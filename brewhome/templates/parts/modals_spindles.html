<!-- Modal Spindle (ajouter / modifier) -->
<div class="modal-overlay" id="spindle-modal" onclick="if(event.target===this)closeModal('spindle-modal')">
  <div class="modal" style="max-width:500px">
    <div class="modal-head">
      <h3 id="spindle-modal-title">Ajouter un densimètre</h3>
      <button class="modal-close" onclick="closeModal('spindle-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Nom du densimètre</label>
          <input type="text" id="spin-f-name" placeholder="Ex : iSpindel-01">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Notes <span style="color:var(--muted)">(optionnel)</span></label>
          <textarea id="spin-f-notes" rows="2" placeholder="Ex : Cuve principale"></textarea>
        </div>
      </div>
      <div id="spindle-token-section" style="display:none">
        <p style="font-weight:600;margin-bottom:6px"><i class="fas fa-key" style="color:var(--amber)"></i> Token d'authentification</p>
        <div class="token-box" id="spindle-token-display" onclick="copySpindleToken()" title="Cliquer pour copier"></div>
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:4px">Dans l'iSpindel, configurer :</p>
        <p style="font-size:.8rem;color:var(--gold);font-family:monospace;word-break:break-all" id="spindle-token-url"></p>
        <p style="font-size:.78rem;color:var(--muted);margin-top:6px"><i class="fas fa-info-circle"></i> Cliquez sur le token pour le copier</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('spindle-modal')">Fermer</button>
      <button class="btn btn-primary" id="spindle-save-btn" onclick="saveSpindle()"><i class="fas fa-plus"></i> Créer</button>
    </div>
  </div>
</div>

<!-- Modal Token Spindle -->
<div class="modal-overlay" id="spindle-token-modal" onclick="if(event.target===this)closeModal('spindle-token-modal')">
  <div class="modal" style="max-width:480px">
    <div class="modal-head">
      <h3><i class="fas fa-key" style="color:var(--amber);margin-right:8px"></i>Identifiants iSpindel</h3>
      <button class="modal-close" onclick="closeModal('spindle-token-modal')">✕</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:14px" id="stm-spindle-name"></p>
      <label style="font-weight:600;display:block;margin-bottom:4px">Token</label>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
        <div class="token-box" id="stm-token" style="flex:1;margin:0" onclick="copyStmToken()" title="Cliquer pour copier"></div>
        <button class="btn btn-ghost btn-sm" onclick="copyStmToken()" title="Copier le token"><i class="fas fa-copy"></i></button>
      </div>
      <label style="font-weight:600;display:block;margin-bottom:4px">URL à configurer dans l'iSpindel</label>
      <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:6px">
        <div class="token-box" id="stm-url" style="flex:1;margin:0;color:var(--info)" onclick="copyStmUrl()" title="Cliquer pour copier"></div>
        <button class="btn btn-ghost btn-sm" onclick="copyStmUrl()" title="Copier l'URL"><i class="fas fa-copy"></i></button>
      </div>
      <p style="font-size:.78rem;color:var(--muted)"><i class="fas fa-circle-info"></i> Méthode : <strong>HTTP POST</strong> — Port : <strong>5000</strong></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="closeModal('spindle-token-modal')">Fermer</button>
    </div>
  </div>
</div>

<!-- Modal Chart Spindle -->
<div class="modal-overlay" id="spindle-chart-modal" onclick="if(event.target===this)closeModal('spindle-chart-modal')">
  <div class="modal" style="max-width:820px">
    <div class="modal-head">
      <h3 id="spindle-chart-title">Suivi densimètre</h3>
      <button class="modal-close" onclick="closeModal('spindle-chart-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="position:relative;height:300px;margin-bottom:16px">
        <canvas id="spindle-chart-canvas"></canvas>
      </div>
      <div id="spindle-chart-table"></div>
    </div>
  </div>
</div>

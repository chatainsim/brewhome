<div class="page" id="page-spindles">
  <div class="section-head">
    <h2>Capteurs connectés</h2>
    <div class="actions">
      <button class="btn btn-primary" onclick="openSpindleModal()"><i class="fas fa-plus"></i> Ajouter</button>
    </div>
  </div>
  <div class="grid-4" style="margin-bottom:20px" id="spin-stats"></div>
  <div class="spindle-grid" id="spindle-grid"></div>
  <div class="empty" id="spindle-empty" style="display:none">
    <i class="fas fa-water"></i><p>Aucun densimètre configuré</p>
  </div>

  <!-- ══ Sondes de température ══ -->
  <div style="margin-top:36px">
    <div class="section-head" style="margin-bottom:16px">
      <h3 style="font-size:1.1rem;margin:0"><i class="fas fa-thermometer-half" style="color:#ef4444;margin-right:8px"></i>Sondes de température</h3>
      <div class="actions">
        <button class="btn btn-primary btn-sm" onclick="openTempSensorModal()"><i class="fas fa-plus"></i> Ajouter</button>
      </div>
    </div>
    <div class="spindle-grid" id="temp-sensor-grid"></div>
    <div class="empty" id="temp-sensor-empty" style="display:none">
      <i class="fas fa-thermometer-empty"></i><p>Aucune sonde configurée</p>
    </div>
  </div>

  <!-- Gestion de la base de données des mesures -->
  <div class="card" style="margin-top:24px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px">
      <div>
        <div style="font-weight:700;margin-bottom:6px"><i class="fas fa-database" style="color:var(--amber);margin-right:7px"></i>Base de données des mesures</div>
        <div style="font-size:.83rem;color:var(--muted);display:flex;flex-direction:column;gap:3px">
          <div><i class="fas fa-water" style="color:var(--info);width:14px;text-align:center;margin-right:5px"></i><span id="spin-db-stats">Chargement…</span></div>
          <div><i class="fas fa-thermometer-half" style="color:#ef4444;width:14px;text-align:center;margin-right:5px"></i><span id="temp-db-stats">Chargement…</span></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:.85rem;color:var(--muted)">Purger les mesures de plus de</span>
        <select id="purge-days" style="width:110px">
          <option value="7">7 jours</option>
          <option value="30" selected>30 jours</option>
          <option value="90">3 mois</option>
          <option value="180">6 mois</option>
          <option value="365">1 an</option>
        </select>
        <button class="btn btn-danger btn-sm" onclick="purgeReadings()">
          <i class="fas fa-trash-can"></i> Purger
        </button>
      </div>
    </div>
  </div>
</div>

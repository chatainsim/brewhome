<div class="page" id="page-brassins">
  <div class="section-head">
    <h2 data-i18n="brew.page_title">Sessions de brassage</h2>
    <div class="actions">
      <button class="btn btn-ghost btn-sm" id="brew-arch-btn" onclick="toggleShowArchived('brew')"></button>
      <button class="btn btn-ghost btn-sm" id="brew-analytics-btn" onclick="toggleBrewAnalytics()"><i class="fas fa-chart-bar"></i> <span data-i18n="brew.analytics_btn">Analytics</span></button>
      <button class="btn btn-ghost btn-sm" onclick="openBrewCompareModal()" title=""><i class="fas fa-code-compare"></i> <span data-i18n="brew.compare_btn">Comparer</span></button>
      <button class="btn btn-ghost btn-sm" onclick="toggleBrewTimerPanel()"><i class="fas fa-stopwatch"></i> <span data-i18n="brew.timer_btn">Timers</span></button>
      <div style="position:relative;display:inline-flex;align-items:center">
        <input type="text" id="brew-search" placeholder="🔍" style="width:160px;padding-right:22px" oninput="renderBrassins();(function(c){c.style.visibility=this.value?'visible':'hidden';c.tabIndex=this.value?0:-1;})(document.getElementById('brew-search-clear'))" onchange="renderBrassins();(function(c){c.style.visibility=this.value?'visible':'hidden';c.tabIndex=this.value?0:-1;})(document.getElementById('brew-search-clear'))">
        <button id="brew-search-clear" onclick="document.getElementById('brew-search').value='';renderBrassins();this.style.visibility='hidden';this.tabIndex=-1;document.getElementById('brew-search').focus()" style="visibility:hidden;position:absolute;right:5px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:.8rem;padding:0;line-height:1" aria-label="Effacer la recherche" tabindex="-1">✕</button>
      </div>
      <span id="brew-search-count" style="font-size:.75rem;color:var(--muted);white-space:nowrap"></span>
      <button class="btn btn-primary" onclick="openBrewModal()"><i class="fas fa-fire-burner"></i> <span data-i18n="brew.launch">Lancer un brassin</span></button>
    </div>
  </div>

  <!-- Analytics panel (collapsible) -->
  <div id="brew-analytics-panel" style="display:none;margin-bottom:20px">
    <div class="card" style="padding:16px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <i class="fas fa-chart-bar" style="color:var(--info)"></i>
        <strong data-i18n="brew.analytics_title">Analytics brasserie</strong>
        <div id="brew-analytics-kpis" style="margin-left:auto;display:flex;gap:16px;font-size:.82rem"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div style="font-size:.75rem;color:var(--muted);margin-bottom:6px" data-i18n="brew.analytics_vol_monthly">Volume mensuel (L)</div>
          <div style="position:relative;height:160px"><canvas id="ba-vol-chart"></canvas></div>
        </div>
        <div>
          <div style="font-size:.75rem;color:var(--muted);margin-bottom:6px" data-i18n="brew.analytics_style_top">Styles les plus brassés</div>
          <div style="position:relative;height:160px"><canvas id="ba-style-chart"></canvas></div>
        </div>
        <div>
          <div style="font-size:.75rem;color:var(--muted);margin-bottom:6px" data-i18n="brew.analytics_eff_trend">Rendement réel (%)</div>
          <div style="position:relative;height:160px"><canvas id="ba-eff-chart"></canvas></div>
        </div>
        <div>
          <div style="font-size:.75rem;color:var(--muted);margin-bottom:6px" data-i18n="brew.analytics_cpl_trend">Coût / litre (€)</div>
          <div style="position:relative;height:160px"><canvas id="ba-cpl-chart"></canvas></div>
        </div>
      </div>
    </div>
  </div>

  <div class="grid-4" style="margin-bottom:20px" id="brew-stats">
    <div class="skel skel-stat"></div>
    <div class="skel skel-stat"></div>
    <div class="skel skel-stat"></div>
    <div class="skel skel-stat"></div>
  </div>

  <div class="card">
    <div id="brew-list">
      <div class="skel skel-row"></div>
      <div class="skel skel-row"></div>
      <div class="skel skel-row"></div>
    </div>
    <div id="brew-empty" style="display:none">
      <!-- Vraiment vide -->
      <div id="brew-empty-cta" class="empty-state">
        <div class="empty-state-icon" style="background:rgba(245,158,11,.12)"><i class="fas fa-fire-burner" style="color:var(--amber)"></i></div>
        <div class="empty-state-title" data-i18n="brew.empty_title">Aucun brassin pour l'instant</div>
        <div class="empty-state-sub" data-i18n="brew.empty_sub">Créez un brassin depuis une recette existante pour suivre votre production</div>
        <div class="empty-state-actions">
          <button class="btn btn-primary" onclick="navigate('recettes')"><i class="fas fa-scroll"></i> <span data-i18n="nav.recettes">Recettes</span></button>
        </div>
      </div>
      <!-- Recherche sans résultat -->
      <div id="brew-empty-noresults" class="empty-state" style="display:none">
        <div class="empty-state-icon" style="background:rgba(148,163,184,.08)"><i class="fas fa-magnifying-glass" style="color:var(--muted)"></i></div>
        <div class="empty-state-title" data-i18n="common.no_results">Aucun résultat</div>
      </div>
    </div>
  </div>
</div>

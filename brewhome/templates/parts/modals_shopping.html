<!-- Modal Liste de courses -->
<div class="modal-overlay" id="shop-modal" onclick="if(event.target===this)closeModal('shop-modal')">
  <div class="modal">
    <div class="modal-head">
      <h3 id="shop-modal-title" data-i18n="shop.modal_add">Ajouter un article</h3>
      <button class="modal-close" onclick="closeModal('shop-modal')">✕</button>
    </div>
    <div class="modal-body">

      <!-- Suggestion depuis l'inventaire -->
      <div class="field" style="position:relative;margin-bottom:14px">
        <label data-i18n="shop.from_inv">Choisir depuis l'inventaire</label>
        <input type="text" id="shop-inv-search" autocomplete="off" spellcheck="false"
          placeholder="Rechercher un ingrédient existant…"
          oninput="shopInvSuggest(this)" onfocus="shopInvSuggest(this)"
          onblur="setTimeout(()=>closeShopInvSuggest(),200)"
          onkeydown="shopInvKeydown(event)"
          data-i18n-placeholder="shop.inv_search_ph">
        <div id="shop-inv-sug" class="ing-suggest"></div>
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;color:var(--muted);font-size:.8rem">
        <hr style="flex:1;border:none;border-top:1px solid var(--border)">
        <span data-i18n="shop.or_manual">— ou saisir manuellement —</span>
        <hr style="flex:1;border:none;border-top:1px solid var(--border)">
      </div>

      <div class="form-row cols-2">
        <div class="field">
          <label><span data-i18n="shop.field_name">Ingrédient</span> <span class="req">*</span></label>
          <input type="text" id="shop-f-name" autocomplete="off">
        </div>
        <div class="field">
          <label><span data-i18n="shop.field_cat">Catégorie</span> <span class="req">*</span></label>
          <select id="shop-f-cat">
            <option value="malt"    data-i18n="cat.malt">Malt</option>
            <option value="houblon" data-i18n="cat.houblon">Houblon</option>
            <option value="levure"  data-i18n="cat.levure">Levure</option>
            <option value="autre"   data-i18n="cat.autre">Autre</option>
          </select>
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="field">
          <label data-i18n="shop.field_qty">Quantité</label>
          <input type="number" id="shop-f-qty" value="1" min="0" step="0.001">
        </div>
        <div class="field">
          <label data-i18n="shop.field_unit">Unité</label>
          <select id="shop-f-unit">
            <option value="kg">kg</option>
            <option value="g" selected>g</option>
            <option value="L">L</option>
            <option value="mL">mL</option>
            <option value="sachet" data-i18n="inv.unit_sachet">sachet</option>
            <option value="pièce"  data-i18n="inv.unit_piece">pièce</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label data-i18n="shop.field_notes">Notes</label>
        <input type="text" id="shop-f-notes" placeholder="—">
      </div>

      <input type="hidden" id="shop-f-inv-id">
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('shop-modal')" data-i18n="common.cancel">Annuler</button>
      <button class="btn btn-primary" onclick="saveShopItem()" data-i18n="common.save">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal Depuis une recette (#11) -->
<div class="modal-overlay" id="shop-recipe-modal" onclick="if(event.target===this)closeModal('shop-recipe-modal')">
  <div class="modal">
    <div class="modal-head">
      <h3 data-i18n="shop.modal_recipe">Ajouter depuis une recette</h3>
      <button class="modal-close" onclick="closeModal('shop-recipe-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field" style="margin-bottom:12px">
        <label data-i18n="shop.pick_recipes">Sélectionner une ou plusieurs recettes</label>
        <div id="shop-recipe-list"
          style="max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:4px 6px;background:var(--bg2)">
        </div>
      </div>
      <div id="shop-recipe-missing"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('shop-recipe-modal')" data-i18n="common.cancel">Annuler</button>
      <button class="btn btn-primary" onclick="withBtn(this, shopAddFromRecipe)" id="shop-recipe-add-btn">
        <i class="fas fa-cart-plus"></i> <span data-i18n="shop.recipe_add_n">Ajouter</span>
      </button>
    </div>
  </div>
</div>

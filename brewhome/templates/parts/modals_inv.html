
<!-- Modal Inventaire -->
<div class="modal-overlay" id="inv-modal" onclick="if(event.target===this)closeModal('inv-modal')">
  <div class="modal">
    <div class="modal-head"><h3 id="inv-modal-title">Ajouter un ingrédient</h3><button class="modal-close" onclick="closeModal('inv-modal')">✕</button></div>
    <div class="modal-body">
      <div class="form-row cols-2">
        <div class="field" style="position:relative">
          <label><span data-i18n="inv.field_name">Nom</span> <span class="req">*</span></label>
          <input type="text" id="inv-f-name" placeholder="Ex : Pilsner Malt" autocomplete="off"
            oninput="invNameSuggest(this)" onfocus="invNameSuggest(this)" onblur="setTimeout(()=>closeInvSuggest(),200)">
          <div id="inv-name-sug" class="ing-suggest"></div>
        </div>
        <div class="field"><label><span data-i18n="inv.col_cat">Catégorie</span> <span class="req">*</span></label>
          <select id="inv-f-cat" onchange="invCatChange()">
            <option value="malt" data-i18n="cat.malt">Malt</option><option value="houblon" data-i18n="cat.houblon">Houblon</option>
            <option value="levure" data-i18n="cat.levure">Levure</option><option value="autre" data-i18n="cat.autre">Autre</option>
          </select></div>
      </div>
      <div class="form-row cols-2">
        <div class="field"><label data-i18n="inv.col_qty">Quantité</label><input type="number" id="inv-f-qty" value="0" min="0" step="0.001"></div>
        <div class="field"><label data-i18n="inv.field_unit">Unité</label>
          <select id="inv-f-unit">
            <option value="kg">kg</option><option value="g">g</option>
            <option value="L">L</option><option value="ml">ml</option>
            <option value="sachet">sachet</option><option value="pièce">pièce</option>
          </select></div>
      </div>
      <div class="form-row cols-3">
        <div class="field" id="inv-f-ebc-wrap"><label data-i18n="inv.field_ebc">EBC (couleur)</label><input type="number" id="inv-f-ebc" step="0.5" placeholder="Ex : 5"></div>
        <div class="field" id="inv-f-alpha-wrap" style="display:none"><label data-i18n="inv.field_alpha">Alpha acides (%)</label><input type="number" id="inv-f-alpha" step="0.1" placeholder="Ex : 10.5"></div>
        <div class="field"><label data-i18n="inv.field_origin">Origine / Producteur</label><input type="text" id="inv-f-origin" placeholder="Ex : Belgique, Weyermann..."></div>
        <div class="field"><label id="inv-f-price-lbl" data-i18n="inv.field_price">Prix (€/kg)</label><input type="number" id="inv-f-price" step="0.01" min="0" placeholder="Ex : 2.50"></div>
      </div>
      <div class="field" id="inv-f-aroma-wrap" style="display:none"><label data-i18n="inv.field_aroma">Profil aromatique</label><input type="text" id="inv-f-aroma" placeholder="Ex : citrus, tropical, floral…"></div>
      <div class="field"><label data-i18n="common.notes">Notes</label><textarea id="inv-f-notes" placeholder="Variété, profil aromatique..."></textarea></div>
      <input type="hidden" id="inv-f-id">
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('inv-modal')" data-i18n="common.cancel">Annuler</button>
      <button class="btn btn-primary" onclick="saveInventoryItem()"><i class="fas fa-floppy-disk"></i> <span data-i18n="common.save">Enregistrer</span></button>
    </div>
  </div>
</div>

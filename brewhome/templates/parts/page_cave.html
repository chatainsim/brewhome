<div class="page" id="page-cave">
  <div class="section-head">
    <h2 data-i18n="cave.page_title">Ma cave à bières</h2>
    <div class="actions">
      <button class="btn btn-ghost btn-sm" id="cave-arch-btn" onclick="toggleShowArchived('cave')"></button>
      <div style="position:relative;display:inline-flex;align-items:center">
        <input type="text" id="cave-search" placeholder="🔍 Rechercher..." style="width:220px;padding-right:24px" oninput="renderCave();document.getElementById('cave-search-clear').style.display=this.value?'flex':'none'">
        <button id="cave-search-clear" onclick="document.getElementById('cave-search').value='';renderCave();this.style.display='none'" style="display:none;position:absolute;right:5px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:.8rem;padding:0;line-height:1;align-items:center" title="Vider">✕</button>
      </div>
      <button class="btn btn-primary" onclick="openBeerModal()"><i class="fas fa-plus"></i> <span data-i18n="common.add">Ajouter</span></button>
    </div>
  </div>

  <div class="grid-4" style="margin-bottom:20px" id="cave-stats"></div>

  <div class="beer-grid" id="cave-grid"></div>
  <div class="empty" id="cave-empty" style="display:none"><i class="fas fa-beer-mug-empty"></i><p data-i18n="cave.empty_cave">Votre cave est vide</p></div>
</div>

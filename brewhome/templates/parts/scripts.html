            </select>
          </div>
          ${timeField}`;
      }
      // Move up/down availability within same category
      const canUp   = recIngredients.slice(0, realIdx).some(x => x.category === cat);
      const canDown = recIngredients.slice(realIdx + 1).some(x => x.category === cat);
      // Malt % badge
      const maltKg  = cat === 'malt' ? (ing.unit === 'kg' ? ing.quantity : ing.quantity / 1000) : 0;
      const maltPct = cat === 'malt' && totalMaltKg > 0 ? (maltKg / totalMaltKg * 100).toFixed(1) : null;

      html += `
        <div class="ing-row">
          <div class="ing-move-btns">
            <button class="ing-move-btn" onclick="moveIngUp(${realIdx})" ${!canUp?'disabled':''} title="${t('rec.ing_move_up')}"><i class="fas fa-chevron-up"></i></button>
            <button class="ing-move-btn" onclick="moveIngDown(${realIdx})" ${!canDown?'disabled':''} title="${t('rec.ing_move_down')}"><i class="fas fa-chevron-down"></i></button>
          </div>
          <div class="ing-name" style="position:relative">
            <div class="ing-lbl"><i class="fas fa-flask" style="font-size:.6rem"></i> ${t('rec.ing_name')}</div>
            <div style="display:flex;align-items:center;gap:6px">
              <div class="stock-dot ${stockInfo.cls}" title="${stockInfo.tip}" style="flex-shrink:0"></div>
              <input type="text" placeholder="${t('common.name')}" value="${esc(ing.name)}"
                oninput="recIngredients[${realIdx}].name=this.value;updateIngSuggest(this,${realIdx},'${cat}')"
                onfocus="updateIngSuggest(this,${realIdx},'${cat}')"
                onblur="setTimeout(()=>closeAllSuggest(),200)"
                style="font-size:.875rem">
              ${stockInfo.badge}
            </div>
            <div class="ing-suggest" id="sug-${realIdx}"></div>
          </div>
          <div class="ing-qty" style="max-width:110px">
            <div class="ing-lbl"><i class="fas fa-scale-balanced"></i> ${t('rec.ing_qty')}</div>
            <input type="number" placeholder="0" step="${ing.unit==='g'?1:ing.unit==='sachet'?0.5:0.1}" min="0" value="${ing.quantity||''}"
              onchange="recIngredients[${realIdx}].quantity=parseFloat(this.value)||0;renderIngredientRows();recCalc()"
              style="font-size:.875rem">
          </div>
          <div class="ing-unit" style="max-width:90px">
            <div class="ing-lbl"><i class="fas fa-ruler"></i> ${t('rec.ing_unit')}</div>
            <select onchange="recIngredients[${realIdx}].unit=this.value;renderIngredientRows();recCalc()" style="font-size:.8rem">
              ${['kg','g','L','mL','sachet','pièce'].map(u=>`<option ${ing.unit===u?'selected':''}>${u}</option>`).join('')}
            </select>
          </div>
          ${maltPct !== null ? `<div class="malt-pct">${maltPct}%</div>` : ''}
          ${extraFields}
          ${(() => { const c = ingCost(ing); return c !== null ? `<div style="flex-shrink:0;text-align:center"><div class="ing-lbl"><i class="fas fa-euro-sign"></i> ${t('rec.ing_cost')}</div><div style="font-size:.85rem;color:var(--success);font-weight:600">≈ ${c.toFixed(2)} €</div></div>` : ''; })()}
          <button class="btn btn-icon btn-danger btn-sm ing-remove" onclick="removeIng(${realIdx})"><i class="fas fa-times"></i></button>
        </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
  calcBrewStats();
}

function getStockInfo(ing) {
  if (!ing.inventory_item_id) {
    // Try to find by name
    const match = S.inventory.find(i => i.name.toLowerCase() === ing.name.toLowerCase());
    if (match) {
      ing.inventory_item_id = match.id;
      ing.stock_qty = match.quantity;
    }
  }
  const inv = ing.inventory_item_id ? S.inventory.find(i => i.id === ing.inventory_item_id) : null;
  if (!inv) return { cls: 'stock-na', tip: t('inv.not_linked'), badge: '' };
  const ok = inv.quantity >= ing.quantity;
  const low = inv.quantity > 0 && inv.quantity < ing.quantity;
  const cls = ok ? 'stock-ok' : low ? 'stock-low' : 'stock-none';
  const sbcls = ok ? 'sb-ok' : low ? 'sb-low' : 'sb-empty';
  const badge = `<div class="stock-badge ${sbcls}" style="font-size:.7rem">${t('inv.qty_avail').replace('${qty}', inv.quantity).replace('${unit}', inv.unit)}</div>`;
  const tip = ok ? t('cave.group_in_stock') : low ? t('inv.low_stock') : t('brew.stock_warn');
  return { cls, tip, badge };
}

function updateIngSuggest(input, idx, cat) {
  const q   = input.value.toLowerCase();
  const sug = document.getElementById(`sug-${idx}`);
  _rSugItems = [];
  closeAllSuggest();

  // Search catalog first, then include inventory-only items
  const catItems = S.catalog.filter(c =>
    c.category === cat && (q.length < 1 || c.name.toLowerCase().includes(q))
  );
  // Also include inventory items not in catalog
  const invExtra = S.inventory.filter(i =>
    i.category === cat &&
    (q.length < 1 || i.name.toLowerCase().includes(q)) &&
    !catItems.some(c => c.name.toLowerCase() === i.name.toLowerCase())
  );

  if (!catItems.length && !invExtra.length) return;

  // Group by subcategory
  const groups = {};
  catItems.forEach(c => {
    const g = c.subcategory || t('cat.autres');
    if (!groups[g]) groups[g] = [];
    const invMatch = S.inventory.find(i => i.name.toLowerCase() === c.name.toLowerCase() && i.category === cat);
    groups[g].push({ ...c, _inv: invMatch || null });
  });
  if (invExtra.length) {
    const _gKey = t('cave.group_in_stock');
    if (!groups[_gKey]) groups[_gKey] = [];
    invExtra.forEach(i => groups[_gKey].push({ name: i.name, _inv: i, id: null }));
  }

  let html = '';
  Object.entries(groups).forEach(([grp, items]) => {
    html += `<div class="ing-suggest-cat">${esc(grp)}</div>`;
    items.forEach(item => {
      const inv     = item._inv;
      const stockTxt = inv ? `<span style="color:${inv.quantity>0?'var(--success)':'var(--danger)'};">${inv.quantity} ${inv.unit}</span>` : '';
      const specs   = [];
      if (item.ebc   != null) specs.push(`EBC ${item.ebc}`);
      if (item.alpha != null) specs.push(`α ${item.alpha}%`);
      const specTxt = specs.length ? `<span style="color:var(--muted);font-size:.72rem">${specs.join(' · ')}</span>` : '';
      const _ri = _rSugItems.push({name: item.name, invId: inv?inv.id:null, catalog: item}) - 1;
      html += `<div class="ing-suggest-item" onmousedown="selectSuggest(${idx},${_ri})">
        <span>${esc(item.name)} ${specTxt}</span>
        ${stockTxt}
      </div>`;
    });
  });
  sug.innerHTML = html;
  sug.classList.add('open');
}

function closeAllSuggest() {
  document.querySelectorAll('.ing-suggest').forEach(s => s.classList.remove('open'));
}

function selectSuggest(idx, si) {
  const { name, invId, catalog } = _rSugItems[si];
  recIngredients[idx].name = name;
  recIngredients[idx].inventory_item_id = invId || null;
  // Auto-fill from catalog
  if (catalog) {
    if (catalog.ebc   != null) recIngredients[idx].ebc   = catalog.ebc;
    if (catalog.alpha != null) recIngredients[idx].alpha = catalog.alpha;
    if (catalog.gu    != null) recIngredients[idx].gu    = catalog.gu;
    if (catalog.default_unit)  recIngredients[idx].unit  = catalog.default_unit;
  }
  if (!recIngredients[idx].unit && invId) {
    const inv = S.inventory.find(i => i.id === invId);
    if (inv) recIngredients[idx].unit = inv.unit;
  }
  renderIngredientRows();
  recCalc();
}

function removeIng(idx) {
  recIngredients.splice(idx, 1);
  renderIngredientRows();
  recCalc();
}

async function saveRecipe(silent = false) {
  const name = document.getElementById('rec-name').value.trim();
  if (!name) { showRecAlert(t('rec.err_name_required')); return; }
  const payload = {
    batch_no:    parseInt(document.getElementById('rec-batch').value) || null,
    name,
    style:       document.getElementById('rec-style').value.trim() || null,
    volume:      parseFloat(document.getElementById('rec-volume').value) || 20,
    brew_date:   document.getElementById('rec-brew-date').value || null,
    mash_temp:   parseFloat(document.getElementById('rec-mash-temp').value),
    mash_time:   parseInt(document.getElementById('rec-mash-time').value),
    boil_time:   parseInt(document.getElementById('rec-boil-time').value),
    mash_ratio:  parseFloat(document.getElementById('rec-mash-ratio').value),
    evap_rate:   parseFloat(document.getElementById('rec-evap').value),
    grain_absorption: parseFloat(document.getElementById('rec-absorption').value),
    brewhouse_efficiency: parseFloat(document.getElementById('rec-efficiency').value),
    ferm_temp:   parseFloat(document.getElementById('rec-ferm-temp').value) || 20,
    ferm_time:   parseInt(document.getElementById('rec-ferm-time').value)   || 14,
    notes:       document.getElementById('rec-notes').value.trim() || null,
    rating:      parseInt(document.getElementById('rec-rating').value) || null,
    ingredients: recIngredients.map(i => ({
      inventory_item_id: i.inventory_item_id || null,
      name: i.name, category: i.category,
      quantity: i.quantity, unit: i.unit,
      hop_time: i.hop_time || null, hop_type: i.hop_type || null, hop_days: i.hop_days || null,
      other_type: i.other_type || null, other_time: i.other_time || null,
      ebc: i.ebc || null, alpha: i.alpha || null, notes: i.notes || null,
    })),
  };
  try {
    if (recEditingId) {
      const updated = await api('PUT', `/api/recipes/${recEditingId}`, payload);
      const idx = S.recipes.findIndex(r => r.id === recEditingId);
      if (idx !== -1) S.recipes[idx] = updated;
      if (!silent) toast(t('rec.updated'), 'success');
    } else {
      let usedDraftId = null;
      if (_pendingDraftId) { usedDraftId = _pendingDraftId; payload.draft_id = _pendingDraftId; _pendingDraftId = null; }
      const created = await api('POST', '/api/recipes', payload);
      S.recipes.unshift(created);
      recEditingId = created.id;
      // Lier l'événement calendrier du brouillon à la nouvelle recette
      if (usedDraftId) {
        const ce = (S.customEvents || []).find(e => e.draft_id === usedDraftId && !e.recipe_id);
        if (ce) {
          try {
            const updatedEv = await api('PUT', `/api/custom_events/${ce.id}`, { ...ce, recipe_id: created.id });
            const idx = S.customEvents.findIndex(x => x.id === ce.id);
            if (idx !== -1) S.customEvents[idx] = updatedEv;
          } catch(_) {}
        }
      }
      if (!silent) toast(t('rec.saved'), 'success');
    }
    renderRecipeList();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    showRecAlert('');
    setRecipeMode('view');
  } catch(e) { showRecAlert(t('rec.err_save_msg') + ' : ' + (e.error || '')); }
}

async function deleteRecipe(id) {
  if (!confirm(t('common.confirm_delete'))) return;
  try {
    await api('DELETE', `/api/recipes/${id}`);
    S.recipes = S.recipes.filter(r => r.id !== id);
    if (recEditingId === id) clearRecipeForm();
    else renderRecipeList();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast(t('rec.deleted'), 'success');
  } catch(e) { toast(t('common.delete') + ' — ' + t('common.error'), 'error'); }
}

function setRecipeMode(mode) {
  recViewMode = mode;
  const formEl  = document.getElementById('rec-form-panel');
  const viewEl  = document.getElementById('rec-view-panel');
  const actions = document.getElementById('rec-actions');
  if (mode === 'view') {
    formEl.style.display = 'none';
    viewEl.style.display = '';
    renderRecipeView();
    actions.innerHTML = `
      <button class="btn btn-ghost" onclick="showRecipeListOnly()"><i class="fas fa-arrow-left"></i> ${t('common.back')}</button>
      <button class="btn btn-ghost" onclick="newRecipeFromList()"><i class="fas fa-plus"></i> ${t('rec.new')}</button>
      <button class="btn btn-ghost" onclick="duplicateRecipe()"><i class="fas fa-copy"></i> ${t('common.duplicate')}</button>
      <button class="btn btn-ghost" onclick="printRecipe()"><i class="fas fa-print"></i> ${t('cave.print')}</button>
      <button class="btn btn-primary" onclick="setRecipeMode('edit')"><i class="fas fa-pen"></i> ${t('common.edit')}</button>`;
  } else {
    formEl.style.display = '';
    viewEl.style.display = 'none';
    const hasRec = !!recEditingId;
    actions.innerHTML = `
      <button class="btn btn-ghost" onclick="showRecipeListOnly()"><i class="fas fa-arrow-left"></i> ${t('common.back')}</button>
      ${hasRec ? `<button class="btn btn-ghost" onclick="loadRecipeForm(${recEditingId})"><i class="fas fa-rotate-left"></i> ${t('common.cancel')}</button>` : ''}
      <button class="btn btn-primary" onclick="saveRecipe()"><i class="fas fa-floppy-disk"></i> ${t('common.save')}</button>`;
  }
}

function ebcToColor(ebc) {
  const srm = (ebc || 0) / 1.97;
  if (srm <  2) return '#FFE699';
  if (srm <  4) return '#FFD878';
  if (srm <  6) return '#FFCA5A';
  if (srm <  9) return '#FFC033';
  if (srm < 12) return '#EBB008';
  if (srm < 15) return '#D98000';
  if (srm < 18) return '#CB6E00';
  if (srm < 22) return '#BE5C00';
  if (srm < 28) return '#A95200';
  if (srm < 35) return '#8D4C00';
  if (srm < 44) return '#6B3A00';
  return '#3D1F00';
}

  const panel = document.getElementById('rec-view-panel');
  const r = S.recipes.find(x => x.id === recEditingId);
  if (!r) { panel.innerHTML = ''; return; }

  // Water values from hidden form elements (already computed)
  const wv = id => document.getElementById(id)?.textContent || '–';

  // Malt bill
  const malts = recIngredients.filter(i => i.category === 'malt');
  const totalMaltKg = malts.reduce((s, m) => s + (m.unit === 'kg' ? m.quantity : m.quantity / 1000), 0);
  let maltHtml = '';
  malts.forEach(m => {
    const kg  = m.unit === 'kg' ? m.quantity : m.quantity / 1000;
    const pct = totalMaltKg > 0 ? (kg / totalMaltKg * 100) : 0;
    const ebcVal = m.ebc != null ? m.ebc : (S.catalog.find(c => c.name.toLowerCase() === m.name.toLowerCase())?.ebc ?? null);
    const dot = ebcVal != null
      ? `<span class="malt-ebc-dot" style="background:${ebcToColor(ebcVal)}" title="EBC ${ebcVal}"></span>` : '';
    maltHtml += `<div class="malt-bar-row">
      <div class="malt-bar-label">
        <span class="malt-bar-name">${dot}<span>${esc(m.name)}</span></span>
        <span style="color:var(--muted)">${m.quantity} ${m.unit}&ensp;<strong style="color:var(--malt)">${totalMaltKg > 0 ? pct.toFixed(1) : '–'}%</strong></span>

// ── Déplacer un ingrédient dans sa catégorie ───────────────────────────────────
function moveIngUp(realIdx) {
  const cat = recIngredients[realIdx].category;
  for (let i = realIdx - 1; i >= 0; i--) {
    if (recIngredients[i].category === cat) {
      [recIngredients[i], recIngredients[realIdx]] = [recIngredients[realIdx], recIngredients[i]];
      renderIngredientRows();
      return;
    }
  }
}

function moveIngDown(realIdx) {
  const cat = recIngredients[realIdx].category;
  for (let i = realIdx + 1; i < recIngredients.length; i++) {
    if (recIngredients[i].category === cat) {
      [recIngredients[i], recIngredients[realIdx]] = [recIngredients[realIdx], recIngredients[i]];
      renderIngredientRows();
      return;
    }
  }
}

  el.style.display = open ? 'none' : '';
  btn.classList.toggle('open', !open);
}

// ── Dupliquer une recette ──────────────────────────────────────────────────────
async function duplicateRecipe() {
  if (!recEditingId) { showRecAlert(t('rec.err_open_to_dup')); return; }
  const r = S.recipes.find(x => x.id === recEditingId);
  if (!r) return;
  const maxBatch = S.recipes.reduce((m, x) => Math.max(m, x.batch_no || 0), 0);
  const payload = {
    batch_no:   maxBatch + 1,
    name:       r.name + ' (copie)',
    style:      r.style || null,
    volume:     r.volume,
    brew_date:  null,
    mash_temp:  r.mash_temp,
    mash_time:  r.mash_time,
    boil_time:  r.boil_time,
    mash_ratio: r.mash_ratio,
    evap_rate:  r.evap_rate,
    grain_absorption:     r.grain_absorption,
    brewhouse_efficiency: r.brewhouse_efficiency,
    ferm_temp:  r.ferm_temp || 20,
    ferm_time:  r.ferm_time || 14,
    notes:      r.notes || null,
    ingredients: (r.ingredients || []).map(i => ({
      inventory_item_id: i.inventory_item_id || null,
      name: i.name, category: i.category,
      quantity: i.quantity, unit: i.unit,
      hop_time: i.hop_time || null, hop_type: i.hop_type || null, hop_days: i.hop_days || null,
      other_type: i.other_type || null, other_time: i.other_time || null,
      ebc: i.ebc || null, alpha: i.alpha || null, notes: i.notes || null,
    })),
  };
  try {
    const created = await api('POST', '/api/recipes', payload);
    S.recipes.unshift(created);
    loadRecipeForm(created.id);
    renderRecipeList();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast(t('rec.duplicated'), 'success');
  } catch(e) { showRecAlert(t('common.error') + ' : ' + (e.error || '')); }
}

// ── Imprimer une recette ───────────────────────────────────────────────────────
function printRecipe() {
  if (!recEditingId) { showRecAlert(t('rec.err_open_to_print')); return; }
  const r = S.recipes.find(x => x.id === recEditingId);
  if (!r) return;

  const wv = id => document.getElementById(id)?.textContent || '–';

  // ── Recalcul des estimations ───────────────────────────────────────────────
  const vol = parseFloat(document.getElementById('rec-volume').value) || 20;
  const eff = parseFloat(document.getElementById('rec-efficiency').value) || 72;

  let ogPoints = 0;
  recIngredients.filter(i => i.category === 'malt').forEach(m => {
    if (!m.quantity) return;
    let guVal = m.gu != null ? m.gu : null;
    if (guVal == null) { const c = S.catalog.find(c => c.name.toLowerCase() === m.name.toLowerCase()); if (c?.gu != null) guVal = c.gu; }
    if (guVal == null) return;
    ogPoints += (m.unit === 'kg' ? m.quantity : m.quantity / 1000) * guVal * (eff / 100);
  });
  const og  = ogPoints > 0 ? 1 + ogPoints / vol / 1000 : null;
  const fg  = og != null ? 1 + (og - 1) * 0.25 : null;
  const abv = og != null ? (og - fg) * 131.25 : null;

  const wortOG = og || 1.050;
  let ibuTotal = 0;
  recIngredients.filter(i => i.category === 'houblon').forEach(h => {
    if (!h.quantity || !h.alpha) return;
    const ht = h.hop_type || 'ebullition';
    if (ht === 'dryhop') return;
    const mins = ht === 'whirlpool' ? 15 : (h.hop_time ?? 60);
    const g = h.unit === 'kg' ? h.quantity * 1000 : h.quantity;
    ibuTotal += 1.65 * Math.pow(0.000125, wortOG - 1) * (1 - Math.exp(-0.04 * mins)) / 4.15 * (h.alpha / 100) * g * 1000 / vol;
  });
  const ibuVal = ibuTotal > 0 ? ibuTotal : null;

  let ebcWt = 0, ebcKg = 0;
  recIngredients.filter(i => i.category === 'malt').forEach(m => {
    if (!m.quantity) return;
    let e = m.ebc ?? (S.catalog.find(c => c.name.toLowerCase() === m.name.toLowerCase())?.ebc ?? null);
    if (e == null) return;
    const kg = m.unit === 'kg' ? m.quantity : m.quantity / 1000;
    ebcWt += kg * e; ebcKg += kg;
  });
  const ebcVal = ebcKg > 0 ? ebcWt / ebcKg : null;

  // BJCP
  const bjcp = S.bjcp.find(x => x.name === (document.getElementById('rec-style').value || '').trim()) || null;

  // ── Barre d'estimation (HTML pur, compatible impression) ───────────────────
  function estBar(label, val, cfgMin, cfgMax, dec, unit, bMin, bMax) {
    const span = cfgMax - cfgMin;
    const hasBjcp = bMin != null && bMax != null;
    const pct = val != null ? Math.min(100, Math.max(0, (val - cfgMin) / span * 100)) : null;
    const rL  = hasBjcp ? Math.min(100, Math.max(0, (bMin - cfgMin) / span * 100)) : 0;
    const rW  = hasBjcp ? Math.min(100, Math.max(0, (bMax - cfgMin) / span * 100)) - rL : 0;
    const inR = hasBjcp && val != null && val >= bMin && val <= bMax;
    const col = val == null ? '#9ca3af' : hasBjcp ? (inR ? '#16a34a' : '#dc2626') : '#d97706';
    const valStr = val != null ? val.toFixed(dec) + (unit ? '\u00a0' + unit : '') : '–';
    const tgt = hasBjcp ? `⌖\u00a0${bMin.toFixed(dec)}–${bMax.toFixed(dec)}${unit||''}` : '';
    return `<div class="est-row">
      <div class="est-lbl">${label}</div>
      <div class="est-track">
        ${hasBjcp ? `<div class="est-range" style="left:${rL.toFixed(1)}%;width:${rW.toFixed(1)}%"></div>` : ''}
        ${pct != null ? `<div class="est-marker" style="left:${pct.toFixed(1)}%;background:${col}"></div>` : ''}
      </div>
      <div class="est-val" style="color:${col}">${valStr}</div>
      <div class="est-target">${tgt}</div>
    </div>`;
  }

  const estimHtml =
    estBar('OG',  og,     1.020, 1.130, 3, '',  bjcp?.og_min,  bjcp?.og_max)  +
    estBar('FG',  fg,     1.002, 1.030, 3, '',  bjcp?.fg_min,  bjcp?.fg_max)  +
    estBar('ABV', abv,    0,     14,    1, '%', bjcp?.abv_min, bjcp?.abv_max) +
    estBar('IBU', ibuVal, 0,     120,   0, '',  bjcp?.ibu_min, bjcp?.ibu_max) +
    estBar('EBC', ebcVal, 0,     120,   0, '',  bjcp?.ebc_min, bjcp?.ebc_max);

  // ── Tableaux ingrédients ───────────────────────────────────────────────────
  const catLabels = { malt: t('rec.malts_full'), houblon: t('cat.houblons'), levure: t('cat.levures'), autre: t('cat.autres') };
  const totalMaltKg = (r.ingredients || []).filter(i => i.category === 'malt')
    .reduce((s, i) => s + (i.unit === 'kg' ? i.quantity : i.quantity / 1000), 0);

  const PRINT_OT_LABELS = {empatage:t('rec.hop_empatage'),sparge:t('rec.hop_sparge'),ebullition:t('rec.hop_ebullition'),flameout:t('rec.hop_flameout'),whirlpool:t('rec.hop_whirlpool'),dryhop:t('rec.hop_dryhop'),fermentation:t('rec.hop_fermentation'),packaging:t('rec.hop_packaging')};

  function maltTable(items) {
    if (!items.length) return '';
    return `<table><thead><tr><th>${t('rec.ing_name')}</th><th>${t('rec.ing_qty_abbr')}</th></tr></thead><tbody>`
      + items.map(i => `<tr><td>${i.name}</td><td>${i.quantity}\u00a0${i.unit}</td></tr>`).join('')
      + `</tbody></table>`;
  }

  let ingHtml = '';
  const malts = (r.ingredients || []).filter(i => i.category === 'malt');
  if (malts.length) {
    const half = Math.ceil(malts.length / 2);
    ingHtml += `<h3>${catLabels.malt}</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:4px;border:1px solid #ddd;border-radius:4px;overflow:hidden">
      <div style="border-right:2px solid #ccc;padding-right:0">${maltTable(malts.slice(0, half))}</div>
      <div>${maltTable(malts.slice(half))}</div>
    </div>`;
  }

  ['houblon','levure','autre'].forEach(cat => {
    const items = (r.ingredients || []).filter(i => i.category === cat);
    if (!items.length) return;
    let cols = `<th>${t('rec.ing_name')}</th><th>${t('rec.ing_qty_abbr')}</th>`;
    if (cat === 'houblon') cols += `<th>Alpha</th><th>${t('rec.col_type')}</th><th>${t('rec.col_duration')}</th>`;
    if (cat === 'autre')   cols += `<th>${t('rec.col_moment')}</th><th>${t('rec.col_duration')}</th>`;
    ingHtml += `<h3>${catLabels[cat]}</h3><table><thead><tr>${cols}</tr></thead><tbody>`;
    items.forEach(i => {
      let row = `<td>${i.name}</td><td>${i.quantity}\u00a0${i.unit}</td>`;
      if (cat === 'houblon') {
        const ht = i.hop_type || 'ebullition';
        const htLabel = {ebullition:t('rec.hop_ebullition'), whirlpool:t('rec.hop_whirlpool'), dryhop:t('rec.hop_dryhop')}[ht] || ht;
        const dur = ht === 'dryhop' ? (i.hop_days != null ? i.hop_days + ' j' : '–') : (i.hop_time != null ? i.hop_time + ' min' : '–');
        row += `<td>${i.alpha != null ? i.alpha + '%' : '–'}</td><td>${htLabel}</td><td>${dur}</td>`;
      }
      if (cat === 'autre') {
        const ot = i.other_type || 'ebullition';
        const otLabel = PRINT_OT_LABELS[ot] || ot;
        const dur = (ot === 'dryhop') ? (i.other_time != null ? i.other_time + ' j' : '–')
          : (ot === 'ebullition' || ot === 'whirlpool') ? (i.other_time != null ? i.other_time + ' min' : '–')
          : '–';
        row += `<td>${otLabel}</td><td>${dur}</td>`;
      }
      ingHtml += `<tr>${row}</tr>`;
    });
    ingHtml += '</tbody></table>';
  });

  const notesHtml = r.notes
    ? `<div class="notes"><strong>${t('common.notes')} :</strong><br>${r.notes.replace(/\n/g,'<br>')}</div>` : '';

  const win = window.open('', '_blank', 'width=840,height=700');
  win.document.write(`<!DOCTYPE html><html lang="fr"><head>
  <meta charset="UTF-8"><title>${r.name}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
    body{font-family:Georgia,serif;color:#111;padding:28px 36px;font-size:13px}
    h1{font-size:22px;margin-bottom:6px}
    h3{font-family:sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#888;margin:18px 0 6px;border-bottom:1px solid #ddd;padding-bottom:4px}
    .meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
    .badge{display:inline-block;background:#f3f3f3;border:1px solid #ccc;border-radius:4px;padding:2px 8px;font-size:11px}
    .header{border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:16px}
    .params-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
    .param{background:#f8f8f8;padding:5px 8px;border-radius:4px}
    .param-val{font-size:12px;font-weight:bold}
    .param-lbl{font-family:sans-serif;font-size:9px;color:#888;text-transform:uppercase;margin-top:1px}
    .water-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
    .stat-box{text-align:center;background:#f8f8f8;padding:8px 4px;border-radius:6px}
    .stat-val{font-size:15px;font-weight:bold}
    .stat-lbl{font-family:sans-serif;font-size:10px;color:#888}
    table{width:100%;border-collapse:collapse;margin-bottom:4px}
    th{text-align:left;padding:4px 8px;font-size:11px;text-transform:uppercase;color:#888;border-bottom:1px solid #ddd;font-family:sans-serif}
    td{padding:5px 8px;border-bottom:1px solid #f0f0f0;font-size:12px}
    .notes{margin-top:16px;padding:10px 12px;background:#f8f8f8;border-radius:6px;font-size:12px;font-family:sans-serif;line-height:1.5}
    .est-row{display:grid;grid-template-columns:44px 1fr 76px 140px;align-items:center;gap:8px;margin-bottom:7px;font-family:sans-serif}
    .est-lbl{font-size:11px;font-weight:700;color:#555}
    .est-track{height:8px;background:#e5e7eb;border-radius:4px;position:relative;overflow:visible}
    .est-range{position:absolute;top:0;height:100%;background:#fbbf24;opacity:.33;border-radius:4px}
    .est-marker{position:absolute;top:-3px;width:3px;height:14px;border-radius:2px;transform:translateX(-50%)}
    .est-val{font-size:13px;font-weight:700;text-align:right}
    .est-target{font-size:10px;color:#9ca3af}
    .ebc-dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:middle;border:1px solid rgba(0,0,0,.15)}
    @media print{body{padding:16px}}
  </style></head><body>
  <div class="header">
    <h1>${esc(r.name)}</h1>
    <div class="meta">
      ${r.style   ? `<span class="badge">${esc(r.style)}</span>` : ''}
      ${r.batch_no? `<span class="badge">${t('rec.batch_word')} #${r.batch_no}</span>` : ''}
      <span class="badge">${r.volume} L</span>
      ${r.brew_date ? `<span class="badge">${r.brew_date}</span>` : ''}
    </div>
  </div>
  <div class="params-grid">
    <div class="param"><div class="param-val">${r.mash_temp||66}°C</div><div class="param-lbl">${t('rec.mash_temp')}</div></div>
    <div class="param"><div class="param-val">${r.mash_time||60} min</div><div class="param-lbl">${t('rec.mash_time')}</div></div>
    <div class="param"><div class="param-val">${r.boil_time||60} min</div><div class="param-lbl">${t('rec.boil_time')}</div></div>
    <div class="param"><div class="param-val">${r.ferm_temp||20}°C</div><div class="param-lbl">${t('rec.ferm_temp')}</div></div>
    <div class="param"><div class="param-val">${r.ferm_time||14} j</div><div class="param-lbl">${t('rec.ferm_time_label')}</div></div>
  </div>
  <h3>${t('rec.print_estimations')}${bjcp ? ' \u2014 ' + esc(bjcp.name) : ''}</h3>

  <h3>${t('rec.print_water')}</h3>

    <div class="stat-box"><div class="stat-val">${wv('rw-sparge')}</div><div class="stat-lbl">${t('rec.water_sparge')}</div></div>
    <div class="stat-box"><div class="stat-val">${wv('rw-preboil')}</div><div class="stat-lbl">${t('rec.water_preboil')}</div></div>

  </div>

  <script>window.onload=function(){window.print()}<\/script>
</body></html>`);
  win.document.close();
}

const BREW_STATUS = {
  planned:     { get label() { return t('brew.status_planned'); },       color: 'var(--info)' },
  in_progress: { get label() { return t('brew.status_in_progress'); },   color: 'var(--amber)' },
  fermenting:  { get label() { return t('brew.status_fermenting'); },    color: 'var(--hop)' },
  completed:   { get label() { return t('brew.status_completed'); },     color: 'var(--success)' },
};
function brewStatusBadge(s) {
  const st = BREW_STATUS[s] || { label: s || t('brew.status_planned'), color: 'var(--muted)' };
  return `<span style="font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:20px;background:${st.color}22;color:${st.color};border:1px solid ${st.color}55;vertical-align:middle">${st.label}</span>`;
}

function _spindleAgo(dateStr) {
  if (!dateStr) return null;
  const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
  if (diff < 60)   return t('brew.ago_sec').replace('${diff}', diff);
  if (diff < 3600) return t('brew.ago_min').replace('${diff}', Math.floor(diff/60));
  if (diff < 86400)return t('brew.ago_hour').replace('${diff}', Math.floor(diff/3600));
  return t('brew.ago_day').replace('${diff}', Math.floor(diff/86400));
}

function renderBrassins() {
  const q      = (document.getElementById('brew-search')?.value || '').toLowerCase();
  const active = S.brews.filter(b => !b.archived);
  const arch   = S.brews.filter(b => b.archived);
  const shown  = (showArchivedBrew ? [...active, ...arch] : active)
    .filter(b => !q || b.name.toLowerCase().includes(q) || (b.recipe_name || '').toLowerCase().includes(q));

  // Stats on active brews only (not affected by search)
  document.getElementById('brew-stats').innerHTML = `
    <div class="stat"><div class="stat-val">${active.length}</div><div class="stat-lbl">${t('brew.stat_total')}</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--hop)">${active.filter(b=>b.status==='completed').length}</div><div class="stat-lbl">${t('brew.stat_completed')}</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--amber)">${active.length ? (active.filter(b=>b.abv).reduce((s,b)=>s+b.abv,0) / (active.filter(b=>b.abv).length || 1)).toFixed(1)+'%' : '–'}</div><div class="stat-lbl">${t('brew.stat_abv_avg')}</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--info)">${active.length ? active.filter(b=>b.volume_brewed).reduce((s,b)=>s+(b.volume_brewed||0),0).toFixed(0)+'L' : '–'}</div><div class="stat-lbl">${t('brew.stat_vol_total')}</div></div>`;

  const list = document.getElementById('brew-list');
  const emptyEl = document.getElementById('brew-empty');
  emptyEl.style.display = shown.length ? 'none' : 'block';
  if (!shown.length) emptyEl.querySelector('p').textContent = q ? t('common.no_results') : t('brew.empty_none');

  if (!shown.length) { list.innerHTML = ''; }
  else {
    const STATUS_ORDER = ['planned', 'in_progress', 'fermenting', 'completed'];
    const STATUS_ICONS = {
      planned:     'fas fa-calendar-plus',
      in_progress: 'fas fa-fire-flame-curved',
      fermenting:  'fas fa-flask',
      completed:   'fas fa-check-circle',
    };

    const _brewCardHtml = b => {
      const sp  = S.spindles.find(s => s.brew_id === b.id);
      const ts  = S.tempSensors.find(s => s.brew_id === b.id);
      const keg = S.sodaKegs.find(k => k.brew_id === b.id);
      let spindleHtml = '';
      let spindleBtn  = '';
      let tempBadge   = '';
      let tempBtn     = '';
      if (sp) {
        const gravStr = sp.last_gravity    != null ? sp.last_gravity.toFixed(3)    : null;
        const tempStr = sp.last_temperature != null ? sp.last_temperature.toFixed(1) : null;
        const ago     = _spindleAgo(sp.last_reading_at);
        const isLive  = sp.last_reading_at && (Date.now() - new Date(sp.last_reading_at).getTime()) < 3_600_000;
        spindleHtml = `
          <div class="brew-spindle-badge">
            ${isLive ? '<span class="bsb-live"></span>' : '<i class="fas fa-water" style="color:var(--info);font-size:.75rem"></i>'}
            <span style="color:var(--muted);font-size:.78rem">${esc(sp.name)}</span>
            ${gravStr ? `<span class="bsb-grav"><i class="fas fa-weight-hanging" style="font-size:.7rem"></i> ${gravStr}</span>` : ''}
            ${tempStr ? `<span class="bsb-temp">${tempStr}°C</span>` : ''}
            ${ago ? `<span class="bsb-ago">${ago}</span>` : ''}
          </div>`;
        spindleBtn = `<button class="btn btn-ghost btn-sm btn-icon" onclick="openSpindleChart(${sp.id})" title="${t('spin.chart_gravity_label')} — ${esc(sp.name)}"><i class="fas fa-water" style="color:var(--info)"></i></button>`;
      }
      if (ts) {
        const tVal = ts.last_temperature != null ? ts.last_temperature.toFixed(1) + '°C' : null;
        const ago  = _spindleAgo(ts.last_reading_at);
        const isLive = ts.last_reading_at && (Date.now() - new Date(ts.last_reading_at).getTime()) < 3_600_000;
        tempBadge = `
          <div class="brew-spindle-badge" style="border-color:#ef444440">
            ${isLive ? '<span class="bsb-live" style="background:#ef4444"></span>' : '<i class="fas fa-thermometer-half" style="color:#ef4444;font-size:.75rem"></i>'}
            <span style="color:var(--muted);font-size:.78rem">${esc(ts.name)}</span>
            ${tVal ? `<span class="bsb-temp" style="color:#ef4444">${tVal}</span>` : ''}
            ${ago ? `<span class="bsb-ago">${ago}</span>` : ''}
          </div>`;
        tempBtn = `<button class="btn btn-ghost btn-sm btn-icon" onclick="openTempChart(${ts.id})" title="${t('spin.chart_temp_label')} — ${esc(ts.name)}"><i class="fas fa-thermometer-half" style="color:#ef4444"></i></button>`;
      }
      return `
      <div class="brew-card ${b.archived ? 'archived-item' : ''}" data-id="${b.id}" draggable="true">
        <span class="brew-drag-handle" title="${t('brew.drag_to_reorder')}"><i class="fas fa-grip-vertical"></i></span>
        <div class="brew-card-info">
          <div class="brew-card-name">${esc(b.name)}</div>
          <div class="brew-card-meta">
            ${b.recipe_name ? `<i class="fas fa-scroll"></i> ${esc(b.recipe_name)} · ` : ''}
            ${b.brew_date ? `<i class="fas fa-calendar"></i> ${b.brew_date} · ` : ''}
            ${b.volume_brewed ? `${b.volume_brewed}L · ` : ''}
            ${b.abv ? `<strong style="color:var(--amber)">${b.abv}% ABV</strong>` : ''}
            ${b.og ? ` · OG ${b.og}` : ''}${b.fg ? ` → FG ${b.fg}` : ''}
          </div>
          ${b.notes ? `<div style="font-size:.78rem;color:var(--muted);margin-top:4px">${esc(b.notes)}</div>` : ''}
          ${keg ? `<div class="brew-spindle-badge" style="border-color:rgba(245,158,11,.35);margin-top:6px">
            <i class="fas fa-jar" style="color:var(--amber);font-size:.75rem"></i>
            <span style="color:var(--muted);font-size:.78rem">${esc(keg.name)}</span>
            ${keg.current_liters != null ? `<span class="bsb-grav" style="color:var(--amber)">${keg.current_liters} L</span>` : ''}
          </div>` : ''}
          ${spindleHtml}${tempBadge}
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          ${spindleBtn}${tempBtn}
          ${b.fermentation_count > 0 ? `<button class="btn btn-ghost btn-sm btn-icon" onclick="openBrewFermentationChart(${b.id})" title="${t('brew.readings')} (${b.fermentation_count})"><i class="fas fa-chart-line" style="color:var(--info)"></i></button>` : ''}
          <button class="btn btn-ghost btn-sm btn-icon" onclick="openBrewKegModal(${b.id})" title="${keg ? esc(keg.name) : t('brew.keg_assign')}" style="${keg ? 'color:var(--amber)' : ''}"><i class="fas fa-jar"></i></button>
          ${b.status === 'completed' ? `<button class="btn btn-sm btn-success" onclick="openAfterBrewModal(${b.id})" title="${t('brew.to_cave')}"><i class="fas fa-beer-mug-empty"></i> ${t('brew.to_cave')}</button>` : ''}
          <button class="btn btn-icon btn-ghost btn-sm" onclick="archiveItem('brew',${b.id},${b.archived?0:1})" title="${b.archived?t('common.restore'):t('common.archive')}"><i class="fas fa-${b.archived?'box-open':'box-archive'}"></i></button>
          <button class="btn btn-icon btn-ghost btn-sm" onclick="openBrewEditModal(${b.id})" title="${t('common.edit')}"><i class="fas fa-pen"></i></button>
          <button class="btn btn-icon btn-danger btn-sm" onclick="deleteBrew(${b.id})"><i class="fas fa-trash"></i></button>
        </div>
      </div>`;
    };

    const groups = STATUS_ORDER.map(status => ({
      status,
      brews: shown.filter(b => (b.status || 'planned') === status),
    })).filter(g => g.brews.length > 0);

    list.innerHTML = groups.map(g => {
      const st = BREW_STATUS[g.status];
      return `
        <div class="brew-group">
          <div class="brew-group-header">
            <i class="${STATUS_ICONS[g.status]}" style="color:${st.color}"></i>
            <span style="color:${st.color}">${st.label}</span>
            <span class="brew-group-count">${g.brews.length}</span>
          </div>
          ${g.brews.map(_brewCardHtml).join('')}
        </div>`;
    }).join('');
  }

  // Archive button
  const archBtn = document.getElementById('brew-arch-btn');
  if (archBtn) {
    const archCount = arch.length;
    archBtn.textContent = showArchivedBrew ? t('brew.show_archives') : `\uD83D\uDDC3\uFE0F Archives (${archCount})`;
  }

  // ── Drag & drop reorder (within each status group) ──
  list.querySelectorAll('.brew-group').forEach(group => {
    group.querySelectorAll('.brew-card[draggable]').forEach(card => {
      card.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', card.dataset.id);
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => card.classList.add('dragging'), 0);
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        group.querySelectorAll('.brew-card').forEach(c => c.classList.remove('drag-over'));
      });
      card.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        group.querySelectorAll('.brew-card').forEach(c => c.classList.remove('drag-over'));
        const srcId = parseInt(e.dataTransfer.getData('text/plain'));
        if (srcId !== parseInt(card.dataset.id)) card.classList.add('drag-over');
      });
      card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
      card.addEventListener('drop', e => {
        e.preventDefault();
        const srcId = parseInt(e.dataTransfer.getData('text/plain'));
        const tgtId = parseInt(card.dataset.id);
        if (!srcId || srcId === tgtId) return;
        const mi = S.brews.findIndex(b => b.id === srcId);
        const ti = S.brews.findIndex(b => b.id === tgtId);
        if (mi === -1 || ti === -1) return;
        // Only reorder within the same status group
        if (S.brews[mi].status !== S.brews[ti].status) return;
        const [moved] = S.brews.splice(mi, 1);
        S.brews.splice(ti, 0, moved);
        saveBrewOrder();
        renderBrassins();
      });
    });
  });
}

function toBaseUnit(qty, unit) {
  if (unit === 'kg') return qty * 1000;
  if (unit === 'g')  return qty;
  if (unit === 'L')  return qty * 1000;
  if (unit === 'ml' || unit === 'mL') return qty;
  return qty; // sachet, pièce
}

function onBrewRecipeChange() {
  const recipeId = parseInt(document.getElementById('brew-f-recipe').value);
  const recipe = S.recipes.find(r => r.id === recipeId);
  const section = document.getElementById('brew-ingredients-section');
  const list    = document.getElementById('brew-ing-list');

  if (!recipe) { section.style.display='none'; return; }

  // Auto-fill name, volume, notes and brew date
  if (!document.getElementById('brew-f-name').value)
    document.getElementById('brew-f-name').value = recipe.name;
  document.getElementById('brew-f-vol').value = recipe.volume;
  if (recipe.notes && !document.getElementById('brew-f-notes').value)
    document.getElementById('brew-f-notes').value = recipe.notes;
  if (recipe.brew_date && !document.getElementById('brew-f-date').value)
    document.getElementById('brew-f-date').value = recipe.brew_date;

  section.style.display = '';
  if (!recipe.ingredients.length) { list.innerHTML=`<p style="color:var(--muted)">${t('rec.no_ing')}</p>`; return; }

  list.innerHTML = recipe.ingredients.map(ing => {
    const inv = ing.inventory_item_id ? S.inventory.find(i => i.id === ing.inventory_item_id) : null;
    const stockBase  = inv ? toBaseUnit(inv.quantity, inv.unit) : null;
    const neededBase = toBaseUnit(ing.quantity, ing.unit);
    let sbcls='sb-na', stockTxt=t('inv.not_linked');
    if (stockBase !== null) {
      if (stockBase >= neededBase) { sbcls='sb-ok'; stockTxt=t('inv.qty_avail').replace('${qty}', inv.quantity).replace('${unit}', inv.unit); }
      else if (stockBase > 0)     { sbcls='sb-low'; stockTxt=`${inv.quantity} ${inv.unit} / besoin ${ing.quantity} ${ing.unit}`; }
      else                        { sbcls='sb-empty'; stockTxt=t('inv.empty_all'); }
    }
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border)">
      <div>
        <span class="badge badge-${ing.category}" style="margin-right:8px">${catLabel(ing.category)}</span>
        <strong>${esc(ing.name)}</strong> — ${ing.quantity} ${ing.unit}
        ${ing.category==='houblon' ? (
            ing.hop_type==='dryhop'    ? `<span style="color:var(--info);font-size:.8rem"> [Dry Hop${ing.hop_days!=null?' · '+ing.hop_days+' j':''}]</span>`
          : ing.hop_type==='whirlpool' ? `<span style="color:var(--muted);font-size:.8rem"> [Whirlpool${ing.hop_time!=null?' −'+ing.hop_time+' min':''}]</span>`
          : ing.hop_time!=null         ? `<span style="color:var(--muted);font-size:.8rem"> (−${ing.hop_time} min)</span>`
          : '') : ''}
      </div>
      <span class="stock-badge ${sbcls}">${stockTxt}</span>
    </div>`;
  }).join('');
}

async function confirmBrew(force = false) {
  const recipeId = parseInt(document.getElementById('brew-f-recipe').value);
  if (!recipeId) { showBrewAlert(t('rec.err_choose_recipe')); return; }
  const name = document.getElementById('brew-f-name').value.trim();
  if (!name) { showBrewAlert(t('rec.err_brew_name')); return; }

  const payload = {
    recipe_id: recipeId,
    name, force,
    deduct_stock:  document.getElementById('brew-deduct').checked,
    brew_date:     document.getElementById('brew-f-date').value || null,
    volume_brewed: parseFloat(document.getElementById('brew-f-vol').value) || null,
    og:   parseFloat(document.getElementById('brew-f-og').value) || null,
    fg:   parseFloat(document.getElementById('brew-f-fg').value) || null,
    abv:  parseFloat(document.getElementById('brew-f-abv').value) || null,
    notes: document.getElementById('brew-f-notes').value.trim() || null,
    status: 'planned',
  };
  try {
    const brew = await api('POST', '/api/brews', payload);
    S.brews.unshift(brew);
    // Refresh inventory after deduction
    S.inventory = await api('GET', '/api/inventory');
    renderInventaire();
    renderBrassins();
    closeModal('brew-modal');
    closeModal('stock-warn-modal');
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast(t('brew.saved_toast'), 'success');
  } catch(err) {
    if (err.error === 'stock_insuffisant') {
      const warnList = document.getElementById('stock-warn-list');
      warnList.innerHTML = err.items.map(i =>
        `<div style="padding:8px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
          <strong>${esc(i.name)}</strong>
          <span style="color:var(--danger)">Besoin: ${i.needed} ${i.unit} — Dispo: ${i.available} ${i.unit}</span>
        </div>`).join('');
      closeModal('brew-modal');
      openModal('stock-warn-modal');
    } else {
      showBrewAlert(t('common.error') + ' : ' + (err.error || err.message || JSON.stringify(err)));
    }
  }
}

async function deleteBrew(id) {
  if (!confirm(t('brew.confirm_delete'))) return;
  try {
    await api('DELETE', `/api/brews/${id}`);
    S.brews = S.brews.filter(b => b.id !== id);
    renderBrassins();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast(t('brew.deleted'), 'success');
  } catch(e) { toast(t('common.delete') + ' — ' + t('common.error'), 'error'); }
}

function beerStockHtml(current, initial, label) {
  const cur = current || 0;
  const ini = initial || 0;
  const consumed = ini > cur;
  const pct = ini > 0 ? Math.round(cur / ini * 100) : 100;
  // color: green if plenty, amber if below half, red if almost empty
  const barColor = pct > 50 ? 'var(--success)' : pct > 20 ? '#f59e0b' : 'var(--danger)';
  const initLabel = consumed
    ? `<span style="color:var(--muted);font-size:.8rem">/${ini}</span>`
    : '';
  const bar = consumed
    ? `<div class="bottle-bar"><div class="bottle-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>`
    : '';
  return `<div class="beer-stock-item">
    <div class="beer-stock-row"><i class="fas fa-beer-mug-empty" style="font-size:.75rem"></i><span class="beer-stock-val">${cur}</span>${initLabel} <span>${label}</span></div>
    ${bar}
  </div>`;
}

function renderCave() {
  const q = (document.getElementById('cave-search')?.value || '').toLowerCase();
  const active = S.beers.filter(b => !b.archived);
  const arch   = S.beers.filter(b => b.archived);
  const shown  = (showArchivedCave ? [...active, ...arch] : active)
    .filter(b => !q || b.name.toLowerCase().includes(q) || (b.type||'').toLowerCase().includes(q));

  // Stats on active beers only
  const total33 = active.reduce((s,b) => s + (b.stock_33cl||0), 0);
  const total75 = active.reduce((s,b) => s + (b.stock_75cl||0), 0);
  const totalL  = (total33 * 0.33 + total75 * 0.75).toFixed(1);
  document.getElementById('cave-stats').innerHTML = `
    <div class="stat"><div class="stat-val">${active.length}</div><div class="stat-lbl">${t('cave.stat_beers')}</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--info)">${total33}</div><div class="stat-lbl">${t('cave.stat_bottles_33')}</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--amber)">${total75}</div><div class="stat-lbl">${t('cave.stat_bottles_75')}</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--success)">${totalL}</div><div class="stat-lbl">${t('cave.stat_liters')}</div></div>`;

  document.getElementById('cave-empty').style.display = shown.length ? 'none' : 'block';
  const grid = document.getElementById('cave-grid');

  const beerCardHtml = b => {
    const linkedKeg = S.sodaKegs.find(k => k.beer_id === b.id);
    const photoHtml = b.photo
      ? `<div class="beer-photo" style="cursor:zoom-in" onclick="openBeerLightbox(${b.id})"><img src="${b.photo}" alt="${esc(b.name)}"></div>`
      : `<div class="beer-photo" style="display:flex;align-items:center;justify-content:center;background:var(--card2);color:var(--border);font-size:3rem;cursor:pointer" onclick="openBeerDetail(${b.id})">🍺</div>`;

    // ── Calcul du prix par bouteille ──────────────────────────────────────────
    let priceHtml = '';
    if (b.recipe_id) {
      const recipe = S.recipes.find(r => r.id === b.recipe_id);
      if (recipe) {
        const totalCost = recipeCost(recipe);
        if (totalCost !== null) {
          const brew   = b.brew_id ? S.brews.find(br => br.id === b.brew_id) : null;
          const volume = (brew && brew.volume_brewed) ? brew.volume_brewed : recipe.volume;
          if (volume > 0) {
            const costPerL = totalCost / volume;
            const p33 = (costPerL * 0.33).toFixed(2);
            const p75 = (costPerL * 0.75).toFixed(2);
            const volSrc = (brew && brew.volume_brewed) ? t('rec.vol_from_brew').replace('${vol}', volume) : t('rec.vol_from_recipe').replace('${vol}', volume);
            priceHtml = `
              <div style="display:flex;flex-wrap:wrap;gap:3px 10px;align-items:center;font-size:.77rem;margin-bottom:7px;padding:5px 8px;background:rgba(34,197,94,.07);border-radius:7px;border:1px solid rgba(34,197,94,.18)">
                <span style="color:var(--success);font-weight:700"><i class="fas fa-euro-sign" style="font-size:.65rem"></i> ${totalCost.toFixed(2)}€</span>
                <span style="color:var(--border)">·</span>
                <span style="color:var(--muted)">33cl <strong style="color:var(--success)">${p33}€</strong></span>
                <span style="color:var(--border)">·</span>
                <span style="color:var(--muted)">75cl <strong style="color:var(--success)">${p75}€</strong></span>
                <span style="color:var(--border);margin-left:auto;font-size:.7rem;font-style:italic">${volSrc}</span>
              </div>`;
          }
        }
      }
    }

    // ── Section fût ──────────────────────────────────────────────────────────
    const kegL    = b.keg_liters    || 0;
    const kegInit = b.keg_initial_liters || 0;
    const hasKeg  = kegL > 0 || kegInit > 0;
    let kegHtml = '';
    if (hasKeg) {
      const kegPct = kegInit > 0 ? Math.round(kegL / kegInit * 100) : 100;
      const kegBarColor = kegPct > 50 ? 'var(--success)' : kegPct > 20 ? '#f59e0b' : 'var(--danger)';
      const kegInitLabel = kegInit > kegL ? `<span style="color:var(--muted);font-size:.8rem">/${kegInit}L</span>` : '';
      const kegBar = kegInit > kegL
        ? `<div class="bottle-bar"><div class="bottle-bar-fill" style="width:${kegPct}%;background:${kegBarColor}"></div></div>`
        : '';
      kegHtml = `
        <div style="margin:6px 0 8px;padding:7px 10px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.22);border-radius:8px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:${kegBar?'4px':'0'}">
            <i class="fas fa-wine-barrel" style="color:var(--amber);font-size:.85rem"></i>
            <span style="font-weight:700;font-size:.9rem">${kegL} L</span>${kegInitLabel}
            <span style="color:var(--muted);font-size:.78rem;margin-left:auto">${t('cave.in_keg')}</span>
          </div>
          ${kegBar}
        </div>`;
    }

    return `
      <div class="beer-card ${b.archived ? 'archived-item' : ''}" data-id="${b.id}" draggable="true" style="position:relative">
        <span class="beer-drag-handle" title="${t('cave.drag_to_reorder')}"><i class="fas fa-grip-vertical"></i></span>
        ${photoHtml}
        <div class="beer-body">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;cursor:pointer" onclick="openBeerDetail(${b.id})">
            <div class="beer-name">${esc(b.name)}</div>
            ${b.abv ? `<div class="beer-abv">${b.abv}%</div>` : ''}
          </div>
          <div class="beer-type" style="cursor:pointer" onclick="openBeerDetail(${b.id})">${b.type ? esc(b.type) : ''} ${b.recipe_name ? `· <i class="fas fa-scroll" style="font-size:.75rem"></i> ${esc(b.recipe_name)}` : ''}</div>
          ${linkedKeg ? `<div class="brew-spindle-badge" style="border-color:rgba(245,158,11,.35);margin:4px 0">
            <i class="fas fa-jar" style="color:var(--amber);font-size:.75rem"></i>
            <span style="color:var(--muted);font-size:.78rem">${esc(linkedKeg.name)}</span>
            ${linkedKeg.current_liters != null ? `<span class="bsb-grav" style="color:var(--amber)">${linkedKeg.current_liters} L</span>` : ''}
          </div>` : ''}
          ${kegHtml}
          <div class="beer-stocks">
            ${beerStockHtml(b.stock_33cl, b.initial_33cl, '33cl')}
            ${beerStockHtml(b.stock_75cl, b.initial_75cl, '75cl')}
          </div>
          ${priceHtml}
          ${b.description ? `<div style="font-size:.78rem;color:var(--muted);margin-bottom:8px;line-height:1.4">${esc(b.description).substring(0,100)}${b.description.length>100?'…':''}</div>` : ''}
          ${hasKeg ? `<div style="margin-bottom:5px"><button class="btn btn-sm btn-ghost" onclick="openKegTransferModal(${b.id})" style="width:100%;border-color:rgba(251,191,36,.4);color:var(--amber)"><i class="fas fa-wine-barrel"></i> ${t('cave.keg_transfer')}</button></div>` : ''}
          <div style="display:flex;gap:5px;margin-bottom:5px">
            <button class="btn btn-sm btn-ghost" onclick="adjustStock(${b.id},-1,0)" title="−1 bouteille 33cl" style="flex:1"><i class="fas fa-minus"></i> 33cl</button>
            <button class="btn btn-sm btn-ghost" onclick="adjustStock(${b.id},0,-1)" title="−1 bouteille 75cl" style="flex:1"><i class="fas fa-minus"></i> 75cl</button>
          </div>
          <div style="display:flex;gap:5px">
            <button class="btn btn-sm btn-ghost" onclick="editBeer(${b.id})" style="flex:1"><i class="fas fa-pen"></i> ${t('common.edit')}</button>
            <button class="btn btn-icon btn-ghost btn-sm" onclick="openTastingModal(${b.id})" title="${t('tasting.btn')}" style="${b.taste_rating||b.taste_appearance?'color:var(--amber)':''}"><i class="fas fa-wine-glass"></i></button>
            <button class="btn btn-icon btn-ghost btn-sm" onclick="openCaveKegModal(${b.id})" title="${linkedKeg ? esc(linkedKeg.name) : t('cave.keg_assign')}" style="${linkedKeg ? 'color:var(--amber)' : ''}"><i class="fas fa-jar"></i></button>
            <button class="btn btn-icon btn-ghost btn-sm" onclick="archiveItem('cave',${b.id},${b.archived?0:1})" title="${b.archived?t('common.restore'):t('common.archive')}"><i class="fas fa-${b.archived?'box-open':'box-archive'}"></i></button>
            <button class="btn btn-icon btn-ghost btn-sm" onclick="event.stopPropagation();printBeerLabel(${b.id})" title="${t('cave.print_label')}"><i class="fas fa-tag"></i></button>
            <button class="btn btn-icon btn-danger btn-sm" onclick="deleteBeer(${b.id})" title="${t('common.delete')}"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      </div>`;
  };

  const hasStock  = shown.filter(b => (b.stock_33cl || 0) + (b.stock_75cl || 0) > 0 || (b.keg_liters || 0) > 0);
  const noStock   = shown.filter(b => (b.stock_33cl || 0) + (b.stock_75cl || 0) === 0 && (b.keg_liters || 0) === 0);
  const needSplit = hasStock.length > 0 && noStock.length > 0;

  const groupHeader = (label, icon, color, count) =>
    `<div class="brew-group-header" style="grid-column:1/-1;color:${color}">
       <i class="fas fa-${icon}"></i> ${label}
       <span class="brew-group-count">${count}</span>
     </div>`;

  if (needSplit) {
    grid.innerHTML =
      groupHeader(t('cave.group_in_stock'), 'check-circle', 'var(--success)', hasStock.length) +
      hasStock.map(beerCardHtml).join('') +
      groupHeader(t('cave.group_empty'), 'wine-bottle', 'var(--muted)', noStock.length) +
      noStock.map(beerCardHtml).join('');
  } else {
    grid.innerHTML = shown.map(beerCardHtml).join('');
  }

  // Archive button
  const archBtn = document.getElementById('cave-arch-btn');
  if (archBtn) {
    const archCount = arch.length;
    archBtn.textContent = showArchivedCave ? t('cave.show_archives') : `\uD83D\uDDC3\uFE0F Archives (${archCount})`;
  }

  // ── Drag & drop reorder (within same stock group) ──
  const hasStockIds = new Set(hasStock.map(b => b.id));
  const noStockIds  = new Set(noStock.map(b => b.id));

  grid.querySelectorAll('.beer-card[draggable]').forEach(card => {
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', card.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => card.classList.add('dragging'), 0);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      grid.querySelectorAll('.beer-card').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      grid.querySelectorAll('.beer-card').forEach(c => c.classList.remove('drag-over'));
      const srcId = parseInt(e.dataTransfer.getData('text/plain'));
      if (srcId !== parseInt(card.dataset.id)) card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      const srcId = parseInt(e.dataTransfer.getData('text/plain'));
      const tgtId = parseInt(card.dataset.id);
      if (!srcId || srcId === tgtId) return;
      // Only reorder within same group (en stock ↔ en stock, épuisée ↔ épuisée)
      const sameGroup = (hasStockIds.has(srcId) && hasStockIds.has(tgtId))
                     || (noStockIds.has(srcId)   && noStockIds.has(tgtId))
                     || (!needSplit);
      if (!sameGroup) return;
      const mi = S.beers.findIndex(b => b.id === srcId);
      const ti = S.beers.findIndex(b => b.id === tgtId);
      if (mi === -1 || ti === -1) return;
      const [moved] = S.beers.splice(mi, 1);
      S.beers.splice(ti, 0, moved);
      saveCaveOrder();
      renderCave();
    });
  });
}

let _saveCaveOrderTimer = null;
function saveCaveOrder() {
  clearTimeout(_saveCaveOrderTimer);
  _saveCaveOrderTimer = setTimeout(async () => {
    try {
      await api('PUT', '/api/beers/reorder',
        S.beers.map((b, i) => ({ id: b.id, sort_order: i })));
    } catch(e) { toast(t('cave.err_save_order'), 'error'); }
  }, 600);
}

function openImgLightbox(src, name = '') {
  document.getElementById('beer-lightbox-img').src  = src;
  document.getElementById('beer-lightbox-img').alt  = name;
  document.getElementById('beer-lightbox-name').textContent = name;
  document.getElementById('beer-lightbox').style.display = 'flex';
}

function openBeerLightbox(id) {
  const b = S.beers.find(x => x.id === id);
  if (!b || !b.photo) return;
  const lb = document.getElementById('beer-lightbox');
  document.getElementById('beer-lightbox-img').src  = b.photo;
  document.getElementById('beer-lightbox-img').alt  = b.name || '';
  document.getElementById('beer-lightbox-name').textContent = b.name || '';
  lb.style.display = 'flex';
}

function closeBeerLightbox() {
  document.getElementById('beer-lightbox').style.display = 'none';
  document.getElementById('beer-lightbox-img').src = '';
}

let _beerDetailId = null;
function _bdPhotoClick() { if (_beerDetailId) openBeerLightbox(_beerDetailId); }

function openBeerDetail(id) {
  const b = S.beers.find(x => x.id === id);
  if (!b) return;
  _beerDetailId = id;

  // Ouvrir le modal en premier — le contenu est peuplé ensuite
  openModal('beer-detail-modal');

  try {
    const get = elId => document.getElementById(elId);

    get('bd-title').textContent = b.name || '';

    // Photo
    const photoWrap = get('bd-photo-wrap');
    const photoImg  = get('bd-photo');
    if (b.photo && photoWrap && photoImg) {
      photoImg.src = b.photo;
      photoImg.alt = b.name || '';
      photoWrap.style.display = '';
    } else if (photoWrap) {
      photoWrap.style.display = 'none';
    }

    // Badges
    const badges = [];
    if (b.abv)         badges.push(`<span class="badge" style="background:var(--amber);color:#000;font-weight:700">${b.abv}% ABV</span>`);
    if (b.type)        badges.push(`<span class="badge badge-info">${esc(b.type)}</span>`);
    if (b.origin)      badges.push(`<span class="badge" style="background:var(--card2);color:var(--muted)"><i class="fas fa-map-marker-alt"></i> ${esc(b.origin)}</span>`);
    if (b.recipe_name) badges.push(`<span class="badge" style="background:var(--card2);color:var(--hop)"><i class="fas fa-scroll"></i> ${esc(b.recipe_name)}</span>`);
    const badgesEl = get('bd-badges');
    if (badgesEl) badgesEl.innerHTML = badges.join('');

    // Stocks
    const stocksEl = get('bd-stocks');
    if (stocksEl) {
      const kegBlock = (b.keg_liters || b.keg_initial_liters)
        ? `<div style="background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.22);border-radius:12px;padding:14px;text-align:center;grid-column:1/-1">
             <div style="font-size:2rem;font-weight:800;color:var(--amber)">${b.keg_liters || 0}</div>
             <div style="font-size:.8rem;color:var(--muted);margin-top:2px"><i class="fas fa-wine-barrel"></i> ${t('cave.vol_keg_label')}</div>
             ${b.keg_initial_liters ? `<div style="font-size:.72rem;color:var(--muted);margin-top:4px">/ ${b.keg_initial_liters} L initial</div>` : ''}
           </div>`
        : '';
      stocksEl.innerHTML = `
        ${kegBlock}
        <div style="background:var(--card2);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:2rem;font-weight:800;color:var(--info)">${b.stock_33cl || 0}</div>
          <div style="font-size:.8rem;color:var(--muted);margin-top:2px">${t('cave.bottles_label_33')}</div>
          ${b.initial_33cl ? `<div style="font-size:.72rem;color:var(--muted);margin-top:4px">/ ${b.initial_33cl} initial</div>` : ''}
        </div>
        <div style="background:var(--card2);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:2rem;font-weight:800;color:var(--amber)">${b.stock_75cl || 0}</div>
          <div style="font-size:.8rem;color:var(--muted);margin-top:2px">${t('cave.bottles_label_75')}</div>
          ${b.initial_75cl ? `<div style="font-size:.72rem;color:var(--muted);margin-top:4px">/ ${b.initial_75cl} initial</div>` : ''}
        </div>`;
    }

    // Description
    const descEl = get('bd-desc');
    if (descEl) {
      descEl.textContent = b.description || '';
      descEl.style.display = b.description ? '' : 'none';
    }

    // Meta
    const totalL = ((b.stock_33cl||0)*0.33 + (b.stock_75cl||0)*0.75 + (b.keg_liters||0)).toFixed(2);
    const metaParts = [`<i class="fas fa-wine-bottle"></i> ${totalL} L en cave`];
    const fmtDate = d => d ? d.split('-').reverse().join('/') : null;
    if (b.brew_date)     metaParts.push(`<i class="fas fa-fire-flame-curved"></i> Brassé le ${fmtDate(b.brew_date)}`);
    if (b.bottling_date) metaParts.push(`<i class="fas fa-wine-bottle"></i> Embouteillé le ${fmtDate(b.bottling_date)}`);
    const metaEl = get('bd-meta');
    if (metaEl) metaEl.innerHTML = metaParts.join(' &nbsp;·&nbsp; ');

    // Section dégustation
    const tastingEl = get('bd-tasting');
    if (tastingEl) {
      const hasTasting = b.taste_appearance || b.taste_aroma || b.taste_flavor ||
                         b.taste_bitterness || b.taste_mouthfeel || b.taste_overall || b.taste_rating;
      if (hasTasting) {
        const fmtDate = d => d ? d.split('-').reverse().join('/') : null;
        const starsHtml = b.taste_rating
          ? Array.from({length:5}, (_,i) =>
              `<span style="color:${i<b.taste_rating?'var(--amber)':'var(--border)'}">★</span>`).join('')
          : '';
        const TASTING_FIELDS = [
          ['fa-eye',              'var(--info)',  t('tasting.appearance'),   b.taste_appearance],
          ['fa-wind',             'var(--hop)',   t('tasting.aroma'),        b.taste_aroma],
          ['fa-droplet',          'var(--malt)',  t('tasting.flavor'),       b.taste_flavor],
          ['fa-fire',             'var(--amber)', t('tasting.bitterness'),   b.taste_bitterness],
          ['fa-circle-half-stroke','var(--info)', t('tasting.mouthfeel'),    b.taste_mouthfeel],
          ['fa-comment',          'var(--muted)', t('tasting.overall_notes'),b.taste_overall],
        ].filter(f => f[3]);
        tastingEl.innerHTML = `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <i class="fas fa-wine-glass" style="color:var(--amber)"></i>
            <span style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amber)">${t('tasting.section_title')}</span>
            ${starsHtml ? `<span style="margin-left:auto;font-size:1rem">${starsHtml}</span>` : ''}
            ${b.taste_date ? `<span style="font-size:.75rem;color:var(--muted)">${fmtDate(b.taste_date)}</span>` : ''}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            ${TASTING_FIELDS.map(([icon, color, label, val]) => `
              <div style="background:var(--card2);border-radius:9px;padding:10px">
                <div style="font-size:.72rem;font-weight:700;color:${color};margin-bottom:4px">
                  <i class="fas ${icon}"></i> ${label}
                </div>
                <div style="font-size:.82rem;line-height:1.5;white-space:pre-wrap">${esc(val)}</div>
              </div>`).join('')}
          </div>`;
        tastingEl.style.display = '';
      } else {
        tastingEl.style.display = 'none';
      }
    }

    // Bouton Dégustation
    const tastingBtn = get('bd-tasting-btn');
    if (tastingBtn) tastingBtn.onclick = () => { closeModal('beer-detail-modal'); openTastingModal(id); };

    // Bouton Étiquette
    const printBtn = get('bd-print-btn');
    if (printBtn) printBtn.onclick = () => printBeerLabel(id);

    // Bouton Modifier
    const editBtn = get('bd-edit-btn');
    if (editBtn) editBtn.onclick = () => { closeModal('beer-detail-modal'); editBeer(id); };

  } catch(e) {
    console.error('openBeerDetail:', e);
  }
}

function openTastingModal(beerId) {
  const b = S.beers.find(x => x.id === beerId);
  if (!b) return;
  document.getElementById('tasting-f-beer-id').value     = beerId;
  document.getElementById('tasting-modal-title').textContent = b.name;
  document.getElementById('tasting-f-date').value        = b.taste_date || new Date().toISOString().split('T')[0];
  document.getElementById('tasting-f-appearance').value  = b.taste_appearance || '';
  document.getElementById('tasting-f-aroma').value       = b.taste_aroma      || '';
  document.getElementById('tasting-f-flavor').value      = b.taste_flavor     || '';
  document.getElementById('tasting-f-bitterness').value  = b.taste_bitterness || '';
  document.getElementById('tasting-f-mouthfeel').value   = b.taste_mouthfeel  || '';
  document.getElementById('tasting-f-overall').value     = b.taste_overall    || '';
  document.getElementById('tasting-f-rating').value      = b.taste_rating     || '';
  // Apply placeholders via i18n
  ['appearance','aroma','flavor','bitterness','mouthfeel','overall'].forEach(k => {
    const el = document.getElementById(`tasting-f-${k}`);
    if (el) el.placeholder = t(`tasting.ph_${k}`);
  });
  renderTastingStars(b.taste_rating || 0);
  openModal('tasting-modal');
}

function setTastingRating(v) {
  const current = parseInt(document.getElementById('tasting-f-rating').value) || 0;
  const newVal = current === v ? 0 : v;
  document.getElementById('tasting-f-rating').value = newVal || '';
  renderTastingStars(newVal);
}

function renderTastingStars(n) {
  document.querySelectorAll('#tasting-star-input .star').forEach((el, i) => {
    el.classList.toggle('on', i < n);
  });
  document.getElementById('tasting-rating-label').textContent = STAR_LABELS()[n] || STAR_LABELS()[0];
}

async function saveTasting() {
  const beerId = parseInt(document.getElementById('tasting-f-beer-id').value);
  const payload = {
    taste_date:        document.getElementById('tasting-f-date').value        || null,
    taste_appearance:  document.getElementById('tasting-f-appearance').value  || null,
    taste_aroma:       document.getElementById('tasting-f-aroma').value       || null,
    taste_flavor:      document.getElementById('tasting-f-flavor').value      || null,
    taste_bitterness:  document.getElementById('tasting-f-bitterness').value  || null,
    taste_mouthfeel:   document.getElementById('tasting-f-mouthfeel').value   || null,
    taste_overall:     document.getElementById('tasting-f-overall').value     || null,
    taste_rating:      parseInt(document.getElementById('tasting-f-rating').value) || null,
  };
  try {
    const updated = await api('PUT', `/api/beers/${beerId}/tasting`, payload);
    const idx = S.beers.findIndex(b => b.id === beerId);
    if (idx !== -1) S.beers[idx] = { ...S.beers[idx], ...updated };
    closeModal('tasting-modal');
    renderCave();
    toast(t('tasting.saved'), 'success');

function _buildOneLabelHtml(b, recipe) {
  const accentColor = appSettings.accentColor || '#ff9500';
  // Calcule si le texte doit être noir ou blanc selon la luminosité du fond
  const _lum = hex => { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return (0.299*r+0.587*g+0.114*b)/255; };
  const headerTextColor = _lum(accentColor) > 0.55 ? '#111' : '#fff';
  const fmtDate = d => d ? d.split('-').reverse().join('/') : null;
  const fmtQty = i => esc(i.name) + (i.hop_type === 'dryhop' ? ' <span style="color:#888;font-style:italic">(DH)</span>' : '');

  // Ingrédients groupés (Autres : seulement sucre, miel, lactose)
  const AUTRES_LABEL = ['sucre', 'miel', 'lactose', 'épice', 'epice', 'cannelle', 'coriandre', 'gingembre', 'vanille', 'cardamome', 'poivre', 'cumin', 'anis', 'muscade', 'piment', 'zeste'];
  let ingHtml = '';
  if (recipe && recipe.ingredients && recipe.ingredients.length) {
    const groups = [
      { cat: 'malt',    label: 'Malts',    filter: null },
      { cat: 'houblon', label: 'Houblons', filter: null },
      { cat: 'autre',   label: 'Autres',   filter: i => AUTRES_LABEL.some(k => i.name.toLowerCase().includes(k)) },
    ];
    groups.forEach(({ cat, label, filter }) => {
      let items = recipe.ingredients.filter(i => i.category === cat);
      if (filter) items = items.filter(filter);
      // Dédoublonnage : unique par (nom, dry hop)
      const seen = new Set();
      items = items.filter(i => {
        const key = i.name.toLowerCase() + '|' + (i.hop_type === 'dryhop' ? '1' : '0');
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      if (!items.length) return;
      ingHtml += `<div class="beer-label-section">${label}</div>
        <div>${items.map(fmtQty).join(', ')}</div>`;
    });
  } else {
    ingHtml = '<div style="color:#aaa;font-size:6.5pt;font-style:italic">Aucune recette liée</div>';
  }

  const subtitle = [b.type, b.abv ? `${b.abv}% ABV` : null].filter(Boolean).join(' · ');
  const photoSection = b.photo
    ? `<img class="beer-label-photo" src="${b.photo}" alt="${esc(b.name)}">`
    : `<div class="beer-label-nophoto">🍺</div>`;

  const footLeft = [
    b.brew_date     ? `🍺\u202f${fmtDate(b.brew_date)}`     : null,
    b.bottling_date ? `🍾\u202f${fmtDate(b.bottling_date)}` : null,
  ].filter(Boolean).join(' · ');

  return `
    <div class="beer-label">
      <div class="beer-label-header" style="background:${accentColor};color:${headerTextColor}">
        <div class="beer-label-title">${esc(b.name)}</div>
        ${subtitle ? `<div class="beer-label-sub">${subtitle}</div>` : ''}
      </div>
      ${photoSection}
      <div class="beer-label-body">
        ${ingHtml}
      </div>
      <div class="beer-label-footer">
        <span>${footLeft}</span>
        <span style="font-weight:800;color:#f59e0b;letter-spacing:.02em">${esc(appSettings.appName || 'BrewHome')}</span>
      </div>
    </div>`;
}

function renderLabelPreview() {
  const b = S.beers.find(x => x.id === _labelBeerId);

function previewBeerPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    // Compress
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 800;
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const b64 = canvas.toDataURL('image/jpeg', 0.75);
      document.getElementById('beer-f-photo-b64').value = b64;
      document.getElementById('beer-f-photo-preview').src = b64;
      document.getElementById('beer-f-photo-preview').style.display = 'block';
      document.getElementById('beer-f-photo-remove').style.display  = 'flex';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveBeer() {
  const name = document.getElementById('beer-f-name').value.trim();
  if (!name) { toast(t('cave.name_required'), 'error'); return; }
  const id = document.getElementById('beer-f-id').value;
  const stock33 = parseInt(document.getElementById('beer-f-33').value) || 0;
  const stock75 = parseInt(document.getElementById('beer-f-75').value) || 0;
  const kegVal = document.getElementById('beer-f-keg').value;
  const kegLiters = kegVal !== '' ? (parseFloat(kegVal) || 0) : null;
  const payload = {
    name,
    type:         document.getElementById('beer-f-type').value || null,
    abv:          parseFloat(document.getElementById('beer-f-abv').value) || null,
    stock_33cl:   stock33,
    stock_75cl:   stock75,
    // On edit: send the (possibly corrected) initial values; on create: not sent for bottles, backend uses stock as initial
    ...(id ? {
      initial_33cl: parseInt(document.getElementById('beer-f-33-init').value) || 0,
      initial_75cl: parseInt(document.getElementById('beer-f-75-init').value) || 0,
    } : {}),
    keg_liters: kegLiters,
    // Always send keg initial when a keg value is present (user may declare a partial keg on creation)
    ...(kegLiters !== null ? {
      keg_initial_liters: parseFloat(document.getElementById('beer-f-keg-init').value) || kegLiters,
    } : {}),
    origin:        document.getElementById('beer-f-origin').value.trim() || null,
    description:   document.getElementById('beer-f-desc').value.trim() || null,
    photo:         document.getElementById('beer-f-photo-b64').value || null,
    brew_date:     document.getElementById('beer-f-brew-date').value || null,
    bottling_date: document.getElementById('beer-f-bottling-date').value || null,
  };
  try {
    if (id) {
      const updated = await api('PUT', `/api/beers/${id}`, payload);
      const idx = S.beers.findIndex(b => b.id === parseInt(id));
      if (idx !== -1) S.beers[idx] = updated;
    } else {
      const created = await api('POST', '/api/beers', payload);
      S.beers.unshift(created);
    }
    closeModal('beer-modal');
    renderCave();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast(id ? t('cave.beer_updated') : t('cave.beer_added'), 'success');
  } catch(e) { toast(t('cave.err_save'), 'error'); }
}

async function adjustStock(id, d33, d75) {
  const beer = S.beers.find(b => b.id === id);
  if (!beer) return;
  const payload = {
    stock_33cl: Math.max(0, (beer.stock_33cl||0) + d33),
    stock_75cl: Math.max(0, (beer.stock_75cl||0) + d75),
  };
  try {
    const updated = await api('PATCH', `/api/beers/${id}/stock`, payload);
    const idx = S.beers.findIndex(b => b.id === id);
    if (idx !== -1) S.beers[idx] = { ...S.beers[idx], ...updated };
    renderCave();
  } catch(e) { toast(t('cave.err_stock'), 'error'); }
}

async function deleteBeer(id) {
  if (!confirm(t('cave.confirm_delete'))) return;
  try {
    await api('DELETE', `/api/beers/${id}`);
    S.beers = S.beers.filter(b => b.id !== id);
    renderCave();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast(t('cave.beer_deleted'), 'success');
  } catch(e) { toast(t('cave.err_save'), 'error'); }
}

function updateKegCalc() {
  const beer = S.beers.find(b => b.id === _kegTransferId);
  if (!beer) return;
  const available = beer.keg_liters || 0;
  const consumed  = parseFloat(document.getElementById('keg-tr-consumed').value) || 0;
  const b33       = parseInt(document.getElementById('keg-tr-33').value)          || 0;
  const b75       = parseInt(document.getElementById('keg-tr-75').value)          || 0;
  const bottled   = b33 * 0.33 + b75 * 0.75;
  const total     = consumed + bottled;
  const remaining = Math.max(0, available - total);
  const over      = total > available;
  const ok        = total > 0 && !over;
  const warnStyle = over ? 'color:var(--danger);font-weight:700' : '';
  document.getElementById('keg-tr-calc').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr auto;gap:2px 12px">
      <span style="color:var(--muted)">Disponible en fût</span><span><strong>${available.toFixed(2)} L</strong></span>
      <span style="color:var(--muted)">Consommé directement</span><span><strong>${consumed.toFixed(2)} L</strong></span>
      <span style="color:var(--muted)">Embouteillé (${b33}×33cl + ${b75}×75cl)</span><span><strong>${bottled.toFixed(2)} L</strong></span>
      <span style="${warnStyle}">Total prélevé</span><span style="${warnStyle}"><strong>${total.toFixed(2)} L</strong>${over ? ' ⚠ dépassement' : ''}</span>
      <span style="color:var(--muted)">Restant en fût</span><span><strong>${remaining.toFixed(2)} L</strong></span>
    </div>`;
  document.getElementById('keg-tr-save-btn').disabled = !ok;
}

async function saveKegTransfer() {
  const beer = S.beers.find(b => b.id === _kegTransferId);
  if (!beer) return;
  const available = beer.keg_liters || 0;
  const consumed  = parseFloat(document.getElementById('keg-tr-consumed').value) || 0;
  const b33       = parseInt(document.getElementById('keg-tr-33').value) || 0;
  const b75       = parseInt(document.getElementById('keg-tr-75').value) || 0;
  const total     = consumed + b33 * 0.33 + b75 * 0.75;
  if (total <= 0 || total > available) { toast(t('cave.err_keg_vol'), 'error'); return; }
  const payload = {
    keg_liters: Math.max(0, parseFloat((available - total).toFixed(3))),
    stock_33cl: (beer.stock_33cl || 0) + b33,
    stock_75cl: (beer.stock_75cl || 0) + b75,
  };
  try {
    const updated = await api('PATCH', `/api/beers/${beer.id}/stock`, payload);
    const idx = S.beers.findIndex(b => b.id === beer.id);
    if (idx !== -1) S.beers[idx] = { ...S.beers[idx], ...updated };
    closeModal('keg-transfer-modal');
    renderCave();
    toast(t('cave.keg_saved'), 'success');
  } catch(e) { toast(t('cave.err_keg'), 'error'); }
}

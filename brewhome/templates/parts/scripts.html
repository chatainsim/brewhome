async function saveTempSensor() {
  const name = document.getElementById('temp-f-name').value.trim();
  if (!name) { toast(t('spin.name_required'), 'error'); return; }
  const sensor_type   = document.getElementById('temp-f-type').value;
  const ha_entity     = document.getElementById('temp-f-entity').value.trim() || null;
  const ha_entity_hum = document.getElementById('temp-f-entity-hum').value.trim() || null;
  const notes    = document.getElementById('temp-f-notes').value.trim() || null;
  const temp_min = document.getElementById('temp-f-min').value !== '' ? parseFloat(document.getElementById('temp-f-min').value) : null;
  const temp_max = document.getElementById('temp-f-max').value !== '' ? parseFloat(document.getElementById('temp-f-max').value) : null;
  const payload  = { name, sensor_type, ha_entity, ha_entity_hum, notes, temp_min, temp_max };

  if (_editTempId !== null) {
    try {
      const updated = await api('PATCH', `/api/temperature/${_editTempId}`, payload);
      const idx = S.tempSensors.findIndex(x => x.id === _editTempId);
      if (idx !== -1) S.tempSensors[idx] = updated;
      renderTempSensors();
      closeModal('temp-sensor-modal');
      toast(t('spin.temp_updated'), 'success');
    } catch(e) { toast(t('spin.err_update'), 'error'); }
    return;
  }

  try {
    const s = await api('POST', '/api/temperature', payload);
    S.tempSensors.unshift(s);
    renderTempSensors();
    document.getElementById('temp-token-display').textContent = s.token;
    document.getElementById('temp-token-section').style.display = '';
    document.getElementById('temp-save-btn').style.display = 'none';
    toast(t('spin.temp_created'), 'success');
  } catch(e) { toast(t('spin.err_create'), 'error'); }
}

function copyTempToken() {
  const tok = document.getElementById('temp-token-display').textContent;
  navigator.clipboard.writeText(tok).then(() => toast(t('spin.token_copied'), 'success'));
}

async function deleteTempSensor(id) {
  if (!confirm(t('spin.confirm_delete_temp'))) return;
  try {
    await api('DELETE', `/api/temperature/${id}`);
    S.tempSensors = S.tempSensors.filter(x => x.id !== id);
    renderTempSensors();
    toast(t('spin.temp_deleted'), 'success');
  } catch(e) { toast(t('spin.err_delete'), 'error'); }
}

async function linkTempSensorBrew(sensorId, brewId) {
  try {
    const updated = await api('PATCH', `/api/temperature/${sensorId}`, {
      brew_id: brewId ? parseInt(brewId) : null,
    });
    const idx = S.tempSensors.findIndex(s => s.id === sensorId);
    if (idx !== -1) S.tempSensors[idx] = updated;
    renderTempSensors();
    renderBrassins();
    toast(brewId ? t('spin.linked') : t('spin.unlinked'), 'success');
  } catch(e) { toast(t('spin.err_link'), 'error'); }
}

function showTempSensorToken(id) {
  const s = S.tempSensors.find(x => x.id === id);
  if (!s) return;
  const url        = `${window.location.origin}/api/temperature/data?token=${s.token}`;
  const sensorSlug = s.name.toLowerCase().replace(/[^a-z0-9]/g, '_');

  document.getElementById('tha-sensor-name').textContent = s.name;
  document.getElementById('tha-token').textContent = s.token;
  document.getElementById('tha-url').textContent   = url;

  let yamlConf, yamlAuto;

  if (s.sensor_type === 'thermostat') {
    const entity  = s.ha_entity || 'climate.ENTITE_THERMOSTAT';
    const warning = s.ha_entity ? '' : '\n# ⚠ Remplacer climate.ENTITE_THERMOSTAT par le nom de votre entité HA';
    yamlConf = `rest_command:
  brewhome_temp_${sensorSlug}:
    url: "${url}"
    method: POST
    content_type: "application/json"
    payload: >-
      {"temperature":{{ '{{' }} state_attr('${entity}','current_temperature')|float|round(1) {{ '}}' }},"target_temp":{{ '{{' }} state_attr('${entity}','temperature')|float|round(1) {{ '}}' }},"hvac_mode":"{{ '{{' }} states('${entity}') {{ '}}' }}"}${warning}`;
  } else {
    const entityTemp = s.ha_entity     || 'sensor.ENTITE_TEMPERATURE';
    const entityHum  = s.ha_entity_hum || 'sensor.ENTITE_HUMIDITE';
    const parts = [];
    if (!s.ha_entity)     parts.push('sensor.ENTITE_TEMPERATURE');
    if (!s.ha_entity_hum) parts.push('sensor.ENTITE_HUMIDITE');
    const warning = parts.length ? `\n# ⚠ Remplacer ${parts.join(' et ')} par vos entités HA réelles` : '';
    yamlConf = `rest_command:
  brewhome_temp_${sensorSlug}:
    url: "${url}"
    method: POST
    content_type: "application/json"
    payload: >-
      {"temperature":{{ '{{' }} states('${entityTemp}')|float|round(1) {{ '}}' }},"humidity":{{ '{{' }} states('${entityHum}')|float|round(1)|default(none) {{ '}}' }}}${warning}`;
  }

  yamlAuto = `- alias: "BrewHome — ${s.name}"
  trigger:
    - platform: time_pattern
      minutes: "/5"
  action:
    - action: rest_command.brewhome_temp_${sensorSlug}`;

  document.getElementById('tha-yaml-conf').textContent = yamlConf;
  document.getElementById('tha-yaml-auto').textContent = yamlAuto;
  openModal('temp-ha-modal');
}

async function _loadTempChart({ hours, from, to } = {}) {
  const seq = ++_tempChartSeq;
  if (_tempChart) { _tempChart.destroy(); _tempChart = null; }
  const stale = Chart.getChart('temp-chart-canvas');
  if (stale) stale.destroy();
  document.getElementById('temp-chart-table').innerHTML =
    `<p style="text-align:center;color:var(--muted);padding:20px 0"><i class="fas fa-spinner fa-spin"></i> ${t('common.loading')}</p>`;

  let url = `/api/temperature/${_tempSensorId}/readings`;
  const params = [];
  if (hours)  params.push(`hours=${hours}`);
  if (from)   params.push(`from=${encodeURIComponent(from)}`);
  if (to)     params.push(`to=${encodeURIComponent(to)}`);
  params.push('limit=2000');
  if (params.length) url += '?' + params.join('&');

  try {
    const readings = await api('GET', url);
    if (seq !== _tempChartSeq) return;  // requête obsolète, une plus récente a pris le relais
    const s = S.tempSensors.find(x => x.id === _tempSensorId);
    const tz = getTzOffset ? getTzOffset() : 0;
    const labels = readings.map(r => {
      const d = new Date(r.recorded_at + 'Z');
      d.setTime(d.getTime() + tz * 3600000);
      return d.toLocaleString(_lang || 'fr', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
    });
    const temps = readings.map(r => r.temperature);
    const hums  = readings.map(r => r.humidity);
    const hasHum = hums.some(h => h != null);

    const datasets = [{
      label: `${t('spin.metric_temp')} (°C)`,
      data: temps,
      borderColor: '#ef4444',
      backgroundColor: 'rgba(239,68,68,.08)',
      borderWidth: 2,
      pointRadius: readings.length > 200 ? 0 : 3,
      tension: 0.3,
      fill: true,
      yAxisID: 'yTemp',
    }];
    if (hasHum) {
      datasets.push({
        label: 'Humidité (%)',
        data: hums,
        borderColor: '#3b82f6',
        backgroundColor: 'transparent',
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.3,
        yAxisID: 'yHum',
      });
    }

    // Lignes de seuil
    const annotations = {};
    if (s?.temp_min != null) {
      annotations.minLine = { type:'line', yMin:s.temp_min, yMax:s.temp_min, borderColor:'#3b82f6', borderWidth:1.5, borderDash:[4,4], yScaleID:'yTemp',
        label:{ content:`Min ${s.temp_min}°C`, enabled:true, position:'end', backgroundColor:'#3b82f6', font:{size:10} } };
    }
    if (s?.temp_max != null) {
      annotations.maxLine = { type:'line', yMin:s.temp_max, yMax:s.temp_max, borderColor:'#ef4444', borderWidth:1.5, borderDash:[4,4], yScaleID:'yTemp',
        label:{ content:`Max ${s.temp_max}°C`, enabled:true, position:'end', backgroundColor:'#ef4444', font:{size:10} } };
    }

    const scales = {
      x:     { ticks:{ maxTicksLimit:8, font:{size:10} }, grid:{ color:'rgba(128,128,128,.1)' } },
      yTemp: { position:'left',  ticks:{ font:{size:10}, callback:v => v+'°C' }, grid:{ color:'rgba(128,128,128,.1)' }, title:{ display:true, text:'°C', font:{size:10} } },
    };
    if (hasHum) {
      scales.yHum = { position:'right', ticks:{ font:{size:10}, callback:v => v+'%' }, grid:{ drawOnChartArea:false }, title:{ display:true, text:'Humidité %', font:{size:10} } };
    }

    _tempChart = new Chart(document.getElementById('temp-chart-canvas'), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        interaction: { mode:'index', intersect:false },
        plugins: { legend:{ labels:{ font:{size:11} } }, annotation:{ annotations } },
        scales,
      },
    });

    // Tableau des 10 dernières mesures
    const last10 = [...readings].reverse().slice(0, 10);
    if (!last10.length) {
      document.getElementById('temp-chart-table').innerHTML = `<p style="text-align:center;color:var(--muted)">${t('brew.no_readings_temp')}</p>`;
    } else {
      document.getElementById('temp-chart-table').innerHTML = `
        <table style="width:100%;font-size:.8rem;border-collapse:collapse">
          <thead><tr style="color:var(--muted)">
            <th style="text-align:left;padding:4px 8px">Date / heure</th>
            <th style="text-align:right;padding:4px 8px">Température</th>
            ${hasHum ? '<th style="text-align:right;padding:4px 8px">Humidité</th>' : ''}
          </tr></thead>
          <tbody>${last10.map(r => {
            const d = new Date(r.recorded_at + 'Z');
            d.setTime(d.getTime() + tz * 3600000);
            const dt = d.toLocaleString(_lang || 'fr', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
            const alert = s && r.temperature != null && ((s.temp_min != null && r.temperature < s.temp_min) || (s.temp_max != null && r.temperature > s.temp_max));
            return `<tr style="border-top:1px solid var(--border)">
              <td style="padding:4px 8px;color:var(--muted)">${dt}</td>
              <td style="padding:4px 8px;text-align:right;font-weight:600;color:${alert ? '#ef4444' : 'inherit'}">${r.temperature != null ? r.temperature.toFixed(1) + ' °C' : '—'}</td>
              ${hasHum ? `<td style="padding:4px 8px;text-align:right">${r.humidity != null ? r.humidity.toFixed(1) + ' %' : '—'}</td>` : ''}
            </tr>`;
          }).join('')}</tbody>
        </table>`;
    }
  } catch(e) {
    if (seq === _tempChartSeq)
      document.getElementById('temp-chart-table').innerHTML = `<p style="color:var(--danger);text-align:center">${esc(e.message)}</p>`;
  }
}

function setTempRange(btn, range) {
  document.querySelectorAll('.tc-range').forEach(b => {
    b.classList.remove('btn-primary'); b.classList.add('btn-ghost');
  });
  btn.classList.remove('btn-ghost'); btn.classList.add('btn-primary');
  const customEl = document.getElementById('tc-custom-range');
  if (range === 'custom') { customEl.style.display = 'flex'; return; }
  customEl.style.display = 'none';
  _loadTempChart({ hours: range > 0 ? range : null });
}

function applyCustomTempRange() {
  const fromVal = document.getElementById('tc-from').value;
  const toVal   = document.getElementById('tc-to').value;
  if (!fromVal) { toast(t('spin.select_date_start'), 'error'); return; }
  const tz = getTzOffset ? getTzOffset() : 0;
  const toServerTs = str => {
    if (!str) return null;
    const d = new Date(str + ':00Z');
    d.setTime(d.getTime() - tz * 3600000);
    return d.toISOString().slice(0, 19).replace('T', ' ');
  };
  _loadTempChart({ from: toServerTs(fromVal), to: toServerTs(toVal) });
}

function downloadJson(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

async function importCatalog(input) {
  const file = input.files[0];
  if (!file) return;
  const data = JSON.parse(await file.text());
  const items = Array.isArray(data) ? data : [data];

// ══════════════════════════════════════════════════════════════════════════════
// WATER CORRECTION
// ══════════════════════════════════════════════════════════════════════════════

// mg of each ion contributed per gram of mineral added to 1 L
const WC_MINERAL_FX = {
  'Sulfate de calcium':    { ca: 232.8, mg: 0,    na: 0,     so4: 557.9,  cl: 0,     hco3: 0      },
  'Sulfate de magnésium':  { ca: 0,     mg: 98.6, na: 0,     so4: 389.8,  cl: 0,     hco3: 0      },
  'Chlorure de calcium':   { ca: 361.2, mg: 0,    na: 0,     so4: 0,      cl: 638.9, hco3: 0      },
  'Chlorure de sodium':    { ca: 0,     mg: 0,    na: 393.3, so4: 0,      cl: 606.5, hco3: 0      },
  'Carbonate de calcium':  { ca: 400.4, mg: 0,    na: 0,     so4: 0,      cl: 0,     hco3: 1218.0 },
  'Bicarbonate de sodium': { ca: 0,     mg: 0,    na: 273.7, so4: 0,      cl: 0,     hco3: 726.4  },
};

const WC_MINERAL_LABEL = {
  'Sulfate de calcium':    'Sulfate de calcium (CaSO₄)',
  'Sulfate de magnésium':  'Sulfate de magnésium (MgSO₄)',
  'Chlorure de calcium':   'Chlorure de calcium (CaCl₂)',
  'Chlorure de sodium':    'Chlorure de sodium (NaCl)',
  'Carbonate de calcium':  'Carbonate de calcium (CaCO₃)',
  'Bicarbonate de sodium': 'Bicarbonate de sodium (NaHCO₃)',
};

// mL of acid needed to neutralize 1 mEq of total alkalinity
// mEq_total = Δ_HCO3_ppm * volume_L / 61.0
const WC_ACID_FX = {
  'Acide lactique 80%':     0.09306,
  'Acide lactique 88%':     0.08461,
  'Acide phosphorique 75%': 0.08277,
  'Acide phosphorique 85%': 0.06826,
};

// Classic water profiles (mg/L)
const WC_PRESETS = {
  neutre:     { ca: 0,   mg: 0,  na: 0,  so4: 0,   cl: 0,   hco3: 0   },
  pilsen:     { ca: 7,   mg: 3,  na: 2,  so4: 5,   cl: 5,   hco3: 15  },
  munich:     { ca: 75,  mg: 18, na: 5,  so4: 45,  cl: 40,  hco3: 200 },
  vienne:     { ca: 200, mg: 60, na: 8,  so4: 120, cl: 12,  hco3: 120 },
  dortmund:   { ca: 225, mg: 40, na: 60, so4: 120, cl: 60,  hco3: 180 },
  london:     { ca: 90,  mg: 5,  na: 15, so4: 50,  cl: 50,  hco3: 140 },
  burton:     { ca: 275, mg: 40, na: 25, so4: 610, cl: 35,  hco3: 270 },
  dublin:     { ca: 118, mg: 12, na: 12, so4: 54,  cl: 19,  hco3: 315 },
  edinburgh:  { ca: 100, mg: 20, na: 55, so4: 140, cl: 60,  hco3: 280 },
  equilibre:  { ca: 75,  mg: 5,  na: 25, so4: 75,  cl: 75,  hco3: 50  },
  ipa:        { ca: 150, mg: 10, na: 10, so4: 300, cl: 55,  hco3: 0   },
  stout:      { ca: 100, mg: 10, na: 35, so4: 50,  cl: 75,  hco3: 300 },
};

function toggleWaterCorrection() {
  const panel = document.getElementById('rec-wc-panel');
  const btn   = document.getElementById('btn-wc');
  const open  = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : '';
  btn.classList.toggle('open', !open);
  if (!open) renderWaterCorrection();
}

function renderWaterCorrection() {
  const w = appSettings.water || {};
  const srcEl = document.getElementById('wc-source-display');
  const hasSrc = ['ca','mg','na','so4','cl','hco3'].some(k => w[k] != null && w[k] !== '');
  if (!hasSrc) {
    srcEl.innerHTML = `<span style="color:var(--danger)"><i class="fas fa-triangle-exclamation"></i> ${t('rec.wc_no_profile')}</span>`;
  } else {
    const fmt = (v, u) => `<strong>${parseFloat(v) || 0}</strong><span style="color:var(--muted);font-size:.72rem"> ${u}</span>`;
    srcEl.innerHTML = [
      `pH ${fmt(w.ph, '')}`,
      `Calcium (Ca²⁺) ${fmt(w.ca, 'mg/L')}`,
      `Magnésium (Mg²⁺) ${fmt(w.mg, 'mg/L')}`,
      `Sodium (Na⁺) ${fmt(w.na, 'mg/L')}`,
      `Sulfates (SO₄²⁻) ${fmt(w.so4, 'mg/L')}`,
      `Chlorures (Cl⁻) ${fmt(w.cl, 'mg/L')}`,
      `Bicarbonates (HCO₃⁻) ${fmt(w.hco3, 'mg/L')}`,
    ].join(' &nbsp;·&nbsp; ');
  }
  // Auto-fill volumes from recipe calculation
  const mashEl   = document.getElementById('wc-volume-mash');
  const spargeEl = document.getElementById('wc-volume-sparge');
  if (mashEl && !mashEl.value) {
    const v = parseFloat(document.getElementById('rw-mash')?.textContent);
    if (!isNaN(v)) mashEl.value = v.toFixed(1);
  }
  if (spargeEl && !spargeEl.value) {
    const v = parseFloat(document.getElementById('rw-sparge')?.textContent);
    if (!isNaN(v)) spargeEl.value = v.toFixed(1);
  }
  calcWaterCorrection();
}

function wcPreset(name) {
  const p = WC_PRESETS[name];
  if (!p) return;
  ['ca','mg','na','so4','cl','hco3'].forEach(k => {
    const el = document.getElementById(`wc-t-${k}`);
    if (el) el.value = p[k];
  });
  calcWaterCorrection();
}

function _computeWCDoses(vol, s, t) {
  const IONS = ['ca','mg','na','so4','cl','hco3'];
  const delta = {};
  IONS.forEach(k => { delta[k] = t[k] !== null ? t[k] - s[k] : 0; });

  const rem = {};
  IONS.forEach(k => { rem[k] = Math.max(0, delta[k]); });

  const doses = {
    'Sulfate de magnésium': 0, 'Sulfate de calcium': 0,
    'Chlorure de calcium':  0, 'Chlorure de sodium': 0,
    'Bicarbonate de sodium':0, 'Carbonate de calcium': 0,
  };

  if (rem.mg > 0) {
    const gPL = rem.mg / 98.6;
    doses['Sulfate de magnésium'] = gPL * vol;
    rem.so4 = Math.max(0, rem.so4 - gPL * 389.8);
    rem.mg  = 0;
  }
  if (rem.so4 > 0) {
    const gPL = rem.so4 / 557.9;
    doses['Sulfate de calcium'] = gPL * vol;
    rem.ca  = Math.max(0, rem.ca - gPL * 232.8);
    rem.so4 = 0;
  }
  if (rem.ca > 0) {
    const gPL = rem.ca / 361.2;
    doses['Chlorure de calcium'] = gPL * vol;
    rem.cl = Math.max(0, rem.cl - gPL * 638.9);
    rem.ca = 0;
  }
  if (rem.cl > 0) {
    const gPL = rem.cl / 606.5;
    doses['Chlorure de sodium'] = gPL * vol;
    rem.na = Math.max(0, rem.na - gPL * 393.3);
    rem.cl = 0;
  }
  if (rem.hco3 > 0) {
    if (rem.na > 0) {
      const use = Math.min(rem.hco3, rem.na / 273.7 * 726.4);
      const gPL = use / 726.4;
      doses['Bicarbonate de sodium'] = gPL * vol;
      rem.na   = Math.max(0, rem.na - gPL * 273.7);
      rem.hco3 -= use;
    }
    if (rem.hco3 > 0) {
      doses['Carbonate de calcium'] = (rem.hco3 / 1218.0) * vol;
      rem.hco3 = 0;
    }
  }
  if (rem.na > 0) {
    doses['Bicarbonate de sodium'] += (rem.na / 273.7) * vol;
    rem.na = 0;
  }

  const hco3Excess = t.hco3 !== null ? Math.max(0, s.hco3 - t.hco3) : 0;
  const acidDoses = {};
  if (hco3Excess > 0) {
    const totalMeq = hco3Excess * vol / 61.0;
    Object.entries(WC_ACID_FX).forEach(([acid, mlPerMeq]) => {
      acidDoses[acid] = totalMeq * mlPerMeq;
    });
  }

  const result = { ...s };
  Object.entries(doses).forEach(([mineral, totalG]) => {
    if (totalG <= 0) return;
    const gPL = totalG / vol;
    const fx  = WC_MINERAL_FX[mineral];
    IONS.forEach(k => { result[k] += gPL * fx[k]; });
  });
  if (hco3Excess > 0) result.hco3 = Math.max(0, result.hco3 - hco3Excess);

  // Alternative CaCl2 : same Ca as CaSO4 provides, but adds Cl instead of SO4
  const caFromCaSO4 = (doses['Sulfate de calcium'] / vol) * WC_MINERAL_FX['Sulfate de calcium'].ca;
  const altCaCl2g   = caFromCaSO4 > 0.5 ? (caFromCaSO4 / WC_MINERAL_FX['Chlorure de calcium'].ca) * vol : 0;

  // Alternative CaCO3 : same HCO3 as NaHCO3 provides, but adds Ca instead of Na
  const hco3FromNaHCO3 = (doses['Bicarbonate de sodium'] / vol) * WC_MINERAL_FX['Bicarbonate de sodium'].hco3;
  const altCaCO3g      = hco3FromNaHCO3 > 0.5 ? (hco3FromNaHCO3 / WC_MINERAL_FX['Carbonate de calcium'].hco3) * vol : 0;

  // Alternative NaHCO3 : same HCO3 as CaCO3 provides, but adds Na instead of Ca
  const hco3FromCaCO3  = (doses['Carbonate de calcium'] / vol) * WC_MINERAL_FX['Carbonate de calcium'].hco3;
  const altNaHCO3g     = hco3FromCaCO3 > 0.5 ? (hco3FromCaCO3 / WC_MINERAL_FX['Bicarbonate de sodium'].hco3) * vol : 0;

  return { delta, doses, acidDoses, result, altCaCl2g, altCaCO3g, altNaHCO3g };
}

function calcWaterCorrection() {
  const volMash   = parseFloat(document.getElementById('wc-volume-mash')?.value)   || 0;
  const volSparge = parseFloat(document.getElementById('wc-volume-sparge')?.value) || 0;

  const w = appSettings.water || {};
  const s = { ca: parseFloat(w.ca)||0, mg: parseFloat(w.mg)||0, na: parseFloat(w.na)||0,
               so4: parseFloat(w.so4)||0, cl: parseFloat(w.cl)||0, hco3: parseFloat(w.hco3)||0 };

  const readT = id => { const v = parseFloat(document.getElementById(id)?.value); return isNaN(v) ? null : v; };
  const tgt = { ca: readT('wc-t-ca'), mg: readT('wc-t-mg'), na: readT('wc-t-na'),
                so4: readT('wc-t-so4'), cl: readT('wc-t-cl'), hco3: readT('wc-t-hco3'),
                ph: readT('wc-t-ph') };

  const hasTarget = ['ca','mg','na','so4','cl','hco3'].some(k => tgt[k] !== null);
  const resMash   = document.getElementById('wc-results-mash');
  const resSparge = document.getElementById('wc-results-sparge');

  if (!hasTarget) {
    if (resMash)   resMash.style.display   = 'none';
    if (resSparge) resSparge.style.display = 'none';
    return;
  }

  if (volMash > 0) {
    const { delta, doses, acidDoses, result, altCaCl2g, altCaCO3g, altNaHCO3g } = _computeWCDoses(volMash, s, tgt);
    _renderWCResults(s, tgt, delta, doses, acidDoses, result, altCaCl2g, altCaCO3g, altNaHCO3g, 'wc-results-mash', t('rec.wc_mash'), 'empatage');
  } else if (resMash) resMash.style.display = 'none';

  if (volSparge > 0) {
    const { delta, doses, acidDoses, result, altCaCl2g, altCaCO3g, altNaHCO3g } = _computeWCDoses(volSparge, s, tgt);
    _renderWCResults(s, tgt, delta, doses, acidDoses, result, altCaCl2g, altCaCO3g, altNaHCO3g, 'wc-results-sparge', t('rec.wc_sparge'), 'sparge');
  } else if (resSparge) resSparge.style.display = 'none';
}

function _renderWCResults(s, tgt, delta, doses, acidDoses, result, altCaCl2g, altCaCO3g, altNaHCO3g, containerId, label, suffix) {
  const otherType = suffix === 'empatage' ? 'empatage' : 'sparge';
  const ION_META = [
    { k: 'ca',   label: t('rec.wc_ca')   },
    { k: 'mg',   label: t('rec.wc_mg')   },
    { k: 'na',   label: t('rec.wc_na')   },
    { k: 'so4',  label: t('rec.wc_so4')  },
    { k: 'cl',   label: t('rec.wc_cl')   },
    { k: 'hco3', label: t('rec.wc_hco3') },
  ];

  // ── Ion balance table ──
  let html = `
    <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--info);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.08)">
      <i class="fas fa-droplet"></i> ${label}
    </div>
    <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px">${t('rec.wc_ion_balance')}</div>
    <div style="overflow-x:auto;margin-bottom:14px">
    <table style="width:100%;font-size:.8rem;border-collapse:collapse;min-width:380px">
      <thead><tr style="color:var(--muted);border-bottom:1px solid var(--border)">
        <th style="text-align:left;padding:3px 8px">${t('rec.wc_col_ion')}</th>
        <th style="text-align:right;padding:3px 8px">${t('rec.wc_col_source')}</th>
        <th style="text-align:right;padding:3px 8px">${t('rec.wc_col_target')}</th>
        <th style="text-align:right;padding:3px 8px">Δ</th>
        <th style="text-align:right;padding:3px 8px">${t('rec.wc_col_result')}</th>
      </tr></thead><tbody>`;

  ION_META.forEach(({ k, label }) => {
    const src = s[k] ?? 0;
    const ionTgt = tgt[k];
    const res = result[k] ?? 0;
    const hasTgt = ionTgt !== null;
    const d = hasTgt ? delta[k] : null;
    const dStr  = d === null ? '–' : (d >= 0 ? `+${d.toFixed(0)}` : d.toFixed(0));
    const dCol  = d === null ? '' : d > 0 ? 'color:var(--info)' : d < 0 ? 'color:var(--danger)' : '';
    const diff  = hasTgt ? Math.abs(res - ionTgt) : null;
    const resCol= diff === null ? '' : diff < 5 ? 'color:var(--success)' : diff < 15 ? 'color:var(--amber)' : 'color:var(--danger)';
    // Warning when source already exceeds target
    const exceeded = hasTgt && ionTgt !== null && src > ionTgt + 1;
    html += `
      <tr style="border-bottom:1px solid var(--border)22">
        <td style="padding:3px 8px;font-weight:600">${label}</td>
        <td style="text-align:right;padding:3px 8px">${src.toFixed(0)}</td>
        <td style="text-align:right;padding:3px 8px">${hasTgt ? ionTgt.toFixed(0) : '–'}</td>
        <td style="text-align:right;padding:3px 8px;${dCol}">${dStr}${exceeded ? ` <i class="fas fa-circle-exclamation" style="color:var(--amber);font-size:.7rem" title="${t('rec.wc_src_exceeds')}"></i>` : ''}</td>
        <td style="text-align:right;padding:3px 8px;font-weight:700;${resCol}">${res.toFixed(1)}</td>
      </tr>`;
  });

  // SO4/Cl ratio
  const ratioVal  = (result.cl > 0) ? result.so4 / result.cl : result.so4;
  const ratioLbl  = ratioVal > 2 ? t('rec.wc_hop_fav') : ratioVal < 0.5 ? t('rec.wc_malt_fav') : t('rec.wc_balanced');
  const ratioCol  = ratioVal > 2 ? 'var(--hop)' : ratioVal < 0.5 ? 'var(--malt)' : 'var(--success)';
  html += `
    <tr style="border-top:1px solid var(--border);background:rgba(255,255,255,.03)">
      <td colspan="4" style="padding:3px 8px;font-size:.74rem;color:var(--muted)">${t('rec.wc_ratio')}</td>

          <span style="flex:1;font-size:.83rem">${WC_MINERAL_LABEL['Chlorure de calcium']}</span>

            <i class="fas fa-plus"></i> ${t('rec.wc_add_recipe')}
          </button>
        </div>
      </div>`;
  }

  // ── Alternative CaCO3 ──
  if (altCaCO3g >= 0.05) {
    html += `
      <div style="margin-bottom:14px">
        <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:6px">
          <i class="fas fa-shuffle"></i> ${t('rec.wc_alt_caco3')}

            <i class="fas fa-plus"></i> ${t('rec.wc_add_recipe')}
          </button>
        </div>
      </div>`;
  }

  // ── Alternative NaHCO3 ──
  if (altNaHCO3g >= 0.05) {
    html += `
      <div style="margin-bottom:14px">
        <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:6px">
          <i class="fas fa-shuffle"></i> ${t('rec.wc_alt_nahco3')}

    });

  }

  const div = document.getElementById(containerId);
  div.innerHTML = html;
  div.style.display = 'block';
}

function wcAddToRecipe(name, qty, unit, otherType = 'empatage') {
  // Update if already present, otherwise add new row
  const existing = recIngredients.find(i => i.name === name && i.category === 'autre');
  if (existing) {
    existing.quantity   = qty;
    existing.unit       = unit;
    existing.other_type = otherType;
    renderIngredientRows();
    toast(t('rec.wc_updated').replace('${name}', name), 'info');
    return;
  }
  recIngredients.push({
    _rid: ++ingRowId, category: 'autre', inventory_item_id: null,
    name, quantity: qty, unit,
    hop_type: null, other_type: otherType, other_time: null, notes: '',
  });
  renderIngredientRows();
  toast(t('rec.wc_added').replace('${name}', name), 'success');
}

async function testTelegramConnection() {
  const token   = document.getElementById('tg-token').value.trim();
  const chat_id = document.getElementById('tg-chat-id').value.trim();
  const res = document.getElementById('tg-test-result');
  if (!token || !chat_id) { res.style.color='var(--danger)'; res.textContent=t('settings.notif.tg_required'); return; }
  res.style.color = 'var(--muted)'; res.textContent = t('settings.notif.tg_sending');
  try {
    const r = await api('POST', '/api/telegram/test', { token, chat_id });
    if (r.success) { res.style.color='var(--success)'; res.textContent=t('settings.notif.tg_sent'); }
    else           { res.style.color='var(--danger)';  res.textContent=r.error||t('common.error'); }
  } catch(e) { res.style.color='var(--danger)'; res.textContent=t('settings.notif.tg_err_connect'); }
}

    const r = await api('POST', `/api/telegram/trigger/${type}`);

    else           toast(r.error || t('settings.github.telegram_err'), 'error');
  } catch(e) { toast(t('settings.github.telegram_err'), 'error'); }
}

async function generateBeerImage() {
  // Recharger les paramètres depuis le serveur pour garantir que la clé API est à jour
  // (évite le cas où localStorage et DB sont désynchronisés après un rechargement de page)
  try {
    const fresh = await api('GET', '/api/app-settings');
    if (fresh && Object.keys(fresh).length) {
      _loadSettingsFromServer(fresh);
      // Mettre à jour la visibilité du bouton si la clé vient d'être chargée
      const aiConfigured = !!appSettings.ai?.apiKey;
      const genBtn = document.getElementById('beer-gen-ai-btn');
      const extraWrap = document.getElementById('beer-ai-extra-wrap');
      if (genBtn)    genBtn.style.display    = aiConfigured ? '' : 'none';
      if (extraWrap) extraWrap.style.display = aiConfigured ? '' : 'none';
    }
  } catch(e) { /* serveur inaccessible — on utilise le cache en mémoire */ }

  const ai = appSettings.ai || {};
  const imgApiKey = ai.provider === 'gemini'
    ? (ai.geminiApiKey || ai.apiKey || '')
    : (ai.openaiApiKey || ai.apiKey || '');
  if (!imgApiKey) {
    toast(t('settings.ai.key_required'), 'error');
    return;
  }
  const name  = document.getElementById('beer-f-name').value.trim() || 'craft beer';
  const type  = document.getElementById('beer-f-type').value.trim();
  const desc  = document.getElementById('beer-f-desc').value.trim();
  const extra = document.getElementById('beer-ai-extra').value.trim();

  const prompt = `A flat, rectangular craft beer label design for a beer named "${name}"` +
    (type  ? `, style: ${type}` : '') +
    (desc  ? `. ${desc}` : '') +
    (extra ? `. Additional instructions: ${extra}` : '') +
    '. The label fills the entire image. No bottle, no glass, no hands, no brewery logo, no made-up brand symbols, no ABV percentage, no bottle size, no volume indication. Decorative illustrated border, beer name prominently displayed, nature or ingredient-inspired background art. Flat lay, print-ready label artwork only.';

  const beerId   = document.getElementById('beer-f-id').value;
  const hadPhoto = !!document.getElementById('beer-f-photo-b64').value;

  const btn = document.getElementById('beer-gen-ai-btn');
  btn.disabled = true;
  btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${t('settings.ai.generating')}`;
  try {
    let b64, mime = 'image/png';
    if (ai.provider === 'gemini') {
      const res = await _aiGenerateGemini(imgApiKey, ai.model || 'gemini-3.1-flash-image-preview', prompt);
      b64 = res.b64; mime = res.mime;
    } else {
      b64 = await _aiGenerateOpenAI(imgApiKey, ai.model || 'gpt-image-1', '1024x1536', ai.quality || 'auto', prompt);
    }
    const dataUrl = `data:${mime};base64,${b64}`;
    document.getElementById('beer-f-photo-b64').value = dataUrl;
    const prev = document.getElementById('beer-f-photo-preview');
    prev.src = dataUrl;
    prev.style.display = 'block';
    document.getElementById('beer-f-photo-remove').style.display = 'flex';
    // Auto-save si la bière existe déjà et n'avait pas de photo
    if (beerId && !hadPhoto) {
      const beerObj = S.beers.find(b => b.id === parseInt(beerId));
      if (beerObj) {
        const updated = await api('PUT', `/api/beers/${beerId}`, { ...beerObj, photo: dataUrl }).catch(() => null);
        if (updated) {
          const idx = S.beers.findIndex(b => b.id === parseInt(beerId));
          if (idx !== -1) S.beers[idx] = updated;
          toast(t('settings.ai.img_generated_auto'), 'success');
        } else {
          toast(t('settings.ai.img_generated_save'), 'success');
        }
      } else {
        toast(t('settings.ai.img_generated'), 'success');
      }
    } else {
      toast(t('settings.ai.img_generated'), 'success');
    }
  } catch(e) {
    const msg = e.message || String(e);
    let friendly = t('settings.ai.img_err') + ' ' + msg;
    if (msg.includes('quota') || msg.includes('RESOURCE_EXHAUSTED') || msg.includes('limit: 0')) {
      friendly = t('settings.ai.img_err_quota');
    } else if (msg.includes('API_KEY') || msg.includes('API key') || msg.includes('401') || msg.includes('403')) {
      friendly = t('settings.ai.img_err_key');
    } else if (msg.includes('model') && msg.includes('not found')) {
      friendly = t('settings.ai.img_err_model');
    } else if (msg.length > 120) {
      friendly = t('settings.ai.img_err') + ' ' + msg.slice(0, 120) + '…';
    }
    toast(friendly, 'error');
  }
  btn.disabled = false;
  btn.innerHTML = `<i class="fas fa-wand-magic-sparkles"></i> ${t('settings.ai.generate_btn')}`;
}

async function _aiGenerateOpenAI(apiKey, model, size, quality, prompt) {
  const body = { model, prompt, n: 1, size, quality };
  // gpt-image-1 returns b64_json by default; older models need it explicit
  if (model !== 'gpt-image-1') body.response_format = 'b64_json';
  const r = await fetch('https://api.openai.com/v1/images/generations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err?.error?.message || r.statusText);
  }
  const data = await r.json();
  return data.data[0].b64_json;
}

async function _aiGenerateGemini(apiKey, model, prompt) {
  // Imagen 4 models use the /predict endpoint
  if (model.startsWith('imagen-')) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:predict?key=${apiKey}`;
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ instances: [{ prompt }], parameters: { sampleCount: 1 } }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err?.error?.message || r.statusText);
    }
    const data = await r.json();
    return { b64: data.predictions[0].bytesBase64Encoded, mime: data.predictions[0].mimeType || 'image/png' };
  }
  // Gemini native image models use generateContent
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { responseModalities: ['IMAGE', 'TEXT'], imageConfig: { aspectRatio: '3:4' } },
    }),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err?.error?.message || r.statusText);
  }
  const data = await r.json();
  const parts = data.candidates?.[0]?.content?.parts || [];
  const imgPart = parts.find(p => p.inlineData?.data);
  if (!imgPart) throw new Error('Aucune image dans la réponse Gemini');
  return { b64: imgPart.inlineData.data, mime: imgPart.inlineData.mimeType || 'image/png' };
}

function previewAppIcon(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const size = 256;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.min(size / img.width, size / img.height);
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
      const b64 = canvas.toDataURL('image/png');
      appSettings.appIcon = b64;
      const prev = document.getElementById('app-icon-preview');
      if (prev) prev.innerHTML = `<img src="${b64}" style="width:100%;height:100%;object-fit:contain">`;
      const removeBtn = document.getElementById('app-icon-remove-btn');
      if (removeBtn) removeBtn.style.display = '';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function removeAppIcon() {
  delete appSettings.appIcon;
  saveSettings();

// binary=true : content est déjà du base64 pur (image), pas besoin d'encoder
// Retourne { skipped: true } si le contenu est identique à GitHub, sinon la réponse de l'API.
async function pushToGithub(repo, pat, branch, filePath, content, message, binary = false) {
  const base = `https://api.github.com/repos/${repo}/contents/${filePath}`;
  const headers = {
    'Authorization': `Bearer ${pat}`,
    'Accept': 'application/vnd.github+json',
    'Content-Type': 'application/json',
  };

  // Récupérer le fichier existant : SHA (pour le PUT) + contenu base64 (pour comparer)
  let sha, existingB64;
  try {
    const getRes = await fetch(`${base}?ref=${encodeURIComponent(branch)}`, { headers, cache: 'no-store' });
    if (getRes.ok) {
      const data = await getRes.json();
      sha = data.sha;
      existingB64 = (data.content || '').replace(/\s/g, ''); // GitHub insère des \n dans le base64
    }
  } catch(_) {}

  // Encoder le nouveau contenu
  const encoded = binary ? content : btoa(unescape(encodeURIComponent(content)));

  // Comparer directement le base64 — skip si identique
  if (existingB64 && existingB64 === encoded) return { skipped: true };

  const body = { message, content: encoded, branch };
  if (sha) body.sha = sha;

  const putRes = await fetch(base, { method: 'PUT', headers, body: JSON.stringify(body) });
  if (!putRes.ok) {
    const err = await putRes.json().catch(() => ({ message: putRes.statusText }));
    throw new Error(err.message || putRes.statusText);
  }
  return putRes.json();
}

// Extrait le base64 pur et l'extension depuis un data URL (ex: data:image/jpeg;base64,...)
function _parsePhotoDataUrl(dataUrl) {
  if (!dataUrl) return null;
  const m = dataUrl.match(/^data:image\/(\w+);base64,(.+)$/s);
  if (!m) return null;
  const ext = m[1] === 'jpeg' ? 'jpg' : m[1];
  return { ext, b64: m[2] };
}

function _vEsc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function _vDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString(_lang || 'fr', { day:'2-digit', month:'long', year:'numeric' }); }
  catch(_) { return iso; }
}

    const cls33  = s33 === 0 ? 'zero' : pct33 >= 0 && pct33 <= 40 ? 'low' : 'ok';

<script>
function openLb(el, name) {
  document.getElementById('lb-img').src = el.src;
  document.getElementById('lb-caption').textContent = name;
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  // Lightbox image (vitrine)
  const lb = document.getElementById('lb');
  if (lb?.classList.contains('open')) { closeLb(); return; }
  // Beer photo lightbox
  const beerLb = document.getElementById('beer-lightbox');
  if (beerLb?.style.display === 'flex') { closeBeerLightbox(); return; }
  // Modal overlays — ferme le dernier ouvert
  const openModals = [...document.querySelectorAll('.modal-overlay.open')];
  if (!openModals.length) return;
  const m = openModals[openModals.length - 1];
  if (m.id === 'modal-settings') closeSettings();
  else if (m.id === 'modal-scale') closeScaleModal();
  else closeModal(m.id);
});
<\/script>
</body>
</html>`;

async function pushVitrine(force = false) {
  _captureGithubSettings();
  const cfg = (appSettings.github || {}).vitrine || {};
  if (!cfg.repo || !cfg.pat) { toast(t('settings.github.err_missing_vitrine'), 'error'); return; }

  const btn      = document.getElementById('btn-push-vitrine');
  const btnForce = document.getElementById('btn-push-vitrine-force');
  const activeBtn = force ? btnForce : btn;
  if (btn)      { btn.disabled = true;      btn.innerHTML      = `<i class="fas fa-spinner fa-spin"></i> ${t('settings.github.sending')}`; }
  if (btnForce) { btnForce.disabled = true; btnForce.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; }

  // S'assurer que les bières sont chargées
  if (!S.beers.length) {
    try { S.beers = await api('GET', '/api/beers'); } catch(e) {}
  }
  const beers   = S.beers.filter(b => !b.archived);
  const dateStr = new Date().toISOString().slice(0, 10);

  // Construire la map des photos (id → {ext, b64})
  const photoMap = {};
  beers.forEach(b => {
    const p = _parsePhotoDataUrl(b.photo);
    if (p) photoMap[b.id] = p;
  });

  // Logo de l'application
  const appIconParsed = _parsePhotoDataUrl(appSettings.appIcon || null);
  const iconPath = appIconParsed ? `images/app-icon.${appIconParsed.ext}` : null;

  const html = generateVitrineHtml(beers, photoMap, iconPath);
  const json = JSON.stringify(beers, null, 2);

  // Commit unique via l'API Git Data (blobs → tree → commit → ref)
  const GH = `https://api.github.com/repos/${cfg.repo}`;
  const headers = {
    'Authorization': `Bearer ${cfg.pat}`,
    'Accept': 'application/vnd.github+json',
    'Content-Type': 'application/json',
  };

  // Liste des fichiers : { path, b64 }
  const files = [
    { path: 'index.html', b64: btoa(unescape(encodeURIComponent(html))) },
    { path: 'beers.json', b64: btoa(unescape(encodeURIComponent(json))) },
    ...Object.entries(photoMap).map(([id, { ext, b64 }]) => ({ path: `images/beer-${id}.${ext}`, b64 })),
    ...(appIconParsed ? [{ path: iconPath, b64: appIconParsed.b64 }] : []),
  ];

  try {
    // 1. Récupérer le SHA du commit actuel de la branche
    const refRes  = await fetch(`${GH}/git/ref/heads/${encodeURIComponent(cfg.branch)}`, { headers, cache: 'no-store' });
    if (!refRes.ok) throw new Error((await refRes.json()).message || 'Branche introuvable');
    const { object: { sha: currentCommitSha } } = await refRes.json();

    // 2. Récupérer le SHA du tree de base
    const commitRes = await fetch(`${GH}/git/commits/${currentCommitSha}`, { headers });
    if (!commitRes.ok) throw new Error('Impossible de lire le commit courant');
    const { tree: { sha: baseTreeSha } } = await commitRes.json();

    // 3. Récupérer le tree existant (récursif) pour comparer les SHAs
    const treeRes = await fetch(`${GH}/git/trees/${baseTreeSha}?recursive=1`, { headers });
    const existingMap = {};
    if (treeRes.ok) ((await treeRes.json()).tree || []).forEach(item => { existingMap[item.path] = item.sha; });

    // 4. Créer les blobs en parallèle
    const blobs = await Promise.all(files.map(async f => {
      const res = await fetch(`${GH}/git/blobs`, {
        method: 'POST', headers,
        body: JSON.stringify({ content: f.b64, encoding: 'base64' }),
      });
      if (!res.ok) throw new Error(`Blob ${f.path} : ${(await res.json()).message}`);
      const { sha } = await res.json();
      return { path: f.path, sha, changed: existingMap[f.path] !== sha };
    }));

    const changed = force ? blobs : blobs.filter(b => b.changed);
    if (!changed.length) {
      toast(t('settings.github.vitrine_up_to_date'), 'success');
      return;
    }

    // 5. Créer le nouveau tree (uniquement les fichiers modifiés, base = tree actuel)
    const newTreeRes = await fetch(`${GH}/git/trees`, {
      method: 'POST', headers,
      body: JSON.stringify({
        base_tree: baseTreeSha,
        tree: changed.map(b => ({ path: b.path, mode: '100644', type: 'blob', sha: b.sha })),
      }),
    });
    if (!newTreeRes.ok) throw new Error((await newTreeRes.json()).message || 'Erreur création tree');
    const { sha: newTreeSha } = await newTreeRes.json();

    // 6. Créer le commit
    const newCommitRes = await fetch(`${GH}/git/commits`, {
      method: 'POST', headers,
      body: JSON.stringify({
        message: `vitrine: mise à jour ${dateStr} (${changed.length} fichier(s))`,
        tree: newTreeSha,
        parents: [currentCommitSha],
      }),
    });
    if (!newCommitRes.ok) throw new Error((await newCommitRes.json()).message || 'Erreur création commit');
    const { sha: newCommitSha } = await newCommitRes.json();

    // 7. Avancer le pointeur de branche
    const patchRes = await fetch(`${GH}/git/refs/heads/${encodeURIComponent(cfg.branch)}`, {
      method: 'PATCH', headers,
      body: JSON.stringify({ sha: newCommitSha }),
    });
    if (!patchRes.ok) throw new Error((await patchRes.json()).message || 'Erreur mise à jour branche');

    const skipped = blobs.length - changed.length;
    const skipTxt = skipped ? t('settings.github.vitrine_skipped').replace('${n}', skipped) : '';
    const forceTxt = force ? t('settings.github.vitrine_forced') : '';
    toast(t('settings.github.vitrine_pushed').replace('${beers}', beers.length).replace('${files}', changed.length) + skipTxt + forceTxt, 'success');
  } catch(e) {
    toast(t('settings.github.err_vitrine') + ' ' + e.message, 'error');
  } finally {
    if (btn)      { btn.disabled = false;      btn.innerHTML      = `<i class="fa-brands fa-github"></i> ${t('settings.github.btn_push_vitrine')}`; }
    if (btnForce) { btnForce.disabled = false; btnForce.innerHTML = `<i class="fas fa-rotate"></i> ${t('settings.github.btn_force')}`; }
  }
}

async function pushGithubData() {
  _captureGithubSettings();
  const cfg = (appSettings.github || {}).data || {};
  if (!cfg.repo || !cfg.pat) {
    toast(t('settings.github.err_missing_data'), 'error');
    return;
  }

  const btn = document.getElementById('btn-push-data');
  if (btn) { btn.disabled = true; btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${t('settings.github.sending')}`; }

  const dateStr = new Date().toISOString().slice(0,10);
  try {
    // Fetch all data in parallel (pas de conflit GitHub ici)
    const [inv, rec, brews, beers, spindles, catalog, drafts, calendar] = await Promise.all([
      api('GET', '/api/export/inventory'),
      api('GET', '/api/export/recipes'),
      api('GET', '/api/export/brews'),
      api('GET', '/api/export/beers'),
      api('GET', '/api/export/spindles'),
      api('GET', '/api/export/catalog'),
      api('GET', '/api/export/drafts'),
      api('GET', '/api/export/calendar'),
    ]);
    // Paramètres avancés (sans PAT)
    const settingsOut = JSON.parse(JSON.stringify(appSettings));
    if (settingsOut.github?.vitrine) delete settingsOut.github.vitrine.pat;
    if (settingsOut.github?.data)    delete settingsOut.github.data.pat;
    // Push séquentiel pour éviter les conflits de SHA sur la même branche
    const dataFiles = [
      { path: 'inventaire.json',  content: JSON.stringify(inv,         null, 2), msg: `backup: inventaire ${dateStr}` },
      { path: 'recettes.json',    content: JSON.stringify(rec,         null, 2), msg: `backup: recettes ${dateStr}` },
      { path: 'brassins.json',    content: JSON.stringify(brews,       null, 2), msg: `backup: brassins ${dateStr}` },
      { path: 'cave.json',        content: JSON.stringify(beers,       null, 2), msg: `backup: cave ${dateStr}` },
      { path: 'densimetres.json', content: JSON.stringify(spindles,    null, 2), msg: `backup: densimètres ${dateStr}` },
      { path: 'catalogue.json',   content: JSON.stringify(catalog,     null, 2), msg: `backup: catalogue ${dateStr}` },
      { path: 'brouillons.json',  content: JSON.stringify(drafts,      null, 2), msg: `backup: brouillons ${dateStr}` },
      { path: 'calendrier.json',  content: JSON.stringify(calendar,    null, 2), msg: `backup: calendrier ${dateStr}` },
      { path: 'parametres.json',  content: JSON.stringify(settingsOut, null, 2), msg: `backup: paramètres ${dateStr}` },
    ];
    let pushed = 0, skipped = 0;
    for (const f of dataFiles) {
      const res = await pushToGithub(cfg.repo, cfg.pat, cfg.branch, f.path, f.content, f.msg);
      res?.skipped ? skipped++ : pushed++;
    }
    const skipTxt = skipped ? t('settings.github.vitrine_skipped').replace('${n}', skipped) : '';
    toast(t('settings.github.data_pushed').replace('${files}', pushed) + skipTxt, 'success');
  } catch(e) {
    toast(t('settings.github.err_data') + ' ' + e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = `<i class="fa-brands fa-github"></i> ${t('settings.github.pushing_data')}`; }
  }
}

let _updatesChecked = false;

async function checkStaticUpdates(force = false) {
  if (_updatesChecked && !force) return;
  const list = document.getElementById('updates-list');
  if (!list) return;
  list.innerHTML = `<div style="color:var(--muted);font-size:.85rem"><i class="fas fa-spinner fa-spin"></i> ${t('settings.updates.checking')}</div>`;
  try {
    const data = await api('GET', '/api/static/check-updates');
    _updatesChecked = true;
    const libs = [
      {
        key: 'chartjs', label: 'Chart.js', icon: 'fas fa-chart-line', color: 'var(--info)',
        updateFn: 'updateStaticLib("chartjs")',
        desc: 'Librairie de graphiques',
      },
      {
        key: 'fontawesome', label: 'Font Awesome', icon: 'fas fa-icons', color: 'var(--amber)',
        updateFn: 'updateStaticLib("fontawesome")',
        desc: 'Icônes (CSS + webfonts)',
      },
      {
        key: 'googlefonts', label: 'Google Fonts', icon: 'fas fa-font', color: '#10b981',
        updateFn: null,
        desc: 'Polices locales (Playfair Display)',
      },
    ];
    list.innerHTML = libs.map(lib => {
      const d = data[lib.key] || {};
      const current = d.current || '–';
      const latest  = d.latest  || null;
      const upToDate = latest && current === latest;
      const hasUpdate = latest && current !== latest;
      const err = d.error;
      let statusHtml;
      if (err) {
        statusHtml = `<span style="color:var(--danger);font-size:.8rem"><i class="fas fa-triangle-exclamation"></i> ${t('settings.updates.err_check')} ${esc(err)}</span>`;
      } else if (lib.key === 'googlefonts') {
        statusHtml = `<span style="color:var(--muted);font-size:.8rem">${t('settings.updates.lib_updated_at')} ${esc(current)} · ${d.size ? Math.round(d.size/1024)+'  KB' : ''}</span>`;
      } else if (upToDate) {
        statusHtml = `<span style="color:var(--success);font-size:.8rem"><i class="fas fa-circle-check"></i> ${t('settings.updates.status_ok').replace('${version}', esc(current))}</span>`;
      } else if (hasUpdate) {
        statusHtml = `<span style="color:var(--amber);font-size:.8rem"><i class="fas fa-arrow-up"></i> ${t('settings.updates.status_update').replace('${current}', esc(current))} <strong>${esc(latest)}</strong></span>`;
      } else {
        statusHtml = `<span style="color:var(--muted);font-size:.8rem">${t('settings.updates.err_status')} ${esc(current)}</span>`;
      }
      const btnHtml = lib.updateFn && hasUpdate
        ? `<button class="btn btn-sm btn-ghost" id="upd-btn-${lib.key}" onclick='${lib.updateFn}' style="border-color:rgba(245,158,11,.4);color:var(--amber)"><i class="fas fa-download"></i> ${t('settings.updates.lib_update_to')} ${esc(latest)}</button>`
        : '';
      return `<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card2);border-radius:10px;border:1px solid var(--border)">
        <i class="${lib.icon}" style="color:${lib.color};font-size:1.1rem;width:18px;text-align:center;flex-shrink:0"></i>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:.9rem">${lib.label} <span style="font-size:.75rem;color:var(--muted);font-weight:400">${lib.desc}</span></div>
          <div style="margin-top:3px">${statusHtml}</div>
        </div>
        ${btnHtml}
      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = `<div style="color:var(--danger);font-size:.85rem"><i class="fas fa-triangle-exclamation"></i> ${t('settings.updates.err_check')} ${esc(e.message)}</div>`;
  }
}

async function updateStaticLib(lib) {
  const btn = document.getElementById(`upd-btn-${lib}`);
  if (btn) { btn.disabled = true; btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${t('settings.updates.lib_updating')}`; }
  try {
    const res = await api('POST', `/api/static/update/${lib}`);
    const libLabel = lib === 'chartjs' ? 'Chart.js' : 'Font Awesome';
    toast(t('settings.updates.updated_ok').replace('${lib}', libLabel).replace('${version}', res.version), 'success');
    _updatesChecked = false;
    await checkStaticUpdates(true);
  } catch(e) {
    toast(t('settings.github.err_update') + ' ' + (e.error || e.message || JSON.stringify(e)), 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = `<i class="fas fa-download"></i> ${t('settings.updates.lib_update_to')}`; }
  }
}

let _calYear  = new Date().getFullYear();
let _calMonth = new Date().getMonth(); // 0-based

// Retourne le Nème jour de semaine (0=dim…6=sam) d'un mois donné (nth : 1=premier, -1=dernier)
function _nthDow(year, month, dow, nth) {
  if (nth > 0) {
    const d = new Date(year, month, 1);
    while (d.getDay() !== dow) d.setDate(d.getDate() + 1);
    d.setDate(d.getDate() + (nth - 1) * 7);
    return d;
  } else { // dernier
    const d = new Date(year, month + 1, 0);
    while (d.getDay() !== dow) d.setDate(d.getDate() - 1);
    return d;
  }
}
function _ymd(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

  add(fd(12, 5), 'National Repeal Day',             '🗽', '#3b82f6');
  add(fd(12,10), 'National Lager Day',              '🍺', '#f59e0b');
  add(fd(12,25), t('cal.ev_noel'),                   '🎄', '#dc2626', 'Noël — Bière de Noël');

  // ── Dates calculées ───────────────────────────────────────────────────────
  // IPA Day : 1er jeudi d'août
  add(_ymd(_nthDow(year, 7, 4, 1)),  'IPA Day',               '🌿', '#84cc16');
  // International Beer Day : 1er vendredi d'août
  add(_ymd(_nthDow(year, 7, 5, 1)),  'International Beer Day','🍺', '#f59e0b');
  // Beaujolais Nouveau : 3e jeudi de novembre
  add(_ymd(_nthDow(year, 10, 4, 3)), 'Beaujolais Nouveau',    '🍷', '#dc2626');
  // Oktoberfest : commence le samedi précédant le 22 sept
  const oktStart = (() => {
    const d = new Date(year, 8, 22);
    while (d.getDay() !== 6) d.setDate(d.getDate() - 1);
    return d;
  })();
  add(_ymd(oktStart),               t('cal.ev_okts'),  '🥨', '#d97706', 'Début Oktoberfest');
  add(_ymd(_nthDow(year, 9, 0, 1)), t('cal.ev_okte'),  '🥨', '#d97706', 'Fin Oktoberfest');

  return ev;
}

function calNav(dir) {
  _calMonth += dir;
  if (_calMonth > 11) { _calMonth = 0;  _calYear++; }
  if (_calMonth < 0)  { _calMonth = 11; _calYear--; }
  renderCalendar();
}
function calGoToday() {
  _calYear  = new Date().getFullYear();
  _calMonth = new Date().getMonth();
  renderCalendar();
}

function _expandCustomEvent(ev) {
  const rec = ev.recurrence
    ? (typeof ev.recurrence === 'string' ? JSON.parse(ev.recurrence) : ev.recurrence)
    : null;
  if (!rec?.type) return [ev.event_date];
  const years = [_calYear - 1, _calYear, _calYear + 1];
  return years.map(year => {
    if (rec.type === 'yearly') {
      return `${year}-${ev.event_date.slice(5, 10)}`;
    } else if (rec.type === 'yearly_nth_dow') {
      const month = parseInt(ev.event_date.slice(5, 7)) - 1;
      return _ymd(_nthDow(year, month, rec.dow, rec.nth));
    }
    return null;
  }).filter(Boolean);
}

function renderCalendar() {
  const MONTHS = t('cal.months');
  document.getElementById('cal-title').textContent = `${MONTHS[_calMonth]} ${_calYear}`;

  // Construire les événements depuis S.brews
  _calEvStore = []; // réinitialisé à chaque rendu
  const events = {}; // { 'YYYY-MM-DD': [{type, label, brewId}] }
  const addEv = (date, ev) => {
    if (!date) return;
    const d = date.slice(0, 10);
    if (!events[d]) events[d] = [];
    events[d].push({ ...ev, date: d });
  };

  (S.brews || []).filter(b => !b.archived).forEach(b => {
    const label = b.name || t('brew.title');
    if (b.brew_date)     addEv(b.brew_date,    { type: 'brew',   label, id: b.id });
    if (b.bottling_date) addEv(b.bottling_date, { type: 'bottle', label, id: b.id });
    if (b.brew_date && b.ferm_time) {
      const d = new Date(b.brew_date + 'T00:00:00');
      d.setDate(d.getDate() + (b.ferm_time | 0));
      addEv(_ymd(d), { type: 'ferm', label: `${label} ${t('cal.ferm_abbr')}`, id: b.id });
    }
  });

  // Brouillons planifiés
  (S.drafts || []).filter(d => d.target_date).forEach(d => {
    addEv(d.target_date, { type: 'draft', label: d.title || 'Brouillon', color: d.color || '#8b5cf6', draftId: d.id });
  });

  // Événements personnalisés + leur rappel J-45
  (S.customEvents || []).forEach(ev => {
    const c = ev.color || '#f59e0b';
    const occurrences = _expandCustomEvent(ev);
    occurrences.forEach(eventDate => {
      addEv(eventDate, { type: 'custom', label: (ev.emoji || '📅') + ' ' + ev.title, color: c, customId: ev.id });
      if (ev.brew_reminder) {
        const days = ev.brew_reminder_days ?? appSettings.defaultBrewReminderDays ?? 45;
        const rd = new Date(eventDate + 'T00:00:00');
        rd.setDate(rd.getDate() - days);
        addEv(_ymd(rd), { type: 'custom_remind', label: '🔔 ' + t('cal.brew_for') + ' ' + ev.title, color: '#a855f7', eventDate, reminderDays: days, customId: ev.id });
      }
    });
  });

  // Événements brassicoles mondiaux + rappels J-45
  const _hiddenWorldEvs  = appSettings.hiddenWorldEvents   || [];
  const _worldOverrides  = appSettings.worldEventOverrides || {};
  const _allWorldEvs = [
    ..._brewingEvents(_calYear),
    ..._brewingEvents(_calYear - 1),
    ..._brewingEvents(_calYear + 1),
  ].filter(e => !_hiddenWorldEvs.includes(e.canonical || e.label));
  _allWorldEvs.forEach(e => {
    const eKey  = e.canonical || e.label;
    const ov    = _worldOverrides[eKey] || {};
    const emoji = ov.emoji || e.emoji;
    const lbl   = ov.label || e.label;
    const color = ov.color || e.color;
    const evYear = e.date.slice(0, 4);
    const date  = ov.date_mmdd ? `${evYear}-${ov.date_mmdd}` : e.date;
    addEv(date, { type: 'world', label: emoji + ' ' + lbl, color, origLabel: eKey });
    // Rappel brassage (délai global)
    const _remDays = appSettings.defaultBrewReminderDays ?? 45;
    const rd = new Date(date + 'T00:00:00');
    rd.setDate(rd.getDate() - _remDays);
    addEv(_ymd(rd), { type: 'remind', label: '🔔 ' + t('cal.brew_for') + ' ' + lbl, color: '#a855f7', eventDate: date, reminderDays: _remDays, origLabel: eKey });
  });

  // Calcul des cellules du mois
  const today    = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(_calYear, _calMonth, 1);
  const lastDay  = new Date(_calYear, _calMonth + 1, 0);
  // Lundi = 0 … Dimanche = 6
  const startDow = (firstDay.getDay() + 6) % 7; // lundi en premier
  const totalCells = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;

  let html = '';
  for (let i = 0; i < totalCells; i++) {
    const cellDate = new Date(_calYear, _calMonth, 1 - startDow + i);
    const isOther  = cellDate.getMonth() !== _calMonth;
    const isToday  = cellDate.getTime() === today.getTime();
    const key      = _ymd(cellDate);
    const dayEvs   = events[key] || [];

    const evHtml = dayEvs.map(ev => {
      const idx = _calEvStore.push(ev) - 1;
      if (ev.type === 'world') {
        return `<div class="cal-event" style="background:${ev.color}22;color:${ev.color};border:1px solid ${ev.color}44"
          onclick="calEvClick(event,${idx})">
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
        </div>`;
      }
      if (ev.type === 'remind') {
        return `<div class="cal-event" style="background:rgba(168,85,247,.12);color:#a855f7;border:1px dashed rgba(168,85,247,.4)"
          onclick="calEvClick(event,${idx})">
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
        </div>`;
      }
      if (ev.type === 'draft') {
        const c = ev.color || '#8b5cf6';
        return `<div class="cal-event" style="background:${c}22;color:${c};border:1px solid ${c}44"
          onclick="calEvClick(event,${idx})">
          <i class="fas fa-book-open" style="flex-shrink:0;font-size:.65rem"></i>
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
        </div>`;
      }
      if (ev.type === 'custom') {
        const c = ev.color || '#f59e0b';
        return `<div class="cal-event" style="background:${c}22;color:${c};border:1px solid ${c}55"
          onclick="event.stopPropagation();editCustomEvent(${ev.customId})" title="${t('common.edit')}">
          <i class="fas fa-star" style="flex-shrink:0;font-size:.6rem"></i>
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
          <i class="fas fa-pen" style="flex-shrink:0;font-size:.55rem;margin-left:auto;opacity:.6"></i>
        </div>`;
      }
      if (ev.type === 'custom_remind') {
        return `<div class="cal-event" style="background:rgba(168,85,247,.12);color:#a855f7;border:1px dashed rgba(168,85,247,.4)"
          onclick="calEvClick(event,${idx})">
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
        </div>`;
      }
      const cls  = ev.type === 'brew' ? 'cal-event-brew' : ev.type === 'bottle' ? 'cal-event-bottle' : 'cal-event-ferm';
      const icon = ev.type === 'brew' ? 'fa-fire-burner'  : ev.type === 'bottle' ? 'fa-wine-bottle'   : 'fa-clock';
      return `<div class="cal-event ${cls}" onclick="calEvClick(event,${idx})">
        <i class="fas ${icon}" style="flex-shrink:0;font-size:.65rem"></i>
        <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
      </div>`;
    }).join('');

    html += `<div class="cal-cell${isOther?' cal-other-month':''}${isToday?' cal-today':''}">
      <div class="cal-day-num">${cellDate.getDate()}</div>
      ${evHtml}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
  _closeCalPopover();
  updateCalBadge();
}

function calEvClick(e, idx) {
  e.stopPropagation();
  const ev  = _calEvStore[idx];
  if (!ev) return;
  const pop = document.getElementById('cal-popover');
  const cnt = document.getElementById('cal-pop-content');

  let html = '';
  if (ev.type === 'draft') {
    const d = (S.drafts || []).find(x => x.id === ev.draftId);
    const c = ev.color || '#8b5cf6';
    html = `
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
        <i class="fas fa-book-open" style="color:${c}"></i>
        <span style="font-weight:700;font-size:.9rem">${esc(ev.label)}</span>
      </div>`;
    if (d) {
      const ingCount = (() => { try { return JSON.parse(d.ingredients||'[]').length; } catch(e) { return 0; } })();
      html += `
      <div style="font-size:.78rem;color:var(--muted);margin-bottom:6px">${d.style ? esc(d.style) + ' · ' : ''}${ingCount ? ingCount + ' ' + t('draft.ing_count_label') : t('draft.no_ing_short')}</div>
      ${d.notes ? `<div style="font-size:.8rem;color:var(--text);line-height:1.4;margin-bottom:8px;font-style:italic">${esc(d.notes.slice(0,120))}${d.notes.length>120?'…':''}</div>` : ''}
      <button class="btn btn-sm btn-ghost" style="width:100%" onclick="_closeCalPopover();navigate('brouillons');setTimeout(()=>openDraft(${d.id}),300)">
        <i class="fas fa-arrow-right"></i> ${t('cal.open_draft')}
      </button>`;
    }
  } else if (ev.type === 'world') {
    const rawLabel = ev.origLabel || ev.label.replace(/^\S+\s/, '');
    const _ov      = (appSettings.worldEventOverrides || {})[rawLabel] || {};
    const details  = { ..._BREW_EV_DETAILS[rawLabel] || {} };
    if (_ov.desc  !== undefined) details.desc  = _ov.desc;
    if (_ov.style !== undefined) details.style = _ov.style;
    const dateStr  = new Date(ev.date + 'T00:00:00').toLocaleDateString(_lang || 'fr', { weekday:'long', day:'numeric', month:'long' });
    // Brouillons liés à cet événement
    const linkedDrafts = (S.drafts || []).filter(d =>
      d.target_date === ev.date || d.event_label === rawLabel
    );
    html = `
      <div style="font-size:1rem;font-weight:700;margin-bottom:4px">${esc(ev.label)}</div>

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('brewhome-theme', next);
  _updateThemeBtn(next);
}
function _updateThemeBtn(theme) {
  const btn = document.getElementById('btn-theme');
  if (!btn) return;
  if (theme === 'light') {
    btn.innerHTML = '<i class="fas fa-moon"></i>';
    btn.title = 'Passer en thème sombre';
  } else {
    btn.innerHTML = '<i class="fas fa-sun"></i>';
    btn.title = 'Passer en thème clair';
  }
}

// ══════════════════════════════════════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function _ceUpdateRecurrenceUI() {
  const type = document.getElementById('ce-recurrence').value;
  const wrap = document.getElementById('ce-rec-nth-wrap');
  if (type === 'yearly_nth_dow') {
    wrap.style.display = 'flex';
    _ceAutoDetectNthDow(document.getElementById('ce-date').value);
  } else {
    wrap.style.display = 'none';
  }
}

function _ceOnDateChange() {
  if (document.getElementById('ce-recurrence').value === 'yearly_nth_dow')
    _ceAutoDetectNthDow(document.getElementById('ce-date').value);
}

function _ceAutoDetectNthDow(dateStr) {
  if (!dateStr) return;
  const d = new Date(dateStr + 'T00:00:00');
  document.getElementById('ce-rec-dow').value = d.getDay();
  document.getElementById('ce-rec-nth').value = Math.ceil(d.getDate() / 7);
}

function _ceGetRecurrence() {
  const type = document.getElementById('ce-recurrence').value;
  if (!type) return null;
  if (type === 'yearly') return JSON.stringify({ type: 'yearly' });
  if (type === 'yearly_nth_dow') return JSON.stringify({
    type: 'yearly_nth_dow',
    nth: parseInt(document.getElementById('ce-rec-nth').value),
    dow: parseInt(document.getElementById('ce-rec-dow').value),
  });
  return null;
}

function _ceSetRecurrence(rec) {
  const obj = rec ? (typeof rec === 'string' ? JSON.parse(rec) : rec) : null;
  const sel = document.getElementById('ce-recurrence');
  sel.value = obj?.type || '';
  if (obj?.type === 'yearly_nth_dow') {
    document.getElementById('ce-rec-nth-wrap').style.display = 'flex';
    document.getElementById('ce-rec-nth').value = obj.nth ?? 1;
    document.getElementById('ce-rec-dow').value  = obj.dow ?? 1;
  } else {
    document.getElementById('ce-rec-nth-wrap').style.display = 'none';
  }
}

async function saveCustomEvent() {
  const title = document.getElementById('ce-title').value.trim();
  const date  = document.getElementById('ce-date').value;
  if (!title) { _ceAlert('Le titre est requis'); return; }
  if (!date)  { _ceAlert('La date est requise'); return; }

  const payload = {
    title,
    emoji:          document.getElementById('ce-emoji').value.trim() || '📅',
    event_date:     date,
    color:          document.getElementById('ce-color').value,
    notes:          document.getElementById('ce-notes').value.trim() || null,
    brew_reminder:       document.getElementById('ce-brew-reminder').checked,
    brew_reminder_days:  document.getElementById('ce-brew-reminder-days').value !== ''
                           ? parseInt(document.getElementById('ce-brew-reminder-days').value) || null
                           : null,
    telegram_notify:     document.getElementById('ce-telegram').checked,
    style:          document.getElementById('ce-style').value.trim() || null,
    recipe_id:      parseInt(document.getElementById('ce-recipe-id').value) || null,
    draft_id:       parseInt(document.getElementById('ce-draft-id').value)  || null,
    recurrence:     _ceGetRecurrence(),
  };

  const id = document.getElementById('ce-id').value;
  try {
    let saved;
    if (id) {
      saved = await api('PUT', `/api/custom_events/${id}`, payload);
      const idx = S.customEvents.findIndex(x => x.id === parseInt(id));
      if (idx !== -1) S.customEvents[idx] = saved;
    } else {
      saved = await api('POST', '/api/custom_events', payload);
      S.customEvents.push(saved);
    }
    closeModal('custom-event-modal');
    renderCalendar();
    toast(id ? t('settings.toast.event_modified') : t('settings.toast.event_created'), 'success');
  } catch(e) { _ceAlert('Erreur lors de l\'enregistrement'); }
}

// ── Suggests : style BJCP, recette, brouillon ─────────────────────────────
function ceStyleSearch(input) {
  const q   = input.value.toLowerCase().trim();
  const sug = document.getElementById('ce-style-sug');
  sug.classList.remove('open');
  let html = '', count = 0;
  const commonMatches = [];
  for (const types of Object.values(BEER_TYPES))
    types.forEach(t => { if (!q || t.toLowerCase().includes(q)) commonMatches.push(t); });
  if (commonMatches.length) {
    html += `<div class="ing-suggest-cat">Styles courants</div>`;
    commonMatches.slice(0, q ? 30 : 10).forEach(t => {
      html += `<div class="ing-suggest-item" onmousedown="selectCeStyle(${JSON.stringify(t).replace(/"/g,'&quot;')})"><span>${esc(t)}</span></div>`;
      count++;
    });
  }
  const bycat = _bjcpByCategory(s => !q || s.name.toLowerCase().includes(q) || s.category.toLowerCase().includes(q));
  for (const [cat, styles] of Object.entries(bycat)) {
    html += `<div class="ing-suggest-cat" style="color:var(--gold)">BJCP — ${esc(cat)}</div>`;
    styles.forEach(s => {
      html += `<div class="ing-suggest-item" onmousedown="selectCeStyle(${JSON.stringify(s.name).replace(/"/g,'&quot;')})"><span style="font-size:.83rem">${esc(s.name)}</span></div>`;
      count++;
    });
    if (!q && count > 50) break;
  }
  if (!html) return;
  sug.innerHTML = html;
  sug.classList.add('open');
}
function closeCeStyleSug() { document.getElementById('ce-style-sug')?.classList.remove('open'); }
function selectCeStyle(name) { document.getElementById('ce-style').value = name; closeCeStyleSug(); }

function ceSuggestRecipe(input) {

function closeCeRecipeSug() { document.getElementById('ce-recipe-sug')?.classList.remove('open'); }
function selectCeRecipe(id, name) {
  document.getElementById('ce-recipe-id').value   = id;

function ceSuggestDraft(input) {

function selectCeDraft(id, name) {

async function deleteCustomEvent() {
  const id = document.getElementById('ce-id').value;
  if (!id || !confirm(t('settings.toast.custom_event_confirm_delete'))) return;
  try {
    await api('DELETE', `/api/custom_events/${id}`);
    S.customEvents = S.customEvents.filter(x => x.id !== parseInt(id));
    closeModal('custom-event-modal');
    renderCalendar();
    toast(t('settings.toast.event_deleted'), 'success');
  } catch(e) { _ceAlert('Erreur lors de la suppression'); }
}

function renderDraftView() {
  const panel = document.getElementById('draft-view-panel');
  const d = S.drafts.find(x => x.id === _currentDraftId);
  if (!panel || !d) return;

  const color = d.color || '#ff9500';
  const ings  = _draftIngredients;

  // Dates
  let bannerHtml = '';
  if (d.target_date) {
    const td      = new Date(d.target_date + 'T00:00:00');
    const today   = new Date(); today.setHours(0,0,0,0);
    const brew    = new Date(td); brew.setDate(brew.getDate() - 30);
    const diffEv  = Math.round((td   - today) / 86400000);
    const diffBr  = Math.round((brew - today) / 86400000);
    const fmtEv   = td.toLocaleDateString(_lang || 'fr',   { day:'numeric', month:'long', year:'numeric' });
    const fmtBrew = brew.toLocaleDateString(_lang || 'fr', { day:'numeric', month:'long', year:'numeric' });
    const cdBrew  = diffBr < 0 ? 'var(--danger)' : diffBr <= 7 ? 'var(--amber)' : 'var(--muted)';
    const cdEvent = diffEv < 0 ? 'var(--danger)' : diffEv <= 14 ? 'var(--amber)' : '#10b981';
    const cntBrew = diffBr === 0 ? t('cal.countdown_today') : diffBr > 0 ? t('cal.countdown_in').replace('${diff}', diffBr) : t('cal.countdown_ago').replace('${diff}', -diffBr);
    bannerHtml = `<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:16px;
      padding:10px 14px;background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.22);border-radius:10px;font-size:.82rem">
      <div style="display:flex;align-items:center;gap:8px">
        <i class="fas fa-fire-burner" style="color:var(--amber);width:14px;text-align:center"></i>
        <span style="color:var(--muted)">${t('draft.brew_on')}</span>
        <span style="font-weight:700;color:var(--amber)">${fmtBrew}</span>
        <span style="font-size:.75rem;font-weight:700;color:${cdBrew};margin-left:auto">(${cntBrew})</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <i class="fas fa-calendar-star" style="color:#8b5cf6;width:14px;text-align:center"></i>
        <span style="font-weight:600;color:#8b5cf6;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.event_label || '')}</span>
        <span style="color:var(--muted);flex-shrink:0">${fmtEv}</span>
        <span style="font-size:.75rem;font-weight:700;color:${cdEvent};flex-shrink:0">(${diffEv >= 0 ? t('cal.countdown_in').replace('${diff}', diffEv) : t('cal.countdown_past')})</span>
      </div>
    </div>`;
  }

  // Ingrédients par catégorie
  const catDef = [
    { key:'malt',    icon:'fa-wheat-awn',    color:'var(--malt)',  label:t('cat.malts') },
    { key:'houblon', icon:'fa-seedling',     color:'var(--hop)',   label:t('cat.houblons') },
    { key:'levure',  icon:'fa-circle-nodes', color:'var(--yeast)', label:t('cat.levures') },
    { key:'autre',   icon:'fa-plus',         color:'var(--other)', label:t('cat.autres') },
  ];
  let ingHtml = '';
  catDef.forEach(({ key, icon, color: col, label }) => {
    const rows = ings.filter(i => i.category === key && i.name);
    if (!rows.length) return;
    ingHtml += `<div style="margin-bottom:8px">
      <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:${col};margin-bottom:4px">
        <i class="fas ${icon}"></i> ${label}
      </div>
      <div style="display:flex;flex-direction:column;gap:3px">
        ${rows.map(i => `<div style="display:flex;justify-content:space-between;font-size:.85rem;padding:3px 8px;background:var(--card2);border-radius:6px">
          <span>${esc(i.name)}</span>
          <span style="color:var(--muted)">${i.quantity != null ? i.quantity : ''} ${esc(i.unit || '')}</span>
        </div>`).join('')}
      </div>
    </div>`;
  });

  // Image
  const imgHtml = d.image
    ? `<img src="${d.image}" style="width:100%;max-width:320px;border-radius:12px;object-fit:cover;display:block;margin-bottom:16px">`
    : '';

  panel.innerHTML = `
    <!-- En-tête -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <span style="width:14px;height:14px;border-radius:50%;background:${color};flex-shrink:0"></span>
      <h3 style="margin:0;font-size:1.25rem;font-weight:700">${esc(d.title || 'Sans titre')}</h3>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
      ${d.style  ? `<span class="badge" style="background:rgba(245,158,11,.15);color:var(--amber)">${esc(d.style)}</span>` : ''}
      ${d.volume ? `<span class="badge" style="background:var(--card2);color:var(--muted)">${d.volume} L</span>` : ''}
    </div>

    ${bannerHtml}
    ${imgHtml}

    ${ings.some(i => i.name) ? `
    <div style="margin-bottom:16px">
      <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px">Ingrédients</div>
      ${ingHtml}
    </div>` : ''}

    ${d.notes ? `
    <div style="margin-bottom:8px">
      <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px">Notes & idées</div>
      <div style="font-size:.88rem;line-height:1.6;white-space:pre-wrap;color:var(--text)">${esc(d.notes)}</div>
    </div>` : ''}
  `;

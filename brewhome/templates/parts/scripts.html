async function loadDbStats() {
  const loading = document.getElementById('dbadmin-loading');
  const content = document.getElementById('dbadmin-content');
  if (loading) loading.style.display = '';
  if (content) content.style.display = 'none';
  try {
    const data = await api('GET', '/api/admin/db-stats');
    const fmt = b => b >= 1048576 ? (b/1048576).toFixed(2)+' Mo' : (b/1024).toFixed(1)+' Ko';
    const mainTotal = Object.values(data.main.tables).reduce((a,b)=>a+b, 0);
    const readTotal = Object.values(data.readings.tables).reduce((a,b)=>a+b, 0);
    document.getElementById('dbadmin-summary').innerHTML = `
      <div class="stat"><div class="stat-val" style="color:var(--info)">${fmt(data.main.size)}</div><div class="stat-lbl">${t('dbadmin.main_size')}</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--info)">${fmt(data.readings.size)}</div><div class="stat-lbl">${t('dbadmin.readings_size')}</div></div>
      <div class="stat"><div class="stat-val">${fmt(data.main.size + data.readings.size)}</div><div class="stat-lbl">${t('dbadmin.total_size')}</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--success)">${(mainTotal + readTotal).toLocaleString()}</div><div class="stat-lbl">${t('dbadmin.total_rows')}</div></div>`;
    const renderTbl = (tables, id) => {
      const rows = Object.entries(tables).sort((a,b) => b[1]-a[1]);
      document.getElementById(id).innerHTML = rows.map(([name, count]) =>
        `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:.82rem;font-family:monospace;color:var(--text)">${name}</span>
          <span class="nav-badge">${count.toLocaleString()}</span>
        </div>`
      ).join('');
    };
    renderTbl(data.main.tables, 'dbadmin-main-tables');
    renderTbl(data.readings.tables, 'dbadmin-readings-tables');
    if (loading) loading.style.display = 'none';
    if (content) content.style.display = '';
  } catch(e) {
    if (loading) loading.innerHTML = `<i class="fas fa-triangle-exclamation"></i><p>${e.message||'Error'}</p>`;
  }
}

async function runVacuum() {
  const btn = document.getElementById('dbadmin-vacuum-btn');
  btn.disabled = true;
  const orig = btn.innerHTML;
  btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${t('dbadmin.vacuuming')}`;
  try {
    await api('POST', '/api/admin/vacuum');
    toast(t('dbadmin.vacuum_done'), 'success');
    await loadDbStats();
  } catch(e) {
    toast(t('dbadmin.vacuum_error'), 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = orig;
  }
}

// mg of each ion contributed per gram of mineral added to 1 L
const WC_MINERAL_FX = {
  'Sulfate de calcium':    { ca: 232.8, mg: 0,    na: 0,     so4: 557.9,  cl: 0,     hco3: 0      },
  'Sulfate de magnésium':  { ca: 0,     mg: 98.6, na: 0,     so4: 389.8,  cl: 0,     hco3: 0      },
  'Chlorure de calcium':   { ca: 361.2, mg: 0,    na: 0,     so4: 0,      cl: 638.9, hco3: 0      },
  'Chlorure de sodium':    { ca: 0,     mg: 0,    na: 393.3, so4: 0,      cl: 606.5, hco3: 0      },
  'Carbonate de calcium':  { ca: 400.4, mg: 0,    na: 0,     so4: 0,      cl: 0,     hco3: 1218.0 },
  'Bicarbonate de sodium': { ca: 0,     mg: 0,    na: 273.7, so4: 0,      cl: 0,     hco3: 726.4  },
};

const WC_MINERAL_LABEL = {
  'Sulfate de calcium':    'Sulfate de calcium (CaSO₄)',
  'Sulfate de magnésium':  'Sulfate de magnésium (MgSO₄)',
  'Chlorure de calcium':   'Chlorure de calcium (CaCl₂)',
  'Chlorure de sodium':    'Chlorure de sodium (NaCl)',
  'Carbonate de calcium':  'Carbonate de calcium (CaCO₃)',
  'Bicarbonate de sodium': 'Bicarbonate de sodium (NaHCO₃)',
};

// mL of acid needed to neutralize 1 mEq of total alkalinity
// mEq_total = Δ_HCO3_ppm * volume_L / 61.0
const WC_ACID_FX = {
  'Acide lactique 80%':     0.09306,
  'Acide lactique 88%':     0.08461,
  'Acide phosphorique 75%': 0.08277,
  'Acide phosphorique 85%': 0.06826,
};

// Classic water profiles (mg/L)
const WC_PRESETS = {
  neutre:     { ca: 0,   mg: 0,  na: 0,  so4: 0,   cl: 0,   hco3: 0   },
  pilsen:     { ca: 7,   mg: 3,  na: 2,  so4: 5,   cl: 5,   hco3: 15  },
  munich:     { ca: 75,  mg: 18, na: 5,  so4: 45,  cl: 40,  hco3: 200 },
  vienne:     { ca: 200, mg: 60, na: 8,  so4: 120, cl: 12,  hco3: 120 },
  dortmund:   { ca: 225, mg: 40, na: 60, so4: 120, cl: 60,  hco3: 180 },
  london:     { ca: 90,  mg: 5,  na: 15, so4: 50,  cl: 50,  hco3: 140 },
  burton:     { ca: 275, mg: 40, na: 25, so4: 610, cl: 35,  hco3: 270 },
  dublin:     { ca: 118, mg: 12, na: 12, so4: 54,  cl: 19,  hco3: 315 },
  edinburgh:  { ca: 100, mg: 20, na: 55, so4: 140, cl: 60,  hco3: 280 },
  equilibre:  { ca: 75,  mg: 5,  na: 25, so4: 75,  cl: 75,  hco3: 50  },
  ipa:        { ca: 150, mg: 10, na: 10, so4: 300, cl: 55,  hco3: 0   },
  stout:      { ca: 100, mg: 10, na: 35, so4: 50,  cl: 75,  hco3: 300 },
};

function toggleWaterCorrection() {

  const btn   = document.getElementById('btn-wc');

function renderWaterCorrection() {

function wcPreset(name) {
  const p = WC_PRESETS[name];
  if (!p) return;
  ['ca','mg','na','so4','cl','hco3'].forEach(k => {
    const el = document.getElementById(`wc-t-${k}`);
    if (el) el.value = p[k];
  });
  calcWaterCorrection();
}

function _computeWCDoses(vol, s, t) {
  const IONS = ['ca','mg','na','so4','cl','hco3'];
  const delta = {};
  IONS.forEach(k => { delta[k] = t[k] !== null ? t[k] - s[k] : 0; });

  const rem = {};
  IONS.forEach(k => { rem[k] = Math.max(0, delta[k]); });

  const doses = {
    'Sulfate de magnésium': 0, 'Sulfate de calcium': 0,
    'Chlorure de calcium':  0, 'Chlorure de sodium': 0,
    'Bicarbonate de sodium':0, 'Carbonate de calcium': 0,
  };

  if (rem.mg > 0) {
    const gPL = rem.mg / 98.6;
    doses['Sulfate de magnésium'] = gPL * vol;
    rem.so4 = Math.max(0, rem.so4 - gPL * 389.8);
    rem.mg  = 0;
  }
  if (rem.so4 > 0) {
    const gPL = rem.so4 / 557.9;
    doses['Sulfate de calcium'] = gPL * vol;
    rem.ca  = Math.max(0, rem.ca - gPL * 232.8);
    rem.so4 = 0;
  }
  if (rem.ca > 0) {
    const gPL = rem.ca / 361.2;
    doses['Chlorure de calcium'] = gPL * vol;
    rem.cl = Math.max(0, rem.cl - gPL * 638.9);
    rem.ca = 0;
  }
  if (rem.cl > 0) {
    const gPL = rem.cl / 606.5;
    doses['Chlorure de sodium'] = gPL * vol;
    rem.na = Math.max(0, rem.na - gPL * 393.3);
    rem.cl = 0;
  }
  if (rem.hco3 > 0) {
    if (rem.na > 0) {
      const use = Math.min(rem.hco3, rem.na / 273.7 * 726.4);
      const gPL = use / 726.4;
      doses['Bicarbonate de sodium'] = gPL * vol;
      rem.na   = Math.max(0, rem.na - gPL * 273.7);
      rem.hco3 -= use;
    }
    if (rem.hco3 > 0) {
      doses['Carbonate de calcium'] = (rem.hco3 / 1218.0) * vol;
      rem.hco3 = 0;
    }
  }
  if (rem.na > 0) {
    doses['Bicarbonate de sodium'] += (rem.na / 273.7) * vol;
    rem.na = 0;
  }

  const hco3Excess = t.hco3 !== null ? Math.max(0, s.hco3 - t.hco3) : 0;
  const acidDoses = {};
  if (hco3Excess > 0) {
    const totalMeq = hco3Excess * vol / 61.0;
    Object.entries(WC_ACID_FX).forEach(([acid, mlPerMeq]) => {
      acidDoses[acid] = totalMeq * mlPerMeq;
    });
  }

  const result = { ...s };
  Object.entries(doses).forEach(([mineral, totalG]) => {
    if (totalG <= 0) return;
    const gPL = totalG / vol;
    const fx  = WC_MINERAL_FX[mineral];
    IONS.forEach(k => { result[k] += gPL * fx[k]; });
  });
  if (hco3Excess > 0) result.hco3 = Math.max(0, result.hco3 - hco3Excess);

  // Alternative CaCl2 : same Ca as CaSO4 provides, but adds Cl instead of SO4
  const caFromCaSO4 = (doses['Sulfate de calcium'] / vol) * WC_MINERAL_FX['Sulfate de calcium'].ca;
  const altCaCl2g   = caFromCaSO4 > 0.5 ? (caFromCaSO4 / WC_MINERAL_FX['Chlorure de calcium'].ca) * vol : 0;

  // Alternative CaCO3 : same HCO3 as NaHCO3 provides, but adds Ca instead of Na
  const hco3FromNaHCO3 = (doses['Bicarbonate de sodium'] / vol) * WC_MINERAL_FX['Bicarbonate de sodium'].hco3;
  const altCaCO3g      = hco3FromNaHCO3 > 0.5 ? (hco3FromNaHCO3 / WC_MINERAL_FX['Carbonate de calcium'].hco3) * vol : 0;

  // Alternative NaHCO3 : same HCO3 as CaCO3 provides, but adds Na instead of Ca
  const hco3FromCaCO3  = (doses['Carbonate de calcium'] / vol) * WC_MINERAL_FX['Carbonate de calcium'].hco3;
  const altNaHCO3g     = hco3FromCaCO3 > 0.5 ? (hco3FromCaCO3 / WC_MINERAL_FX['Bicarbonate de sodium'].hco3) * vol : 0;

  return { delta, doses, acidDoses, result, altCaCl2g, altCaCO3g, altNaHCO3g };
}

function calcWaterCorrection() {
  const volMash   = parseFloat(document.getElementById('wc-volume-mash')?.value)   || 0;
  const volSparge = parseFloat(document.getElementById('wc-volume-sparge')?.value) || 0;

  const w = appSettings.water || {};
  const s = { ca: parseFloat(w.ca)||0, mg: parseFloat(w.mg)||0, na: parseFloat(w.na)||0,
               so4: parseFloat(w.so4)||0, cl: parseFloat(w.cl)||0, hco3: parseFloat(w.hco3)||0 };

  const readT = id => { const v = parseFloat(document.getElementById(id)?.value); return isNaN(v) ? null : v; };
  const tgt = { ca: readT('wc-t-ca'), mg: readT('wc-t-mg'), na: readT('wc-t-na'),
                so4: readT('wc-t-so4'), cl: readT('wc-t-cl'), hco3: readT('wc-t-hco3'),
                ph: readT('wc-t-ph') };

  const hasTarget = ['ca','mg','na','so4','cl','hco3'].some(k => tgt[k] !== null);
  const resMash   = document.getElementById('wc-results-mash');
  const resSparge = document.getElementById('wc-results-sparge');

  if (!hasTarget) {
    if (resMash)   resMash.style.display   = 'none';
    if (resSparge) resSparge.style.display = 'none';
    return;
  }

  if (volMash > 0) {
    const { delta, doses, acidDoses, result, altCaCl2g, altCaCO3g, altNaHCO3g } = _computeWCDoses(volMash, s, tgt);
    _renderWCResults(s, tgt, delta, doses, acidDoses, result, altCaCl2g, altCaCO3g, altNaHCO3g, 'wc-results-mash', t('rec.wc_mash'), 'empatage');
  } else if (resMash) resMash.style.display = 'none';

  if (volSparge > 0) {
    const { delta, doses, acidDoses, result, altCaCl2g, altCaCO3g, altNaHCO3g } = _computeWCDoses(volSparge, s, tgt);
    _renderWCResults(s, tgt, delta, doses, acidDoses, result, altCaCl2g, altCaCO3g, altNaHCO3g, 'wc-results-sparge', t('rec.wc_sparge'), 'sparge');
  } else if (resSparge) resSparge.style.display = 'none';
}

function _renderWCResults(s, tgt, delta, doses, acidDoses, result, altCaCl2g, altCaCO3g, altNaHCO3g, containerId, label, suffix) {
  const otherType = suffix === 'empatage' ? 'empatage' : 'sparge';
  const ION_META = [
    { k: 'ca',   label: t('rec.wc_ca')   },
    { k: 'mg',   label: t('rec.wc_mg')   },
    { k: 'na',   label: t('rec.wc_na')   },
    { k: 'so4',  label: t('rec.wc_so4')  },
    { k: 'cl',   label: t('rec.wc_cl')   },
    { k: 'hco3', label: t('rec.wc_hco3') },
  ];

  // ── Ion balance table ──
  let html = `
    <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--info);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.08)">
      <i class="fas fa-droplet"></i> ${label}
    </div>
    <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px">${t('rec.wc_ion_balance')}</div>
    <div style="overflow-x:auto;margin-bottom:14px">
    <table style="width:100%;font-size:.8rem;border-collapse:collapse;min-width:380px">
      <thead><tr style="color:var(--muted);border-bottom:1px solid var(--border)">
        <th style="text-align:left;padding:3px 8px">${t('rec.wc_col_ion')}</th>
        <th style="text-align:right;padding:3px 8px">${t('rec.wc_col_source')}</th>
        <th style="text-align:right;padding:3px 8px">${t('rec.wc_col_target')}</th>
        <th style="text-align:right;padding:3px 8px">Δ</th>
        <th style="text-align:right;padding:3px 8px">${t('rec.wc_col_result')}</th>
      </tr></thead><tbody>`;

  ION_META.forEach(({ k, label }) => {
    const src = s[k] ?? 0;
    const ionTgt = tgt[k];
    const res = result[k] ?? 0;
    const hasTgt = ionTgt !== null;
    const d = hasTgt ? delta[k] : null;
    const dStr  = d === null ? '–' : (d >= 0 ? `+${d.toFixed(0)}` : d.toFixed(0));
    const dCol  = d === null ? '' : d > 0 ? 'color:var(--info)' : d < 0 ? 'color:var(--danger)' : '';
    const diff  = hasTgt ? Math.abs(res - ionTgt) : null;
    const resCol= diff === null ? '' : diff < 5 ? 'color:var(--success)' : diff < 15 ? 'color:var(--amber)' : 'color:var(--danger)';
    // Warning when source already exceeds target
    const exceeded = hasTgt && ionTgt !== null && src > ionTgt + 1;
    html += `
      <tr style="border-bottom:1px solid var(--border)22">
        <td style="padding:3px 8px;font-weight:600">${label}</td>
        <td style="text-align:right;padding:3px 8px">${src.toFixed(0)}</td>
        <td style="text-align:right;padding:3px 8px">${hasTgt ? ionTgt.toFixed(0) : '–'}</td>
        <td style="text-align:right;padding:3px 8px;${dCol}">${dStr}${exceeded ? ` <i class="fas fa-circle-exclamation" style="color:var(--amber);font-size:.7rem" title="${t('rec.wc_src_exceeds')}"></i>` : ''}</td>
        <td style="text-align:right;padding:3px 8px;font-weight:700;${resCol}">${res.toFixed(1)}</td>
      </tr>`;
  });

  // SO4/Cl ratio
  const ratioVal  = (result.cl > 0) ? result.so4 / result.cl : result.so4;
  const ratioLbl  = ratioVal > 2 ? t('rec.wc_hop_fav') : ratioVal < 0.5 ? t('rec.wc_malt_fav') : t('rec.wc_balanced');
  const ratioCol  = ratioVal > 2 ? 'var(--hop)' : ratioVal < 0.5 ? 'var(--malt)' : 'var(--success)';
  html += `
    <tr style="border-top:1px solid var(--border);background:rgba(255,255,255,.03)">
      <td colspan="4" style="padding:3px 8px;font-size:.74rem;color:var(--muted)">${t('rec.wc_ratio')}</td>
      <td style="text-align:right;padding:3px 8px;font-weight:700;color:${ratioCol}">${ratioVal.toFixed(2)} — ${ratioLbl}</td>
    </tr>`;
  html += `</tbody></table></div>`;

  // ── Mineral doses ──
  const activeMinerals = Object.entries(doses).filter(([, g]) => g >= 0.05);
  html += `<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px"><i class="fas fa-flask"></i> ${t('rec.wc_minerals')}</div>`;

    activeMinerals.forEach(([mineral, grams]) => {
      html += `
        <div style="display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 10px">

            onclick="wcAddToRecipe('${mineral} (${suffix})',${grams.toFixed(2)},'g','${otherType}')">
            <i class="fas fa-plus"></i> ${t('rec.wc_add_recipe')}

  }

  // ── Alternative CaCl2 ──
  if (altCaCl2g >= 0.05) {

          ${t('rec.wc_alt_cacl2_desc')}
        </div>
        <div style="display:flex;align-items:center;gap:8px;background:var(--card);border:1px dashed var(--border);border-radius:6px;padding:5px 10px">
          <span style="flex:1;font-size:.83rem">${WC_MINERAL_LABEL['Chlorure de calcium']}</span>
          <span style="font-weight:700;color:var(--amber);min-width:58px;text-align:right">${altCaCl2g.toFixed(2)} g</span>
          <button class="btn btn-sm btn-ghost" style="padding:2px 8px;white-space:nowrap"
            onclick="wcAddToRecipe('Chlorure de calcium (${suffix})',${altCaCl2g.toFixed(2)},'g','${otherType}')">
            <i class="fas fa-plus"></i> ${t('rec.wc_add_recipe')}
          </button>
        </div>
      </div>`;
  }

  // ── Alternative CaCO3 ──
  if (altCaCO3g >= 0.05) {
    html += `
      <div style="margin-bottom:14px">
        <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:6px">
          <i class="fas fa-shuffle"></i> ${t('rec.wc_alt_caco3')}
        </div>
        <div style="color:var(--muted);font-size:.78rem;margin-bottom:6px;font-style:italic">
          ${t('rec.wc_alt_caco3_desc')}
        </div>
        <div style="display:flex;align-items:center;gap:8px;background:var(--card);border:1px dashed var(--border);border-radius:6px;padding:5px 10px">
          <span style="flex:1;font-size:.83rem">${WC_MINERAL_LABEL['Carbonate de calcium']}</span>
          <span style="font-weight:700;color:var(--amber);min-width:58px;text-align:right">${altCaCO3g.toFixed(2)} g</span>
          <button class="btn btn-sm btn-ghost" style="padding:2px 8px;white-space:nowrap"
            onclick="wcAddToRecipe('Carbonate de calcium (${suffix})',${altCaCO3g.toFixed(2)},'g','${otherType}')">
            <i class="fas fa-plus"></i> ${t('rec.wc_add_recipe')}
          </button>
        </div>
      </div>`;
  }

  // ── Alternative NaHCO3 ──
  if (altNaHCO3g >= 0.05) {
    html += `
      <div style="margin-bottom:14px">
        <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:6px">
          <i class="fas fa-shuffle"></i> ${t('rec.wc_alt_nahco3')}
        </div>
        <div style="color:var(--muted);font-size:.78rem;margin-bottom:6px;font-style:italic">
          ${t('rec.wc_alt_nahco3_desc')}
        </div>
        <div style="display:flex;align-items:center;gap:8px;background:var(--card);border:1px dashed var(--border);border-radius:6px;padding:5px 10px">

          </button>
        </div>
      </div>`;
  }

  // ── Acid doses ──
  const activeAcids = Object.entries(acidDoses).filter(([, mL]) => mL >= 0.05);
  if (activeAcids.length) {
    html += `<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--danger);margin-bottom:6px"><i class="fas fa-vial"></i> ${t('rec.wc_acids')}</div>`;

        </div>`;
    });
    html += `</div>`;
  }

  const div = document.getElementById(containerId);
  div.innerHTML = html;
  div.style.display = 'block';
}

function wcAddToRecipe(name, qty, unit, otherType = 'empatage') {
  // Update if already present, otherwise add new row
  const existing = recIngredients.find(i => i.name === name && i.category === 'autre');
  if (existing) {
    existing.quantity   = qty;
    existing.unit       = unit;
    existing.other_type = otherType;
    renderIngredientRows();
    toast(t('rec.wc_updated').replace('${name}', name), 'info');
    return;
  }
  recIngredients.push({
    _rid: ++ingRowId, category: 'autre', inventory_item_id: null,
    name, quantity: qty, unit,
    hop_type: null, other_type: otherType, other_time: null, notes: '',
  });
  renderIngredientRows();
  toast(t('rec.wc_added').replace('${name}', name), 'success');
}

function renderSettingsGithub() {
  const gh = appSettings.github || {};
  const v  = gh.vitrine || {};
  const d  = gh.data    || {};
  const bk = gh.backup  || {};
  // Migration depuis l'ancien format à champs individuels
  const vitTargets = v.targets?.length ? v.targets
    : [{ provider: v.provider || 'github', apiUrl: v.apiUrl || '', repo: v.repo || '', branch: v.branch || 'main', pat: v.pat || '' }];
  const datTargets = d.targets?.length ? d.targets
    : [{ provider: d.provider || 'github', apiUrl: d.apiUrl || '', repo: d.repo || '', branch: d.branch || 'main', pat: d.pat || '' }];
  _renderGhTargets('vit', vitTargets);
  _renderGhTargets('dat', datTargets);
  // Sauvegarde automatique
  const enabled = !!bk.enabled;
  document.getElementById('gh-backup-enabled').checked = enabled;
  document.getElementById('gh-backup-freq').value    = bk.freq    || 'daily';
  document.getElementById('gh-backup-hour').value   = bk.hour    ?? 2;
  document.getElementById('gh-backup-min').value    = bk.minute  ?? 0;
  document.getElementById('gh-backup-weekday').value = bk.weekday ?? 0;
  document.getElementById('gh-backup-day').value    = bk.day     || 1;
  document.getElementById('gh-backup-notify').checked = !!bk.notify;
  document.getElementById('gh-backup-config').style.display = enabled ? 'flex' : 'none';
  ghBackupFreqChange();
  const lastEl = document.getElementById('gh-last-backup');
  lastEl.textContent = bk.lastBackup ? `${t('settings.github.last_backup')} : ${bk.lastBackup}` : '';
}

function ghBackupToggle() {
  const on = document.getElementById('gh-backup-enabled').checked;
  document.getElementById('gh-backup-config').style.display = on ? 'flex' : 'none';
}

function ghBackupFreqChange() {
  const freq = document.getElementById('gh-backup-freq').value;
  document.getElementById('gh-backup-dow-wrap').style.display = freq === 'weekly'  ? 'flex' : 'none';
  document.getElementById('gh-backup-dom-wrap').style.display = freq === 'monthly' ? 'flex' : 'none';
}

function _ghTargetHtml(section, idx, tgt = {}) {
  const isCustom = tgt.provider === 'custom';
  return `<div class="gh-target" style="border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase">${t('settings.github.dest_n').replace('${n}', idx + 1)}</span>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="_ghRemoveTarget('${section}',${idx})" title="${t('common.delete')}"><i class="fas fa-trash-can" style="color:var(--danger)"></i></button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div class="field"><label>${t('settings.github.provider_label')}</label>
        <select class="gh-provider" onchange="this.closest('.gh-target').querySelector('.gh-url-wrap').style.display=this.value==='custom'?'':'none'">
          <option value="github"${tgt.provider !== 'custom' ? ' selected' : ''}>${t('settings.github.provider_github')}</option>
          <option value="custom"${tgt.provider === 'custom' ? ' selected' : ''}>${t('settings.github.provider_custom')}</option>
        </select>
      </div>
      <div class="gh-url-wrap field" style="${isCustom ? '' : 'display:none'}">
        <label>${t('settings.github.api_url_label')}</label>
        <input type="text" class="gh-url" placeholder="https://gitea.example.com/api/v1" value="${_vEsc(tgt.apiUrl || '')}">
      </div>
      <div class="field"><label>${t('settings.github.repo_label')} <span style="font-size:.78rem;color:var(--muted)">(owner/repo)</span></label>
        <input type="text" class="gh-repo" placeholder="ex: user/repo" value="${_vEsc(tgt.repo || '')}" onblur="const n=_normalizeGitRepo(this.value);if(n)this.value=n">
      </div>
      <div class="field"><label>${t('settings.github.vitrine_branch')}</label>
        <input type="text" class="gh-branch" placeholder="main" value="${_vEsc(tgt.branch || 'main')}">
      </div>
      <div class="field"><label>${t('settings.github.vitrine_pat')}</label>
        <div style="display:flex;gap:6px">
          <input type="password" class="gh-pat" placeholder="ghp_…" value="${_vEsc(tgt.pat || '')}" style="flex:1">
          <button class="btn btn-ghost btn-sm btn-icon" onclick="const i=this.previousElementSibling;i.type=i.type==='password'?'text':'password'" title="${t('settings.github.show_hide')}"><i class="fas fa-eye"></i></button>
        </div>
      </div>
    </div>
  </div>`;
}

function _renderGhTargets(section, targets) {
  const el = document.getElementById(`gh-${section}-targets`);
  if (!el) return;
  el.innerHTML = (targets.length ? targets : [{}]).map((tgt, i) => _ghTargetHtml(section, i, tgt)).join('');
}

function _captureGhTargets(section) {
  const el = document.getElementById(`gh-${section}-targets`);
  if (!el) return [];
  return [...el.querySelectorAll('.gh-target')].map(div => ({
    provider: div.querySelector('.gh-provider')?.value || 'github',
    apiUrl:   (div.querySelector('.gh-url')?.value || '').trim().replace(/\/+$/, ''),
    repo:     _normalizeGitRepo(div.querySelector('.gh-repo')?.value || ''),
    branch:   (div.querySelector('.gh-branch')?.value || '').trim() || 'main',
    pat:      (div.querySelector('.gh-pat')?.value || '').trim(),
  }));
}

function _ghAddTarget(section) {
  _captureGithubSettings();
  const key = section === 'vit' ? 'vitrine' : 'data';
  const targets = [...(appSettings.github?.[key]?.targets || [{}])];
  targets.push({ provider: 'github', apiUrl: '', repo: '', branch: 'main', pat: '' });
  _renderGhTargets(section, targets);
}

function _ghRemoveTarget(section, idx) {
  _captureGithubSettings();
  const key = section === 'vit' ? 'vitrine' : 'data';
  const targets = [...(appSettings.github?.[key]?.targets || [])];
  if (targets.length <= 1) return;
  targets.splice(idx, 1);
  appSettings.github[key].targets = targets;
  _renderGhTargets(section, targets);
}

// Extrait "owner/repo" depuis une URL Git complète ou un chemin avec .git
function _normalizeGitRepo(raw) {
  if (!raw) return '';
  raw = raw.trim();
  try {
    // Si c'est une URL complète (http://host/owner/repo.git)
    const url = new URL(raw);
    return url.pathname.replace(/^\/+/, '').replace(/\.git$/, '');
  } catch(_) {}
  // Sinon juste enlever le .git éventuel
  return raw.replace(/\.git$/, '');
}

function _captureGithubSettings() {
  appSettings.github = {
    vitrine: { targets: _captureGhTargets('vit') },
    data:    { targets: _captureGhTargets('dat') },
    backup: {
      enabled: document.getElementById('gh-backup-enabled').checked,
      freq:    document.getElementById('gh-backup-freq').value,
      hour:    parseInt(document.getElementById('gh-backup-hour').value) || 2,
      minute:  parseInt(document.getElementById('gh-backup-min').value)  || 0,
      weekday: parseInt(document.getElementById('gh-backup-weekday').value) ?? 0,
      day:     parseInt(document.getElementById('gh-backup-day').value)  || 1,
      lastBackup: appSettings.github?.backup?.lastBackup || null,
      notify:  document.getElementById('gh-backup-notify').checked,
    },
  };
  saveSettings();
}

function saveGithubSettings() {
  _captureGithubSettings();
  toast(t('settings.toast.github_saved'), 'success');
}

async function generateBeerImage() {
  // Recharger les paramètres depuis le serveur pour garantir que la clé API est à jour
  // (évite le cas où localStorage et DB sont désynchronisés après un rechargement de page)
  try {
    const fresh = await api('GET', '/api/app-settings');
    if (fresh && Object.keys(fresh).length) {
      _loadSettingsFromServer(fresh);
      // Mettre à jour la visibilité du bouton si la clé vient d'être chargée
      const aiConfigured = !!appSettings.ai?.apiKey;
      const genBtn = document.getElementById('beer-gen-ai-btn');
      const extraWrap = document.getElementById('beer-ai-extra-wrap');
      if (genBtn)    genBtn.style.display    = aiConfigured ? '' : 'none';
      if (extraWrap) extraWrap.style.display = aiConfigured ? '' : 'none';
    }
  } catch(e) { /* serveur inaccessible — on utilise le cache en mémoire */ }

  const ai = appSettings.ai || {};
  const imgApiKey = ai.provider === 'gemini'
    ? (ai.geminiApiKey || ai.apiKey || '')
    : (ai.openaiApiKey || ai.apiKey || '');
  if (!imgApiKey) {
    toast(t('settings.ai.key_required'), 'error');
    return;
  }
  const name  = document.getElementById('beer-f-name').value.trim() || 'craft beer';
  const type  = document.getElementById('beer-f-type').value.trim();
  const desc  = document.getElementById('beer-f-desc').value.trim();
  const extra = document.getElementById('beer-ai-extra').value.trim();

  const prompt = `A flat, rectangular craft beer label design for a beer named "${name}"` +
    (type  ? `, style: ${type}` : '') +
    (desc  ? `. ${desc}` : '') +
    (extra ? `. Additional instructions: ${extra}` : '') +
    '. The label fills the entire image. No bottle, no glass, no hands, no brewery logo, no made-up brand symbols, no ABV percentage, no bottle size, no volume indication. Decorative illustrated border, beer name prominently displayed, nature or ingredient-inspired background art. Flat lay, print-ready label artwork only.';

  const beerId   = document.getElementById('beer-f-id').value;
  const hadPhoto = !!document.getElementById('beer-f-photo-b64').value;

  const btn = document.getElementById('beer-gen-ai-btn');
  btn.disabled = true;
  btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${t('settings.ai.generating')}`;
  try {
    let b64, mime = 'image/png';
    if (ai.provider === 'gemini') {
      const res = await _aiGenerateGemini(imgApiKey, ai.model || 'gemini-3.1-flash-image-preview', prompt);
      b64 = res.b64; mime = res.mime;
    } else {
      b64 = await _aiGenerateOpenAI(imgApiKey, ai.model || 'gpt-image-1', '1024x1536', ai.quality || 'auto', prompt);
    }
    const dataUrl = `data:${mime};base64,${b64}`;
    document.getElementById('beer-f-photo-b64').value = dataUrl;
    const prev = document.getElementById('beer-f-photo-preview');
    prev.src = dataUrl;
    prev.style.display = 'block';
    document.getElementById('beer-f-photo-remove').style.display = 'flex';
    // Auto-save si la bière existe déjà et n'avait pas de photo
    if (beerId && !hadPhoto) {
      const beerObj = S.beers.find(b => b.id === parseInt(beerId));
      if (beerObj) {
        const updated = await api('PUT', `/api/beers/${beerId}`, { ...beerObj, photo: dataUrl }).catch(() => null);
        if (updated) {
          const idx = S.beers.findIndex(b => b.id === parseInt(beerId));
          if (idx !== -1) S.beers[idx] = updated;
          toast(t('settings.ai.img_generated_auto'), 'success');
        } else {
          toast(t('settings.ai.img_generated_save'), 'success');
        }
      } else {
        toast(t('settings.ai.img_generated'), 'success');
      }
    } else {
      toast(t('settings.ai.img_generated'), 'success');
    }
  } catch(e) {
    const msg = e.message || String(e);
    let friendly = t('settings.ai.img_err') + ' ' + msg;
    if (msg.includes('quota') || msg.includes('RESOURCE_EXHAUSTED') || msg.includes('limit: 0')) {
      friendly = t('settings.ai.img_err_quota');
    } else if (msg.includes('API_KEY') || msg.includes('API key') || msg.includes('401') || msg.includes('403')) {
      friendly = t('settings.ai.img_err_key');
    } else if (msg.includes('model') && msg.includes('not found')) {
      friendly = t('settings.ai.img_err_model');
    } else if (msg.length > 120) {
      friendly = t('settings.ai.img_err') + ' ' + msg.slice(0, 120) + '…';
    }
    toast(friendly, 'error');
  }
  btn.disabled = false;
  btn.innerHTML = `<i class="fas fa-wand-magic-sparkles"></i> ${t('settings.ai.generate_btn')}`;
}

async function _aiGenerateOpenAI(apiKey, model, size, quality, prompt) {
  const body = { model, prompt, n: 1, size, quality };
  // gpt-image-1 returns b64_json by default; older models need it explicit
  if (model !== 'gpt-image-1') body.response_format = 'b64_json';
  const r = await fetch('https://api.openai.com/v1/images/generations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err?.error?.message || r.statusText);
  }
  const data = await r.json();
  return data.data[0].b64_json;
}

async function _aiGenerateGemini(apiKey, model, prompt) {
  // Imagen 4 models use the /predict endpoint
  if (model.startsWith('imagen-')) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:predict?key=${apiKey}`;
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ instances: [{ prompt }], parameters: { sampleCount: 1 } }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err?.error?.message || r.statusText);
    }
    const data = await r.json();
    return { b64: data.predictions[0].bytesBase64Encoded, mime: data.predictions[0].mimeType || 'image/png' };
  }
  // Gemini native image models use generateContent
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { responseModalities: ['IMAGE', 'TEXT'], imageConfig: { aspectRatio: '3:4' } },
    }),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err?.error?.message || r.statusText);
  }
  const data = await r.json();
  const parts = data.candidates?.[0]?.content?.parts || [];
  const imgPart = parts.find(p => p.inlineData?.data);
  if (!imgPart) throw new Error('Aucune image dans la réponse Gemini');
  return { b64: imgPart.inlineData.data, mime: imgPart.inlineData.mimeType || 'image/png' };
}

function previewAppIcon(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const size = 256;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.min(size / img.width, size / img.height);
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
      const b64 = canvas.toDataURL('image/png');
      appSettings.appIcon = b64;
      const prev = document.getElementById('app-icon-preview');
      if (prev) prev.innerHTML = `<img src="${b64}" style="width:100%;height:100%;object-fit:contain">`;
      const removeBtn = document.getElementById('app-icon-remove-btn');
      if (removeBtn) removeBtn.style.display = '';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

// Pour les providers custom (Gitea/Forgejo), les fetch passent par le proxy Flask
// afin d'éviter les restrictions CORS du navigateur.
async function _gitFetch(url, options, isCustom) {
  if (!isCustom) return fetch(url, options);
  const authHeader = (options.headers || {})['Authorization'] || '';
  const pat  = authHeader.replace(/^Bearer\s+/i, '');
  const body = options.body !== undefined ? JSON.parse(options.body) : undefined;
  return fetch('/api/git-proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url, method: options.method || 'GET', pat, body }),
  });
}

// binary=true : content est déjà du base64 pur (image), pas besoin d'encoder
// apiBase : URL de base de l'API (ex: 'https://api.github.com' ou 'https://gitea.example.com/api/v1')
// Retourne { skipped: true } si le contenu est identique, sinon la réponse de l'API.
async function pushToGithub(repo, pat, branch, filePath, content, message, binary = false, apiBase = 'https://api.github.com') {
  const base = `${apiBase}/repos/${repo}/contents/${filePath}`;
  const isGithub = apiBase === 'https://api.github.com';
  const isCustom = !isGithub;
  const headers = {
    'Authorization': `Bearer ${pat}`,
    'Accept': isGithub ? 'application/vnd.github+json' : 'application/json',
    'Content-Type': 'application/json',
  };

  // Récupérer le fichier existant : SHA (pour le PUT) + contenu base64 (pour comparer)
  let sha, existingB64;
  try {
    const getRes = await _gitFetch(`${base}?ref=${encodeURIComponent(branch)}`, { headers, cache: 'no-store' }, isCustom);
    if (getRes.ok) {
      const data = await getRes.json();
      sha = data.sha;
      existingB64 = (data.content || '').replace(/\s/g, ''); // GitHub/Gitea insèrent des \n dans le base64
    }
  } catch(_) {}

  // Encoder le nouveau contenu
  const encoded = binary ? content : btoa(unescape(encodeURIComponent(content)));

  // Comparer directement le base64 — skip si identique
  if (existingB64 && existingB64 === encoded) return { skipped: true };

  const body = { message, content: encoded, branch };
  if (sha) body.sha = sha;

  // Gitea/Forgejo : POST pour créer (pas de SHA), PUT pour mettre à jour (SHA requis)
  // GitHub : PUT gère les deux cas
  const method = isCustom && !sha ? 'POST' : 'PUT';

  const putRes = await _gitFetch(base, { method, headers, body: JSON.stringify(body) }, isCustom);
  if (!putRes.ok) {
    const err = await putRes.json().catch(() => ({ message: putRes.statusText }));
    throw new Error(err.message || putRes.statusText);
  }
  return putRes.json();
}

// Extrait le base64 pur et l'extension depuis un data URL (ex: data:image/jpeg;base64,...)
function _parsePhotoDataUrl(dataUrl) {
  if (!dataUrl) return null;
  const m = dataUrl.match(/^data:image\/(\w+);base64,(.+)$/s);
  if (!m) return null;
  const ext = m[1] === 'jpeg' ? 'jpg' : m[1];
  return { ext, b64: m[2] };
}

function _vEsc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function _vDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString(_lang || 'fr', { day:'2-digit', month:'long', year:'numeric' }); }

}

    const kegBarColor = kegL === 0 ? '#333' : pctKeg >= 0 && pctKeg <= 40 ? '#f59e0b' : 'var(--amber)';

        : `<div class="card-img-ph">🍺</div>`}

        ${kegBlock}
        <div class="stock-row">
          ${stockItem(s33, '33 cl', cls33, pct33)}
          <div class="stock-sep"></div>
          ${stockItem(s75, '75 cl', cls75, pct75)}

        ${b.origin      ? `<div class="card-origin">📍 ${_vEsc(b.origin)}</div>` : ''}
        ${b.description ? `<p class="card-desc">${_vEsc(b.description)}</p>` : ''}
        ${brewInfo.length ? `<div class="card-foot">${brewInfo.join('<span class="sep">·</span>')}</div>` : ''}
        ${appSettings.appName ? `<div class="card-brand">${_vEsc(appSettings.appName)}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  return `<!DOCTYPE html>

// ── Global search ─────────────────────────────────────────────────────────────
let _gsActive = false;
let _gsIdx = -1;

function openGlobalSearch() {
  const ov = document.getElementById('global-search-overlay');
  if (!ov) return;
  _gsActive = true;
  _gsIdx = -1;
  ov.style.display = 'flex';
  const inp = document.getElementById('global-search-input');
  if (inp) { inp.value = ''; inp.placeholder = t('search.placeholder'); inp.focus(); }
  document.getElementById('global-search-results').innerHTML = '';
  document.getElementById('global-search-hint').textContent = t('search.hint');
}

function closeGlobalSearch() {
  const ov = document.getElementById('global-search-overlay');
  if (!ov) return;
  _gsActive = false;
  ov.style.display = 'none';
}

function runGlobalSearch() {
  const q = (document.getElementById('global-search-input')?.value || '').toLowerCase().trim();
  const res = document.getElementById('global-search-results');
  if (!res) return;
  _gsIdx = -1;
  if (!q) { res.innerHTML = ''; return; }

  const esc2 = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const sections = [];

  const recs = (S.recipes || []).filter(r =>
    r.name?.toLowerCase().includes(q) || r.style?.toLowerCase().includes(q)
  ).slice(0, 5);
  if (recs.length) sections.push({ label: t('search.section_recipes'), items: recs.map(r => ({
    icon: 'fa-scroll', title: r.name, sub: r.style || '', action: () => { navigate('recettes'); loadRecipeForm(r.id); }
  }))});

  const beers = (S.beers || []).filter(b =>
    b.name?.toLowerCase().includes(q) || b.type?.toLowerCase().includes(q) || b.recipe_name?.toLowerCase().includes(q)
  ).slice(0, 5);
  if (beers.length) sections.push({ label: t('search.section_cave'), items: beers.map(b => ({
    icon: 'fa-beer-mug-empty', title: b.name, sub: b.type || b.recipe_name || '', action: () => { navigate('cave'); openBeerDetail(b.id); }
  }))});

  const invItems = (S.inventory || []).filter(i =>
    i.name?.toLowerCase().includes(q) || i.category?.toLowerCase().includes(q)
  ).slice(0, 4);
  if (invItems.length) sections.push({ label: t('search.section_inv'), items: invItems.map(i => ({
    icon: 'fa-boxes-stacked', title: i.name, sub: i.category || '', action: () => { navigate('inventaire'); openInvModal(i); }
  }))});

  const brews = (S.brews || []).filter(b =>
    b.name?.toLowerCase().includes(q) || b.recipe_name?.toLowerCase().includes(q)
  ).slice(0, 4);
  if (brews.length) sections.push({ label: t('search.section_brews'), items: brews.map(b => ({
    icon: 'fa-fire-burner', title: b.name || b.recipe_name || '', sub: b.status || '', action: () => { navigate('brassins'); }
  }))});

  const TASTING_FIELDS = ['taste_overall','taste_aroma','taste_appearance','taste_flavor','taste_bitterness','taste_mouthfeel','taste_finish'];
  const tastings = (S.beers || [])
    .map(b => {
      const matchedField = TASTING_FIELDS.find(f => b[f]?.toLowerCase().includes(q));
      if (!matchedField) return null;
      return { b, snippet: b[matchedField] };
    }).filter(Boolean).slice(0, 4);
  if (tastings.length) sections.push({ label: t('search.section_tasting'), items: tastings.map(({ b, snippet }) => ({
    icon: 'fa-wine-glass', title: b.name,
    sub: snippet.slice(0, 60) + (snippet.length > 60 ? '…' : ''),
    action: () => { navigate('cave'); openTastingModal(b.id); }
  }))});

  if (!sections.length) {
    const noRes = t('search.no_results').replace('${q}', esc2(q));
    res.innerHTML = '<div style="padding:20px 18px;color:var(--muted);font-size:.9rem">' + noRes + '</div>';
    return;
  }

  let html = '';
  let itemIdx = 0;
  sections.forEach(sec => {
    html += '<div style="padding:6px 18px 2px;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">' + esc2(sec.label) + '</div>';
    sec.items.forEach(item => {
      html += '<div class="gs-item" data-idx="' + itemIdx + '" style="display:flex;align-items:center;gap:12px;padding:9px 18px;cursor:pointer;border-radius:6px;margin:0 4px" onclick="_gsPickIdx(' + itemIdx + ')">';
      html += '<i class="fas ' + item.icon + '" style="color:var(--muted);width:16px;text-align:center;flex-shrink:0"></i>';
      html += '<div style="flex:1;min-width:0">';
      html += '<div style="font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc2(item.title) + '</div>';
      html += item.sub ? '<div style="font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc2(item.sub) + '</div>' : '';
      html += '</div></div>';
      itemIdx++;
    });
  });

  res.innerHTML = html;
  res._actions = sections.flatMap(s => s.items.map(i => i.action));
  _gsHighlight(-1);
}

function _gsPickIdx(idx) {
  const res = document.getElementById('global-search-results');
  if (!res?._actions?.[idx]) return;
  closeGlobalSearch();
  res._actions[idx]();
}

function _gsHighlight(idx) {
  const items = document.querySelectorAll('#global-search-results .gs-item');
  items.forEach((el, i) => {
    el.style.background = i === idx ? 'var(--bg2)' : '';
  });
  _gsIdx = idx;
  if (idx >= 0 && items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
}

function handleGlobalSearchKey(e) {
  const items = document.querySelectorAll('#global-search-results .gs-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    _gsHighlight(Math.min(_gsIdx + 1, items.length - 1));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    _gsHighlight(Math.max(_gsIdx - 1, 0));
  } else if (e.key === 'Enter') {
    if (_gsIdx >= 0) _gsPickIdx(_gsIdx);
    else if (items.length) _gsPickIdx(0);
  } else if (e.key === 'Escape') {
    closeGlobalSearch();
  }
}

// ── Keyboard shortcuts help ────────────────────────────────────────────────────
function openKbdHelp() {
  const ov = document.getElementById('kbd-help-overlay');
  if (!ov) return;
  document.getElementById('kbd-help-title').textContent = t('kbd.title');
  const kbdRow = (k, label) => '<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;gap:8px">'
    + '<span style="color:var(--muted);font-size:.82rem">' + label + '</span>'

    + '</div>';
  document.getElementById('kbd-help-body').innerHTML =

    kbdRow('Alt+2', t('kbd.page_inventaire')) +
    kbdRow('Alt+3', t('kbd.page_recettes')) +
    kbdRow('Alt+4', t('kbd.page_brassins')) +
    kbdRow('Alt+5', t('kbd.page_cave')) +
    kbdRow('Alt+6', t('kbd.page_kegs')) +
    kbdRow('Alt+7', t('kbd.page_spindles')) +
    kbdRow('Alt+8', t('kbd.page_calendrier')) +
    kbdRow('Alt+9', t('kbd.page_stats'));
  ov.style.display = 'flex';
}

function closeKbdHelp() {
  const ov = document.getElementById('kbd-help-overlay');
  if (ov) ov.style.display = 'none';
}

// ── Main app keydown handler ───────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  const inInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT'
    || document.activeElement?.isContentEditable;

  if (e.key === 'Escape') {
    if (_gsActive) { closeGlobalSearch(); return; }
    if (document.getElementById('kbd-help-overlay')?.style.display === 'flex') { closeKbdHelp(); return; }
    const lb = document.getElementById('lb');
    if (lb?.classList.contains('open')) { closeLb(); return; }
    const beerLb = document.getElementById('beer-lightbox');
    if (beerLb?.style.display === 'flex') { closeBeerLightbox(); return; }
    const openModals = [...document.querySelectorAll('.modal-overlay.open')];
    if (!openModals.length) return;
    const m = openModals[openModals.length - 1];
    if (m.id === 'modal-settings') closeSettings();
    else if (m.id === 'modal-scale') closeScaleModal();
    else closeModal(m.id);
    return;
  }

  if ((e.key === '/' && !inInput) || (e.key === 'k' && e.ctrlKey && !e.shiftKey)) {
    e.preventDefault();
    openGlobalSearch();
    return;
  }

  if (e.key === '?' && !inInput) {
    e.preventDefault();
    openKbdHelp();
    return;
  }

  if (e.altKey && !e.ctrlKey && !e.shiftKey && !inInput) {
    const openModals = [...document.querySelectorAll('.modal-overlay.open')];
    if (openModals.length || _gsActive) return;
    const pages = ['dashboard','inventaire','recettes','brassins','cave','kegs','spindles','calendrier','stats'];
    const idx = parseInt(e.key) - 1;
    if (idx >= 0 && idx < pages.length) {
      e.preventDefault();
      navigate(pages[idx]);
    }
  }
});

async function pushVitrine(force = false) {
  _captureGithubSettings();
  const targets = ((appSettings.github || {}).vitrine?.targets || []).filter(tgt => tgt.repo && tgt.pat);
  if (!targets.length) { toast(t('settings.github.err_missing_vitrine'), 'error'); return; }

  const btn      = document.getElementById('btn-push-vitrine');
  const btnForce = document.getElementById('btn-push-vitrine-force');
  if (btn)      { btn.disabled = true;      btn.innerHTML      = `<i class="fas fa-spinner fa-spin"></i> ${t('settings.github.sending')}`; }
  if (btnForce) { btnForce.disabled = true; btnForce.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; }

  // S'assurer que les bières sont chargées
  if (!S.beers.length) {
    try { S.beers = await api('GET', '/api/beers'); } catch(e) {}
  }
  const beers   = S.beers.filter(b => !b.archived);
  const dateStr = new Date().toISOString().slice(0, 10);

  // Construire la map des photos (id → {ext, b64})
  const photoMap = {};
  beers.forEach(b => {
    const p = _parsePhotoDataUrl(b.photo);
    if (p) photoMap[b.id] = p;
  });

  // Logo de l'application
  const appIconParsed = _parsePhotoDataUrl(appSettings.appIcon || null);
  const iconPath = appIconParsed ? `images/app-icon.${appIconParsed.ext}` : null;

  const html = generateVitrineHtml(beers, photoMap, iconPath);
  const json = JSON.stringify(beers, null, 2);

  // Liste des fichiers : { path, b64 }
  const files = [
    { path: 'index.html', b64: btoa(unescape(encodeURIComponent(html))) },
    { path: 'beers.json', b64: btoa(unescape(encodeURIComponent(json))) },
    ...Object.entries(photoMap).map(([id, { ext, b64 }]) => ({ path: `images/beer-${id}.${ext}`, b64 })),
    ...(appIconParsed ? [{ path: iconPath, b64: appIconParsed.b64 }] : []),
  ];

  try {
    let totalPushed = 0, totalSkipped = 0;
    for (const cfg of targets) {
      const isCustom = cfg.provider === 'custom';
      const apiBase  = isCustom && cfg.apiUrl ? cfg.apiUrl.replace(/\/+$/, '') : 'https://api.github.com';

      if (isCustom) {
        // Gitea/Forgejo : Contents API fichier par fichier
        for (const f of files) {
          const res = await pushToGithub(cfg.repo, cfg.pat, cfg.branch, f.path,
            f.b64, `vitrine: ${f.path} ${dateStr}`, true, apiBase);
          if (!force && res?.skipped) totalSkipped++; else totalPushed++;
        }
      } else {
        // GitHub : API Git Data — commit unique (blobs → tree → commit → ref)
        const GH = `${apiBase}/repos/${cfg.repo}`;
        const headers = {
          'Authorization': `Bearer ${cfg.pat}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        };
        const refRes  = await fetch(`${GH}/git/ref/heads/${encodeURIComponent(cfg.branch)}`, { headers, cache: 'no-store' });
        if (!refRes.ok) throw new Error((await refRes.json()).message || 'Branche introuvable');
        const { object: { sha: currentCommitSha } } = await refRes.json();
        const commitRes = await fetch(`${GH}/git/commits/${currentCommitSha}`, { headers });
        if (!commitRes.ok) throw new Error('Impossible de lire le commit courant');
        const { tree: { sha: baseTreeSha } } = await commitRes.json();
        const treeRes = await fetch(`${GH}/git/trees/${baseTreeSha}?recursive=1`, { headers });
        const existingMap = {};
        if (treeRes.ok) ((await treeRes.json()).tree || []).forEach(item => { existingMap[item.path] = item.sha; });
        const blobs = await Promise.all(files.map(async f => {
          const res = await fetch(`${GH}/git/blobs`, { method: 'POST', headers, body: JSON.stringify({ content: f.b64, encoding: 'base64' }) });
          if (!res.ok) throw new Error(`Blob ${f.path} : ${(await res.json()).message}`);
          const { sha } = await res.json();
          return { path: f.path, sha, changed: existingMap[f.path] !== sha };
        }));
        const changed = force ? blobs : blobs.filter(b => b.changed);
        if (changed.length) {
          const newTreeRes = await fetch(`${GH}/git/trees`, { method: 'POST', headers, body: JSON.stringify({ base_tree: baseTreeSha, tree: changed.map(b => ({ path: b.path, mode: '100644', type: 'blob', sha: b.sha })) }) });
          if (!newTreeRes.ok) throw new Error((await newTreeRes.json()).message || 'Erreur création tree');
          const { sha: newTreeSha } = await newTreeRes.json();
          const newCommitRes = await fetch(`${GH}/git/commits`, { method: 'POST', headers, body: JSON.stringify({ message: `vitrine: mise à jour ${dateStr} (${changed.length} fichier(s))`, tree: newTreeSha, parents: [currentCommitSha] }) });
          if (!newCommitRes.ok) throw new Error((await newCommitRes.json()).message || 'Erreur création commit');
          const { sha: newCommitSha } = await newCommitRes.json();
          const patchRes = await fetch(`${GH}/git/refs/heads/${encodeURIComponent(cfg.branch)}`, { method: 'PATCH', headers, body: JSON.stringify({ sha: newCommitSha }) });
          if (!patchRes.ok) throw new Error((await patchRes.json()).message || 'Erreur mise à jour branche');
          totalPushed += changed.length;
          totalSkipped += blobs.length - changed.length;
        } else {
          totalSkipped += blobs.length;
        }
      }
    }

    if (!force && totalPushed === 0) {
      toast(t('settings.github.vitrine_up_to_date'), 'success');
      return;
    }
    const skipTxt  = totalSkipped ? t('settings.github.vitrine_skipped').replace('${n}', totalSkipped) : '';
    const forceTxt = force ? t('settings.github.vitrine_forced') : '';
    toast(t('settings.github.vitrine_pushed').replace('${beers}', beers.length).replace('${files}', totalPushed) + skipTxt + forceTxt, 'success');
    _logActivity('backup', 'vitrine', `Vitrine publiée : ${totalPushed} fichier(s)`);
  } catch(e) {
    toast(t('settings.github.err_vitrine') + ' ' + e.message, 'error');
  } finally {
    if (btn)      { btn.disabled = false;      btn.innerHTML      = `<i class="fa-brands fa-github"></i> ${t('settings.github.btn_push_vitrine')}`; }
    if (btnForce) { btnForce.disabled = false; btnForce.innerHTML = `<i class="fas fa-rotate"></i> ${t('settings.github.btn_force')}`; }
  }
}

async function pushGithubData() {
  _captureGithubSettings();
  const targets = ((appSettings.github || {}).data?.targets || []).filter(tgt => tgt.repo && tgt.pat);
  if (!targets.length) {
    toast(t('settings.github.err_missing_data'), 'error');
    return;
  }

  const btn = document.getElementById('btn-push-data');
  if (btn) { btn.disabled = true; btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${t('settings.github.sending')}`; }

  const dateStr = new Date().toISOString().slice(0,10);
  try {
    // Fetch all data in parallel (pas de conflit GitHub ici)
    const [inv, rec, brews, beers, spindles, catalog, drafts, calendar] = await Promise.all([
      api('GET', '/api/export/inventory'),
      api('GET', '/api/export/recipes'),
      api('GET', '/api/export/brews'),
      api('GET', '/api/export/beers'),
      api('GET', '/api/export/spindles'),
      api('GET', '/api/export/catalog'),
      api('GET', '/api/export/drafts'),
      api('GET', '/api/export/calendar'),
    ]);
    // Paramètres avancés (sans PAT)
    const settingsOut = JSON.parse(JSON.stringify(appSettings));
    if (settingsOut.github?.vitrine) delete settingsOut.github.vitrine.pat;
    if (settingsOut.github?.data)    delete settingsOut.github.data.pat;
    // Push séquentiel pour éviter les conflits de SHA sur la même branche
    const dataFiles = [
      { path: 'inventaire.json',  content: JSON.stringify(inv,         null, 2), msg: `backup: inventaire ${dateStr}` },
      { path: 'recettes.json',    content: JSON.stringify(rec,         null, 2), msg: `backup: recettes ${dateStr}` },
      { path: 'brassins.json',    content: JSON.stringify(brews,       null, 2), msg: `backup: brassins ${dateStr}` },
      { path: 'cave.json',        content: JSON.stringify(beers,       null, 2), msg: `backup: cave ${dateStr}` },
      { path: 'densimetres.json', content: JSON.stringify(spindles,    null, 2), msg: `backup: densimètres ${dateStr}` },
      { path: 'catalogue.json',   content: JSON.stringify(catalog,     null, 2), msg: `backup: catalogue ${dateStr}` },
      { path: 'brouillons.json',  content: JSON.stringify(drafts,      null, 2), msg: `backup: brouillons ${dateStr}` },
      { path: 'calendrier.json',  content: JSON.stringify(calendar,    null, 2), msg: `backup: calendrier ${dateStr}` },
      { path: 'parametres.json',  content: JSON.stringify(settingsOut, null, 2), msg: `backup: paramètres ${dateStr}` },
    ];
    let totalPushed = 0, totalSkipped = 0;
    for (const cfg of targets) {
      const isCustom = cfg.provider === 'custom';
      const apiBase  = isCustom && cfg.apiUrl ? cfg.apiUrl.replace(/\/+$/, '') : 'https://api.github.com';
      for (const f of dataFiles) {
        const res = await pushToGithub(cfg.repo, cfg.pat, cfg.branch, f.path, f.content, f.msg, false, apiBase);
        res?.skipped ? totalSkipped++ : totalPushed++;
      }
    }
    const skipTxt = totalSkipped ? t('settings.github.vitrine_skipped').replace('${n}', totalSkipped) : '';
    toast(t('settings.github.data_pushed').replace('${files}', totalPushed) + skipTxt, 'success');
    _logActivity('backup', 'manual', `Backup manuel : ${totalPushed} fichier(s)`);
  } catch(e) {
    toast(t('settings.github.err_data') + ' ' + e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = `<i class="fa-brands fa-github"></i> ${t('settings.github.pushing_data')}`; }
  }
}

      } else {
        appStatusHtml = `<span style="color:var(--success);font-size:.8rem"><i class="fas fa-circle-check"></i> ${t('settings.updates.status_ok').replace('${version}', esc(appVer.current))}</span>`;
      }
      appRow.innerHTML = `<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card2);border-radius:10px;border:1px solid var(--border)">
        <i class="fas fa-beer-mug-empty" style="color:var(--amber);font-size:1.1rem;width:18px;text-align:center;flex-shrink:0"></i>

          <div style="margin-top:3px">${appStatusHtml}</div>
        </div>
        ${appBtnHtml}
      </div>`;
    }
    _updatesChecked = true;
    const libs = [
      {
        key: 'chartjs', label: 'Chart.js', icon: 'fas fa-chart-line', color: 'var(--info)',
        updateFn: 'updateStaticLib("chartjs")',
        desc: 'Librairie de graphiques',
      },
      {
        key: 'fontawesome', label: 'Font Awesome', icon: 'fas fa-icons', color: 'var(--amber)',
        updateFn: 'updateStaticLib("fontawesome")',
        desc: 'Icônes (CSS + webfonts)',
      },
      {
        key: 'googlefonts', label: 'Google Fonts', icon: 'fas fa-font', color: '#10b981',
        updateFn: null,
        desc: 'Polices locales (Playfair Display)',
      },
    ];
    list.innerHTML = libs.map(lib => {
      const d = data[lib.key] || {};
      const current = d.current || '–';
      const latest  = d.latest  || null;
      const upToDate = latest && current === latest;
      const hasUpdate = latest && current !== latest;
      const err = d.error;
      let statusHtml;
      if (err) {
        statusHtml = `<span style="color:var(--danger);font-size:.8rem"><i class="fas fa-triangle-exclamation"></i> ${t('settings.updates.err_check')} ${esc(err)}</span>`;
      } else if (lib.key === 'googlefonts') {
        statusHtml = `<span style="color:var(--muted);font-size:.8rem">${t('settings.updates.lib_updated_at')} ${esc(current)} · ${d.size ? Math.round(d.size/1024)+'  KB' : ''}</span>`;
      } else if (upToDate) {
        statusHtml = `<span style="color:var(--success);font-size:.8rem"><i class="fas fa-circle-check"></i> ${t('settings.updates.status_ok').replace('${version}', esc(current))}</span>`;
      } else if (hasUpdate) {
        statusHtml = `<span style="color:var(--amber);font-size:.8rem"><i class="fas fa-arrow-up"></i> ${t('settings.updates.status_update').replace('${current}', esc(current))} <strong>${esc(latest)}</strong></span>`;
      } else {
        statusHtml = `<span style="color:var(--muted);font-size:.8rem">${t('settings.updates.err_status')} ${esc(current)}</span>`;
      }
      const btnHtml = lib.updateFn && hasUpdate
        ? `<button class="btn btn-sm btn-ghost" id="upd-btn-${lib.key}" onclick='${lib.updateFn}' style="border-color:rgba(245,158,11,.4);color:var(--amber)"><i class="fas fa-download"></i> ${t('settings.updates.lib_update_to')} ${esc(latest)}</button>`

        </div>

      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = `<div style="color:var(--danger);font-size:.85rem"><i class="fas fa-triangle-exclamation"></i> ${t('settings.updates.err_check')} ${esc(e.message)}</div>`;
    if (appRow) appRow.innerHTML = '';

  const btn = document.getElementById(`upd-btn-${lib}`);

let _calYear  = new Date().getFullYear();

// Retourne le Nème jour de semaine (0=dim…6=sam) d'un mois donné (nth : 1=premier, -1=dernier)
function _nthDow(year, month, dow, nth) {
  if (nth > 0) {
    const d = new Date(year, month, 1);
    while (d.getDay() !== dow) d.setDate(d.getDate() + 1);
    d.setDate(d.getDate() + (nth - 1) * 7);
    return d;
  } else { // dernier
    const d = new Date(year, month + 1, 0);
    while (d.getDay() !== dow) d.setDate(d.getDate() - 1);
    return d;
  }
}
function _ymd(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function calNav(dir) {
  _calMonth += dir;
  if (_calMonth > 11) { _calMonth = 0;  _calYear++; }
  if (_calMonth < 0)  { _calMonth = 11; _calYear--; }
  renderCalendar();
}
function calGoToday() {
  _calYear  = new Date().getFullYear();
  _calMonth = new Date().getMonth();
  renderCalendar();
}

function setCalView(mode) {
  _calViewMode = mode;
  localStorage.setItem('calViewMode', mode);
  document.getElementById('cal-grid-view').style.display = mode === 'grid'   ? '' : 'none';
  document.getElementById('cal-agenda').style.display    = mode === 'agenda' ? '' : 'none';
  document.getElementById('cal-btn-grid').classList.toggle('active',   mode === 'grid');
  document.getElementById('cal-btn-agenda').classList.toggle('active', mode === 'agenda');
  if (mode === 'agenda') renderAgendaView();
  else renderCalendar();
}

function renderAgendaView() {
  const today = new Date(); today.setHours(0,0,0,0);
  const horizon = new Date(today); horizon.setDate(horizon.getDate() + 180);
  const todayStr = _ymd(today);

  const events = [];
  const add = (date, type, label, color, emoji, id) => {
    if (!date) return;
    const d = new Date(date + 'T00:00:00');
    if (d >= today && d <= horizon) events.push({ date, type, label, color, emoji, id });
  };

  // Brassins
  (S.brews || []).filter(b => !b.archived).forEach(b => {
    add(b.brew_date,    'brew',   b.name || '?', 'var(--amber)', '🍺', b.id);
    add(b.bottling_date,'bottle', b.name || '?', '#10b981',      '🍾', b.id);
    if (b.brew_date && b.ferm_time) {
      const d = new Date(b.brew_date + 'T00:00:00'); d.setDate(d.getDate() + b.ferm_time);
      add(_ymd(d), 'ferm', b.name || '?', 'var(--info)', '🌡️', b.id);
    }
  });

  // Brouillons
  (S.drafts || []).filter(dr => dr.target_date).forEach(dr => {
    add(dr.target_date, 'draft', dr.title || '?', '#8b5cf6', '📖', dr.id);
  });

  // Événements personnalisés (avec expansion récurrence)
  const savedYear = _calYear, savedMonth = _calMonth;
  _calYear = today.getFullYear(); _calMonth = today.getMonth();
  (S.customEvents || []).forEach(ev => {
    _expandCustomEvent(ev).forEach(ds => {
      add(ds, 'custom', ev.title, ev.color || 'var(--amber)', ev.emoji || '📅', ev.id);
      if (ev.brew_reminder) {
        const rd = new Date(ds + 'T00:00:00');
        rd.setDate(rd.getDate() - (ev.brew_reminder_days || appSettings.defaultBrewReminderDays || 45));
        add(_ymd(rd), 'remind', ev.title, '#a855f7', '🔔', ev.id);
      }
    });
  });
  _calYear = savedYear; _calMonth = savedMonth;

  // Événements mondiaux
  [today.getFullYear(), today.getFullYear() + 1].forEach(yr =>
    _brewingEvents(yr).forEach(we => add(we.date, 'world', we.label, we.color, we.emoji))
  );

  events.sort((a, b) => a.date.localeCompare(b.date));

  const container = document.getElementById('cal-agenda');
  if (!events.length) {
    container.innerHTML = `<div class="empty"><i class="fas fa-calendar-check"></i><p>${t('cal.agenda_empty')}</p></div>`;
    return;
  }

  const MONTHS     = t('cal.months');
  const DAY_NAMES  = t('cal.agenda_day_names');
  const MON_SHORT  = t('cal.agenda_months_short');
  const typeColor  = { brew:'var(--amber)', ferm:'var(--info)', bottle:'#10b981', custom:'', remind:'#a855f7', draft:'#8b5cf6', world:'' };
  const thisWeekEnd  = _ymd(new Date(today.getFullYear(), today.getMonth(), today.getDate() + 7));
  const thisMonthEnd = _ymd(new Date(today.getFullYear(), today.getMonth() + 1, 0));

  let html = '', lastGroup = null;
  events.forEach(ev => {
    const d = new Date(ev.date + 'T00:00:00');
    let group;
    if (ev.date === todayStr)          group = t('cal.agenda_today');
    else if (ev.date < thisWeekEnd)    group = t('cal.agenda_this_week');
    else if (ev.date <= thisMonthEnd)  group = t('cal.agenda_this_month');
    else                               group = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    if (group !== lastGroup) { html += `<div class="agenda-group-head">${group}</div>`; lastGroup = group; }

    const dot  = ev.color || typeColor[ev.type] || 'var(--muted)';
    const ico  = ev.emoji || '📅';
    const ds   = `${DAY_NAMES[d.getDay()]} ${d.getDate()} ${MON_SHORT[d.getMonth()]}`;
    const edit = ev.type === 'custom'
      ? `<button class="btn btn-ghost btn-icon btn-sm" onclick="editCustomEvent(${ev.id})" style="flex-shrink:0"><i class="fas fa-pen"></i></button>`
      : ev.type === 'brew' ? `<button class="btn btn-ghost btn-icon btn-sm" onclick="navigate('brassins')" style="flex-shrink:0"><i class="fas fa-arrow-right"></i></button>` : '';

    html += `<div class="agenda-row">
      <div class="agenda-date">${ds}</div>
      <div class="agenda-dot" style="background:${dot}"></div>
      <div class="agenda-label">${ico} ${ev.label}</div>
      ${edit}
    </div>`;
  });
  container.innerHTML = html;
}

function _expandCustomEvent(ev) {
  const rec = ev.recurrence
    ? (typeof ev.recurrence === 'string' ? JSON.parse(ev.recurrence) : ev.recurrence)
    : null;
  if (!rec?.type) return [ev.event_date];
  const years = [_calYear - 1, _calYear, _calYear + 1];

  if (rec.type === 'yearly') {
    return years.map(year => `${year}-${ev.event_date.slice(5, 10)}`);
  }
  if (rec.type === 'yearly_nth_dow') {
    const month = parseInt(ev.event_date.slice(5, 7)) - 1;
    return years.map(year => _ymd(_nthDow(year, month, rec.dow, rec.nth))).filter(Boolean);
  }
  if (rec.type === 'monthly') {
    const day = parseInt(ev.event_date.slice(8, 10));
    const results = [];
    for (const year of years)
      for (let m = 0; m < 12; m++) {
        const d = new Date(year, m, day);
        if (d.getMonth() === m) results.push(_ymd(d));
      }
    return results;
  }
  if (rec.type === 'monthly_nth_dow') {
    const results = [];
    for (const year of years)
      for (let m = 0; m < 12; m++) {
        const d = _nthDow(year, m, rec.dow, rec.nth);
        if (d) results.push(_ymd(d));
      }
    return results;
  }
  if (rec.type === 'weekly') {
    const interval = Math.max(1, parseInt(rec.interval) || 1);
    const anchor = new Date(ev.event_date + 'T00:00:00');
    const rangeStart = new Date(_calYear - 1, 0, 1);
    const rangeEnd   = new Date(_calYear + 1, 11, 31);
    const cur = new Date(anchor);
    while (cur > rangeStart) cur.setDate(cur.getDate() - 7 * interval);
    cur.setDate(cur.getDate() + 7 * interval);
    const results = [];
    while (cur <= rangeEnd) { results.push(_ymd(new Date(cur))); cur.setDate(cur.getDate() + 7 * interval); }
    return results;
  }
  return [ev.event_date];
}

function renderCalendar() {
  const MONTHS = t('cal.months');
  document.getElementById('cal-title').textContent = `${MONTHS[_calMonth]} ${_calYear}`;

  // Construire les événements depuis S.brews
  _calEvStore = []; // réinitialisé à chaque rendu
  const events = {}; // { 'YYYY-MM-DD': [{type, label, brewId}] }
  const addEv = (date, ev) => {
    if (!date) return;
    const d = date.slice(0, 10);
    if (!events[d]) events[d] = [];
    events[d].push({ ...ev, date: d });
  };

  (S.brews || []).filter(b => !b.archived).forEach(b => {
    const label = b.name || t('brew.title');
    if (b.brew_date)     addEv(b.brew_date,    { type: 'brew',   label, id: b.id });
    if (b.bottling_date) addEv(b.bottling_date, { type: 'bottle', label, id: b.id });
    if (b.brew_date && b.ferm_time) {
      const d = new Date(b.brew_date + 'T00:00:00');
      d.setDate(d.getDate() + (b.ferm_time | 0));
      addEv(_ymd(d), { type: 'ferm', label: `${label} ${t('cal.ferm_abbr')}`, id: b.id });
    }
  });

  // Brouillons planifiés
  (S.drafts || []).filter(d => d.target_date).forEach(d => {
    addEv(d.target_date, { type: 'draft', label: d.title || 'Brouillon', color: d.color || '#8b5cf6', draftId: d.id });
  });

  // Événements personnalisés + leur rappel J-45
  (S.customEvents || []).forEach(ev => {
    const c = ev.color || '#f59e0b';
    const occurrences = _expandCustomEvent(ev);
    occurrences.forEach(eventDate => {
      addEv(eventDate, { type: 'custom', label: (ev.emoji || '📅') + ' ' + ev.title, color: c, customId: ev.id });
      if (ev.brew_reminder) {
        const days = ev.brew_reminder_days ?? appSettings.defaultBrewReminderDays ?? 45;
        const rd = new Date(eventDate + 'T00:00:00');
        rd.setDate(rd.getDate() - days);
        addEv(_ymd(rd), { type: 'custom_remind', label: '🔔 ' + t('cal.brew_for') + ' ' + ev.title, color: '#a855f7', eventDate, reminderDays: days, customId: ev.id });
      }
    });
  });

  // Événements brassicoles mondiaux + rappels J-45
  const _hiddenWorldEvs  = appSettings.hiddenWorldEvents   || [];
  const _worldOverrides  = appSettings.worldEventOverrides || {};
  const _allWorldEvs = [
    ..._brewingEvents(_calYear),
    ..._brewingEvents(_calYear - 1),
    ..._brewingEvents(_calYear + 1),
  ].filter(e => !_hiddenWorldEvs.includes(e.canonical || e.label));
  _allWorldEvs.forEach(e => {
    const eKey  = e.canonical || e.label;
    const ov    = _worldOverrides[eKey] || {};
    const emoji = ov.emoji || e.emoji;
    const lbl   = ov.label || e.label;
    const color = ov.color || e.color;
    const evYear = e.date.slice(0, 4);
    const date  = ov.date_mmdd ? `${evYear}-${ov.date_mmdd}` : e.date;
    addEv(date, { type: 'world', label: emoji + ' ' + lbl, color, origLabel: eKey });
    // Rappel brassage (délai global)
    const _remDays = appSettings.defaultBrewReminderDays ?? 45;
    const rd = new Date(date + 'T00:00:00');
    rd.setDate(rd.getDate() - _remDays);
    addEv(_ymd(rd), { type: 'remind', label: '🔔 ' + t('cal.brew_for') + ' ' + lbl, color: '#a855f7', eventDate: date, reminderDays: _remDays, origLabel: eKey });
  });

  // Calcul des cellules du mois
  const today    = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(_calYear, _calMonth, 1);
  const lastDay  = new Date(_calYear, _calMonth + 1, 0);
  // Lundi = 0 … Dimanche = 6
  const startDow = (firstDay.getDay() + 6) % 7; // lundi en premier
  const totalCells = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;

  let html = '';
  for (let i = 0; i < totalCells; i++) {
    const cellDate = new Date(_calYear, _calMonth, 1 - startDow + i);
    const isOther  = cellDate.getMonth() !== _calMonth;
    const isToday  = cellDate.getTime() === today.getTime();
    const key      = _ymd(cellDate);
    const dayEvs   = events[key] || [];

    const evHtml = dayEvs.map(ev => {
      const idx = _calEvStore.push(ev) - 1;
      if (ev.type === 'world') {
        return `<div class="cal-event" style="background:${ev.color}22;color:${ev.color};border:1px solid ${ev.color}44"
          onclick="calEvClick(event,${idx})">
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
        </div>`;
      }
      if (ev.type === 'remind') {
        return `<div class="cal-event" style="background:rgba(168,85,247,.12);color:#a855f7;border:1px dashed rgba(168,85,247,.4)"
          onclick="calEvClick(event,${idx})">
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
        </div>`;
      }
      if (ev.type === 'draft') {
        const c = ev.color || '#8b5cf6';
        return `<div class="cal-event" style="background:${c}22;color:${c};border:1px solid ${c}44"
          onclick="calEvClick(event,${idx})">
          <i class="fas fa-book-open" style="flex-shrink:0;font-size:.65rem"></i>
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
        </div>`;
      }
      if (ev.type === 'custom') {
        const c = ev.color || '#f59e0b';
        return `<div class="cal-event" style="background:${c}22;color:${c};border:1px solid ${c}55"
          onclick="event.stopPropagation();editCustomEvent(${ev.customId})" title="${t('common.edit')}">
          <i class="fas fa-star" style="flex-shrink:0;font-size:.6rem"></i>
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
          <i class="fas fa-pen" style="flex-shrink:0;font-size:.55rem;margin-left:auto;opacity:.6"></i>
        </div>`;
      }
      if (ev.type === 'custom_remind') {
        return `<div class="cal-event" style="background:rgba(168,85,247,.12);color:#a855f7;border:1px dashed rgba(168,85,247,.4)"
          onclick="calEvClick(event,${idx})">
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
        </div>`;
      }
      const cls  = ev.type === 'brew' ? 'cal-event-brew' : ev.type === 'bottle' ? 'cal-event-bottle' : 'cal-event-ferm';
      const icon = ev.type === 'brew' ? 'fa-fire-burner'  : ev.type === 'bottle' ? 'fa-wine-bottle'   : 'fa-clock';
      return `<div class="cal-event ${cls}" onclick="calEvClick(event,${idx})">
        <i class="fas ${icon}" style="flex-shrink:0;font-size:.65rem"></i>
        <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
      </div>`;
    }).join('');

    html += `<div class="cal-cell${isOther?' cal-other-month':''}${isToday?' cal-today':''}">
      <div class="cal-day-num">${cellDate.getDate()}</div>
      ${evHtml}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
  _closeCalPopover();
  updateCalBadge();
}

function calEvClick(e, idx) {
  e.stopPropagation();
  const ev  = _calEvStore[idx];
  if (!ev) return;
  const pop = document.getElementById('cal-popover');
  const cnt = document.getElementById('cal-pop-content');

  let html = '';
  if (ev.type === 'draft') {
    const d = (S.drafts || []).find(x => x.id === ev.draftId);
    const c = ev.color || '#8b5cf6';
    html = `
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
        <i class="fas fa-book-open" style="color:${c}"></i>
        <span style="font-weight:700;font-size:.9rem">${esc(ev.label)}</span>
      </div>`;
    if (d) {
      const ingCount = (() => { try { return JSON.parse(d.ingredients||'[]').length; } catch(e) { return 0; } })();
      html += `

// ══════════════════════════════════════════════════════════════════════════════
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('brewhome-theme', next);
  _updateThemeBtn(next);
}
function _updateThemeBtn(theme) {
  const btn = document.getElementById('btn-theme');
  if (!btn) return;
  if (theme === 'light') {
    btn.innerHTML = '<i class="fas fa-moon"></i>';
    btn.title = 'Passer en thème sombre';
  } else {
    btn.innerHTML = '<i class="fas fa-sun"></i>';
    btn.title = 'Passer en thème clair';
  }
}

// UTILS
// ══════════════════════════════════════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════
(async () => {
  // Appliquer le thème sauvegardé et mettre à jour le bouton
  const savedTheme = localStorage.getItem('brewhome-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  _updateThemeBtn(savedTheme);

  // ── Dropdowns nav tactiles ─────────────────────────────────────────────────
  // Problème racine : sur mobile .nav-links a overflow-x:auto, ce qui en CSS
  // force aussi overflow-y:auto → le dropdown position:absolute est clipé.
  // Solution : position:fixed calculée depuis getBoundingClientRect() pour
  // échapper complètement au conteneur de scroll.
  window._closeAllNavDd = function(except) {
    document.querySelectorAll('.nav-group.dd-open').forEach(g => {
      if (g === except) return;
      g.classList.remove('dd-open');
      const dd = g.querySelector('.nav-dropdown');
      if (dd) { dd.style.cssText = ''; } // reset inline styles
    });
  };
  const _closeAllNavDd = window._closeAllNavDd;
  document.querySelectorAll('.nav-group').forEach(group => {
    const mainBtn  = group.querySelector(':scope > .nav-btn');
    const dropdown = group.querySelector('.nav-dropdown');
    if (!mainBtn || !dropdown) return;
    mainBtn.addEventListener('touchstart', function(e) {
      if (!group.classList.contains('dd-open')) {
        e.preventDefault(); // bloque le click → navigate() ne s'exécute pas
        _closeAllNavDd(group);
        // Positionner en fixed pour échapper à l'overflow du nav scroll container
        const rect = mainBtn.getBoundingClientRect();
        dropdown.style.position = 'fixed';
        dropdown.style.top      = rect.bottom + 'px';
        dropdown.style.left     = Math.min(rect.left, window.innerWidth - 170) + 'px';
        dropdown.style.zIndex   = '9999';
        group.classList.add('dd-open');
      }
      // si déjà ouvert : pas de preventDefault → click se déclenche → navigate()
    }, { passive: false });
  });
  // Fermer en touchant hors du nav
  document.addEventListener('touchstart', e => {
    if (!e.target.closest('.nav-group')) _closeAllNavDd();
  }, { passive: true });
  // Fallback souris
  document.addEventListener('click', e => {
    if (!e.target.closest('.nav-group')) _closeAllNavDd();
  });

  await loadAll();
  applyI18n();
  applyAppearance();
  clearRecipeForm();
  // Set today's date for brew
  document.getElementById('brew-f-date').value = new Date().toISOString().split('T')[0];
})();

  }).join('');

  panel.innerHTML = `
    <div class="rec-view-header">
      <div class="rec-view-title">${esc(r.name)}</div>
      <div class="rec-view-meta">
        ${r.style    ? `<span class="rec-view-badge"><i class="fas fa-tag"></i> ${esc(r.style)}</span>` : ''}
        ${r.batch_no ? `<span class="rec-view-badge"><i class="fas fa-hashtag"></i> Brassin ${r.batch_no}</span>` : ''}
        <span class="rec-view-badge"><i class="fas fa-flask"></i> ${r.volume} L</span>
        ${r.brew_date ? `<span class="rec-view-badge"><i class="fas fa-calendar"></i> ${r.brew_date}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
        <div style="display:flex;gap:2px">${rvStarsHtml}</div>
        <span style="font-size:.82rem;color:var(--muted)">${STAR_LABELS[r.rating||0]}</span>
      </div>
    </div>

    <div class="rvp-strip">
      <div class="rvp-row">
        <span><span class="rvp-lbl">Empâtage</span>${r.mash_temp || 66}°C · ${r.mash_time || 60} min</span>
        <span class="rvp-sep">·</span>
        <span><span class="rvp-lbl">Ébullition</span>${r.boil_time || 60} min</span>
        <span class="rvp-sep">·</span>
        <span><span class="rvp-lbl">Rendement</span>${r.brewhouse_efficiency || 72}%</span>
        <span class="rvp-sep">·</span>
        <span><span class="rvp-lbl">Fermentation</span><span style="color:var(--info)">${r.ferm_temp ?? 20}°C · ${r.ferm_time ?? 14} j</span></span>
      </div>
      <div class="rvp-row">
        <span><span class="rvp-lbl">Eau emp.</span>${wv('rw-mash')} L</span>
        <span class="rvp-sep">·</span>
        <span><span class="rvp-lbl">Rinçage</span>${wv('rw-sparge')} L</span>
        <span class="rvp-sep">·</span>
        <span><span class="rvp-lbl">Pré-ébullition</span>${wv('rw-preboil')} L</span>
        <span class="rvp-sep">·</span>
        <span><span class="rvp-lbl">Total eau</span>${wv('rw-total')} L</span>
      </div>
    </div>

    ${calcHtml}

    ${malts.length ? `<div class="rec-view-section" style="color:var(--malt)"><i class="fas fa-wheat-awn"></i> Malts & Céréales</div><div style="margin-bottom:12px">${maltHtml}</div>` : ''}
    ${hops.length  ? `<div class="rec-view-section" style="color:var(--hop)"><i class="fas fa-seedling"></i> Houblons</div><div style="margin-bottom:12px">${hopHtml}</div>` : ''}
    ${otherHtml}
    ${r.notes ? `<div class="rec-view-section"><i class="fas fa-note-sticky"></i> Notes</div><div class="view-notes">${esc(r.notes)}</div>` : ''}
  `;
}

// ── Déplacer un ingrédient dans sa catégorie ───────────────────────────────────
function moveIngUp(realIdx) {
  const cat = recIngredients[realIdx].category;
  for (let i = realIdx - 1; i >= 0; i--) {
    if (recIngredients[i].category === cat) {
      [recIngredients[i], recIngredients[realIdx]] = [recIngredients[realIdx], recIngredients[i]];
      renderIngredientRows();
      return;
    }
  }
}

function moveIngDown(realIdx) {
  const cat = recIngredients[realIdx].category;
  for (let i = realIdx + 1; i < recIngredients.length; i++) {
    if (recIngredients[i].category === cat) {
      [recIngredients[i], recIngredients[realIdx]] = [recIngredients[realIdx], recIngredients[i]];
      renderIngredientRows();
      return;
    }
  }
}

// ── Paramètres avancés toggle ─────────────────────────────────────────────────
function toggleAdvancedParams() {
  const el  = document.getElementById('rec-advanced-params');
  const btn = document.getElementById('btn-adv-params');
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : '';
  btn.classList.toggle('open', !open);
}

// ── Dupliquer une recette ──────────────────────────────────────────────────────
async function duplicateRecipe() {
  if (!recEditingId) { showRecAlert('Ouvrez une recette pour la dupliquer'); return; }
  const r = S.recipes.find(x => x.id === recEditingId);
  if (!r) return;
  const maxBatch = S.recipes.reduce((m, x) => Math.max(m, x.batch_no || 0), 0);
  const payload = {
    batch_no:   maxBatch + 1,
    name:       r.name + ' (copie)',
    style:      r.style || null,
    volume:     r.volume,
    brew_date:  null,
    mash_temp:  r.mash_temp,
    mash_time:  r.mash_time,
    boil_time:  r.boil_time,
    mash_ratio: r.mash_ratio,
    evap_rate:  r.evap_rate,
    grain_absorption:     r.grain_absorption,
    brewhouse_efficiency: r.brewhouse_efficiency,
    ferm_temp:  r.ferm_temp || 20,
    ferm_time:  r.ferm_time || 14,
    notes:      r.notes || null,
    ingredients: (r.ingredients || []).map(i => ({
      inventory_item_id: i.inventory_item_id || null,
      name: i.name, category: i.category,
      quantity: i.quantity, unit: i.unit,
      hop_time: i.hop_time || null, hop_type: i.hop_type || null, hop_days: i.hop_days || null,
      other_type: i.other_type || null, other_time: i.other_time || null,
      ebc: i.ebc || null, alpha: i.alpha || null, notes: i.notes || null,
    })),
  };
  try {
    const created = await api('POST', '/api/recipes', payload);
    S.recipes.unshift(created);
    loadRecipeForm(created.id);
    renderRecipeList();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast('Recette dupliquée', 'success');
  } catch(e) { showRecAlert('Erreur duplication : ' + (e.error || '')); }
}

// ── Imprimer une recette ───────────────────────────────────────────────────────
function printRecipe() {
  if (!recEditingId) { showRecAlert('Ouvrez une recette pour l\'imprimer'); return; }
  const r = S.recipes.find(x => x.id === recEditingId);
  if (!r) return;

  const wv = id => document.getElementById(id)?.textContent || '–';

  // ── Recalcul des estimations ───────────────────────────────────────────────
  const vol = parseFloat(document.getElementById('rec-volume').value) || 20;
  const eff = parseFloat(document.getElementById('rec-efficiency').value) || 72;

  let ogPoints = 0;
  recIngredients.filter(i => i.category === 'malt').forEach(m => {
    if (!m.quantity) return;
    let guVal = m.gu != null ? m.gu : null;
    if (guVal == null) { const c = S.catalog.find(c => c.name.toLowerCase() === m.name.toLowerCase()); if (c?.gu != null) guVal = c.gu; }
    if (guVal == null) return;
    ogPoints += (m.unit === 'kg' ? m.quantity : m.quantity / 1000) * guVal * (eff / 100);
  });
  const og  = ogPoints > 0 ? 1 + ogPoints / vol / 1000 : null;
  const fg  = og != null ? 1 + (og - 1) * 0.25 : null;
  const abv = og != null ? (og - fg) * 131.25 : null;

  const wortOG = og || 1.050;
  let ibuTotal = 0;
  recIngredients.filter(i => i.category === 'houblon').forEach(h => {
    if (!h.quantity || !h.alpha) return;
    const ht = h.hop_type || 'ebullition';
    if (ht === 'dryhop') return;
    const mins = ht === 'whirlpool' ? 15 : (h.hop_time ?? 60);
    const g = h.unit === 'kg' ? h.quantity * 1000 : h.quantity;
    ibuTotal += 1.65 * Math.pow(0.000125, wortOG - 1) * (1 - Math.exp(-0.04 * mins)) / 4.15 * (h.alpha / 100) * g * 1000 / vol;
  });
  const ibuVal = ibuTotal > 0 ? ibuTotal : null;

  let ebcWt = 0, ebcKg = 0;
  recIngredients.filter(i => i.category === 'malt').forEach(m => {
    if (!m.quantity) return;
    let e = m.ebc ?? (S.catalog.find(c => c.name.toLowerCase() === m.name.toLowerCase())?.ebc ?? null);
    if (e == null) return;
    const kg = m.unit === 'kg' ? m.quantity : m.quantity / 1000;
    ebcWt += kg * e; ebcKg += kg;
  });
  const ebcVal = ebcKg > 0 ? ebcWt / ebcKg : null;

  // BJCP
  const bjcp = S.bjcp.find(x => x.name === (document.getElementById('rec-style').value || '').trim()) || null;

  // ── Barre d'estimation (HTML pur, compatible impression) ───────────────────
  function estBar(label, val, cfgMin, cfgMax, dec, unit, bMin, bMax) {
    const span = cfgMax - cfgMin;
    const hasBjcp = bMin != null && bMax != null;
    const pct = val != null ? Math.min(100, Math.max(0, (val - cfgMin) / span * 100)) : null;
    const rL  = hasBjcp ? Math.min(100, Math.max(0, (bMin - cfgMin) / span * 100)) : 0;
    const rW  = hasBjcp ? Math.min(100, Math.max(0, (bMax - cfgMin) / span * 100)) - rL : 0;
    const inR = hasBjcp && val != null && val >= bMin && val <= bMax;
    const col = val == null ? '#9ca3af' : hasBjcp ? (inR ? '#16a34a' : '#dc2626') : '#d97706';
    const valStr = val != null ? val.toFixed(dec) + (unit ? '\u00a0' + unit : '') : '–';
    const tgt = hasBjcp ? `⌖\u00a0${bMin.toFixed(dec)}–${bMax.toFixed(dec)}${unit||''}` : '';
    return `<div class="est-row">
      <div class="est-lbl">${label}</div>
      <div class="est-track">
        ${hasBjcp ? `<div class="est-range" style="left:${rL.toFixed(1)}%;width:${rW.toFixed(1)}%"></div>` : ''}
        ${pct != null ? `<div class="est-marker" style="left:${pct.toFixed(1)}%;background:${col}"></div>` : ''}
      </div>
      <div class="est-val" style="color:${col}">${valStr}</div>
      <div class="est-target">${tgt}</div>
    </div>`;
  }

  const estimHtml =
    estBar('OG',  og,     1.020, 1.130, 3, '',  bjcp?.og_min,  bjcp?.og_max)  +
    estBar('FG',  fg,     1.002, 1.030, 3, '',  bjcp?.fg_min,  bjcp?.fg_max)  +
    estBar('ABV', abv,    0,     14,    1, '%', bjcp?.abv_min, bjcp?.abv_max) +
    estBar('IBU', ibuVal, 0,     120,   0, '',  bjcp?.ibu_min, bjcp?.ibu_max) +
    estBar('EBC', ebcVal, 0,     120,   0, '',  bjcp?.ebc_min, bjcp?.ebc_max);

  // ── Tableaux ingrédients ───────────────────────────────────────────────────
  const catLabels = { malt:'Malts & Céréales', houblon:'Houblons', levure:'Levures', autre:'Autres' };
  const totalMaltKg = (r.ingredients || []).filter(i => i.category === 'malt')
    .reduce((s, i) => s + (i.unit === 'kg' ? i.quantity : i.quantity / 1000), 0);

  let ingHtml = '';
  ['malt','houblon','levure','autre'].forEach(cat => {
    const items = (r.ingredients || []).filter(i => i.category === cat);
    if (!items.length) return;
    const PRINT_OT_LABELS = {empatage:'Empâtage',ebullition:'Ébullition',flameout:'Flameout',whirlpool:'Whirlpool',dryhop:'Dry Hop',fermentation:'Fermentation',packaging:'Mise en bouteille'};
    let cols = '<th>Ingrédient</th><th>Qté</th>';
    if (cat === 'malt')    cols += '<th style="text-align:right">%</th><th>EBC</th>';
    if (cat === 'houblon') cols += '<th>Alpha</th><th>Type</th><th>Durée</th>';
    if (cat === 'autre')   cols += '<th>Moment</th><th>Durée</th>';
    ingHtml += `<h3>${catLabels[cat]}</h3><table><thead><tr>${cols}</tr></thead><tbody>`;
    items.forEach(i => {
      let row = `<td>${i.name}</td><td>${i.quantity}\u00a0${i.unit}</td>`;
      if (cat === 'malt') {
        const kg  = i.unit === 'kg' ? i.quantity : i.quantity / 1000;
        const pct = totalMaltKg > 0 ? (kg / totalMaltKg * 100).toFixed(1) : '–';
        const ebc = i.ebc ?? (S.catalog.find(c => c.name.toLowerCase() === i.name.toLowerCase())?.ebc ?? null);
        const dot = ebc != null ? `<span class="ebc-dot" style="background:${ebcToColor(ebc)}"></span>` : '';
        row += `<td style="text-align:right;font-weight:700;color:#d97706">${pct}%</td><td>${dot}${ebc ?? '–'}</td>`;
      }
      if (cat === 'houblon') {
        const ht = i.hop_type || 'ebullition';
        const htLabel = {ebullition:'Ebullition', whirlpool:'Whirlpool', dryhop:'Dry Hop'}[ht] || ht;
        const dur = ht === 'dryhop' ? (i.hop_days != null ? i.hop_days + ' j' : '–') : (i.hop_time != null ? i.hop_time + ' min' : '–');
        row += `<td>${i.alpha != null ? i.alpha + '%' : '–'}</td><td>${htLabel}</td><td>${dur}</td>`;
      }
      if (cat === 'autre') {
        const ot = i.other_type || 'ebullition';
        const otLabel = PRINT_OT_LABELS[ot] || ot;
        const dur = (ot === 'dryhop') ? (i.other_time != null ? i.other_time + ' j' : '–')
          : (ot === 'ebullition' || ot === 'whirlpool') ? (i.other_time != null ? i.other_time + ' min' : '–')
          : '–';
        row += `<td>${otLabel}</td><td>${dur}</td>`;
      }
      ingHtml += `<tr>${row}</tr>`;
    });
    ingHtml += '</tbody></table>';
  });

  const notesHtml = r.notes
    ? `<div class="notes"><strong>Notes :</strong><br>${r.notes.replace(/\n/g,'<br>')}</div>` : '';

  const win = window.open('', '_blank', 'width=840,height=700');
  win.document.write(`<!DOCTYPE html><html lang="fr"><head>
  <meta charset="UTF-8"><title>${r.name}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
    body{font-family:Georgia,serif;color:#111;padding:28px 36px;font-size:13px}
    h1{font-size:22px;margin-bottom:6px}
    h3{font-family:sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#888;margin:18px 0 6px;border-bottom:1px solid #ddd;padding-bottom:4px}
    .meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
    .badge{display:inline-block;background:#f3f3f3;border:1px solid #ccc;border-radius:4px;padding:2px 8px;font-size:11px}
    .header{border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:16px}
    .params-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
    .param{background:#f8f8f8;padding:6px 10px;border-radius:4px}
    .param-val{font-size:15px;font-weight:bold}
    .param-lbl{font-family:sans-serif;font-size:10px;color:#888;text-transform:uppercase;margin-top:1px}
    .water-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
    .stat-box{text-align:center;background:#f8f8f8;padding:8px 4px;border-radius:6px}
    .stat-val{font-size:15px;font-weight:bold}
    .stat-lbl{font-family:sans-serif;font-size:10px;color:#888}
    table{width:100%;border-collapse:collapse;margin-bottom:4px}
    th{text-align:left;padding:4px 8px;font-size:11px;text-transform:uppercase;color:#888;border-bottom:1px solid #ddd;font-family:sans-serif}
    td{padding:5px 8px;border-bottom:1px solid #f0f0f0;font-size:12px}
    .notes{margin-top:16px;padding:10px 12px;background:#f8f8f8;border-radius:6px;font-size:12px;font-family:sans-serif;line-height:1.5}
    .est-row{display:grid;grid-template-columns:44px 1fr 76px 140px;align-items:center;gap:8px;margin-bottom:7px;font-family:sans-serif}
    .est-lbl{font-size:11px;font-weight:700;color:#555}
    .est-track{height:8px;background:#e5e7eb;border-radius:4px;position:relative;overflow:visible}
    .est-range{position:absolute;top:0;height:100%;background:#fbbf24;opacity:.33;border-radius:4px}
    .est-marker{position:absolute;top:-3px;width:3px;height:14px;border-radius:2px;transform:translateX(-50%)}
    .est-val{font-size:13px;font-weight:700;text-align:right}
    .est-target{font-size:10px;color:#9ca3af}
    .ebc-dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:middle;border:1px solid rgba(0,0,0,.15)}
    @media print{body{padding:16px}}
  </style></head><body>
  <div class="header">
    <h1>${esc(r.name)}</h1>
    <div class="meta">
      ${r.style   ? `<span class="badge">${esc(r.style)}</span>` : ''}
      ${r.batch_no? `<span class="badge">Brassin #${r.batch_no}</span>` : ''}
      <span class="badge">${r.volume} L</span>
      ${r.brew_date ? `<span class="badge">${r.brew_date}</span>` : ''}
    </div>
  </div>
  <div class="params-grid">
    <div class="param"><div class="param-val">${r.mash_temp||66}°C</div><div class="param-lbl">T° empâtage</div></div>
    <div class="param"><div class="param-val">${r.mash_time||60} min</div><div class="param-lbl">Durée empâtage</div></div>
    <div class="param"><div class="param-val">${r.boil_time||60} min</div><div class="param-lbl">Ébullition</div></div>
    <div class="param"><div class="param-val">${r.brewhouse_efficiency||72}%</div><div class="param-lbl">Rendement</div></div>
    <div class="param"><div class="param-val">${r.ferm_temp||20}°C</div><div class="param-lbl">T° fermentation</div></div>
    <div class="param"><div class="param-val">${r.ferm_time||14} j</div><div class="param-lbl">Fermentation</div></div>
  </div>

  <div class="water-grid" style="margin-bottom:14px">

  </div>
  ${ingHtml}
  ${notesHtml}
  <script>window.onload=function(){window.print()}<\/script>
</body></html>`);
  win.document.close();
}

// ── BRASSINS ─────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const BREW_STATUS = {
  planned:     { label: 'Planifié',        color: 'var(--info)' },
  in_progress: { label: 'En cours',        color: 'var(--amber)' },
  fermenting:  { label: 'En fermentation', color: 'var(--hop)' },
  completed:   { label: 'Terminé',         color: 'var(--success)' },
};
function brewStatusBadge(s) {
  const st = BREW_STATUS[s] || { label: s || 'Planifié', color: 'var(--muted)' };
  return `<span style="font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:20px;background:${st.color}22;color:${st.color};border:1px solid ${st.color}55;vertical-align:middle">${st.label}</span>`;
}

function _spindleAgo(dateStr) {
  if (!dateStr) return null;
  const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
  if (diff < 60)   return `il y a ${diff}s`;
  if (diff < 3600) return `il y a ${Math.floor(diff/60)}min`;
  if (diff < 86400)return `il y a ${Math.floor(diff/3600)}h`;
  return `il y a ${Math.floor(diff/86400)}j`;
}

function renderBrassins() {
  const active = S.brews.filter(b => !b.archived);
  const arch   = S.brews.filter(b => b.archived);
  const shown  = showArchivedBrew ? [...active, ...arch] : active;

  // Stats on active brews only
  document.getElementById('brew-stats').innerHTML = `
    <div class="stat"><div class="stat-val">${active.length}</div><div class="stat-lbl">Total brassins</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--hop)">${active.filter(b=>b.status==='completed').length}</div><div class="stat-lbl">Terminés</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--amber)">${active.length ? (active.filter(b=>b.abv).reduce((s,b)=>s+b.abv,0) / (active.filter(b=>b.abv).length || 1)).toFixed(1)+'%' : '–'}</div><div class="stat-lbl">ABV moyen</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--info)">${active.length ? active.filter(b=>b.volume_brewed).reduce((s,b)=>s+(b.volume_brewed||0),0).toFixed(0)+'L' : '–'}</div><div class="stat-lbl">Volume total</div></div>`;

  const list = document.getElementById('brew-list');
  document.getElementById('brew-empty').style.display = shown.length ? 'none' : 'block';

  if (!shown.length) { list.innerHTML = ''; }
  else {
    const STATUS_ORDER = ['planned', 'in_progress', 'fermenting', 'completed'];
    const STATUS_ICONS = {
      planned:     'fas fa-calendar-plus',
      in_progress: 'fas fa-fire-flame-curved',
      fermenting:  'fas fa-flask',
      completed:   'fas fa-check-circle',
    };

    const _brewCardHtml = b => {
      const sp = S.spindles.find(s => s.brew_id === b.id);
      let spindleHtml = '';
      let spindleBtn  = '';
      if (sp) {
        const gravStr = sp.last_gravity    != null ? sp.last_gravity.toFixed(3)    : null;
        const tempStr = sp.last_temperature != null ? sp.last_temperature.toFixed(1) : null;
        const ago     = _spindleAgo(sp.last_reading_at);
        const isLive  = sp.last_reading_at && (Date.now() - new Date(sp.last_reading_at).getTime()) < 3_600_000;
        spindleHtml = `
          <div class="brew-spindle-badge">
            ${isLive ? '<span class="bsb-live"></span>' : '<i class="fas fa-water" style="color:var(--info);font-size:.75rem"></i>'}
            <span style="color:var(--muted);font-size:.78rem">${esc(sp.name)}</span>
            ${gravStr ? `<span class="bsb-grav"><i class="fas fa-weight-hanging" style="font-size:.7rem"></i> ${gravStr}</span>` : ''}
            ${tempStr ? `<span class="bsb-temp">${tempStr}°C</span>` : ''}
            ${ago ? `<span class="bsb-ago">${ago}</span>` : ''}
          </div>`;
        spindleBtn = `<button class="btn btn-ghost btn-sm btn-icon" onclick="openSpindleChart(${sp.id})" title="Graphique densimètre — ${esc(sp.name)}"><i class="fas fa-water" style="color:var(--info)"></i></button>`;
      }
      return `
      <div class="brew-card ${b.archived ? 'archived-item' : ''}">
        <div class="brew-card-info">
          <div class="brew-card-name">${esc(b.name)}</div>
          <div class="brew-card-meta">
            ${b.recipe_name ? `<i class="fas fa-scroll"></i> ${esc(b.recipe_name)} · ` : ''}
            ${b.brew_date ? `<i class="fas fa-calendar"></i> ${b.brew_date} · ` : ''}
            ${b.volume_brewed ? `${b.volume_brewed}L · ` : ''}
            ${b.abv ? `<strong style="color:var(--amber)">${b.abv}% ABV</strong>` : ''}
            ${b.og ? ` · OG ${b.og}` : ''}${b.fg ? ` → FG ${b.fg}` : ''}
          </div>
          ${b.notes ? `<div style="font-size:.78rem;color:var(--muted);margin-top:4px">${esc(b.notes)}</div>` : ''}
          ${spindleHtml}
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          ${spindleBtn}
          ${b.fermentation_count > 0 ? `<button class="btn btn-ghost btn-sm btn-icon" onclick="openBrewFermentationChart(${b.id})" title="Historique fermentation (${b.fermentation_count} mesures)"><i class="fas fa-chart-line" style="color:var(--info)"></i></button>` : ''}
          ${b.status === 'completed' ? `<button class="btn btn-sm btn-success" onclick="openAfterBrewModal(${b.id})" title="Ajouter à la cave"><i class="fas fa-beer-mug-empty"></i> Mettre en cave</button>` : ''}
          <button class="btn btn-icon btn-ghost btn-sm" onclick="archiveItem('brew',${b.id},${b.archived?0:1})" title="${b.archived?'Désarchiver':'Archiver'}"><i class="fas fa-${b.archived?'box-open':'box-archive'}"></i></button>
          <button class="btn btn-icon btn-ghost btn-sm" onclick="openBrewEditModal(${b.id})" title="Modifier"><i class="fas fa-pen"></i></button>
          <button class="btn btn-icon btn-danger btn-sm" onclick="deleteBrew(${b.id})"><i class="fas fa-trash"></i></button>
        </div>
      </div>`;
    };

    const groups = STATUS_ORDER.map(status => ({
      status,
      brews: shown.filter(b => (b.status || 'planned') === status),
    })).filter(g => g.brews.length > 0);

    list.innerHTML = groups.map(g => {
      const st = BREW_STATUS[g.status];
      return `
        <div class="brew-group">
          <div class="brew-group-header">
            <i class="${STATUS_ICONS[g.status]}" style="color:${st.color}"></i>
            <span style="color:${st.color}">${st.label}</span>
            <span class="brew-group-count">${g.brews.length}</span>
          </div>
          ${g.brews.map(_brewCardHtml).join('')}
        </div>`;
    }).join('');
  }

  // Archive button
  const archBtn = document.getElementById('brew-arch-btn');
  if (archBtn) {
    const archCount = arch.length;
    archBtn.textContent = showArchivedBrew ? 'Masquer archives' : `\uD83D\uDDC3\uFE0F Archives (${archCount})`;
  }
}

function toBaseUnit(qty, unit) {
  if (unit === 'kg') return qty * 1000;
  if (unit === 'g')  return qty;
  if (unit === 'L')  return qty * 1000;
  if (unit === 'ml' || unit === 'mL') return qty;
  return qty; // sachet, pièce
}

function onBrewRecipeChange() {
  const recipeId = parseInt(document.getElementById('brew-f-recipe').value);
  const recipe = S.recipes.find(r => r.id === recipeId);
  const section = document.getElementById('brew-ingredients-section');
  const list    = document.getElementById('brew-ing-list');

  if (!recipe) { section.style.display='none'; return; }

  // Auto-fill name and volume
  if (!document.getElementById('brew-f-name').value)
    document.getElementById('brew-f-name').value = recipe.name;
  document.getElementById('brew-f-vol').value = recipe.volume;

  section.style.display = '';
  if (!recipe.ingredients.length) { list.innerHTML='<p style="color:var(--muted)">Aucun ingrédient dans cette recette.</p>'; return; }

  list.innerHTML = recipe.ingredients.map(ing => {
    const inv = ing.inventory_item_id ? S.inventory.find(i => i.id === ing.inventory_item_id) : null;
    const stockBase  = inv ? toBaseUnit(inv.quantity, inv.unit) : null;
    const neededBase = toBaseUnit(ing.quantity, ing.unit);
    let sbcls='sb-na', stockTxt='Non lié';
    if (stockBase !== null) {
      if (stockBase >= neededBase) { sbcls='sb-ok'; stockTxt=`${inv.quantity} ${inv.unit} dispo`; }
      else if (stockBase > 0)     { sbcls='sb-low'; stockTxt=`${inv.quantity} ${inv.unit} / besoin ${ing.quantity} ${ing.unit}`; }
      else                        { sbcls='sb-empty'; stockTxt='Aucun stock'; }
    }
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border)">
      <div>
        <span class="badge badge-${ing.category}" style="margin-right:8px">${catLabel(ing.category)}</span>
        <strong>${esc(ing.name)}</strong> — ${ing.quantity} ${ing.unit}
        ${ing.category==='houblon' ? (
            ing.hop_type==='dryhop'    ? `<span style="color:var(--info);font-size:.8rem"> [Dry Hop${ing.hop_days!=null?' · '+ing.hop_days+' j':''}]</span>`
          : ing.hop_type==='whirlpool' ? `<span style="color:var(--muted);font-size:.8rem"> [Whirlpool${ing.hop_time!=null?' −'+ing.hop_time+' min':''}]</span>`
          : ing.hop_time!=null         ? `<span style="color:var(--muted);font-size:.8rem"> (−${ing.hop_time} min)</span>`
          : '') : ''}
      </div>
      <span class="stock-badge ${sbcls}">${stockTxt}</span>
    </div>`;
  }).join('');
}

function showBrewAlert(msg, type='danger') {
  const el = document.getElementById('brew-alert');
  if (!msg) { el.classList.remove('show'); return; }
  el.className = `alert alert-${type} show`;
  el.textContent = msg;
}

async function confirmBrew(force = false) {
  const recipeId = parseInt(document.getElementById('brew-f-recipe').value);
  if (!recipeId) { showBrewAlert('Veuillez choisir une recette'); return; }
  const name = document.getElementById('brew-f-name').value.trim();
  if (!name) { showBrewAlert('Veuillez saisir un nom de brassin'); return; }

  const payload = {
    recipe_id: recipeId,
    name, force,
    deduct_stock:  document.getElementById('brew-deduct').checked,
    brew_date:     document.getElementById('brew-f-date').value || null,
    volume_brewed: parseFloat(document.getElementById('brew-f-vol').value) || null,
    og:   parseFloat(document.getElementById('brew-f-og').value) || null,
    fg:   parseFloat(document.getElementById('brew-f-fg').value) || null,
    abv:  parseFloat(document.getElementById('brew-f-abv').value) || null,
    notes: document.getElementById('brew-f-notes').value.trim() || null,
    status: 'planned',
  };
  try {
    const brew = await api('POST', '/api/brews', payload);
    S.brews.unshift(brew);
    // Refresh inventory after deduction
    S.inventory = await api('GET', '/api/inventory');
    renderInventaire();
    renderBrassins();
    closeModal('brew-modal');
    closeModal('stock-warn-modal');
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast('Brassin enregistré !', 'success');
  } catch(err) {
    if (err.error === 'stock_insuffisant') {
      const warnList = document.getElementById('stock-warn-list');
      warnList.innerHTML = err.items.map(i =>
        `<div style="padding:8px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
          <strong>${esc(i.name)}</strong>
          <span style="color:var(--danger)">Besoin: ${i.needed} ${i.unit} — Dispo: ${i.available} ${i.unit}</span>
        </div>`).join('');
      closeModal('brew-modal');
      openModal('stock-warn-modal');
    } else {
      showBrewAlert('Erreur : ' + (err.error || err.message || JSON.stringify(err)));
    }
  }
}

async function deleteBrew(id) {
  if (!confirm('Supprimer ce brassin ?')) return;
  try {
    await api('DELETE', `/api/brews/${id}`);
    S.brews = S.brews.filter(b => b.id !== id);
    renderBrassins();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast('Brassin supprimé', 'success');
  } catch(e) { toast('Erreur suppression', 'error'); }
}

    status:        document.getElementById('bew-status').value,

function beerStockHtml(current, initial, label) {
  const cur = current || 0;
  const ini = initial || 0;
  const consumed = ini > cur;
  const pct = ini > 0 ? Math.round(cur / ini * 100) : 100;
  // color: green if plenty, amber if below half, red if almost empty
  const barColor = pct > 50 ? 'var(--success)' : pct > 20 ? '#f59e0b' : 'var(--danger)';
  const initLabel = consumed
    ? `<span style="color:var(--muted);font-size:.8rem">/${ini}</span>`
    : '';
  const bar = consumed
    ? `<div class="bottle-bar"><div class="bottle-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>`
    : '';
  return `<div class="beer-stock-item">
    <div class="beer-stock-row"><i class="fas fa-beer-mug-empty" style="font-size:.75rem"></i><span class="beer-stock-val">${cur}</span>${initLabel} <span>${label}</span></div>
    ${bar}
  </div>`;
}

function renderCave() {
  const q = (document.getElementById('cave-search')?.value || '').toLowerCase();
  const active = S.beers.filter(b => !b.archived);
  const arch   = S.beers.filter(b => b.archived);
  const shown  = (showArchivedCave ? [...active, ...arch] : active)
    .filter(b => !q || b.name.toLowerCase().includes(q) || (b.type||'').toLowerCase().includes(q));

  // Stats on active beers only
  const total33 = active.reduce((s,b) => s + (b.stock_33cl||0), 0);
  const total75 = active.reduce((s,b) => s + (b.stock_75cl||0), 0);
  const totalL  = (total33 * 0.33 + total75 * 0.75).toFixed(1);
  document.getElementById('cave-stats').innerHTML = `
    <div class="stat"><div class="stat-val">${active.length}</div><div class="stat-lbl">Bières différentes</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--info)">${total33}</div><div class="stat-lbl">Bouteilles 33cl</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--amber)">${total75}</div><div class="stat-lbl">Bouteilles 75cl</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--success)">${totalL}</div><div class="stat-lbl">Litres totaux</div></div>`;

  document.getElementById('cave-empty').style.display = shown.length ? 'none' : 'block';
  const grid = document.getElementById('cave-grid');

  const beerCardHtml = b => {
    const photoHtml = b.photo
      ? `<div class="beer-photo" style="cursor:zoom-in" onclick="openBeerLightbox(${b.id})"><img src="${b.photo}" alt="${esc(b.name)}"></div>`
      : `<div class="beer-photo" style="display:flex;align-items:center;justify-content:center;background:var(--card2);color:var(--border);font-size:3rem;cursor:pointer" onclick="openBeerDetail(${b.id})">🍺</div>`;

    // ── Calcul du prix par bouteille ──────────────────────────────────────────
    let priceHtml = '';
    if (b.recipe_id) {
      const recipe = S.recipes.find(r => r.id === b.recipe_id);
      if (recipe) {
        const totalCost = recipeCost(recipe);
        if (totalCost !== null) {
          const brew   = b.brew_id ? S.brews.find(br => br.id === b.brew_id) : null;
          const volume = (brew && brew.volume_brewed) ? brew.volume_brewed : recipe.volume;
          if (volume > 0) {
            const costPerL = totalCost / volume;
            const p33 = (costPerL * 0.33).toFixed(2);
            const p75 = (costPerL * 0.75).toFixed(2);
            const volSrc = (brew && brew.volume_brewed) ? `brassin ${volume}L` : `recette ${volume}L`;
            priceHtml = `
              <div style="display:flex;flex-wrap:wrap;gap:3px 10px;align-items:center;font-size:.77rem;margin-bottom:7px;padding:5px 8px;background:rgba(34,197,94,.07);border-radius:7px;border:1px solid rgba(34,197,94,.18)">
                <span style="color:var(--success);font-weight:700"><i class="fas fa-euro-sign" style="font-size:.65rem"></i> ${totalCost.toFixed(2)}€</span>
                <span style="color:var(--border)">·</span>
                <span style="color:var(--muted)">33cl <strong style="color:var(--success)">${p33}€</strong></span>
                <span style="color:var(--border)">·</span>
                <span style="color:var(--muted)">75cl <strong style="color:var(--success)">${p75}€</strong></span>
                <span style="color:var(--border);margin-left:auto;font-size:.7rem;font-style:italic">${volSrc}</span>
              </div>`;
          }
        }
      }
    }

    return `
      <div class="beer-card ${b.archived ? 'archived-item' : ''}">
        ${photoHtml}
        <div class="beer-body">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;cursor:pointer" onclick="openBeerDetail(${b.id})">
            <div class="beer-name">${esc(b.name)}</div>
            ${b.abv ? `<div class="beer-abv">${b.abv}%</div>` : ''}
          </div>
          <div class="beer-type" style="cursor:pointer" onclick="openBeerDetail(${b.id})">${b.type ? esc(b.type) : ''} ${b.recipe_name ? `· <i class="fas fa-scroll" style="font-size:.75rem"></i> ${esc(b.recipe_name)}` : ''}</div>
          <div class="beer-stocks">
            ${beerStockHtml(b.stock_33cl, b.initial_33cl, '33cl')}
            ${beerStockHtml(b.stock_75cl, b.initial_75cl, '75cl')}
          </div>
          ${priceHtml}
          ${b.description ? `<div style="font-size:.78rem;color:var(--muted);margin-bottom:8px;line-height:1.4">${esc(b.description).substring(0,100)}${b.description.length>100?'…':''}</div>` : ''}
          <div style="display:flex;gap:6px">
            <button class="btn btn-icon btn-ghost btn-sm" onclick="archiveItem('cave',${b.id},${b.archived?0:1})" title="${b.archived?'Désarchiver':'Archiver'}"><i class="fas fa-${b.archived?'box-open':'box-archive'}"></i></button>
            <button class="btn btn-sm btn-ghost" onclick="editBeer(${b.id})" style="flex:1"><i class="fas fa-pen"></i> Modifier</button>
            <button class="btn btn-sm btn-ghost" onclick="adjustStock(${b.id},-1,0)" title="−1 bouteille 33cl"><i class="fas fa-minus"></i> 33</button>
            <button class="btn btn-sm btn-ghost" onclick="adjustStock(${b.id},0,-1)" title="−1 bouteille 75cl"><i class="fas fa-minus"></i> 75</button>
            <button class="btn btn-icon btn-danger btn-sm" onclick="deleteBeer(${b.id})"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      </div>`;
  };

  const hasStock  = shown.filter(b => (b.stock_33cl || 0) + (b.stock_75cl || 0) > 0);
  const noStock   = shown.filter(b => (b.stock_33cl || 0) + (b.stock_75cl || 0) === 0);
  const needSplit = hasStock.length > 0 && noStock.length > 0;

  const groupHeader = (label, icon, color, count) =>
    `<div class="brew-group-header" style="grid-column:1/-1;color:${color}">
       <i class="fas fa-${icon}"></i> ${label}
       <span class="brew-group-count">${count}</span>
     </div>`;

  if (needSplit) {
    grid.innerHTML =
      groupHeader('En stock', 'check-circle', 'var(--success)', hasStock.length) +
      hasStock.map(beerCardHtml).join('') +
      groupHeader('Épuisées', 'wine-bottle', 'var(--muted)', noStock.length) +
      noStock.map(beerCardHtml).join('');
  } else {
    grid.innerHTML = shown.map(beerCardHtml).join('');
  }

  // Archive button
  const archBtn = document.getElementById('cave-arch-btn');
  if (archBtn) {
    const archCount = arch.length;
    archBtn.textContent = showArchivedCave ? 'Masquer archives' : `\uD83D\uDDC3\uFE0F Archives (${archCount})`;
  }
}

function previewBeerPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    // Compress
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 800;
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const b64 = canvas.toDataURL('image/jpeg', 0.75);
      document.getElementById('beer-f-photo-b64').value = b64;
      document.getElementById('beer-f-photo-preview').src = b64;
      document.getElementById('beer-f-photo-preview').style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveBeer() {
  const name = document.getElementById('beer-f-name').value.trim();
  if (!name) { toast('Le nom est requis', 'error'); return; }
  const id = document.getElementById('beer-f-id').value;
  const stock33 = parseInt(document.getElementById('beer-f-33').value) || 0;
  const stock75 = parseInt(document.getElementById('beer-f-75').value) || 0;
  const payload = {
    name,
    type:         document.getElementById('beer-f-type').value || null,
    abv:          parseFloat(document.getElementById('beer-f-abv').value) || null,
    stock_33cl:   stock33,
    stock_75cl:   stock75,
    // On edit: send the (possibly corrected) initial values; on create: not sent, backend uses stock as initial
    ...(id ? {
      initial_33cl: parseInt(document.getElementById('beer-f-33-init').value) || 0,
      initial_75cl: parseInt(document.getElementById('beer-f-75-init').value) || 0,
    } : {}),
    origin:        document.getElementById('beer-f-origin').value.trim() || null,
    description:   document.getElementById('beer-f-desc').value.trim() || null,
    photo:         document.getElementById('beer-f-photo-b64').value || null,
    brew_date:     document.getElementById('beer-f-brew-date').value || null,
    bottling_date: document.getElementById('beer-f-bottling-date').value || null,
  };
  try {
    if (id) {
      const updated = await api('PUT', `/api/beers/${id}`, payload);
      const idx = S.beers.findIndex(b => b.id === parseInt(id));
      if (idx !== -1) S.beers[idx] = updated;
    } else {
      const created = await api('POST', '/api/beers', payload);
      S.beers.unshift(created);
    }
    closeModal('beer-modal');
    renderCave();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast(id ? 'Bière mise à jour' : 'Bière ajoutée à la cave', 'success');
  } catch(e) { toast('Erreur sauvegarde bière', 'error'); }
}

async function adjustStock(id, d33, d75) {
  const beer = S.beers.find(b => b.id === id);
  if (!beer) return;
  const payload = {
    stock_33cl: Math.max(0, (beer.stock_33cl||0) + d33),
    stock_75cl: Math.max(0, (beer.stock_75cl||0) + d75),
  };
  try {
    const updated = await api('PATCH', `/api/beers/${id}/stock`, payload);
    const idx = S.beers.findIndex(b => b.id === id);
    if (idx !== -1) S.beers[idx] = { ...S.beers[idx], ...updated };
    renderCave();
  } catch(e) { toast('Erreur mise à jour stock', 'error'); }
}

async function deleteBeer(id) {
  if (!confirm('Supprimer cette bière de la cave ?')) return;
  try {
    await api('DELETE', `/api/beers/${id}`);
    S.beers = S.beers.filter(b => b.id !== id);
    renderCave();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast('Bière supprimée', 'success');
  } catch(e) { toast('Erreur suppression', 'error'); }
}

// ── Brew stats calculator (Brewfather-style) ──────────────────────────────────
const CALC_PARAMS = {
  og:  { label: 'OG',  unit: '',  dec: 3, min: 1.020, max: 1.130 },
  fg:  { label: 'FG',  unit: '',  dec: 3, min: 1.002, max: 1.030 },
  abv: { label: 'ABV', unit: '%', dec: 1, min: 0,     max: 14    },
  ibu: { label: 'IBU', unit: '',  dec: 0, min: 0,     max: 120   },
  ebc: { label: 'EBC', unit: '',  dec: 0, min: 0,     max: 120   },
};

function renderCalcBar(key, val, range, cfg) {
  const span = cfg.max - cfg.min;
  const hasRange = range && range[0] != null && range[1] != null;

  let rangeHtml = '';
  if (hasRange) {
    const rL = Math.min(100, Math.max(0, (range[0] - cfg.min) / span * 100));
    const rR = Math.min(100, Math.max(0, (range[1] - cfg.min) / span * 100));
    rangeHtml = `<div class="calc-bar-range" style="left:${rL.toFixed(1)}%;width:${(rR - rL).toFixed(1)}%"></div>`;
  }

  let markerHtml = '';
  let valColor = 'var(--amber)';
  if (val != null) {
    const pct = Math.min(100, Math.max(0, (val - cfg.min) / span * 100));
    if (hasRange) valColor = (val >= range[0] && val <= range[1]) ? 'var(--success)' : 'var(--danger)';
    markerHtml = `<div class="calc-bar-marker" style="left:${pct.toFixed(1)}%;background:${valColor}"></div>`;
  }

  const valStr    = val != null ? val.toFixed(cfg.dec) + (cfg.unit ? ' ' + cfg.unit : '') : '–';
  const targetStr = hasRange ? `${range[0].toFixed(cfg.dec)}–${range[1].toFixed(cfg.dec)}${cfg.unit ? cfg.unit : ''}` : '';

  return `<div class="calc-bar-row">
    <div class="calc-bar-lbl">${cfg.label}</div>
    <div class="calc-bar-track">${rangeHtml}${markerHtml}</div>
    <div class="calc-bar-val" style="color:${valColor}">${valStr}</div>
    <div class="calc-bar-target">${targetStr ? '⌖ ' + targetStr : ''}</div>
  </div>`;
}

function calcBrewStats() {
  const panel = document.getElementById('rec-calc-panel');
  if (!panel) return;

  const vol = parseFloat(document.getElementById('rec-volume').value) || 20;
  const eff = parseFloat(document.getElementById('rec-efficiency').value) || 72;

  // Selected BJCP style ranges
  const styleName = (document.getElementById('rec-style').value || '').trim();
  const bjcpStyle = S.bjcp.find(x => x.name === styleName) || null;

  // ── OG (L°/kg metric) ───────────────────────────────────────────────────────
  let ogPoints = 0;
  recIngredients.filter(i => i.category === 'malt').forEach(m => {
    if (!m.quantity) return;
    let guVal = m.gu != null ? m.gu : null;
    if (guVal == null) {
      const cat = S.catalog.find(c => c.name.toLowerCase() === m.name.toLowerCase());
      if (cat && cat.gu != null) guVal = cat.gu;
    }
    if (guVal == null) return;
    const kg = m.unit === 'kg' ? m.quantity : m.quantity / 1000;
    ogPoints += kg * guVal * (eff / 100);
  });
  const og = ogPoints > 0 ? 1 + ogPoints / vol / 1000 : null;

  // ── FG (75% attenuation) ─────────────────────────────────────────────────────
  const fg = og != null ? 1 + (og - 1) * 0.25 : null;

  // ── ABV ──────────────────────────────────────────────────────────────────────
  const abv = (og != null && fg != null) ? (og - fg) * 131.25 : null;

  // ── IBU (Tinseth metric) ─────────────────────────────────────────────────────
  const wortOG = og || 1.050;
  let ibuTotal = 0;
  recIngredients.filter(i => i.category === 'houblon').forEach(h => {
    if (!h.quantity || !h.alpha) return;
    const ht = h.hop_type || 'ebullition';
    if (ht === 'dryhop') return;
    const mins = ht === 'whirlpool' ? 15 : (h.hop_time != null ? h.hop_time : 60);
    const grams     = h.unit === 'kg' ? h.quantity * 1000 : h.quantity;
    const bigness   = 1.65 * Math.pow(0.000125, wortOG - 1);
    const timeFact  = (1 - Math.exp(-0.04 * mins)) / 4.15;
    ibuTotal += bigness * timeFact * (h.alpha / 100) * grams * 1000 / vol;
  });
  const ibuVal = ibuTotal > 0 ? ibuTotal : null;

  // ── EBC (moyenne pondérée par poids de grain) ─────────────────────────────────
  let ebcWtSum = 0, ebcKgSum = 0;
  recIngredients.filter(i => i.category === 'malt').forEach(m => {
    if (!m.quantity) return;
    let mEbc = m.ebc != null ? m.ebc : null;
    if (mEbc == null) {
      const cat = S.catalog.find(c => c.name.toLowerCase() === m.name.toLowerCase());
      if (cat && cat.ebc != null) mEbc = cat.ebc;
    }
    if (mEbc == null) return;
    const kg = m.unit === 'kg' ? m.quantity : m.quantity / 1000;
    ebcWtSum += kg * mEbc;
    ebcKgSum += kg;
  });
  const ebcVal = ebcKgSum > 0 ? ebcWtSum / ebcKgSum : null;

  // ── Render ────────────────────────────────────────────────────────────────────
  const rng = bjcpStyle ? {
    og:  [bjcpStyle.og_min,  bjcpStyle.og_max],
    fg:  [bjcpStyle.fg_min,  bjcpStyle.fg_max],
    abv: [bjcpStyle.abv_min, bjcpStyle.abv_max],
    ibu: [bjcpStyle.ibu_min, bjcpStyle.ibu_max],
    ebc: [bjcpStyle.ebc_min, bjcpStyle.ebc_max],
  } : {};

  const styleLabel = bjcpStyle
    ? `<span style="color:var(--muted);font-weight:400;font-size:.7rem;text-transform:none;letter-spacing:0"> — ${esc(bjcpStyle.name)}</span>`
    : '';

  // ── Coût total de la recette ──────────────────────────────────────────────
  const CAT_COST_META = {
    malt:    { label: 'Malts',    color: 'var(--malt)',  icon: 'fas fa-seedling' },
    houblon: { label: 'Houblons', color: 'var(--hop)',   icon: 'fas fa-leaf' },
    levure:  { label: 'Levures',  color: 'var(--yeast)', icon: 'fas fa-flask' },
    autre:   { label: 'Autres',   color: 'var(--other)', icon: 'fas fa-box' },
  };
  const catCosts = { malt: 0, houblon: 0, levure: 0, autre: 0 };
  let totalCost = 0, hasCost = false;
  recIngredients.forEach(ing => {
    const c = ingCost(ing);
    if (c !== null) { catCosts[ing.category] = (catCosts[ing.category] || 0) + c; totalCost += c; hasCost = true; }
  });
  // Coût de l'eau (prix/L × volume total eau)
  const waterPrice = (appSettings.water || {}).price;
  let waterCost = null;
  if (waterPrice != null) {
    // totalWater est déjà calculé plus haut via recCalc — on le recalcule ici
    const grainKg2 = recIngredients.filter(i=>i.category==='malt')
      .reduce((s,i) => s + (i.unit==='kg' ? i.quantity : i.quantity/1000), 0);
    const boil2  = parseFloat(document.getElementById('rec-boil-time').value) || 60;
    const ratio2 = parseFloat(document.getElementById('rec-mash-ratio').value) || 3;
    const evap2  = parseFloat(document.getElementById('rec-evap').value) || 3;
    const abs2   = parseFloat(document.getElementById('rec-absorption').value) || 0.8;
    const preboil2   = vol + evap2 * (boil2/60);
    const totalWater2 = preboil2 + grainKg2 * abs2;
    waterCost = totalWater2 * waterPrice;
    totalCost += waterCost;
    hasCost = true;
  }

  const costHtml = hasCost ? `
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)"><i class="fas fa-euro-sign"></i> Coût matières estimé</div>
        <div style="display:flex;gap:16px;align-items:baseline">
          <span style="font-size:1.1rem;font-weight:800;color:var(--success)">${totalCost.toFixed(2)} €</span>
          <span style="font-size:.8rem;color:var(--muted)">${(totalCost / vol).toFixed(2)} €/L</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:${waterCost !== null ? '8px' : '0'}">
        ${['malt','houblon','levure','autre'].map(cat => {
          const m = CAT_COST_META[cat];
          const c = catCosts[cat] || 0;
          const pct = totalCost > 0 ? (c / totalCost * 100) : 0;
          if (c === 0) return `<div style="background:var(--card2);border-radius:10px;padding:10px 12px;opacity:.35">
            <div style="font-size:.72rem;color:${m.color};font-weight:600;margin-bottom:4px"><i class="${m.icon}"></i> ${m.label}</div>
            <div style="font-size:.9rem;font-weight:700;color:var(--muted)">—</div>
          </div>`;
          return `<div style="background:var(--card2);border-radius:10px;padding:10px 12px;border-left:3px solid ${m.color}">
            <div style="font-size:.72rem;color:${m.color};font-weight:600;margin-bottom:4px"><i class="${m.icon}"></i> ${m.label}</div>
            <div style="font-size:.95rem;font-weight:700;color:var(--text)">${c.toFixed(2)} €</div>
            <div style="font-size:.72rem;color:var(--muted);margin-top:2px">${pct.toFixed(0)}% du total</div>
          </div>`;
        }).join('')}
      </div>
      ${waterCost !== null ? `
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px;padding:8px 12px;background:var(--card2);border-radius:10px;border-left:3px solid var(--info)">
        <i class="fas fa-droplet" style="color:var(--info);font-size:.8rem"></i>
        <span style="font-size:.82rem;color:var(--muted);flex:1">Eau (${((appSettings.water||{}).price||0).toFixed(4)} €/L)</span>
        <span style="font-size:.9rem;font-weight:700;color:var(--info)">${waterCost.toFixed(2)} €</span>
        <span style="font-size:.75rem;color:var(--muted)">${(waterCost/totalCost*100).toFixed(0)}% du total</span>
      </div>` : ''}
    </div>` : '';

  panel.innerHTML = `<div class="calc-panel">
    <div class="calc-panel-title"><i class="fas fa-chart-bar"></i> Estimations${styleLabel}</div>
    ${renderCalcBar('og',  og,     rng.og  || null, CALC_PARAMS.og)}
    ${renderCalcBar('fg',  fg,     rng.fg  || null, CALC_PARAMS.fg)}
    ${renderCalcBar('abv', abv,    rng.abv || null, CALC_PARAMS.abv)}
    ${renderCalcBar('ibu', ibuVal, rng.ibu || null, CALC_PARAMS.ibu)}
    ${renderCalcBar('ebc', ebcVal, rng.ebc || null, CALC_PARAMS.ebc)}
    ${costHtml}
  </div>`;
}

// ── BJCP search (champ style recette) ────────────────────────────────────────
function bjcpSearch(input) {
  const q   = input.value.toLowerCase().trim();
  const sug = document.getElementById('bjcp-sug');
  closeBjcpSuggest();
  let html = '';
  let count = 0;

  // Styles courants en premier
  const commonMatches = [];
  for (const types of Object.values(BEER_TYPES)) {
    types.forEach(t => { if (!q || t.toLowerCase().includes(q)) commonMatches.push(t); });
  }
  if (commonMatches.length) {
    html += `<div class="ing-suggest-cat">Styles courants</div>`;
    commonMatches.slice(0, q ? 30 : 10).forEach(t => {
      html += `<div class="ing-suggest-item" onmousedown="selectBjcp(${JSON.stringify(t).replace(/"/g,'&quot;')},0)"><span>${esc(t)}</span></div>`;
      count++;
    });
  }

  // Styles BJCP depuis la DB
  const bycat = _bjcpByCategory(s => !q || s.name.toLowerCase().includes(q) || s.category.toLowerCase().includes(q));
  for (const [cat, styles] of Object.entries(bycat)) {
    html += `<div class="ing-suggest-cat" style="color:var(--gold)">BJCP — ${esc(cat)}</div>`;
    styles.forEach(s => {
      html += `<div class="ing-suggest-item" onmousedown="selectBjcp(${JSON.stringify(s.name).replace(/"/g,'&quot;')},${s.id})"><span style="font-size:.83rem">${esc(s.name)}</span></div>`;
      count++;
    });
    if (!q && count > 50) break;
  }
  if (!html) return;
  sug.innerHTML = html;
  sug.classList.add('open');
}

let _spindleChart = null;

function spindleAge(dateStr) {
  if (!dateStr) return { color: 'var(--muted)', label: 'Aucune donnée', fresh: false };
  const d = new Date(dateStr.replace(' ', 'T'));
  if (isNaN(d.getTime())) return { color: 'var(--muted)', label: '—', fresh: false };
  const mins = (Date.now() - d.getTime()) / 60000;
  const hrs  = mins / 60;
  let label;
  if (mins < 2)       label = 'À l\'instant';
  else if (mins < 60) label = Math.round(mins) + ' min';
  else if (hrs < 5)   label = Math.round(hrs) + ' h ' + (Math.round(mins) % 60 ? Math.round(mins) % 60 + ' min' : '');
  else                label = Math.round(hrs) + ' h';
  const color = hrs < 1 ? 'var(--success)' : hrs < 5 ? '#f59e0b' : 'var(--danger)';
  return { color, label: label.trim(), fresh: hrs < 1 };
}

function renderSpindles() {
  const grid  = document.getElementById('spindle-grid');
  const empty = document.getElementById('spindle-empty');
  const statsEl = document.getElementById('spin-stats');
  const nb = document.getElementById('nb-spin');
  if (nb) nb.textContent = S.spindles.length;

  const linked = S.spindles.filter(s => s.brew_id).length;
  const total  = S.spindles.reduce((a, s) => a + (s.reading_count || 0), 0);
  statsEl.innerHTML = `
    <div class="stat"><div class="stat-val">${S.spindles.length}</div><div class="stat-lbl">Densimètres</div></div>
    <div class="stat"><div class="stat-val">${linked}</div><div class="stat-lbl">Liés à un brassin</div></div>
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Mesures totales</div></div>`;

  if (!S.spindles.length) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = S.spindles.map(s => {
    const batV   = s.last_battery;
    const batPct = batV != null ? Math.min(100, Math.max(0, Math.round((batV - 3.0) / (4.2 - 3.0) * 100))) : null;
    const batColor = batPct == null ? 'var(--muted)' : batPct > 50 ? 'var(--success)' : batPct > 20 ? '#f59e0b' : 'var(--danger)';
    const lastAt = fmtReadingDate(s.last_reading_at);
    const gravStr = s.last_gravity    != null ? s.last_gravity.toFixed(3)    : '—';

      : '';

    const age = spindleAge(s.last_reading_at);
    const otherLinkedIds = new Set(S.spindles.filter(sp => sp.brew_id && sp.id !== s.id).map(sp => sp.brew_id));
    const activeBrews = S.brews.filter(b => !b.archived && b.status !== 'completed' && !otherLinkedIds.has(b.id));

      <div class="spindle-card" style="border-color:${age.color}44">

          <div style="display:flex;align-items:center;gap:6px">
            <span class="spindle-age-badge${age.fresh ? ' spindle-age-pulse' : ''}" style="color:${age.color};background:${age.color}1a;border-color:${age.color}55" title="Dernière réception : ${lastAt}">
              <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${age.color};flex-shrink:0"></span>
              ${age.label}

            <button class="btn btn-ghost btn-sm btn-icon" onclick="showSpindleToken(${s.id})" title="Voir le token / URL iSpindel"><i class="fas fa-key"></i></button>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="openSpindleChart(${s.id})" title="Voir le graphique"><i class="fas fa-chart-line"></i></button>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="openSpindleEditModal(${s.id})" title="Modifier"><i class="fas fa-pen"></i></button>
            <button class="btn btn-danger btn-sm btn-icon" onclick="deleteSpindle(${s.id})" title="Supprimer"><i class="fas fa-trash"></i></button>
          </div>
        </div>
        <div class="spindle-metrics">
          <div class="spindle-metric">
            <div class="spindle-metric-val">${gravStr}</div>
            <div class="spindle-metric-lbl">Gravité</div>
          </div>
          <div class="spindle-metric">
            <div class="spindle-metric-val">${tempStr}</div>
            <div class="spindle-metric-lbl">Température</div>
          </div>

      </div>`;
  }).join('');

async function saveSpindle() {
  const name = document.getElementById('spin-f-name').value.trim();
  if (!name) { toast('Nom requis', 'error'); return; }
  const notes = document.getElementById('spin-f-notes').value.trim() || null;

  // ── Mode édition ──
  if (_editSpindleId !== null) {
    try {
      const updated = await api('PATCH', `/api/spindles/${_editSpindleId}`, { name, notes });
      const idx = S.spindles.findIndex(s => s.id === _editSpindleId);
      if (idx !== -1) S.spindles[idx] = updated;
      renderSpindles();
      closeModal('spindle-modal');
      toast('Densimètre mis à jour', 'success');
    } catch(e) { toast('Erreur mise à jour', 'error'); }
    return;
  }

  // ── Mode création ──
  try {
    const sp = await api('POST', '/api/spindles', { name, notes });
    S.spindles.unshift(sp);
    renderSpindles();
    document.getElementById('spindle-token-display').textContent = sp.token;
    const host = window.location.origin;
    document.getElementById('spindle-token-url').textContent = `POST ${host}/api/spindle/data?token=${sp.token}`;
    document.getElementById('spindle-token-section').style.display = '';
    document.getElementById('spindle-save-btn').style.display = 'none';
    toast('Densimètre créé', 'success');
  } catch(e) { toast('Erreur création densimètre', 'error'); }
}

function getTzOffset() {
  return parseFloat((appSettings.tz_offset !== undefined ? appSettings.tz_offset : 0)) || 0;
}
function fmtReadingDate(dateStr) {
  if (!dateStr) return '—';
  // SQLite renvoie '2024-01-15 14:30:00' — remplacer l'espace par T pour un parsing ISO fiable
  const d = new Date(dateStr.replace(' ', 'T'));
  if (isNaN(d.getTime())) return dateStr;
  d.setHours(d.getHours() + getTzOffset());
  return d.toLocaleString('fr-FR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
}
function saveTzOffset() {
  const v = parseFloat(document.getElementById('tz-offset')?.value);
  appSettings.tz_offset = isNaN(v) ? 0 : v;
  saveSettings();
  renderSpindles();
  renderBrassins();
  toast('Fuseau horaire enregistré', 'success');
}

async function loadSpindleStats() {
  try {
    const stats = await api('GET', '/api/spindle/readings/stats');
    const el = document.getElementById('spin-db-stats');
    if (!el) return;
    const kb = Math.round((stats.db_size || 0) / 1024);
    const size = kb > 1024 ? (kb / 1024).toFixed(1) + ' Mo' : kb + ' Ko';
    const oldest = stats.oldest ? new Date(stats.oldest).toLocaleDateString('fr-FR') : '—';
    el.textContent = `${(stats.total || 0).toLocaleString('fr-FR')} mesures · ${size} · depuis le ${oldest}`;
  } catch(e) {}
}

async function purgeReadings() {
  const days = parseInt(document.getElementById('purge-days')?.value || '30');
  if (!confirm(`Supprimer toutes les mesures de plus de ${days} jour(s) ?`)) return;
  try {
    const r = await api('DELETE', `/api/spindle/readings/purge?days=${days}`);
    toast(`${r.deleted} mesure(s) supprimée(s), ${r.remaining} restante(s)`, 'success');
    S.spindles = await api('GET', '/api/spindles');
    renderSpindles();
    loadSpindleStats();
  } catch(e) { toast('Erreur lors de la purge', 'error'); }
}

function downloadJson(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// WATER CORRECTION
// ══════════════════════════════════════════════════════════════════════════════

// mg of each ion contributed per gram of mineral added to 1 L
const WC_MINERAL_FX = {
  'Sulfate de calcium':    { ca: 232.8, mg: 0,    na: 0,     so4: 557.9,  cl: 0,     hco3: 0      },
  'Sulfate de magnésium':  { ca: 0,     mg: 98.6, na: 0,     so4: 389.8,  cl: 0,     hco3: 0      },
  'Chlorure de calcium':   { ca: 361.2, mg: 0,    na: 0,     so4: 0,      cl: 638.9, hco3: 0      },
  'Chlorure de sodium':    { ca: 0,     mg: 0,    na: 393.3, so4: 0,      cl: 606.5, hco3: 0      },
  'Carbonate de calcium':  { ca: 400.4, mg: 0,    na: 0,     so4: 0,      cl: 0,     hco3: 1218.0 },
  'Bicarbonate de sodium': { ca: 0,     mg: 0,    na: 273.7, so4: 0,      cl: 0,     hco3: 726.4  },
};

// mL of acid needed to neutralize 1 mEq of total alkalinity
// mEq_total = Δ_HCO3_ppm * volume_L / 61.0
const WC_ACID_FX = {
  'Acide lactique 80%':     0.09306,
  'Acide lactique 88%':     0.08461,
  'Acide phosphorique 75%': 0.08277,
  'Acide phosphorique 85%': 0.06826,
};

// Classic water profiles (mg/L)
const WC_PRESETS = {
  neutre:     { ca: 0,   mg: 0,  na: 0,  so4: 0,   cl: 0,   hco3: 0   },
  pilsen:     { ca: 7,   mg: 3,  na: 2,  so4: 5,   cl: 5,   hco3: 15  },
  munich:     { ca: 75,  mg: 18, na: 5,  so4: 45,  cl: 40,  hco3: 200 },
  vienne:     { ca: 200, mg: 60, na: 8,  so4: 120, cl: 12,  hco3: 120 },
  dortmund:   { ca: 225, mg: 40, na: 60, so4: 120, cl: 60,  hco3: 180 },
  london:     { ca: 90,  mg: 5,  na: 15, so4: 50,  cl: 50,  hco3: 140 },
  burton:     { ca: 275, mg: 40, na: 25, so4: 610, cl: 35,  hco3: 270 },
  dublin:     { ca: 118, mg: 12, na: 12, so4: 54,  cl: 19,  hco3: 315 },
  edinburgh:  { ca: 100, mg: 20, na: 55, so4: 140, cl: 60,  hco3: 280 },
  equilibre:  { ca: 75,  mg: 5,  na: 25, so4: 75,  cl: 75,  hco3: 50  },
  ipa:        { ca: 150, mg: 10, na: 10, so4: 300, cl: 55,  hco3: 0   },
  stout:      { ca: 100, mg: 10, na: 35, so4: 50,  cl: 75,  hco3: 300 },
};

function toggleWaterCorrection() {
  const panel = document.getElementById('rec-wc-panel');
  const btn   = document.getElementById('btn-wc');
  const open  = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : '';
  btn.classList.toggle('open', !open);
  if (!open) renderWaterCorrection();
}

function renderWaterCorrection() {
  const w = appSettings.water || {};
  const srcEl = document.getElementById('wc-source-display');
  const hasSrc = ['ca','mg','na','so4','cl','hco3'].some(k => w[k] != null && w[k] !== '');
  if (!hasSrc) {
    srcEl.innerHTML = '<span style="color:var(--danger)"><i class="fas fa-triangle-exclamation"></i> Aucun profil configuré — <strong>Paramètres → Eau</strong></span>';
  } else {
    const fmt = (v, u) => `<strong>${parseFloat(v) || 0}</strong><span style="color:var(--muted);font-size:.72rem"> ${u}</span>`;
    srcEl.innerHTML = [
      `pH ${fmt(w.ph, '')}`,
      `Ca²⁺ ${fmt(w.ca, 'mg/L')}`,
      `Mg²⁺ ${fmt(w.mg, 'mg/L')}`,
      `Na⁺ ${fmt(w.na, 'mg/L')}`,
      `SO₄²⁻ ${fmt(w.so4, 'mg/L')}`,
      `Cl⁻ ${fmt(w.cl, 'mg/L')}`,
      `HCO₃⁻ ${fmt(w.hco3, 'mg/L')}`,
    ].join(' &nbsp;·&nbsp; ');
  }
  // Auto-fill volume from recipe calculation
  const volEl = document.getElementById('wc-volume');
  if (!volEl.value) {
    const totalEl = document.getElementById('rw-total');
    const v = totalEl ? parseFloat(totalEl.textContent) : NaN;
    volEl.value = !isNaN(v) ? v.toFixed(1) : (parseFloat(document.getElementById('rec-volume')?.value) || 20);
  }
  calcWaterCorrection();
}

function wcPreset(name) {
  const p = WC_PRESETS[name];
  if (!p) return;
  ['ca','mg','na','so4','cl','hco3'].forEach(k => {
    const el = document.getElementById(`wc-t-${k}`);
    if (el) el.value = p[k];
  });
  calcWaterCorrection();
}

function calcWaterCorrection() {
  const vol = parseFloat(document.getElementById('wc-volume')?.value) || 0;
  if (vol <= 0) return;

  const w = appSettings.water || {};
  const s = { ca: parseFloat(w.ca)||0, mg: parseFloat(w.mg)||0, na: parseFloat(w.na)||0,
               so4: parseFloat(w.so4)||0, cl: parseFloat(w.cl)||0, hco3: parseFloat(w.hco3)||0 };

  const readT = id => { const v = parseFloat(document.getElementById(id)?.value); return isNaN(v) ? null : v; };
  const t = { ca: readT('wc-t-ca'), mg: readT('wc-t-mg'), na: readT('wc-t-na'),
              so4: readT('wc-t-so4'), cl: readT('wc-t-cl'), hco3: readT('wc-t-hco3'),
              ph: readT('wc-t-ph') };

  if (!['ca','mg','na','so4','cl','hco3'].some(k => t[k] !== null)) {
    document.getElementById('wc-results').style.display = 'none';
    return;
  }

  const IONS = ['ca','mg','na','so4','cl','hco3'];
  const delta = {};
  IONS.forEach(k => { delta[k] = t[k] !== null ? t[k] - s[k] : 0; });

  // Remaining deficits (minerals can only add ions, not remove)
  const rem = {};
  IONS.forEach(k => { rem[k] = Math.max(0, delta[k]); });

  const doses = {
    'Sulfate de magnésium': 0, 'Sulfate de calcium': 0,
    'Chlorure de calcium':  0, 'Chlorure de sodium': 0,
    'Bicarbonate de sodium':0, 'Carbonate de calcium': 0,
  };

  // Step 1 – Mg deficit → MgSO4 (also contributes SO4)
  if (rem.mg > 0) {
    const gPL = rem.mg / 98.6;
    doses['Sulfate de magnésium'] = gPL * vol;
    rem.so4 = Math.max(0, rem.so4 - gPL * 389.8);
    rem.mg  = 0;
  }
  // Step 2 – SO4 deficit → CaSO4 (also contributes Ca)
  if (rem.so4 > 0) {
    const gPL = rem.so4 / 557.9;
    doses['Sulfate de calcium'] = gPL * vol;
    rem.ca  = Math.max(0, rem.ca - gPL * 232.8);
    rem.so4 = 0;
  }
  // Step 3 – Ca deficit → CaCl2 (also contributes Cl)
  if (rem.ca > 0) {
    const gPL = rem.ca / 361.2;
    doses['Chlorure de calcium'] = gPL * vol;
    rem.cl = Math.max(0, rem.cl - gPL * 638.9);
    rem.ca = 0;
  }
  // Step 4 – Cl deficit → NaCl (also contributes Na)
  if (rem.cl > 0) {
    const gPL = rem.cl / 606.5;
    doses['Chlorure de sodium'] = gPL * vol;
    rem.na = Math.max(0, rem.na - gPL * 393.3);
    rem.cl = 0;
  }
  // Step 5 – HCO3 deficit: prefer NaHCO3 when Na also deficient, then CaCO3
  if (rem.hco3 > 0) {
    if (rem.na > 0) {
      const use = Math.min(rem.hco3, rem.na / 273.7 * 726.4);
      const gPL = use / 726.4;
      doses['Bicarbonate de sodium'] = gPL * vol;
      rem.na   = Math.max(0, rem.na - gPL * 273.7);
      rem.hco3 -= use;
    }
    if (rem.hco3 > 0) {
      doses['Carbonate de calcium'] = (rem.hco3 / 1218.0) * vol;
      rem.hco3 = 0;
    }
  }
  // Step 6 – Na still deficient → NaHCO3 (adds bonus HCO3)
  if (rem.na > 0) {
    doses['Bicarbonate de sodium'] += (rem.na / 273.7) * vol;
    rem.na = 0;
  }

  // Acid for HCO3 excess (target < source → need to acidify)
  const hco3Excess = t.hco3 !== null ? Math.max(0, s.hco3 - t.hco3) : 0;
  const acidDoses = {};
  if (hco3Excess > 0) {
    const totalMeq = hco3Excess * vol / 61.0;
    Object.entries(WC_ACID_FX).forEach(([acid, mlPerMeq]) => {
      acidDoses[acid] = totalMeq * mlPerMeq;
    });
  }

  // Resulting profile
  const result = { ...s };
  Object.entries(doses).forEach(([mineral, totalG]) => {
    if (totalG <= 0) return;
    const gPL = totalG / vol;
    const fx  = WC_MINERAL_FX[mineral];
    IONS.forEach(k => { result[k] += gPL * fx[k]; });
  });
  if (hco3Excess > 0) result.hco3 = Math.max(0, result.hco3 - hco3Excess);

  _renderWCResults(s, t, delta, doses, acidDoses, result);
}

function _renderWCResults(s, t, delta, doses, acidDoses, result) {
  const ION_META = [
    { k: 'ca',   label: 'Ca²⁺'  },
    { k: 'mg',   label: 'Mg²⁺'  },
    { k: 'na',   label: 'Na⁺'   },
    { k: 'so4',  label: 'SO₄²⁻' },
    { k: 'cl',   label: 'Cl⁻'   },
    { k: 'hco3', label: 'HCO₃⁻' },
  ];

  // ── Ion balance table ──
  let html = `
    <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px">Bilan ionique (mg/L)</div>
    <div style="overflow-x:auto;margin-bottom:14px">
    <table style="width:100%;font-size:.8rem;border-collapse:collapse;min-width:380px">
      <thead><tr style="color:var(--muted);border-bottom:1px solid var(--border)">
        <th style="text-align:left;padding:3px 8px">Ion</th>
        <th style="text-align:right;padding:3px 8px">Source</th>
        <th style="text-align:right;padding:3px 8px">Cible</th>
        <th style="text-align:right;padding:3px 8px">Δ</th>
        <th style="text-align:right;padding:3px 8px">Résultant</th>
      </tr></thead><tbody>`;

  ION_META.forEach(({ k, label }) => {
    const src = s[k] ?? 0;
    const tgt = t[k];
    const res = result[k] ?? 0;
    const hasTgt = tgt !== null;
    const d = hasTgt ? delta[k] : null;
    const dStr  = d === null ? '–' : (d >= 0 ? `+${d.toFixed(0)}` : d.toFixed(0));
    const dCol  = d === null ? '' : d > 0 ? 'color:var(--info)' : d < 0 ? 'color:var(--danger)' : '';
    const diff  = hasTgt ? Math.abs(res - tgt) : null;
    const resCol= diff === null ? '' : diff < 5 ? 'color:var(--success)' : diff < 15 ? 'color:var(--amber)' : 'color:var(--danger)';
    // Warning when source already exceeds target
    const exceeded = hasTgt && tgt !== null && src > tgt + 1;
    html += `
      <tr style="border-bottom:1px solid var(--border)22">
        <td style="padding:3px 8px;font-weight:600">${label}</td>
        <td style="text-align:right;padding:3px 8px">${src.toFixed(0)}</td>
        <td style="text-align:right;padding:3px 8px">${hasTgt ? tgt.toFixed(0) : '–'}</td>
        <td style="text-align:right;padding:3px 8px;${dCol}">${dStr}${exceeded ? ' <i class="fas fa-circle-exclamation" style="color:var(--amber);font-size:.7rem" title="Source dépasse la cible — dilution nécessaire"></i>' : ''}</td>
        <td style="text-align:right;padding:3px 8px;font-weight:700;${resCol}">${res.toFixed(1)}</td>
      </tr>`;
  });

  // SO4/Cl ratio
  const ratioVal  = (result.cl > 0) ? result.so4 / result.cl : result.so4;
  const ratioLbl  = ratioVal > 2 ? 'Houblons favorisés' : ratioVal < 0.5 ? 'Malts favorisés' : 'Équilibré';
  const ratioCol  = ratioVal > 2 ? 'var(--hop)' : ratioVal < 0.5 ? 'var(--malt)' : 'var(--success)';
  html += `
    <tr style="border-top:1px solid var(--border);background:rgba(255,255,255,.03)">
      <td colspan="4" style="padding:3px 8px;font-size:.74rem;color:var(--muted)">Ratio SO₄/Cl</td>
      <td style="text-align:right;padding:3px 8px;font-weight:700;color:${ratioCol}">${ratioVal.toFixed(2)} — ${ratioLbl}</td>
    </tr>`;
  html += `</tbody></table></div>`;

  // ── Mineral doses ──
  const activeMinerals = Object.entries(doses).filter(([, g]) => g >= 0.05);
  html += `<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px"><i class="fas fa-flask"></i> Minéraux à ajouter</div>`;
  if (!activeMinerals.length) {
    html += `<p style="font-size:.8rem;color:var(--muted);font-style:italic;margin-bottom:12px">Aucun ajout minéral nécessaire.</p>`;
  } else {
    html += `<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">`;
    activeMinerals.forEach(([mineral, grams]) => {
      html += `
        <div style="display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 10px">
          <span style="flex:1;font-size:.83rem">${mineral}</span>
          <span style="font-weight:700;color:var(--amber);min-width:58px;text-align:right">${grams.toFixed(2)} g</span>
          <button class="btn btn-sm btn-ghost" style="padding:2px 8px;white-space:nowrap"
            onclick="wcAddToRecipe('${mineral}',${grams.toFixed(2)},'g')">
            <i class="fas fa-plus"></i> Recette
          </button>
        </div>`;
    });
    html += `</div>`;
  }

  // ── Acid doses ──
  const activeAcids = Object.entries(acidDoses).filter(([, mL]) => mL >= 0.05);
  if (activeAcids.length) {
    html += `<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--danger);margin-bottom:6px"><i class="fas fa-vial"></i> Acides pour réduire l'alcalinité — <em style="font-style:normal;color:var(--muted)">choisir un seul</em></div>`;
    html += `<div style="display:flex;flex-direction:column;gap:5px">`;
    activeAcids.forEach(([acid, mL]) => {
      html += `
        <div style="display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 10px">
          <span style="flex:1;font-size:.83rem">${acid}</span>
          <span style="font-weight:700;color:var(--amber);min-width:58px;text-align:right">${mL.toFixed(1)} mL</span>
          <button class="btn btn-sm btn-ghost" style="padding:2px 8px;white-space:nowrap"
            onclick="wcAddToRecipe('${acid}',${mL.toFixed(1)},'mL')">
            <i class="fas fa-plus"></i> Recette
          </button>
        </div>`;
    });
    html += `</div>`;
  }

  const div = document.getElementById('wc-results');
  div.innerHTML = html;
  div.style.display = 'block';
}

function wcAddToRecipe(name, qty, unit) {
  // Update if already present, otherwise add new row
  const existing = recIngredients.find(i => i.name === name && i.category === 'autre');
  if (existing) {
    existing.quantity = qty;
    existing.unit     = unit;
    renderIngredientRows();
    toast(`${name} mis à jour dans les ingrédients`, 'info');
    return;
  }
  const rid = ++ingRowId;
  recIngredients.push({
    _rid: rid, category: 'autre', inventory_item_id: null,
    name, quantity: qty, unit,
    hop_type: null, other_type: 'ebullition', other_time: null, notes: '',
  });
  renderIngredientRows();
  toast(`${name} ajouté aux ingrédients`, 'success');
}

// binary=true : content est déjà du base64 pur (image), pas besoin d'encoder
async function pushToGithub(repo, pat, branch, filePath, content, message, binary = false) {
  const base = `https://api.github.com/repos/${repo}/contents/${filePath}`;
  const headers = {
    'Authorization': `Bearer ${pat}`,
    'Accept': 'application/vnd.github+json',
    'Content-Type': 'application/json',
  };

  // Récupérer le SHA si le fichier existe déjà
  let sha;
  try {
    const getRes = await fetch(`${base}?ref=${encodeURIComponent(branch)}`, { headers });
    if (getRes.ok) { sha = (await getRes.json()).sha; }
  } catch(_) {}

  const encoded = binary ? content : btoa(unescape(encodeURIComponent(content)));
  const body = { message, content: encoded, branch };
  if (sha) body.sha = sha;

  const putRes = await fetch(base, { method: 'PUT', headers, body: JSON.stringify(body) });
  if (!putRes.ok) {
    const err = await putRes.json().catch(() => ({ message: putRes.statusText }));
    throw new Error(err.message || putRes.statusText);
  }
  return putRes.json();
}

// Extrait le base64 pur et l'extension depuis un data URL (ex: data:image/jpeg;base64,...)
function _parsePhotoDataUrl(dataUrl) {
  if (!dataUrl) return null;
  const m = dataUrl.match(/^data:image\/(\w+);base64,(.+)$/s);
  if (!m) return null;
  const ext = m[1] === 'jpeg' ? 'jpg' : m[1];
  return { ext, b64: m[2] };
}

function _vEsc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function _vDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' }); }
  catch(_) { return iso; }
}

function generateVitrineHtml(beers, photoMap) {
  const date   = new Date().toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' });
  const total33 = beers.reduce((s, b) => s + (b.stock_33cl || 0), 0);
  const total75 = beers.reduce((s, b) => s + (b.stock_75cl || 0), 0);

  const cards = beers.map(b => {
    const photo  = photoMap && photoMap[b.id];
    const imgSrc = photo ? `images/beer-${b.id}.${photo.ext}` : null;
    const abv    = b.abv != null ? `${parseFloat(b.abv).toFixed(1)} %` : null;
    const s33    = b.stock_33cl  ?? 0;
    const s75    = b.stock_75cl  ?? 0;
    const i33    = b.initial_33cl > 0 ? b.initial_33cl : 0;
    const i75    = b.initial_75cl > 0 ? b.initial_75cl : 0;
    const pct33  = i33 > 0 ? Math.round(Math.min(100, s33 / i33 * 100)) : -1;
    const pct75  = i75 > 0 ? Math.round(Math.min(100, s75 / i75 * 100)) : -1;

    const cls33  = s33 === 0 ? 'zero' : pct33 >= 0 && pct33 <= 40 ? 'low' : 'ok';
    const cls75  = s75 === 0 ? 'zero' : pct75 >= 0 && pct75 <= 40 ? 'low' : 'ok';

    const stockItem = (count, label, cls, pct) => `
      <div class="si ${cls}">
        <div class="si-n">${count > 0 ? count : '–'}</div>
        <div class="si-l">${label}</div>
        ${count > 0 && pct >= 0 ? `<div class="si-bar"><div class="si-fill" style="width:${pct}%"></div></div>` : ''}
        ${count === 0 ? `<div class="si-empty">épuisé</div>` : ''}
      </div>`;

    const brewInfo = [
      b.brew_date     ? `🍺 Brassé le ${_vDate(b.brew_date)}`          : '',
      b.bottling_date ? `🍾 Embouteillé le ${_vDate(b.bottling_date)}` : '',
      b.recipe_name   ? `📋 ${_vEsc(b.recipe_name)}`                   : '',
    ].filter(Boolean);

    return `
    <div class="card">
      ${imgSrc
        ? `<img class="card-img" src="${imgSrc}" loading="lazy" alt="${_vEsc(b.name)}" onclick="openLb(this,'${_vEsc(b.name)}')">`
        : `<div class="card-img-ph">🍺</div>`}
      <div class="card-body">
        <div class="card-name">${_vEsc(b.name)}</div>
        ${b.type ? `<div class="card-type">${_vEsc(b.type)}</div>` : ''}
        ${abv    ? `<div class="card-abv">ABV <strong>${abv}</strong></div>` : ''}
        <div class="stock-row">
          ${stockItem(s33, '33 cl', cls33, pct33)}
          <div class="stock-sep"></div>
          ${stockItem(s75, '75 cl', cls75, pct75)}
        </div>
        ${b.origin      ? `<div class="card-origin">📍 ${_vEsc(b.origin)}</div>` : ''}
        ${b.description ? `<p class="card-desc">${_vEsc(b.description)}</p>` : ''}
        ${brewInfo.length ? `<div class="card-foot">${brewInfo.join('<span class="sep">·</span>')}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  return `<!DOCTYPE html>
<html lang="fr">

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ma cave à bières</title>

.stat-val{font-size:1.7rem;font-weight:800;color:var(--amber);line-height:1}
.stat-lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px;max-width:1200px;margin:0 auto;padding:0 16px 60px}

<div id="lb" onclick="closeLb()">

}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

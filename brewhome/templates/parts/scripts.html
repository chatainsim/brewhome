async function pushVitrine() {
  saveGithubSettings();
  const cfg = (appSettings.github || {}).vitrine || {};
  if (!cfg.repo || !cfg.pat) { toast('Renseignez le dépôt et le PAT vitrine', 'error'); return; }

  // S'assurer que les bières sont chargées
  if (!S.beers.length) {
    try { S.beers = await api('GET', '/api/beers'); } catch(e) {}
  }
  const beers   = S.beers.filter(b => !b.archived);
  const dateStr = new Date().toISOString().slice(0, 10);

  // Construire la map des photos (id → {ext, b64})
  const photoMap = {};
  beers.forEach(b => {
    const p = _parsePhotoDataUrl(b.photo);
    if (p) photoMap[b.id] = p;
  });

  const html = generateVitrineHtml(beers, photoMap);
  const json = JSON.stringify(beers, null, 2);

  // Les fichiers sont poussés séquentiellement : chaque push crée un commit et
  // déplace le ref de la branche ; un push parallèle recevrait un SHA périmé.
  try {
    const files = [
      { path: 'index.html', content: html, msg: `vitrine: mise à jour ${dateStr}` },
      { path: 'beers.json', content: json, msg: `vitrine: beers.json ${dateStr}` },
      ...Object.entries(photoMap).map(([id, { ext, b64 }]) => ({
        path: `images/beer-${id}.${ext}`, content: b64,
        msg: `vitrine: photo bière #${id}`, binary: true,
      })),
    ];
    for (const f of files) {
      await pushToGithub(cfg.repo, cfg.pat, cfg.branch, f.path, f.content, f.msg, f.binary || false);
    }
    const nPhotos = Object.keys(photoMap).length;
    toast(`Vitrine poussée ✓ — ${beers.length} bière(s)${nPhotos ? `, ${nPhotos} photo(s)` : ''}`, 'success');
  } catch(e) {
    toast(`Erreur vitrine : ${e.message}`, 'error');
  }
}

async function pushGithubData() {
  saveGithubSettings();
  const cfg = (appSettings.github || {}).data || {};
  if (!cfg.repo || !cfg.pat) {
    toast('Renseignez le dépôt et le PAT données', 'error');
    return;
  }
  const dateStr = new Date().toISOString().slice(0,10);
  try {
    // Fetch all data in parallel (pas de conflit GitHub ici)
    const [inv, rec, brews, beers, spindles] = await Promise.all([
      api('GET', '/api/export/inventory'),
      api('GET', '/api/export/recipes'),
      api('GET', '/api/export/brews'),
      api('GET', '/api/export/beers'),
      api('GET', '/api/export/spindles'),
    ]);
    // Push séquentiel pour éviter les conflits de SHA sur la même branche
    await pushToGithub(cfg.repo, cfg.pat, cfg.branch, 'inventaire.json',  JSON.stringify(inv,      null, 2), `backup: inventaire ${dateStr}`);
    await pushToGithub(cfg.repo, cfg.pat, cfg.branch, 'recettes.json',    JSON.stringify(rec,      null, 2), `backup: recettes ${dateStr}`);
    await pushToGithub(cfg.repo, cfg.pat, cfg.branch, 'brassins.json',    JSON.stringify(brews,    null, 2), `backup: brassins ${dateStr}`);
    await pushToGithub(cfg.repo, cfg.pat, cfg.branch, 'cave.json',        JSON.stringify(beers,    null, 2), `backup: cave ${dateStr}`);
    await pushToGithub(cfg.repo, cfg.pat, cfg.branch, 'densimetres.json', JSON.stringify(spindles, null, 2), `backup: densimètres ${dateStr}`);
    toast('Données poussées sur GitHub ✓ (inventaire, recettes, brassins, cave, densimètres)', 'success');
  } catch(e) {
    toast(`Erreur données : ${e.message}`, 'error');
  }
}

// THÈME

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('brewhome-theme', next);
  _updateThemeBtn(next);
}
function _updateThemeBtn(theme) {
  const btn = document.getElementById('btn-theme');
  if (!btn) return;
  if (theme === 'light') {
    btn.innerHTML = '<i class="fas fa-moon"></i>';
    btn.title = 'Passer en thème sombre';
  } else {
    btn.innerHTML = '<i class="fas fa-sun"></i>';
    btn.title = 'Passer en thème clair';
  }
}

// ══════════════════════════════════════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

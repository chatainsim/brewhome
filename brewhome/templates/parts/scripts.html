<script>
// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
const S = { inventory: [], recipes: [], brews: [], beers: [], catalog: [], bjcp: [], spindles: [] };
let invFilter = 'all';
let showArchivedInv=false, showArchivedRec=false, showArchivedBrew=false, showArchivedCave=false;
let appSettings = JSON.parse(localStorage.getItem('brewSettings') || '{}');
const DEFAULT_THRESH = {malt:1000, houblon:50, levure:2, autre:100};
function getThresh(cat) { return ((appSettings.thresholds||{})[cat] ?? DEFAULT_THRESH[cat]); }
function saveSettings() { localStorage.setItem('brewSettings', JSON.stringify(appSettings)); }
// Normalise une quantité vers l'unité de base de sa dimension
function toBaseVal(qty, unit) {
  if (unit === 'kg')  return { v: qty * 1000, dim: 'weight' };
  if (unit === 'g')   return { v: qty,        dim: 'weight' };
  if (unit === 'L')   return { v: qty * 1000, dim: 'volume' };
  if (unit === 'mL')  return { v: qty,        dim: 'volume' };
  return { v: qty, dim: 'count' }; // pièce, sachet, unité, …
}
let settingsCat = 'malt';
let recSort = 'recent';
const STAR_LABELS = ['Non noté', 'Passable', 'Correct', 'Bon', 'Très bon', 'Excellent'];
let recEditingId = null;
let recViewMode  = 'edit'; // 'view' | 'edit'
let recIngredients = []; // [{id,category,inventory_item_id,name,quantity,unit,...}]
let _invSugItems = []; // cache for inventory suggest clicks
let _rSugItems   = []; // cache for recipe ingredient suggest clicks

// ══════════════════════════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({ error: r.statusText }));
    throw err;
  }
  return r.json();
}

// ══════════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════════════════════
function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  window.scrollTo(0, 0);
  _refreshPage(page);
}

async function _refreshPage(page) {
  try {
    if (page === 'inventaire') {
      S.inventory = await api('GET', '/api/inventory');
      renderInventaire();
    } else if (page === 'recettes') {
      S.recipes = await api('GET', '/api/recipes');
      renderRecipeList();
    } else if (page === 'brassins') {
      [S.brews, S.spindles] = await Promise.all([
        api('GET', '/api/brews'),
        api('GET', '/api/spindles'),
      ]);
      renderBrassins();
    } else if (page === 'cave') {
      S.beers = await api('GET', '/api/beers');
      renderCave();
    } else if (page === 'spindles') {
      S.spindles = await api('GET', '/api/spindles');
      renderSpindles();
    }
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
  } catch(e) { /* refresh silencieux */ }
}

// ══════════════════════════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════════════════════════
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':type==='error'?'circle-xmark':'circle-info'}"></i> ${msg}`;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ══════════════════════════════════════════════════════════════════════════════
// ARCHIVE
// ══════════════════════════════════════════════════════════════════════════════
async function archiveItem(entity, id, archived) {
  const paths = {inv:'inventory', rec:'recipes', brew:'brews', cave:'beers'};
  try {
    const updated = await api('PATCH', `/api/${paths[entity]}/${id}`, {archived});
    const arr = {inv:S.inventory, rec:S.recipes, brew:S.brews, cave:S.beers}[entity];
    const idx = arr.findIndex(x=>x.id===id);
    if(idx!==-1) arr[idx] = {...arr[idx], archived: archived?1:0};
    ({inv:renderInventaire, rec:renderRecipeList, brew:renderBrassins, cave:renderCave})[entity]();
    toast(archived ? 'Archivé' : 'Désarchivé', 'success');
  } catch(e) { toast('Erreur archivage', 'error'); }
}

function toggleShowArchived(section) {
  if(section==='inv')  { showArchivedInv  = !showArchivedInv;  renderInventaire(); }
  if(section==='rec')  { showArchivedRec  = !showArchivedRec;  renderRecipeList(); }
  if(section==='brew') { showArchivedBrew = !showArchivedBrew; renderBrassins();   }
  if(section==='cave') { showArchivedCave = !showArchivedCave; renderCave();       }
}

// ══════════════════════════════════════════════════════════════════════════════
// SETTINGS MODAL
// ══════════════════════════════════════════════════════════════════════════════
function openSettings() {
  renderSettingsCatalog(settingsCat);
  renderSettingsThresholds();
  settingsTab('catalogue');
  document.getElementById('modal-settings').classList.add('open');
}
function closeSettings() { document.getElementById('modal-settings').classList.remove('open'); }

function settingsTab(tab) {
  document.querySelectorAll('#modal-settings .stab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('stab-catalogue').style.display  = tab === 'catalogue'  ? '' : 'none';
  document.getElementById('stab-thresholds').style.display = tab === 'thresholds' ? '' : 'none';
  document.getElementById('stab-water').style.display      = tab === 'water'      ? '' : 'none';
  document.getElementById('stab-import').style.display     = tab === 'import'     ? '' : 'none';
  document.getElementById('stab-github').style.display     = tab === 'github'     ? '' : 'none';
  document.getElementById('settings-save-btn').style.display = tab === 'thresholds' ? '' : 'none';
  document.getElementById('github-save-btn').style.display   = tab === 'github'     ? '' : 'none';
  if (tab === 'thresholds') renderSettingsThresholds();
  if (tab === 'water')      renderSettingsWater();
  if (tab === 'github')     renderSettingsGithub();
}

function renderSettingsCatalog(cat) {
  settingsCat = cat;
  document.querySelectorAll('#settings-cat-chips .cat-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.cat === cat);
  });
  const items = S.catalog.filter(c => c.category === cat)
    .sort((a,b) => (a.subcategory||'').localeCompare(b.subcategory||'') || a.name.localeCompare(b.name));
  const list = document.getElementById('settings-catalog-list');
  list.innerHTML = items.length ? items.map(item => _catalogRowHtml(item, cat)).join('')
    : '<div style="color:var(--muted);text-align:center;padding:20px 0;font-size:.87rem">Aucun article dans cette catégorie</div>';
  // Afficher les bons champs selon catégorie
  document.getElementById('scat-ebc-wrap').style.display    = cat === 'malt'    ? '' : 'none';
  document.getElementById('scat-maxpct-wrap').style.display = cat === 'malt'    ? '' : 'none';
  document.getElementById('scat-alpha-wrap').style.display  = cat === 'houblon' ? '' : 'none';
  document.getElementById('scat-ytype-wrap').style.display  = cat === 'levure'  ? '' : 'none';
  document.getElementById('scat-yeast-wrap').style.display  = cat === 'levure'  ? '' : 'none';
  document.getElementById('scat-unit').value = cat === 'malt' ? 'kg' : 'g';
}

function _catalogRowHtml(item, cat) {
  return `
    <div class="catalog-row" id="crow-${item.id}">
      <div style="flex:1">
        <span style="font-weight:600">${esc(item.name)}</span>
        ${item.subcategory ? `<span style="font-size:.78rem;color:var(--muted);margin-left:6px">${esc(item.subcategory)}</span>` : ''}
        ${item.ebc        != null ? `<span class="badge badge-malt"    style="font-size:.68rem;margin-left:4px">EBC ${item.ebc}</span>` : ''}
        ${item.max_usage_pct != null ? `<span class="badge badge-malt" style="font-size:.68rem;margin-left:4px;opacity:.8">max ${item.max_usage_pct}%</span>` : ''}
        ${item.alpha      != null ? `<span class="badge badge-houblon" style="font-size:.68rem;margin-left:4px">α ${item.alpha}%</span>` : ''}
        ${item.yeast_type ? `<span class="badge badge-levure" style="font-size:.68rem;margin-left:4px">${esc(item.yeast_type)}</span>` : ''}
        ${item.temp_min != null || item.temp_max != null ? `<span class="badge badge-levure" style="font-size:.68rem;margin-left:4px;opacity:.8">${item.temp_min??'?'}–${item.temp_max??'?'}°C</span>` : ''}
        ${item.attenuation_min != null || item.attenuation_max != null ? `<span class="badge badge-levure" style="font-size:.68rem;margin-left:4px;opacity:.7">${item.attenuation_min??'?'}–${item.attenuation_max??'?'}%</span>` : ''}
        ${item.alcohol_tolerance != null ? `<span class="badge badge-levure" style="font-size:.68rem;margin-left:4px;opacity:.6">tol. ${item.alcohol_tolerance}%</span>` : ''}
        ${item.dosage_per_liter != null ? `<span class="badge badge-levure" style="font-size:.68rem;margin-left:4px;opacity:.6">${item.dosage_per_liter}g/L</span>` : ''}
        <span style="font-size:.72rem;color:var(--muted);margin-left:6px">[${item.default_unit || 'g'}]</span>
      </div>
      <button class="btn btn-icon btn-ghost btn-sm" onclick="editCatalogInline(${item.id})" title="Modifier"><i class="fas fa-pen"></i></button>
      <button class="btn btn-icon btn-danger btn-sm" onclick="deleteCatalogItem(${item.id})" title="Supprimer"><i class="fas fa-trash"></i></button>
    </div>`;
}

function editCatalogInline(id) {
  const item = S.catalog.find(c => c.id === id);
  if (!item) return;
  const cat = item.category;
  const extraField =
    cat === 'malt'    ? `<input type="number" id="cedit-ebc-${id}"    value="${item.ebc    ?? ''}" step="0.1" placeholder="EBC"    style="width:70px" title="EBC">
                         <input type="number" id="cedit-maxpct-${id}" value="${item.max_usage_pct ?? ''}" step="1" min="0" max="100" placeholder="% max" style="width:70px" title="% max recette">` :
    cat === 'houblon' ? `<input type="number" id="cedit-alpha-${id}"  value="${item.alpha  ?? ''}" step="0.1" placeholder="α%"     style="width:70px" title="Alpha %">` :
    cat === 'levure'  ? `<input type="text"   id="cedit-ytype-${id}"  value="${esc(item.yeast_type||'')}"  placeholder="Type" style="width:80px" title="Type levure">` : '';
  const yeastExtra = cat === 'levure' ? `
    <div style="width:100%;display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;padding-top:6px;border-top:1px solid var(--border)">
      <input type="number" id="cedit-tmin-${id}"   value="${item.temp_min??''}"          step="0.5" placeholder="T°min°C" style="width:80px" title="T° min fermentation">
      <input type="number" id="cedit-tmax-${id}"   value="${item.temp_max??''}"          step="0.5" placeholder="T°max°C" style="width:80px" title="T° max fermentation">
      <input type="number" id="cedit-dosage-${id}" value="${item.dosage_per_liter??''}"  step="0.01" placeholder="g/L"    style="width:70px" title="Dosage g/L">
      <input type="number" id="cedit-attmin-${id}" value="${item.attenuation_min??''}"   step="1"    placeholder="Att.min%" style="width:78px" title="Atténuation min">
      <input type="number" id="cedit-attmax-${id}" value="${item.attenuation_max??''}"   step="1"    placeholder="Att.max%" style="width:78px" title="Atténuation max">
      <input type="number" id="cedit-alctol-${id}" value="${item.alcohol_tolerance??''}" step="0.5"  placeholder="Tol.alc%" style="width:82px" title="Tolérance alcool">
    </div>` : '';
  const unitOpts = ['kg','g','L','mL','unité','sachet'].map(u =>
    `<option value="${u}" ${item.default_unit===u?'selected':''}>${u}</option>`).join('');

  document.getElementById(`crow-${id}`).outerHTML = `
    <div class="catalog-row" id="crow-${id}" style="flex-wrap:wrap;gap:6px">
      <input type="text" id="cedit-name-${id}" value="${esc(item.name)}" style="flex:1;min-width:130px" placeholder="Nom">
      <input type="text" id="cedit-sub-${id}"  value="${esc(item.subcategory||'')}" style="width:110px" placeholder="Sous-cat.">
      ${extraField}
      <select id="cedit-unit-${id}" style="width:70px" title="Unité par défaut">${unitOpts}</select>
      <button class="btn btn-success btn-icon btn-sm" onclick="saveCatalogEdit(${id})" title="Enregistrer"><i class="fas fa-check"></i></button>
      <button class="btn btn-ghost  btn-icon btn-sm" onclick="renderSettingsCatalog(settingsCat)" title="Annuler"><i class="fas fa-xmark"></i></button>
      ${yeastExtra}
    </div>`;
  document.getElementById(`cedit-name-${id}`).focus();
}

async function saveCatalogEdit(id) {
  const item = S.catalog.find(c => c.id === id);
  if (!item) return;
  const cat  = item.category;
  const name = document.getElementById(`cedit-name-${id}`).value.trim();
  if (!name) { toast('Nom requis', 'error'); return; }
  const fv = (elId) => { const el = document.getElementById(elId); return el && el.value !== '' ? parseFloat(el.value) : null; };
  const payload = {
    name,
    category:    cat,
    subcategory: document.getElementById(`cedit-sub-${id}`).value.trim() || null,
    ebc:         cat === 'malt'    ? fv(`cedit-ebc-${id}`)    : null,
    max_usage_pct: cat === 'malt'  ? fv(`cedit-maxpct-${id}`) : null,
    alpha:       cat === 'houblon' ? fv(`cedit-alpha-${id}`)  : null,
    yeast_type:  cat === 'levure'  ? (document.getElementById(`cedit-ytype-${id}`)?.value.trim() || null) : null,
    temp_min:          cat === 'levure' ? fv(`cedit-tmin-${id}`)   : null,
    temp_max:          cat === 'levure' ? fv(`cedit-tmax-${id}`)   : null,
    dosage_per_liter:  cat === 'levure' ? fv(`cedit-dosage-${id}`) : null,
    attenuation_min:   cat === 'levure' ? fv(`cedit-attmin-${id}`) : null,
    attenuation_max:   cat === 'levure' ? fv(`cedit-attmax-${id}`) : null,
    alcohol_tolerance: cat === 'levure' ? fv(`cedit-alctol-${id}`) : null,
    default_unit: document.getElementById(`cedit-unit-${id}`).value,
  };
  try {
    const updated = await api('PUT', `/api/catalog/${id}`, payload);
    const idx = S.catalog.findIndex(c => c.id === id);
    if (idx !== -1) S.catalog[idx] = updated;
    renderSettingsCatalog(settingsCat);
    toast('Catalogue mis à jour', 'success');
  } catch(e) { toast('Erreur mise à jour', 'error'); }
}

async function addCatalogItem() {
  const name = document.getElementById('scat-name').value.trim();
  if (!name) { toast('Nom requis', 'error'); return; }
  const sfv = (id) => { const el = document.getElementById(id); return el && el.value !== '' ? parseFloat(el.value) : null; };
  const payload = {
    name,
    category:    settingsCat,
    subcategory: document.getElementById('scat-sub').value.trim() || null,
    ebc:         sfv('scat-ebc'),
    max_usage_pct: sfv('scat-maxpct'),
    alpha:       sfv('scat-alpha'),
    yeast_type:  document.getElementById('scat-ytype').value.trim() || null,
    temp_min:          sfv('scat-tmin'),
    temp_max:          sfv('scat-tmax'),
    dosage_per_liter:  sfv('scat-dosage'),
    attenuation_min:   sfv('scat-attmin'),
    attenuation_max:   sfv('scat-attmax'),
    alcohol_tolerance: sfv('scat-alctol'),
    default_unit: document.getElementById('scat-unit').value,
  };
  try {
    const item = await api('POST', '/api/catalog', payload);
    S.catalog.push(item);
    ['scat-name','scat-sub','scat-ebc','scat-maxpct','scat-alpha','scat-ytype',
     'scat-tmin','scat-tmax','scat-dosage','scat-attmin','scat-attmax','scat-alctol']
      .forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
    renderSettingsCatalog(settingsCat);
    toast('Ajouté au catalogue', 'success');
  } catch(e) { toast('Erreur ajout catalogue', 'error'); }
}

async function deleteCatalogItem(id) {
  try {
    await api('DELETE', `/api/catalog/${id}`);
    S.catalog = S.catalog.filter(c => c.id !== id);
    renderSettingsCatalog(settingsCat);
    toast('Supprimé du catalogue', 'success');
  } catch(e) { toast('Erreur suppression', 'error'); }
}

const AUTRE_UNITS = ['g','kg','mL','L','pièce','sachet'];

function renderSettingsThresholds() {
  const t  = appSettings.thresholds || {};
  const tzEl = document.getElementById('tz-offset');
  if (tzEl) tzEl.value = appSettings.tz_offset ?? 0;
  document.getElementById('thresh-malt').value    = t.malt    ?? 1000;
  document.getElementById('thresh-houblon').value = t.houblon ?? 50;
  document.getElementById('thresh-levure').value  = t.levure  ?? 2;
  // Per-unit thresholds for "autre"
  const au = t.autre_units || { g: 100 };
  AUTRE_UNITS.forEach(u => {
    const el = document.getElementById(`tau-${u}`);
    if (el) el.value = au[u] != null ? au[u] : '';
  });
}

function saveThresholds() {
  const autre_units = {};
  AUTRE_UNITS.forEach(u => {
    const v = document.getElementById(`tau-${u}`)?.value;
    autre_units[u] = v !== '' && v != null ? parseFloat(v) : null;
  });
  appSettings.thresholds = {
    malt:        parseFloat(document.getElementById('thresh-malt').value)    || 1000,
    houblon:     parseFloat(document.getElementById('thresh-houblon').value) || 50,
    levure:      parseFloat(document.getElementById('thresh-levure').value)  || 2,
    autre_units,
  };
  saveSettings();
  renderInventaire();
  toast('Seuils enregistrés', 'success');
}

const WATER_FIELDS = ['price','ph','ca','mg','na','so4','cl','hco3'];

function renderSettingsWater() {
  const w = appSettings.water || {};
  WATER_FIELDS.forEach(k => {
    const el = document.getElementById(`water-${k}`);
    if (el) el.value = w[k] != null ? w[k] : '';
  });
}

function saveWaterSettings() {
  const w = {};
  WATER_FIELDS.forEach(k => {
    const v = document.getElementById(`water-${k}`)?.value;
    w[k] = v !== '' && v != null ? parseFloat(v) : null;
  });
  appSettings.water = w;
  saveSettings();
  toast('Profil eau enregistré', 'success');
}

// ══════════════════════════════════════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ══════════════════════════════════════════════════════════════════════════════
// LOAD ALL DATA
// ══════════════════════════════════════════════════════════════════════════════
async function loadAll() {
  const [inv, rec, bra, beerList, stats, catalog, bjcp, spindles] = await Promise.all([
    api('GET', '/api/inventory'),
    api('GET', '/api/recipes'),
    api('GET', '/api/brews'),
    api('GET', '/api/beers'),
    api('GET', '/api/stats'),
    api('GET', '/api/catalog'),
    api('GET', '/api/bjcp'),
    api('GET', '/api/spindles'),
  ]);
  S.inventory = inv;
  S.recipes   = rec;
  S.brews     = bra;
  S.beers     = beerList;
  S.catalog   = catalog;
  S.bjcp      = bjcp;
  S.spindles  = spindles;
  updateNavBadges(stats);
  renderInventaire();
  renderRecipeList();
  renderBrassins();
  renderCave();
  renderSpindles();
}

function updateNavBadges(stats) {
  document.getElementById('nb-inv').textContent = stats.inventory_count;
  document.getElementById('nb-rec').textContent = stats.recipes_count;
  document.getElementById('nb-bra').textContent = stats.brews_count;
  document.getElementById('nb-cav').textContent = stats.beers_count;
}

// ══════════════════════════════════════════════════════════════════════════════
// ── INVENTAIRE ───────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function catLabel(c) { return {malt:'Malt',houblon:'Houblon',levure:'Levure',autre:'Autre'}[c] || c; }

function renderInventaire() {
  const filtered = S.inventory.filter(i => invFilter === 'all' || i.category === invFilter);
  const active = filtered.filter(i => !i.archived);
  const arch   = filtered.filter(i => i.archived);
  const shown  = showArchivedInv ? [...active, ...arch] : active;

  const tbody = document.getElementById('inv-body');
  tbody.innerHTML = '';
  document.getElementById('inv-empty').style.display = shown.length ? 'none' : 'block';

  shown.forEach(item => {
    const specs = [];
    if (item.ebc != null) specs.push(`<span class="badge badge-malt" style="font-size:.7rem">EBC ${item.ebc}</span>`);
    if (item.alpha != null) specs.push(`<span class="badge badge-houblon" style="font-size:.7rem">α ${item.alpha}%</span>`);
    if (item.price_per_unit != null) specs.push(`<span class="badge" style="font-size:.7rem;background:rgba(34,197,94,.12);color:var(--success)"><i class="fas fa-euro-sign" style="font-size:.6rem"></i> ${item.price_per_unit.toFixed(2)}/${INV_PRICE_LABELS[item.category]||'unité'}</span>`);
    const thresh  = getThresh(item.category);
    const isEmpty = item.quantity <= 0;
    let isLow = false;
    if (!isEmpty) {
      if (item.category === 'levure') {
        // Seuil en sachets : comparaison brute
        isLow = item.quantity < thresh;
      } else if (item.category === 'autre') {
        // Seuil par unité : comparaison directe dans l'unité de l'ingrédient
        const autreUnits = (appSettings.thresholds || {}).autre_units || { g: 100 };
        const unitThresh = autreUnits[item.unit];
        isLow = unitThresh != null && item.quantity < unitThresh;
      } else {
        // Malt / Houblon : seuil en grammes
        const qtyG = item.unit === 'kg' ? item.quantity * 1000 : item.quantity;
        isLow = qtyG < thresh;
      }
    }
    const qtyColor = isEmpty ? 'var(--danger)' : isLow ? '#f59e0b' : 'var(--text)';
    const archIcon = item.archived ? 'box-open' : 'box-archive';
    tbody.insertAdjacentHTML('beforeend', `
      <tr class="${item.archived ? 'archived-item' : ''}">
        <td><strong>${esc(item.name)}</strong>${item.notes ? `<div style="font-size:.78rem;color:var(--muted)">${esc(item.notes)}</div>` : ''}</td>
        <td><span class="badge badge-${item.category}">${catLabel(item.category)}</span></td>
        <td style="color:var(--muted);font-size:.85rem">${esc(item.origin||'')}</td>
        <td>${specs.join(' ')}</td>
        <td style="text-align:right">
          <div style="display:inline-flex;align-items:center;gap:6px">
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="adjustQty(${item.id},-1)">−</button>
              <input class="qty-inp" type="number" value="${item.quantity}" min="0" step="0.001"
                     onchange="setQty(${item.id},parseFloat(this.value))" style="color:${qtyColor}">
              <span class="qty-unit">${esc(item.unit)}</span>
              <button class="qty-btn" onclick="adjustQty(${item.id},1)">+</button>
            </div>
          </div>
        </td>
        <td style="text-align:right">
          <div style="display:flex;gap:4px;justify-content:flex-end">
            <button class="btn btn-icon btn-ghost btn-sm" onclick="archiveItem('inv',${item.id},${item.archived?0:1})" title="${item.archived?'Désarchiver':'Archiver'}"><i class="fas fa-${archIcon}"></i></button>
            <button class="btn btn-icon btn-ghost btn-sm" onclick="editInventoryItem(${item.id})" title="Modifier"><i class="fas fa-pen"></i></button>
            <button class="btn btn-icon btn-danger btn-sm" onclick="deleteInventoryItem(${item.id})" title="Supprimer"><i class="fas fa-trash"></i></button>
          </div>
        </td>
      </tr>`);
  });

  // Stats (active only)
  const activeAll = S.inventory.filter(i => !i.archived);
  const counts = { malt:0, houblon:0, levure:0, autre:0 };
  activeAll.forEach(i => counts[i.category] = (counts[i.category]||0)+1);

  const maltKgTotal = activeAll.filter(i => i.category === 'malt')
    .reduce((s, i) => s + (i.unit === 'kg' ? i.quantity : i.unit === 'g' ? i.quantity / 1000 : 0), 0);
  const hopGTotal = activeAll.filter(i => i.category === 'houblon')
    .reduce((s, i) => s + (i.unit === 'g' ? i.quantity : i.unit === 'kg' ? i.quantity * 1000 : 0), 0);
  const maltQtyLabel = maltKgTotal > 0 ? (maltKgTotal >= 1 ? maltKgTotal.toFixed(2) + ' kg' : (maltKgTotal * 1000).toFixed(0) + ' g') : '';
  const hopQtyLabel  = hopGTotal  > 0 ? (hopGTotal >= 1000 ? (hopGTotal / 1000).toFixed(2) + ' kg' : hopGTotal.toFixed(0) + ' g') : '';

  document.getElementById('inv-stats').innerHTML = `
    <div class="stat"><div class="stat-val" style="color:var(--text)">${activeAll.length}</div><div class="stat-lbl">Total articles</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--malt)">${counts.malt}</div><div class="stat-lbl">Malts</div>${maltQtyLabel ? `<div style="font-size:.78rem;color:var(--malt);opacity:.75;margin-top:3px">${maltQtyLabel}</div>` : ''}</div>
    <div class="stat"><div class="stat-val" style="color:var(--hop)">${counts.houblon}</div><div class="stat-lbl">Houblons</div>${hopQtyLabel ? `<div style="font-size:.78rem;color:var(--hop);opacity:.75;margin-top:3px">${hopQtyLabel}</div>` : ''}</div>
    <div class="stat"><div class="stat-val" style="color:var(--yeast)">${counts.levure}</div><div class="stat-lbl">Levures</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--other)">${counts.autre}</div><div class="stat-lbl">Autres</div></div>`;

  // Archive button
  const archBtn = document.getElementById('inv-arch-btn');
  if (archBtn) {
    const archCount = S.inventory.filter(i => i.archived).length;
    archBtn.textContent = showArchivedInv ? 'Masquer archives' : `\uD83D\uDDC3\uFE0F Archives (${archCount})`;
  }
}

function setInvFilter(cat, btn) {
  invFilter = cat;
  document.querySelectorAll('#inv-filters .filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderInventaire();
}

const INV_PRICE_LABELS = { malt:'€/kg', houblon:'€/g', levure:'€/sachet', autre:'€/unité' };
function invCatChange() {
  const cat = document.getElementById('inv-f-cat').value;
  document.getElementById('inv-f-ebc-wrap').style.display   = cat === 'malt'    ? '' : 'none';
  document.getElementById('inv-f-alpha-wrap').style.display = cat === 'houblon' ? '' : 'none';
  const priceLabel = document.getElementById('inv-f-price-lbl');
  if (priceLabel) priceLabel.textContent = `Prix (${INV_PRICE_LABELS[cat] || '€/unité'})`;
  // Refresh suggest only if the name field is currently focused
  const nameInput = document.getElementById('inv-f-name');
  if (nameInput && document.activeElement === nameInput) invNameSuggest(nameInput);
}

async function adjustQty(id, delta) {
  const item = S.inventory.find(i => i.id === id);
  if (!item) return;
  const step = item.unit === 'g' || item.unit === 'mL' ? 100 : 0.1;
  const newQty = Math.max(0, parseFloat((item.quantity + delta * step).toFixed(3)));
  await setQty(id, newQty);
}
async function setQty(id, qty) {
  try {
    const updated = await api('PATCH', `/api/inventory/${id}/qty`, { quantity: qty });
    const idx = S.inventory.findIndex(i => i.id === id);
    if (idx !== -1) S.inventory[idx] = updated;
    renderInventaire();
  } catch(e) { toast('Erreur mise à jour quantité', 'error'); }
}

function openInvModal(item = null) {
  document.getElementById('inv-f-id').value    = item ? item.id : '';
  document.getElementById('inv-f-name').value  = item ? item.name : '';
  document.getElementById('inv-f-cat').value   = item ? item.category : 'malt';
  document.getElementById('inv-f-qty').value   = item ? item.quantity : 0;
  document.getElementById('inv-f-unit').value  = item ? item.unit : 'kg';
  document.getElementById('inv-f-ebc').value   = item ? (item.ebc||'') : '';
  document.getElementById('inv-f-alpha').value = item ? (item.alpha||'') : '';
  document.getElementById('inv-f-origin').value= item ? (item.origin||'') : '';
  document.getElementById('inv-f-notes').value  = item ? (item.notes||'') : '';
  document.getElementById('inv-f-price').value  = item ? (item.price_per_unit ?? '') : '';
  document.getElementById('inv-modal-title').textContent = item ? 'Modifier l\'ingrédient' : 'Ajouter un ingrédient';
  invCatChange();
  openModal('inv-modal');
}

function editInventoryItem(id) { openInvModal(S.inventory.find(i => i.id === id)); }

function invNameSuggest(input) {
  const q   = input.value.toLowerCase();
  if (!q) { closeInvSuggest(); return; }
  const cat = document.getElementById('inv-f-cat').value;
  const sug = document.getElementById('inv-name-sug');
  _invSugItems = [];
  closeInvSuggest();
  const matches = S.catalog.filter(c =>
    c.category === cat && c.name.toLowerCase().includes(q)
  ).slice(0, 30);
  if (!matches.length) return;
  const groups = {};
  matches.forEach(c => {
    const g = c.subcategory || 'Autres';
    if (!groups[g]) groups[g] = [];
    groups[g].push(c);
  });
  let html = '';
  Object.entries(groups).forEach(([grp, items]) => {
    html += `<div class="ing-suggest-cat">${esc(grp)}</div>`;
    items.forEach(item => {
      const specs = [];
      if (item.ebc   != null) specs.push(`EBC ${item.ebc}`);
      if (item.alpha != null) specs.push(`α ${item.alpha}%`);
      const specTxt = specs.length ? ` <span style="color:var(--muted);font-size:.72rem">${specs.join(' · ')}</span>` : '';
      const _ii = _invSugItems.push(item) - 1;
      html += `<div class="ing-suggest-item" onmousedown="applyInvCatalog(_invSugItems[${_ii}])">
        <span>${esc(item.name)}${specTxt}</span>
      </div>`;
    });
  });
  sug.innerHTML = html;
  sug.classList.add('open');
}

function closeInvSuggest() {
  document.getElementById('inv-name-sug').classList.remove('open');
}

function applyInvCatalog(item) {
  document.getElementById('inv-f-name').value  = item.name;
  document.getElementById('inv-f-cat').value   = item.category;
  if (item.ebc   != null) document.getElementById('inv-f-ebc').value   = item.ebc;
  if (item.alpha != null) document.getElementById('inv-f-alpha').value = item.alpha;
  if (item.default_unit && !document.getElementById('inv-f-id').value)
    document.getElementById('inv-f-unit').value = item.default_unit;
  invCatChange();
  closeInvSuggest();
}

async function saveInventoryItem() {
  const name = document.getElementById('inv-f-name').value.trim();
  if (!name) { toast('Le nom est requis', 'error'); return; }
  const id  = document.getElementById('inv-f-id').value;
  const cat = document.getElementById('inv-f-cat').value;
  const payload = {
    name, category: cat,
    quantity: parseFloat(document.getElementById('inv-f-qty').value) || 0,
    unit:     document.getElementById('inv-f-unit').value,
    origin:   document.getElementById('inv-f-origin').value.trim() || null,
    ebc:           document.getElementById('inv-f-ebc').value   ? parseFloat(document.getElementById('inv-f-ebc').value)   : null,
    alpha:         document.getElementById('inv-f-alpha').value ? parseFloat(document.getElementById('inv-f-alpha').value) : null,
    notes:         document.getElementById('inv-f-notes').value.trim() || null,
    price_per_unit:document.getElementById('inv-f-price').value ? parseFloat(document.getElementById('inv-f-price').value) : null,
  };
  try {
    if (id) {
      const updated = await api('PUT', `/api/inventory/${id}`, payload);
      const idx = S.inventory.findIndex(i => i.id === parseInt(id));
      if (idx !== -1) S.inventory[idx] = updated;
    } else {
      const created = await api('POST', '/api/inventory', payload);
      S.inventory.push(created);
    }
    closeModal('inv-modal');
    renderInventaire();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast(id ? 'Ingrédient mis à jour' : 'Ingrédient ajouté', 'success');
  } catch(e) { toast('Erreur lors de la sauvegarde', 'error'); }
}

async function deleteInventoryItem(id) {
  if (!confirm('Supprimer cet ingrédient ?')) return;
  try {
    await api('DELETE', `/api/inventory/${id}`);
    S.inventory = S.inventory.filter(i => i.id !== id);
    renderInventaire();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast('Ingrédient supprimé', 'success');
  } catch(e) { toast('Erreur suppression', 'error'); }
}

function setRecRating(v) {

  document.getElementById('rec-rating').value = newVal || '';
  renderRecStars(newVal);

function renderRecStars(n) {
  document.querySelectorAll('#rec-star-input .star').forEach((el, i) => {
    el.classList.toggle('on', i < n);
  });

async function rateRecipe(id, n) {
  const r = S.recipes.find(x => x.id === id);
  if (!r) return;
  const newRating = r.rating === n ? null : n; // toggle
  try {
    await api('PATCH', `/api/recipes/${id}`, { rating: newRating });
    r.rating = newRating;
    renderRecipeView();
    renderRecipeList();
  } catch(e) { toast('Erreur notation', 'error'); }
}

function recipeCost(r) {
  let total = 0, has = false;
  (r.ingredients || []).forEach(ing => {
    const c = ingCost(ing);
    if (c !== null) { total += c; has = true; }
  });
  return has ? total : null;
}

function renderRecipeList() {
  // Sync sort select
  const sortSel = document.getElementById('rec-sort-select');
  if (sortSel) sortSel.value = recSort;

  const c = document.getElementById('recipe-list-container');
  const active = S.recipes.filter(r => !r.archived);
  const arch   = S.recipes.filter(r => r.archived);
  const shown  = showArchivedRec ? [...active, ...arch] : active;

  // Apply sort (archives always follow actives)
  const sortFn = {
    name:   (a, b) => a.name.localeCompare(b.name),
    rating: (a, b) => (b.rating || 0) - (a.rating || 0),
    style:  (a, b) => (a.style || '').localeCompare(b.style || ''),
    volume: (a, b) => b.volume - a.volume,
    recent: () => 0,
  }[recSort] || (() => 0);
  if (recSort !== 'recent') {
    active.sort(sortFn);
    arch.sort(sortFn);
    shown.splice(0, shown.length, ...active, ...(showArchivedRec ? arch : []));
  }

  if (!S.recipes.length) {
    c.innerHTML = '<div class="empty" id="recipe-list-empty"><i class="fas fa-scroll"></i><p>Aucune recette</p></div>';
  } else {
    const BREW_STATUS = {
      planned:    { icon:'calendar-plus',      color:'var(--muted)',    label:'Planifié' },
      in_progress:{ icon:'fire-flame-curved',  color:'var(--amber)',    label:'En cours' },
      fermenting: { icon:'flask',              color:'var(--info)',     label:'En fermentation' },
    };
    c.innerHTML = shown.map(r => {
      const cost = recipeCost(r);
      const costBadge = cost !== null
        ? `<span style="color:var(--success);font-weight:700;white-space:nowrap"><i class="fas fa-euro-sign" style="font-size:.65rem"></i> ${cost.toFixed(2)}</span>`
        : '';
      const starsHtml = r.rating
        ? `<span class="stars-sm">${Array.from({length:5},(_,i)=>`<span style="color:${i<r.rating?'var(--amber)':'var(--border)'}">\u2605</span>`).join('')}</span>`
        : '';

      // Brassins actifs liés à cette recette
      const activeBrews = S.brews.filter(b => b.recipe_id === r.id && !b.archived && b.status !== 'completed');
      // Stock en cave lié à cette recette
      const linkedBeers = S.beers.filter(b => b.recipe_id === r.id && !b.archived);
      const total33 = linkedBeers.reduce((s, b) => s + (b.stock_33cl || 0), 0);
      const total75 = linkedBeers.reduce((s, b) => s + (b.stock_75cl || 0), 0);
      const hasStock = (total33 + total75) > 0;

      let statusHtml = '';
      if (activeBrews.length > 0) {
        const brew = activeBrews[0];
        const bs = BREW_STATUS[brew.status] || { icon:'flask', color:'var(--muted)', label:brew.status };
        const brewLabel = activeBrews.length > 1
          ? `${activeBrews.length} brassins actifs`
          : esc(brew.name);
        statusHtml += `<button class="rec-status-btn" style="color:${bs.color};background:${bs.color}1a;border-color:${bs.color}55"
          onclick="event.stopPropagation();navigate('brassins')" title="${esc(brew.name)} — ${bs.label}">
          <i class="fas fa-${bs.icon}"></i> ${brewLabel}</button>`;
      }
      if (hasStock) {
        const parts = [total33 ? total33 + '\u00d7 33cl' : '', total75 ? total75 + '\u00d7 75cl' : ''].filter(Boolean).join(' · ');
        statusHtml += `<button class="rec-status-btn" style="color:var(--success);background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3)"
          onclick="event.stopPropagation();goToCaveFromRecipe(${r.id})" title="Voir en cave">
          <i class="fas fa-wine-bottle"></i> ${parts}</button>`;
      }
      if (!activeBrews.length && !hasStock) {
        statusHtml = `<span style="font-size:.72rem;color:var(--muted);font-style:italic"><i class="fas fa-circle-info"></i> Aucun brassin actif · Pas de stock</span>`;
      }

      return `
      <div class="recipe-item ${r.archived?'archived-item':''} ${recEditingId===r.id?'active':''}" onclick="loadRecipeForm(${r.id})">
        <div style="min-width:0;flex:1">
          <div class="recipe-item-name">${esc(r.name)}</div>
          <div class="recipe-item-meta" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span>${r.batch_no ? '#' + r.batch_no + ' · ' : ''}${r.style ? esc(r.style) + ' · ' : ''}${r.volume}L · ${r.ingredients.length} ing.</span>
            ${starsHtml}
            ${costBadge}
          </div>
          <div class="recipe-item-status">${statusHtml}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0;margin-top:2px">
          <button class="btn btn-icon btn-ghost btn-sm" onclick="event.stopPropagation();archiveItem('rec',${r.id},${r.archived?0:1})" title="${r.archived?'Désarchiver':'Archiver'}"><i class="fas fa-${r.archived?'box-open':'box-archive'}"></i></button>
          <button class="btn btn-icon btn-danger btn-sm" onclick="event.stopPropagation();deleteRecipe(${r.id})" title="Supprimer"><i class="fas fa-trash"></i></button>
        </div>
      </div>`;
    }).join('') || '<div style="color:var(--muted);padding:12px 0;text-align:center">Aucune recette active.</div>';
  }

  // Archive toggle button for recipes
  const archWrap = document.getElementById('rec-arch-wrap');
  if (archWrap) {
    const archCount = arch.length;
    archWrap.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="toggleShowArchived('rec')">${showArchivedRec ? 'Masquer archives' : '\uD83D\uDDC3\uFE0F Archives (' + archCount + ')'}</button>`;
  }
}

// Water calcs
function recCalc() {
  const vol  = parseFloat(document.getElementById('rec-volume').value) || 20;
  const boil = parseFloat(document.getElementById('rec-boil-time').value) || 60;
  const ratio= parseFloat(document.getElementById('rec-mash-ratio').value) || 3;
  const evap = parseFloat(document.getElementById('rec-evap').value) || 3;
  const abs  = parseFloat(document.getElementById('rec-absorption').value) || 0.8;

  const grainKg = recIngredients.filter(i=>i.category==='malt')
    .reduce((s,i) => s + (i.unit==='kg' ? i.quantity : i.quantity/1000), 0);

  const preboil     = vol + evap * (boil/60);
  const grainAbs    = grainKg * abs;
  const totalWater  = preboil + grainAbs;          // Eau totale toujours nécessaire

  // Eau d'empâtage : ratio voulu, mais au minimum 55 % du total
  // pour garantir empâtage ≥ rinçage dans tous les cas
  const mashFromRatio = grainKg * ratio;
  const mashMin       = totalWater * 0.55;
  const mashWater     = grainKg > 0 ? Math.max(mashFromRatio, mashMin) : 0;
  const sparge        = Math.max(0, totalWater - mashWater);

  const fmtL = v => v > 0 ? v.toFixed(1) : '–';
  const hasGrain = grainKg > 0;
  document.getElementById('rw-mash').textContent   = hasGrain ? fmtL(mashWater) : '–';
  document.getElementById('rw-sparge').textContent = hasGrain ? fmtL(sparge) : '–';
  document.getElementById('rw-preboil').textContent= fmtL(preboil);
  document.getElementById('rw-total').textContent  = hasGrain ? fmtL(totalWater) : '–';
  calcBrewStats();
  // Sync water correction panel volume if open
  if (hasGrain && document.getElementById('rec-wc-panel')?.style.display !== 'none') {
    const wcVol = document.getElementById('wc-volume');
    if (wcVol) { wcVol.value = totalWater.toFixed(1); calcWaterCorrection(); }
  }
}

// ── Conversion d'unité pour calcul de coût ───────────────────────────────────
function convertQtyForCost(qty, from, to) {
  if (from === to) return qty;
  if (from === 'g'  && to === 'kg') return qty / 1000;
  if (from === 'kg' && to === 'g')  return qty * 1000;
  if ((from === 'ml' || from === 'mL') && to === 'L')  return qty / 1000;
  if (from === 'L' && (to === 'ml' || to === 'mL'))   return qty * 1000;
  return null; // incompatible
}

// Unité canonique dans laquelle le prix est toujours saisi/stocké
const CANONICAL_PRICE_UNIT = { malt: 'kg', houblon: 'g', levure: 'sachet' };

function ingCost(ing) {
  const inv = ing.inventory_item_id
    ? S.inventory.find(i => i.id === ing.inventory_item_id)
    : S.inventory.find(i => i.name.toLowerCase() === ing.name.toLowerCase() && i.category === ing.category);
  if (!inv || inv.price_per_unit == null) return null;
  // Convertir la quantité de l'ingrédient vers l'unité canonique du prix
  // (ex: g → kg pour les malts, peu importe l'unité de stockage)
  const priceUnit = CANONICAL_PRICE_UNIT[ing.category] || inv.unit;
  const converted = convertQtyForCost(ing.quantity || 0, ing.unit, priceUnit);
  if (converted === null) return null;
  return converted * inv.price_per_unit;
}

// Ingredient rows
let ingRowId = 0;
function addIngRow(cat, data = null) {
  const rid = ++ingRowId;
  const ing = data || { _rid: rid, category: cat, name: '', quantity: 0,
    unit: cat==='malt'?'kg':cat==='houblon'?'g':cat==='levure'?'sachet':'g',
    hop_type: cat==='houblon' ? 'ebullition' : null,
    other_type: cat==='autre' ? 'ebullition' : null,
    inventory_item_id: null };
  if (!data) { ing._rid = rid; recIngredients.push(ing); }
  else ing._rid = rid;
  renderIngredientRows();
}

function renderIngredientRows() {
  const container = document.getElementById('rec-ingredients');
  if (!recIngredients.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:.875rem;padding:12px 0">Aucun ingrédient. Utilisez les boutons ci-dessus pour en ajouter.</div>';
    return;
  }

  const cats = ['malt','houblon','levure','autre'];
  let html = '';
  // Pre-compute total malt kg for % display
  const totalMaltKg = recIngredients
    .filter(i => i.category === 'malt')
    .reduce((s, i) => s + (i.unit === 'kg' ? i.quantity : i.quantity / 1000), 0);
  const totalHopG = recIngredients
    .filter(i => i.category === 'houblon')
    .reduce((s, i) => s + (i.unit === 'kg' ? i.quantity * 1000 : i.quantity), 0);

  cats.forEach(cat => {
    const ings = recIngredients.filter(i => i.category === cat);
    if (!ings.length) return;
    const catColors = {malt:'var(--malt)',houblon:'var(--hop)',levure:'var(--yeast)',autre:'var(--other)'};
    let totalLabel = '';
    if (cat === 'malt' && totalMaltKg > 0)
      totalLabel = `<span style="font-weight:400;opacity:.7;margin-left:8px">${totalMaltKg >= 1 ? totalMaltKg.toFixed(2)+' kg' : (totalMaltKg*1000).toFixed(0)+' g'}</span>`;
    if (cat === 'houblon' && totalHopG > 0)
      totalLabel = `<span style="font-weight:400;opacity:.7;margin-left:8px">${totalHopG.toFixed(0)} g</span>`;
    html += `<div style="margin-bottom:10px"><div class="section-label" style="color:${catColors[cat]};margin-bottom:6px">${catLabel(cat)}${totalLabel}</div>`;
    ings.forEach((ing, idx) => {
      const realIdx = recIngredients.indexOf(ing);
      const stockInfo = getStockInfo(ing);
      let extraFields = '';
      if (cat === 'houblon') {
        const ht = ing.hop_type || 'ebullition';
        const durationField = ht === 'dryhop' ? `
          <div style="flex-shrink:0;width:88px">
            <div class="ing-lbl"><i class="fas fa-calendar-days"></i> Jours</div>
            <input type="number" placeholder="jours" step="1" min="0" value="${ing.hop_days!=null?ing.hop_days:''}"
              onchange="recIngredients[${realIdx}].hop_days=parseFloat(this.value)||null;calcBrewStats()"
              style="font-size:.8rem">
          </div>` : `
          <div style="flex-shrink:0;width:88px">
            <div class="ing-lbl"><i class="fas fa-clock"></i> Min fin ébu.</div>
            <input type="number" placeholder="min" step="1" min="0" value="${ing.hop_time!=null?ing.hop_time:''}"
              onchange="recIngredients[${realIdx}].hop_time=parseFloat(this.value)||null;calcBrewStats()"
              style="font-size:.8rem">
          </div>`;
        extraFields = `
          <div style="flex-shrink:0;width:78px">
            <div class="ing-lbl"><i class="fas fa-percent"></i> Alpha</div>
            <input type="number" placeholder="%" step="0.1" min="0" max="30" value="${ing.alpha!=null?ing.alpha:''}"
              onchange="recIngredients[${realIdx}].alpha=parseFloat(this.value)||null;calcBrewStats()"
              style="font-size:.8rem">
          </div>
          <div style="flex-shrink:0;min-width:128px">
            <div class="ing-lbl"><i class="fas fa-tag"></i> Type d'ajout</div>
            <select onchange="recIngredients[${realIdx}].hop_type=this.value;renderIngredientRows()" style="font-size:.8rem">
              <option value="ebullition" ${ht==='ebullition'?'selected':''}>Ebullition</option>
              <option value="whirlpool"  ${ht==='whirlpool' ?'selected':''}>Whirlpool</option>
              <option value="dryhop"     ${ht==='dryhop'    ?'selected':''}>Dry Hop</option>
            </select>
          </div>
          ${durationField}`;
      }
      if (cat === 'autre') {
        const ot = ing.other_type || 'ebullition';
        const OTHER_LABELS = {empatage:'Empâtage',ebullition:'Ébullition',flameout:'Flameout',whirlpool:'Whirlpool',dryhop:'Dry Hop',fermentation:'Fermentation',packaging:'Mise en bouteille'};
        const needsMinutes = ot === 'ebullition' || ot === 'whirlpool';
        const needsDays    = ot === 'dryhop';
        const timeField = needsMinutes ? `
          <div style="flex-shrink:0;width:88px">
            <div class="ing-lbl"><i class="fas fa-clock"></i> Min fin ébu.</div>
            <input type="number" placeholder="min" step="1" min="0" value="${ing.other_time!=null?ing.other_time:''}"
              onchange="recIngredients[${realIdx}].other_time=parseFloat(this.value)||null"
              style="font-size:.8rem">
          </div>` : needsDays ? `
          <div style="flex-shrink:0;width:88px">
            <div class="ing-lbl"><i class="fas fa-calendar-days"></i> Jours</div>
            <input type="number" placeholder="jours" step="1" min="0" value="${ing.other_time!=null?ing.other_time:''}"
              onchange="recIngredients[${realIdx}].other_time=parseFloat(this.value)||null"
              style="font-size:.8rem">
          </div>` : '';
        extraFields = `
          <div style="flex-shrink:0;min-width:152px">
            <div class="ing-lbl"><i class="fas fa-tag"></i> Moment d'ajout</div>
            <select onchange="recIngredients[${realIdx}].other_type=this.value;renderIngredientRows()" style="font-size:.8rem">
              ${Object.entries(OTHER_LABELS).map(([v,l])=>`<option value="${v}" ${ot===v?'selected':''}>${l}</option>`).join('')}
            </select>
          </div>
          ${timeField}`;
      }
      // Move up/down availability within same category
      const canUp   = recIngredients.slice(0, realIdx).some(x => x.category === cat);
      const canDown = recIngredients.slice(realIdx + 1).some(x => x.category === cat);
      // Malt % badge
      const maltKg  = cat === 'malt' ? (ing.unit === 'kg' ? ing.quantity : ing.quantity / 1000) : 0;
      const maltPct = cat === 'malt' && totalMaltKg > 0 ? (maltKg / totalMaltKg * 100).toFixed(1) : null;

      html += `
        <div class="ing-row">
          <div class="ing-move-btns">
            <button class="ing-move-btn" onclick="moveIngUp(${realIdx})" ${!canUp?'disabled':''} title="Monter"><i class="fas fa-chevron-up"></i></button>
            <button class="ing-move-btn" onclick="moveIngDown(${realIdx})" ${!canDown?'disabled':''} title="Descendre"><i class="fas fa-chevron-down"></i></button>
          </div>
          <div class="ing-name" style="position:relative">
            <div class="ing-lbl"><i class="fas fa-flask" style="font-size:.6rem"></i> Ingrédient</div>
            <div style="display:flex;align-items:center;gap:6px">
              <div class="stock-dot ${stockInfo.cls}" title="${stockInfo.tip}" style="flex-shrink:0"></div>
              <input type="text" placeholder="Nom" value="${esc(ing.name)}"
                oninput="recIngredients[${realIdx}].name=this.value;updateIngSuggest(this,${realIdx},'${cat}')"
                onfocus="updateIngSuggest(this,${realIdx},'${cat}')"
                onblur="setTimeout(()=>closeAllSuggest(),200)"
                style="font-size:.875rem">
              ${stockInfo.badge}
            </div>
            <div class="ing-suggest" id="sug-${realIdx}"></div>
          </div>
          <div class="ing-qty" style="max-width:110px">
            <div class="ing-lbl"><i class="fas fa-scale-balanced"></i> Quantité</div>
            <input type="number" placeholder="0" step="${ing.unit==='g'?1:ing.unit==='sachet'?0.5:0.1}" min="0" value="${ing.quantity||''}"
              onchange="recIngredients[${realIdx}].quantity=parseFloat(this.value)||0;renderIngredientRows();recCalc()"
              style="font-size:.875rem">
          </div>
          <div class="ing-unit" style="max-width:90px">
            <div class="ing-lbl"><i class="fas fa-ruler"></i> Unité</div>
            <select onchange="recIngredients[${realIdx}].unit=this.value;renderIngredientRows();recCalc()" style="font-size:.8rem">
              ${['kg','g','L','mL','sachet','pièce'].map(u=>`<option ${ing.unit===u?'selected':''}>${u}</option>`).join('')}
            </select>
          </div>
          ${maltPct !== null ? `<div class="malt-pct">${maltPct}%</div>` : ''}
          ${extraFields}
          ${(() => { const c = ingCost(ing); return c !== null ? `<div style="flex-shrink:0;text-align:center"><div class="ing-lbl"><i class="fas fa-euro-sign"></i> Coût</div><div style="font-size:.85rem;color:var(--success);font-weight:600">≈ ${c.toFixed(2)} €</div></div>` : ''; })()}
          <button class="btn btn-icon btn-danger btn-sm ing-remove" onclick="removeIng(${realIdx})"><i class="fas fa-times"></i></button>
        </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
  calcBrewStats();
}

function getStockInfo(ing) {
  if (!ing.inventory_item_id) {
    // Try to find by name
    const match = S.inventory.find(i => i.name.toLowerCase() === ing.name.toLowerCase());
    if (match) {
      ing.inventory_item_id = match.id;
      ing.stock_qty = match.quantity;
    }
  }
  const inv = ing.inventory_item_id ? S.inventory.find(i => i.id === ing.inventory_item_id) : null;
  if (!inv) return { cls: 'stock-na', tip: 'Non lié au stock', badge: '' };
  const ok = inv.quantity >= ing.quantity;
  const low = inv.quantity > 0 && inv.quantity < ing.quantity;
  const cls = ok ? 'stock-ok' : low ? 'stock-low' : 'stock-none';
  const sbcls = ok ? 'sb-ok' : low ? 'sb-low' : 'sb-empty';
  const badge = `<div class="stock-badge ${sbcls}" style="font-size:.7rem">${inv.quantity} ${inv.unit} dispo</div>`;
  const tip = ok ? 'En stock' : low ? 'Stock faible' : 'Stock insuffisant';
  return { cls, tip, badge };
}

function updateIngSuggest(input, idx, cat) {
  const q   = input.value.toLowerCase();
  const sug = document.getElementById(`sug-${idx}`);
  _rSugItems = [];
  closeAllSuggest();

  // Search catalog first, then include inventory-only items
  const catItems = S.catalog.filter(c =>
    c.category === cat && (q.length < 1 || c.name.toLowerCase().includes(q))
  );
  // Also include inventory items not in catalog
  const invExtra = S.inventory.filter(i =>
    i.category === cat &&
    (q.length < 1 || i.name.toLowerCase().includes(q)) &&
    !catItems.some(c => c.name.toLowerCase() === i.name.toLowerCase())
  );

  if (!catItems.length && !invExtra.length) return;

  // Group by subcategory
  const groups = {};
  catItems.forEach(c => {
    const g = c.subcategory || 'Autres';
    if (!groups[g]) groups[g] = [];
    const invMatch = S.inventory.find(i => i.name.toLowerCase() === c.name.toLowerCase() && i.category === cat);
    groups[g].push({ ...c, _inv: invMatch || null });
  });
  if (invExtra.length) {
    if (!groups['En stock']) groups['En stock'] = [];
    invExtra.forEach(i => groups['En stock'].push({ name: i.name, _inv: i, id: null }));
  }

  let html = '';
  Object.entries(groups).forEach(([grp, items]) => {
    html += `<div class="ing-suggest-cat">${esc(grp)}</div>`;
    items.forEach(item => {
      const inv     = item._inv;
      const stockTxt = inv ? `<span style="color:${inv.quantity>0?'var(--success)':'var(--danger)'};">${inv.quantity} ${inv.unit}</span>` : '';
      const specs   = [];
      if (item.ebc   != null) specs.push(`EBC ${item.ebc}`);
      if (item.alpha != null) specs.push(`α ${item.alpha}%`);
      const specTxt = specs.length ? `<span style="color:var(--muted);font-size:.72rem">${specs.join(' · ')}</span>` : '';
      const _ri = _rSugItems.push({name: item.name, invId: inv?inv.id:null, catalog: item}) - 1;
      html += `<div class="ing-suggest-item" onmousedown="selectSuggest(${idx},${_ri})">
        <span>${esc(item.name)} ${specTxt}</span>
        ${stockTxt}
      </div>`;
    });
  });
  sug.innerHTML = html;
  sug.classList.add('open');
}

function closeAllSuggest() {
  document.querySelectorAll('.ing-suggest').forEach(s => s.classList.remove('open'));
}

function selectSuggest(idx, si) {
  const { name, invId, catalog } = _rSugItems[si];
  recIngredients[idx].name = name;
  recIngredients[idx].inventory_item_id = invId || null;
  // Auto-fill from catalog
  if (catalog) {
    if (catalog.ebc   != null) recIngredients[idx].ebc   = catalog.ebc;
    if (catalog.alpha != null) recIngredients[idx].alpha = catalog.alpha;
    if (catalog.gu    != null) recIngredients[idx].gu    = catalog.gu;
    if (catalog.default_unit)  recIngredients[idx].unit  = catalog.default_unit;
  }
  if (!recIngredients[idx].unit && invId) {
    const inv = S.inventory.find(i => i.id === invId);
    if (inv) recIngredients[idx].unit = inv.unit;
  }
  renderIngredientRows();
  recCalc();
}

function removeIng(idx) {
  recIngredients.splice(idx, 1);
  renderIngredientRows();
  recCalc();
}

async function saveRecipe() {
  const name = document.getElementById('rec-name').value.trim();
  if (!name) { showRecAlert('Le nom de la bière est requis'); return; }
  const payload = {
    batch_no:    parseInt(document.getElementById('rec-batch').value) || null,
    name,
    style:       document.getElementById('rec-style').value.trim() || null,
    volume:      parseFloat(document.getElementById('rec-volume').value) || 20,
    brew_date:   document.getElementById('rec-brew-date').value || null,
    mash_temp:   parseFloat(document.getElementById('rec-mash-temp').value),
    mash_time:   parseInt(document.getElementById('rec-mash-time').value),
    boil_time:   parseInt(document.getElementById('rec-boil-time').value),
    mash_ratio:  parseFloat(document.getElementById('rec-mash-ratio').value),
    evap_rate:   parseFloat(document.getElementById('rec-evap').value),
    grain_absorption: parseFloat(document.getElementById('rec-absorption').value),
    brewhouse_efficiency: parseFloat(document.getElementById('rec-efficiency').value),
    ferm_temp:   parseFloat(document.getElementById('rec-ferm-temp').value) || 20,
    ferm_time:   parseInt(document.getElementById('rec-ferm-time').value)   || 14,
    notes:       document.getElementById('rec-notes').value.trim() || null,
    rating:      parseInt(document.getElementById('rec-rating').value) || null,
    ingredients: recIngredients.map(i => ({
      inventory_item_id: i.inventory_item_id || null,
      name: i.name, category: i.category,
      quantity: i.quantity, unit: i.unit,
      hop_time: i.hop_time || null, hop_type: i.hop_type || null, hop_days: i.hop_days || null,
      other_type: i.other_type || null, other_time: i.other_time || null,
      ebc: i.ebc || null, alpha: i.alpha || null, notes: i.notes || null,
    })),
  };
  try {
    if (recEditingId) {
      const updated = await api('PUT', `/api/recipes/${recEditingId}`, payload);
      const idx = S.recipes.findIndex(r => r.id === recEditingId);
      if (idx !== -1) S.recipes[idx] = updated;
      toast('Recette mise à jour', 'success');
    } else {
      const created = await api('POST', '/api/recipes', payload);
      S.recipes.unshift(created);
      recEditingId = created.id;
      toast('Recette enregistrée', 'success');
    }
    renderRecipeList();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    showRecAlert('');
    setRecipeMode('view');
  } catch(e) { showRecAlert('Erreur lors de la sauvegarde : ' + (e.error || '')); }
}

async function deleteRecipe(id) {
  if (!confirm('Supprimer cette recette ?')) return;
  try {
    await api('DELETE', `/api/recipes/${id}`);
    S.recipes = S.recipes.filter(r => r.id !== id);
    if (recEditingId === id) clearRecipeForm();
    else renderRecipeList();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast('Recette supprimée', 'success');
  } catch(e) { toast('Erreur suppression', 'error'); }
}

// ── Mode visualisation / édition ──────────────────────────────────────────────
function setRecipeMode(mode) {
  recViewMode = mode;
  const formEl  = document.getElementById('rec-form-panel');
  const viewEl  = document.getElementById('rec-view-panel');
  const actions = document.getElementById('rec-actions');
  if (mode === 'view') {
    formEl.style.display = 'none';
    viewEl.style.display = '';
    renderRecipeView();
    actions.innerHTML = `
      <button class="btn btn-ghost" onclick="showRecipeListOnly()"><i class="fas fa-arrow-left"></i> Liste</button>
      <button class="btn btn-ghost" onclick="newRecipeFromList()"><i class="fas fa-plus"></i> Nouvelle</button>
      <button class="btn btn-ghost" onclick="duplicateRecipe()"><i class="fas fa-copy"></i> Dupliquer</button>
      <button class="btn btn-ghost" onclick="printRecipe()"><i class="fas fa-print"></i> Imprimer</button>
      <button class="btn btn-primary" onclick="setRecipeMode('edit')"><i class="fas fa-pen"></i> Éditer</button>`;
  } else {
    formEl.style.display = '';
    viewEl.style.display = 'none';
    const hasRec = !!recEditingId;
    actions.innerHTML = `
      <button class="btn btn-ghost" onclick="showRecipeListOnly()"><i class="fas fa-arrow-left"></i> Liste</button>
      ${hasRec ? `<button class="btn btn-ghost" onclick="loadRecipeForm(${recEditingId})"><i class="fas fa-rotate-left"></i> Annuler</button>` : ''}
      <button class="btn btn-primary" onclick="saveRecipe()"><i class="fas fa-floppy-disk"></i> Enregistrer</button>`;
  }
}

function ebcToColor(ebc) {
  const srm = (ebc || 0) / 1.97;
  if (srm <  2) return '#FFE699';
  if (srm <  4) return '#FFD878';
  if (srm <  6) return '#FFCA5A';
  if (srm <  9) return '#FFC033';
  if (srm < 12) return '#EBB008';
  if (srm < 15) return '#D98000';
  if (srm < 18) return '#CB6E00';
  if (srm < 22) return '#BE5C00';
  if (srm < 28) return '#A95200';
  if (srm < 35) return '#8D4C00';
  if (srm < 44) return '#6B3A00';
  return '#3D1F00';
}

function renderRecipeView() {
  const panel = document.getElementById('rec-view-panel');
  const r = S.recipes.find(x => x.id === recEditingId);
  if (!r) { panel.innerHTML = ''; return; }

  // Water values from hidden form elements (already computed)
  const wv = id => document.getElementById(id)?.textContent || '–';

  // Malt bill
  const malts = recIngredients.filter(i => i.category === 'malt');
  const totalMaltKg = malts.reduce((s, m) => s + (m.unit === 'kg' ? m.quantity : m.quantity / 1000), 0);
  let maltHtml = '';
  malts.forEach(m => {
    const kg  = m.unit === 'kg' ? m.quantity : m.quantity / 1000;
    const pct = totalMaltKg > 0 ? (kg / totalMaltKg * 100) : 0;
    const ebcVal = m.ebc != null ? m.ebc : (S.catalog.find(c => c.name.toLowerCase() === m.name.toLowerCase())?.ebc ?? null);
    const dot = ebcVal != null
      ? `<span class="malt-ebc-dot" style="background:${ebcToColor(ebcVal)}" title="EBC ${ebcVal}"></span>` : '';
    maltHtml += `<div class="malt-bar-row">
      <div class="malt-bar-label">
        <span class="malt-bar-name">${dot}<span>${esc(m.name)}</span></span>
        <span style="color:var(--muted)">${m.quantity} ${m.unit}&ensp;<strong style="color:var(--malt)">${totalMaltKg > 0 ? pct.toFixed(1) : '–'}%</strong></span>
      </div>
      <div class="malt-bar-track"><div class="malt-bar-fill" style="width:${pct.toFixed(1)}%"></div></div>
    </div>`;
  });

  // Hops
  const hops = recIngredients.filter(i => i.category === 'houblon');
  let hopHtml = '';
  if (hops.length) {
    hopHtml = `<table class="view-ing-table"><thead><tr>
      <th>Houblon</th><th>Qté</th><th>Alpha</th><th>Type</th><th>Durée</th>
    </tr></thead><tbody>`;
    hops.forEach(h => {
      const ht = h.hop_type || 'ebullition';
      const htLabel = { ebullition: 'Ebullition', whirlpool: 'Whirlpool', dryhop: 'Dry Hop' }[ht] || ht;
      const dur = ht === 'dryhop'
        ? (h.hop_days != null ? h.hop_days + ' j' : '–')
        : (h.hop_time != null ? h.hop_time + ' min' : '–');
      hopHtml += `<tr>
        <td style="color:var(--hop);font-weight:500">${esc(h.name)}</td>
        <td>${h.quantity} ${h.unit}</td>
        <td>${h.alpha != null ? h.alpha + '%' : '–'}</td>
        <td><span style="font-size:.75rem;padding:2px 7px;border-radius:10px;background:rgba(16,185,129,.1);color:var(--hop)">${htLabel}</span></td>
        <td>${dur}</td>
      </tr>`;
    });
    hopHtml += '</tbody></table>';
  }

  // Levures + Autres
  const OTHER_TYPE_LABELS = {empatage:'Empâtage',ebullition:'Ébullition',flameout:'Flameout',whirlpool:'Whirlpool',dryhop:'Dry Hop',fermentation:'Fermentation',packaging:'Mise en bouteille'};
  let otherHtml = '';
  [{ cat: 'levure', label: 'Levures', color: 'var(--yeast)' }, { cat: 'autre', label: 'Autres', color: 'var(--other)' }].forEach(({ cat, label, color }) => {
    const items = recIngredients.filter(i => i.category === cat);
    if (!items.length) return;
    otherHtml += `<div class="rec-view-section" style="color:${color}">${label}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">`;
    items.forEach(i => {
      let addInfo = '';
      if (cat === 'autre') {
        const ot = i.other_type || 'ebullition';
        const otl = OTHER_TYPE_LABELS[ot] || ot;
        const timeStr = (ot === 'dryhop') ? (i.other_time != null ? ' · ' + i.other_time + ' j' : '')
          : (ot === 'ebullition' || ot === 'whirlpool') ? (i.other_time != null ? ' · ' + i.other_time + ' min' : '')
          : '';
        addInfo = `<span style="font-size:.72rem;color:${color};margin-left:5px">${otl}${timeStr}</span>`;
      }
      otherHtml += `<span style="background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:.82rem">
        <strong>${esc(i.name)}</strong> <span style="color:var(--muted)">${i.quantity} ${i.unit}</span>${addInfo}
      </span>`;
    });
    otherHtml += '</div>';
  });

  // Clone calc panel bars from the hidden form
  const calcSrc = document.getElementById('rec-calc-panel');

  const rvStarsHtml = Array.from({length:5}, (_, i) => {

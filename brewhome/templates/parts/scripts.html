// Synchronise tous les paramètres non-sensibles vers la base de données

    hubeau:            appSettings.hubeau           ? JSON.stringify(appSettings.hubeau)     : null,

    gh_vitrine_repo:   appSettings.github?.vitrine?.repo   || null,
    gh_vitrine_branch: appSettings.github?.vitrine?.branch || null,
    gh_vitrine_pat:    appSettings.github?.vitrine?.pat    || null,
    gh_data_repo:      appSettings.github?.data?.repo      || null,
    gh_data_branch:    appSettings.github?.data?.branch    || null,
    gh_data_pat:       appSettings.github?.data?.pat       || null,

    gh_data_backup_freq:    appSettings.github?.backup?.freq    || null,

    gh_data_backup_minute:  appSettings.github?.backup?.minute  != null ? String(appSettings.github.backup.minute)  : null,
    gh_data_backup_weekday: appSettings.github?.backup?.weekday != null ? String(appSettings.github.backup.weekday) : null,
    gh_data_backup_day:     appSettings.github?.backup?.day     != null ? String(appSettings.github.backup.day)     : null,
    gh_data_backup_notify:  appSettings.github?.backup?.notify  ? 'true' : null,

    ai_model:          appSettings.ai?.model        || null,
    ai_size:           appSettings.ai?.size         || null,
    ai_quality:        appSettings.ai?.quality      || null,
    ai_api_key:        appSettings.ai?.apiKey       || null,
    telegram_token:    appSettings.telegram?.token    || null,
    telegram_chat_id:  appSettings.telegram?.chatId   || null,
    telegram_tz:       appSettings.telegram?.tz       || null,

    hidden_world_events:  appSettings.hiddenWorldEvents?.length ? JSON.stringify(appSettings.hiddenWorldEvents) : null,
    world_event_overrides: appSettings.worldEventOverrides && Object.keys(appSettings.worldEventOverrides).length
      ? JSON.stringify(appSettings.worldEventOverrides) : null,
    default_brew_reminder_days: appSettings.defaultBrewReminderDays != null ? String(appSettings.defaultBrewReminderDays) : null,
  };
  api('PUT', '/api/app-settings', payload).catch(() => {});
}

// Reconstruit appSettings depuis les données serveur (priorité sur localStorage)
// Les clés sensibles (PATs GitHub, clé IA) restent uniquement dans localStorage
function _loadSettingsFromServer(srv) {
  if (!srv || !Object.keys(srv).length) return;
  // Apparence
  if (srv.app_name     != null) appSettings.appName     = srv.app_name     || null;
  if (srv.accent_color != null) appSettings.accentColor = srv.accent_color || null;
  if (srv.app_icon     != null) appSettings.appIcon     = srv.app_icon     || null;
  // Objets complexes (sérialisés en JSON)
  if (srv.thresholds != null) { try { appSettings.thresholds = JSON.parse(srv.thresholds); } catch(e) {} }
  if (srv.water      != null) { try { appSettings.water      = JSON.parse(srv.water);      } catch(e) {} }
  if (srv.energy     != null) { try { appSettings.energy     = JSON.parse(srv.energy);     } catch(e) {} }
  if (srv.vessels    != null) { try { appSettings.vessels    = JSON.parse(srv.vessels);    } catch(e) {} }
  if (srv.hubeau     != null) { try { appSettings.hubeau     = JSON.parse(srv.hubeau);     } catch(e) {} }
  if (srv.tz_offset  != null) appSettings.tz_offset = parseFloat(srv.tz_offset) || 0;
  // Langue
  if (srv.lang && LOCALES[srv.lang]) {
    _lang = srv.lang;
    _locale = LOCALES[_lang];
    localStorage.setItem('brewLang', _lang);
  }
  // GitHub
  if (srv.gh_vitrine_repo != null || srv.gh_vitrine_branch != null || srv.gh_vitrine_pat != null) {
    appSettings.github = appSettings.github || {};
    appSettings.github.vitrine = appSettings.github.vitrine || {};
    if (srv.gh_vitrine_repo   != null) appSettings.github.vitrine.repo   = srv.gh_vitrine_repo   || '';
    if (srv.gh_vitrine_branch != null) appSettings.github.vitrine.branch = srv.gh_vitrine_branch || 'main';
    if (srv.gh_vitrine_pat != null) appSettings.github.vitrine.pat = srv.gh_vitrine_pat || '';
  }
  if (srv.gh_data_repo != null || srv.gh_data_branch != null || srv.gh_data_pat != null) {
    appSettings.github = appSettings.github || {};
    appSettings.github.data = appSettings.github.data || {};
    if (srv.gh_data_repo   != null) appSettings.github.data.repo   = srv.gh_data_repo   || '';
    if (srv.gh_data_branch != null) appSettings.github.data.branch = srv.gh_data_branch || 'main';
    if (srv.gh_data_pat    != null) appSettings.github.data.pat    = srv.gh_data_pat    || '';
  }
  if (srv.gh_data_backup_enabled != null || srv.gh_data_backup_freq != null) {
    appSettings.github = appSettings.github || {};
    appSettings.github.backup = appSettings.github.backup || {};
    const bk = appSettings.github.backup;
    if (srv.gh_data_backup_enabled != null) bk.enabled = srv.gh_data_backup_enabled === 'true';
    if (srv.gh_data_backup_notify  != null) bk.notify  = srv.gh_data_backup_notify  === 'true';
    if (srv.gh_data_backup_freq    != null) bk.freq    = srv.gh_data_backup_freq;
    if (srv.gh_data_backup_hour    != null) bk.hour    = parseInt(srv.gh_data_backup_hour)   || 2;
    if (srv.gh_data_backup_minute  != null) bk.minute  = parseInt(srv.gh_data_backup_minute) || 0;
    if (srv.gh_data_backup_weekday != null) bk.weekday = parseInt(srv.gh_data_backup_weekday) ?? 0;
    if (srv.gh_data_backup_day     != null) bk.day     = parseInt(srv.gh_data_backup_day)    || 1;
    if (srv.gh_data_last_backup    != null) bk.lastBackup = srv.gh_data_last_backup;
  }
  // IA
  if (srv.ai_provider != null || srv.ai_model != null || srv.ai_size != null || srv.ai_quality != null || srv.ai_api_key != null) {
    appSettings.ai = appSettings.ai || {};
    if (srv.ai_provider != null) appSettings.ai.provider = srv.ai_provider;
    if (srv.ai_model    != null) appSettings.ai.model    = srv.ai_model;
    if (srv.ai_size     != null) appSettings.ai.size     = srv.ai_size;
    if (srv.ai_quality  != null) appSettings.ai.quality  = srv.ai_quality;
    if (srv.ai_api_key  != null) appSettings.ai.apiKey = srv.ai_api_key;
  }
  // Telegram
  if (srv.telegram_token != null || srv.telegram_chat_id != null ||
      srv.telegram_tz    != null || srv.telegram_notifs  != null) {
    appSettings.telegram = appSettings.telegram || {};
    if (srv.telegram_token   != null) appSettings.telegram.token  = srv.telegram_token  || '';
    if (srv.telegram_chat_id != null) appSettings.telegram.chatId = srv.telegram_chat_id || '';
    if (srv.telegram_tz      != null) appSettings.telegram.tz     = srv.telegram_tz     || 'Europe/Paris';
    if (srv.telegram_notifs  != null) {
      try { appSettings.telegram.notifs = JSON.parse(srv.telegram_notifs); } catch(e) {}
    }
  }
  if (srv.tg_brewing_events != null) {
    try { appSettings.brewEvents = JSON.parse(srv.tg_brewing_events); } catch(e) {}
  }
  if (srv.hidden_world_events != null) {
    try { appSettings.hiddenWorldEvents = JSON.parse(srv.hidden_world_events); } catch(e) {}
  }
  if (srv.world_event_overrides != null) {
    try { appSettings.worldEventOverrides = JSON.parse(srv.world_event_overrides); } catch(e) {}
  }
  if (srv.default_brew_reminder_days != null)
    appSettings.defaultBrewReminderDays = parseInt(srv.default_brew_reminder_days) || 45;
  localStorage.setItem('brewSettings', JSON.stringify(appSettings));
}
// Normalise une quantité vers l'unité de base de sa dimension
function toBaseVal(qty, unit) {
  if (unit === 'kg')  return { v: qty * 1000, dim: 'weight' };
  if (unit === 'g')   return { v: qty,        dim: 'weight' };
  if (unit === 'L')   return { v: qty * 1000, dim: 'volume' };
  if (unit === 'mL')  return { v: qty,        dim: 'volume' };
  return { v: qty, dim: 'count' }; // pièce, sachet, unité, …
}

let _lang   = localStorage.getItem('brewLang') || 'fr';
let _locale = LOCALES[_lang] || LOCALES.fr;

function t(key, fallback) {
  const val = key.split('.').reduce((o, k) => o?.[k], _locale);
  return val ?? fallback ?? key;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const val = t(el.dataset.i18n, el.textContent);
    el.textContent = val;
  });
}

// API
// ══════════════════════════════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({ error: r.statusText }));
    throw err;
  }
  return r.json();
}

function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  window.scrollTo(0, 0);
  _refreshPage(page);
}

async function _refreshPage(page) {
  try {
    if (page === 'dashboard') {
      [S.recipes, S.brews, S.beers, S.inventory, S.sodaKegs] = await Promise.all([
        api('GET', '/api/recipes'),
        api('GET', '/api/brews'),
        api('GET', '/api/beers'),
        api('GET', '/api/inventory'),
        api('GET', '/api/soda-kegs'),
      ]);
      renderDashboard();
    } else if (page === 'inventaire') {
      S.inventory = await api('GET', '/api/inventory');
      renderInventaire();
    } else if (page === 'recettes') {
      S.recipes = await api('GET', '/api/recipes');
      renderRecipeList();
    } else if (page === 'brassins') {
      [S.brews, S.spindles, S.tempSensors, S.sodaKegs] = await Promise.all([
        api('GET', '/api/brews'),
        api('GET', '/api/spindles'),
        api('GET', '/api/temperature'),
        api('GET', '/api/soda-kegs'),
      ]);
      renderBrassins();
    } else if (page === 'cave') {
      [S.beers, S.sodaKegs] = await Promise.all([
        api('GET', '/api/beers'),
        api('GET', '/api/soda-kegs'),
      ]);
      renderCave();
    } else if (page === 'spindles') {
      [S.spindles, S.tempSensors] = await Promise.all([
        api('GET', '/api/spindles'),
        api('GET', '/api/temperature'),
      ]);
      renderSpindles();
      renderTempSensors();
    } else if (page === 'calendrier') {
      [S.brews, S.drafts, S.customEvents] = await Promise.all([
        api('GET', '/api/brews'),
        api('GET', '/api/drafts'),
        api('GET', '/api/custom_events'),
      ]);
      renderCalendar();
    } else if (page === 'brouillons') {
      if (S.drafts.length) renderBrouillons(); // rendu immédiat avec cache
      S.drafts = await api('GET', '/api/drafts');
      renderBrouillons();
    } else if (page === 'kegs') {
      [S.sodaKegs, S.brews, S.beers] = await Promise.all([
        api('GET', '/api/soda-kegs'),
        S.brews.length ? Promise.resolve(S.brews) : api('GET', '/api/brews'),
        S.beers.length ? Promise.resolve(S.beers) : api('GET', '/api/beers'),
      ]);
      renderKegs();
    }
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
  } catch(e) { /* refresh silencieux */ }
}

// TOAST
// ══════════════════════════════════════════════════════════════════════════════
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'circle-xmark' : 'circle-info';
  el.innerHTML = `<i class="fas fa-${icon}"></i><span style="flex:1">${esc(msg)}</span><button class="toast-close" onclick="this.parentElement.remove()" title="${esc(t('common.close'))}">✕</button>`;
  document.getElementById('toast').appendChild(el);
  // Auto-fermeture : 5s pour les erreurs, 3s pour les autres
  const delay = type === 'error' ? 15000 : 5000;
  const timer = setTimeout(() => el.remove(), delay);
  // Annuler le timer si l'utilisateur ferme manuellement
  el.querySelector('.toast-close').addEventListener('click', () => clearTimeout(timer));
}

// ARCHIVE
// ══════════════════════════════════════════════════════════════════════════════
async function archiveItem(entity, id, archived) {
  const paths = {inv:'inventory', rec:'recipes', brew:'brews', cave:'beers'};
  try {
    const updated = await api('PATCH', `/api/${paths[entity]}/${id}`, {archived});
    const arr = {inv:S.inventory, rec:S.recipes, brew:S.brews, cave:S.beers}[entity];
    const idx = arr.findIndex(x=>x.id===id);
    if(idx!==-1) arr[idx] = {...arr[idx], archived: archived?1:0};
    ({inv:renderInventaire, rec:renderRecipeList, brew:renderBrassins, cave:renderCave})[entity]();
    toast(archived ? t('common.archived') : t('common.restored'), 'success');
  } catch(e) { toast(t('common.err_archive'), 'error'); }
}

function toggleShowArchived(section) {
  if(section==='inv')  { showArchivedInv  = !showArchivedInv;  renderInventaire(); }
  if(section==='rec')  { showArchivedRec  = !showArchivedRec;  renderRecipeList(); }
  if(section==='brew') { showArchivedBrew = !showArchivedBrew; renderBrassins();   }
  if(section==='cave') { showArchivedCave = !showArchivedCave; renderCave();       }
}

  const modal = document.querySelector('#modal-settings .modal');
  const head  = document.querySelector('#modal-settings .modal-head');
  const foot  = document.querySelector('#modal-settings .modal-foot');
  const body  = document.getElementById('settings-modal-body');
  const nav   = document.getElementById('settings-nav');
  if (!modal || !head || !foot || !body || !nav) return;
  const h = modal.offsetHeight - head.offsetHeight - foot.offsetHeight;
  console.log('[Settings] modal:', modal.offsetHeight, 'head:', head.offsetHeight, 'foot:', foot.offsetHeight, '→ body h:', h);
  body.style.height = h + 'px';
  nav.style.height  = h + 'px';
}

      <input type="number" id="cedit-tmax-${id}"   value="${item.temp_max??''}"          step="0.5" placeholder="T°max°C" style="width:80px" title="${t('settings.catalogue.field_tmax')}">
      <input type="number" id="cedit-dosage-${id}" value="${item.dosage_per_liter??''}"  step="0.01" placeholder="g/L"    style="width:70px" title="${t('settings.catalogue.field_dosage')}">
      <input type="number" id="cedit-attmin-${id}" value="${item.attenuation_min??''}"   step="1"    placeholder="Att.min%" style="width:78px" title="${t('settings.catalogue.field_att_min')}">
      <input type="number" id="cedit-attmax-${id}" value="${item.attenuation_max??''}"   step="1"    placeholder="Att.max%" style="width:78px" title="${t('settings.catalogue.field_att_max')}">
      <input type="number" id="cedit-alctol-${id}" value="${item.alcohol_tolerance??''}" step="0.5"  placeholder="Tol.alc%" style="width:82px" title="${t('settings.catalogue.field_alc_tol')}">

async function saveCatalogEdit(id) {
  const item = S.catalog.find(c => c.id === id);
  if (!item) return;
  const cat  = item.category;
  const name = document.getElementById(`cedit-name-${id}`).value.trim();
  if (!name) { toast(t('settings.toast.err_name_required'), 'error'); return; }
  const fv = (elId) => { const el = document.getElementById(elId); return el && el.value !== '' ? parseFloat(el.value) : null; };
  const payload = {
    name,
    category:    cat,
    subcategory: document.getElementById(`cedit-sub-${id}`).value.trim() || null,
    ebc:         cat === 'malt'    ? fv(`cedit-ebc-${id}`)    : null,
    max_usage_pct: cat === 'malt'  ? fv(`cedit-maxpct-${id}`) : null,
    alpha:       cat === 'houblon' ? fv(`cedit-alpha-${id}`)  : null,
    aroma_spec:  cat === 'houblon' ? (document.getElementById(`cedit-aroma-${id}`)?.value.trim() || null) : null,
    yeast_type:  cat === 'levure'  ? (document.getElementById(`cedit-ytype-${id}`)?.value.trim() || null) : null,
    temp_min:          cat === 'levure' ? fv(`cedit-tmin-${id}`)   : null,
    temp_max:          cat === 'levure' ? fv(`cedit-tmax-${id}`)   : null,
    dosage_per_liter:  cat === 'levure' ? fv(`cedit-dosage-${id}`) : null,
    attenuation_min:   cat === 'levure' ? fv(`cedit-attmin-${id}`) : null,
    attenuation_max:   cat === 'levure' ? fv(`cedit-attmax-${id}`) : null,
    alcohol_tolerance: cat === 'levure' ? fv(`cedit-alctol-${id}`) : null,
    default_unit: document.getElementById(`cedit-unit-${id}`).value,
  };
  try {
    const updated = await api('PUT', `/api/catalog/${id}`, payload);
    const idx = S.catalog.findIndex(c => c.id === id);
    if (idx !== -1) S.catalog[idx] = updated;
    renderSettingsCatalog(settingsCat);
    toast(t('settings.toast.catalog_updated'), 'success');
  } catch(e) { toast(t('settings.toast.err_update'), 'error'); }
}

async function addCatalogItem() {
  const name = document.getElementById('scat-name').value.trim();
  if (!name) { toast(t('settings.toast.err_name_required'), 'error'); return; }
  const sfv = (id) => { const el = document.getElementById(id); return el && el.value !== '' ? parseFloat(el.value) : null; };
  const payload = {
    name,
    category:    settingsCat,
    subcategory: document.getElementById('scat-sub').value.trim() || null,
    ebc:         sfv('scat-ebc'),
    max_usage_pct: sfv('scat-maxpct'),
    alpha:       sfv('scat-alpha'),
    aroma_spec:  document.getElementById('scat-aroma')?.value.trim() || null,
    yeast_type:  document.getElementById('scat-ytype').value.trim() || null,
    temp_min:          sfv('scat-tmin'),
    temp_max:          sfv('scat-tmax'),
    dosage_per_liter:  sfv('scat-dosage'),
    attenuation_min:   sfv('scat-attmin'),
    attenuation_max:   sfv('scat-attmax'),
    alcohol_tolerance: sfv('scat-alctol'),
    default_unit: document.getElementById('scat-unit').value,
  };
  try {
    const item = await api('POST', '/api/catalog', payload);
    S.catalog.push(item);
    ['scat-name','scat-sub','scat-ebc','scat-maxpct','scat-alpha','scat-aroma','scat-ytype',
     'scat-tmin','scat-tmax','scat-dosage','scat-attmin','scat-attmax','scat-alctol']
      .forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
    renderSettingsCatalog(settingsCat);
    toast(t('settings.toast.catalog_added'), 'success');
  } catch(e) { toast(t('settings.toast.err_add'), 'error'); }
}

async function deleteCatalogItem(id) {
  try {
    await api('DELETE', `/api/catalog/${id}`);
    S.catalog = S.catalog.filter(c => c.id !== id);
    renderSettingsCatalog(settingsCat);
    toast(t('settings.toast.catalog_deleted'), 'success');
  } catch(e) { toast(t('settings.toast.err_delete'), 'error'); }
}

function _wevId(label) { return label.replace(/[^a-zA-Z0-9]/g, '-'); }

function _worldEvRecurrenceLabel(eKey) {
  const year  = new Date().getFullYear();
  const evCur  = _brewingEvents(year).find(e => (e.canonical || e.label) === eKey);
  const evNext = _brewingEvents(year + 1).find(e => (e.canonical || e.label) === eKey);
  if (!evCur) return '';
  const cur  = evCur.date;
  const MONTHS = t('cal.months');
  const dCur = new Date(cur + 'T00:00:00');
  const month = dCur.getMonth(); // 0-indexed
  if (!evNext || cur.slice(5) === evNext.date.slice(5)) {
    // Même MM-JJ chaque année
    return `🔁 ${t('cal.rec_yearly')} · ${dCur.toLocaleDateString(_lang || 'fr', { day: 'numeric', month: 'long' })}`;
  }
  // Nième jour de la semaine du mois
  const nth    = Math.ceil(dCur.getDate() / 7);
  const dow    = dCur.getDay();
  const nthLbls = [null, t('cal.rec_1st'), t('cal.rec_2nd'), t('cal.rec_3rd'), t('cal.rec_4th')];
  const dowLbls = [t('cal.rec_dow_0'), t('cal.rec_dow_1'), t('cal.rec_dow_2'),
                   t('cal.rec_dow_3'), t('cal.rec_dow_4'), t('cal.rec_dow_5'), t('cal.rec_dow_6')];
  return `🔁 ${nthLbls[nth] || nth + 'e'} ${dowLbls[dow]} ${t('cal.rec_of')} ${MONTHS[month]}`;
}

function _worldEvMonthLabel(canonicalOrLabel) {
  const year = new Date().getFullYear();
  const evs  = _brewingEvents(year);
  const ev   = evs.find(e => (e.canonical || e.label) === canonicalOrLabel);
  if (!ev) return '';
  return new Date(ev.date + 'T00:00:00').toLocaleDateString(_lang || 'fr', { day:'numeric', month:'short' });
}

function saveWorldEventOverride(originalLabel) {
  const id      = _wevId(originalLabel);
  const emoji   = document.getElementById(`wev-emoji-${id}`)?.value.trim();
  const label   = document.getElementById(`wev-label-${id}`)?.value.trim();
  const color   = document.getElementById(`wev-color-${id}`)?.value;
  const desc    = document.getElementById(`wev-desc-${id}`)?.value.trim();
  const style   = document.getElementById(`wev-style-${id}`)?.value.trim();
  const dateVal = document.getElementById(`wev-date-${id}`)?.value; // YYYY-MM-DD
  const orig    = _brewingEvents(new Date().getFullYear()).find(e => (e.canonical || e.label) === originalLabel) || {};
  const origDet = _BREW_EV_DETAILS[originalLabel] || {};
  const origMmdd = (orig.date || '').slice(5); // MM-DD
  if (!appSettings.worldEventOverrides) appSettings.worldEventOverrides = {};
  const ov = {};
  if (emoji && emoji !== orig.emoji)        ov.emoji = emoji;
  if (label && label !== originalLabel)     ov.label = label;
  if (color && color !== orig.color)        ov.color = color;
  const _origDescBase = _lang === 'en' ? (origDet.desc_en || origDet.desc || '') : (origDet.desc || '');
  if (desc  !== undefined && desc  !== _origDescBase)  ov.desc  = desc;
  const _origStyleBase = _lang === 'en' ? (origDet.style_en || origDet.style || '') : (origDet.style || '');
  if (style !== undefined && style !== _origStyleBase)  ov.style = style;
  const newMmdd = dateVal ? dateVal.slice(5) : '';
  if (newMmdd && newMmdd !== origMmdd)      ov.date_mmdd = newMmdd;
  if (Object.keys(ov).length) {
    appSettings.worldEventOverrides[originalLabel] = ov;
  } else {
    delete appSettings.worldEventOverrides[originalLabel];
  }
  _editingWorldEv = null;
  saveSettings();
  _renderSettingsWorldEvents();
  renderCalendar();
  toast(t('settings.toast.event_updated'), 'success');
}

function resetWorldEventOverride(originalLabel) {
  if (appSettings.worldEventOverrides) delete appSettings.worldEventOverrides[originalLabel];
  _editingWorldEv = null;
  saveSettings();
  _renderSettingsWorldEvents();
  renderCalendar();
  toast(t('settings.toast.event_reset'), 'success');
}

function toggleWorldEvent(label, visible) {
  if (!appSettings.hiddenWorldEvents) appSettings.hiddenWorldEvents = [];
  if (visible) {
    appSettings.hiddenWorldEvents = appSettings.hiddenWorldEvents.filter(l => l !== label);
  } else {
    if (!appSettings.hiddenWorldEvents.includes(label)) appSettings.hiddenWorldEvents.push(label);
  }
  saveSettings();
  _renderSettingsWorldEvents();
  renderCalendar();
}

function toggleAllWorldEvents() {
  const hidden = appSettings.hiddenWorldEvents || [];
  const allEvs = _brewingEvents(new Date().getFullYear());
  const seen = new Set(); const unique = allEvs.filter(e => { const k = e.canonical||e.label; if(seen.has(k)) return false; seen.add(k); return true; });
  const allHidden = unique.every(e => hidden.includes(e.canonical || e.label));
  appSettings.hiddenWorldEvents = allHidden ? [] : unique.map(e => e.canonical || e.label);
  saveSettings();
  _renderSettingsWorldEvents();
  renderCalendar();
}

const HUBEAU_PARAMS = [
  { code: '1302', field: 'water-ph',   label: 'pH',           unit: '',      convert: v => Math.round(v * 10) / 10 },
  { code: '1374', field: 'water-ca',   label: 'Calcium',      unit: 'mg/L',  convert: v => Math.round(v) },
  { code: '1372', field: 'water-mg',   label: 'Magnésium',    unit: 'mg/L',  convert: v => Math.round(v) },
  { code: '1337', field: 'water-cl',   label: 'Chlorures',    unit: 'mg/L',  convert: v => Math.round(v) },
  { code: '1338', field: 'water-so4',  label: 'Sulfates',     unit: 'mg/L',  convert: v => Math.round(v) },
  // 1347 = TAC (Titre Alcalimétrique Complet) en °f → HCO₃⁻ mg/L (×12.2)
  { code: '1347', field: 'water-hco3', label: 'Bicarbonates (via TAC)', unit: 'mg/L', convert: v => Math.round(v * 12.2) },
];

async function hubEauDeptChange(preselect) {
  const dept = document.getElementById('hubeau-dept').value;
  const communeEl = document.getElementById('hubeau-commune');
  const fetchBtn  = document.getElementById('hubeau-fetch-btn');
  document.getElementById('hubeau-result').style.display = 'none';
  communeEl.disabled = true;
  fetchBtn.disabled  = true;
  communeEl.innerHTML = '<option value="">— Commune —</option>';
  if (!dept) { appSettings.hubeau = {}; saveSettings(); return; }
  // Sauvegarder le département (conserver la commune si on est en cours de restauration)
  appSettings.hubeau = { ...(appSettings.hubeau || {}), dept, commune: preselect || null };
  saveSettings();
  communeEl.innerHTML = `<option value="">${t('settings.toast.hubeau_loading')}</option>`;
  try {
    const url = `https://hubeau.eaufrance.fr/api/v1/qualite_eau_potable/resultats_dis?code_departement=${encodeURIComponent(dept)}&code_parametre=1302&size=5000&fields=code_commune,nom_commune`;
    const json = await fetch(url).then(r => r.json());
    const seen = new Set();
    const communes = (json.data || []).filter(c => {
      if (!c.nom_commune || seen.has(c.code_commune)) return false;
      seen.add(c.code_commune); return true;
    }).sort((a, b) => a.nom_commune.localeCompare(b.nom_commune, 'fr'));
    if (!communes.length) {
      communeEl.innerHTML = `<option value="">${t('settings.toast.hubeau_no_commune')}</option>`;
      return;
    }
    communeEl.innerHTML = '<option value="">— Commune —</option>' +
      communes.map(c => `<option value="${c.code_commune}">${c.nom_commune}</option>`).join('');
    // Restaurer la commune sauvegardée si elle est dans la liste
    if (preselect && communes.some(c => c.code_commune === preselect)) {
      communeEl.value = preselect;
      fetchBtn.disabled = false;
    }
    communeEl.disabled = false;
    communeEl.onchange = () => {
      const code = communeEl.value;
      fetchBtn.disabled = !code;
      document.getElementById('hubeau-result').style.display = 'none';
      // Sauvegarder la commune sélectionnée
      appSettings.hubeau = { ...(appSettings.hubeau || {}), commune: code || null };
      saveSettings();
    };
  } catch (e) {
    communeEl.innerHTML = `<option value="">${t('settings.toast.hubeau_error')}</option>`;
  }
}

async function hubEauFetch() {
  const commune = document.getElementById('hubeau-commune').value;
  if (!commune) return;
  const btn = document.getElementById('hubeau-fetch-btn');
  btn.disabled = true;
  btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${t('settings.toast.hubeau_loading')}`;
  const resultDiv = document.getElementById('hubeau-result');
  resultDiv.style.display = 'none';
  try {
    const BASE = 'https://hubeau.eaufrance.fr/api/v1/qualite_eau_potable/resultats_dis';
    const fetched = {};
    await Promise.all(HUBEAU_PARAMS.map(async p => {
      const url = `${BASE}?code_commune=${commune}&code_parametre=${p.code}&size=1&fields=resultat_numerique,date_prelevement`;
      const json = await fetch(url).then(r => r.json());
      if (json.data && json.data.length > 0) {
        const d = json.data[0];
        if (d.resultat_numerique != null) {
          fetched[p.code] = { raw: d.resultat_numerique, date: (d.date_prelevement || '').slice(0, 10) };
        }
      }
    }));

    if (!Object.keys(fetched).length) {
      resultDiv.innerHTML = `<p style="font-size:.85rem;color:var(--muted)"><i class="fas fa-circle-info"></i> ${t('settings.water.hubeau_no_data')}</p>`;
    } else {
      let rows = '';
      HUBEAU_PARAMS.forEach(p => {
        if (!fetched[p.code]) return;
        const converted = p.convert(fetched[p.code].raw);
        const curRaw    = document.getElementById(p.field)?.value;
        const current   = curRaw !== '' && curRaw != null ? parseFloat(curRaw) : null;
        const changed   = current === null || current !== converted;
        rows += `<tr data-field="${p.field}" data-value="${converted}">
          <td style="padding:5px 8px;font-size:.83rem">${p.label}</td>
          <td style="padding:5px 8px;font-size:.83rem;color:var(--muted)">${current !== null ? current + (p.unit ? ' ' + p.unit : '') : '—'}</td>
          <td style="padding:5px 8px;font-size:.83rem;font-weight:${changed ? '700' : '400'};color:${changed ? 'var(--success)' : 'inherit'}">${converted}${p.unit ? ' ' + p.unit : ''}</td>
          <td style="padding:5px 8px;font-size:.78rem;color:var(--muted)">${fetched[p.code].date}</td>
          <td style="padding:5px 8px;text-align:center"><input type="checkbox" class="hubeau-chk" ${changed ? 'checked' : ''} style="width:15px;height:15px;cursor:pointer"></td>
        </tr>`;
      });
      resultDiv.innerHTML = `
        <p style="font-size:.78rem;color:var(--muted);margin-bottom:8px"><i class="fas fa-circle-info"></i> ${t('settings.water.hubeau_hint_apply')}</p>
        <table style="width:100%;border-collapse:collapse;margin-bottom:12px">
          <thead>
            <tr style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)">
              <th style="padding:4px 8px;text-align:left;font-weight:600">${t('settings.water.hubeau_col_param')}</th>
              <th style="padding:4px 8px;text-align:left;font-weight:600">${t('settings.water.hubeau_col_current')}</th>
              <th style="padding:4px 8px;text-align:left;font-weight:600">HubEau</th>
              <th style="padding:4px 8px;text-align:left;font-weight:600">${t('common.date')}</th>
              <th style="padding:4px 8px;text-align:center;font-weight:600">${t('settings.water.hubeau_col_apply')}</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-primary btn-sm" onclick="hubEauApply()"><i class="fas fa-check"></i> ${t('settings.water.hubeau_apply_btn')}</button>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('hubeau-result').style.display='none'">${t('common.close')}</button>
        </div>`;
    }
  } catch (e) {
    resultDiv.innerHTML = `<p style="font-size:.85rem;color:var(--danger)"><i class="fas fa-triangle-exclamation"></i> ${t('settings.water.hubeau_err')} ${esc(e.message)}</p>`;
  }
  resultDiv.style.display = 'block';
  btn.disabled  = false;
  btn.innerHTML = `<i class="fas fa-satellite-dish"></i> ${t('settings.water.hubeau_fetch')}`;
}

function hubEauApply() {
  document.querySelectorAll('#hubeau-result tr[data-field]').forEach(row => {
    const chk = row.querySelector('.hubeau-chk');
    if (chk && chk.checked) {
      const input = document.getElementById(row.dataset.field);
      if (input) input.value = row.dataset.value;
    }
  });
  document.getElementById('hubeau-result').style.display = 'none';
}

function catLabel(c) { return t('cat.' + c, {malt:'Malt',houblon:'Houblon',levure:'Levure',autre:'Autre'}[c] || c); }

function renderDashboard() {
  const brews   = S.brews.filter(b => !b.archived);
  const recipes = S.recipes.filter(r => !r.archived);
  const beers   = S.beers.filter(b => !b.archived);
  const inv     = S.inventory.filter(i => !i.archived);

  // ── Chiffres clés ──────────────────────────────────────────────────────────
  const completed   = brews.filter(b => b.status === 'completed');
  const active      = brews.filter(b => ['planned','in_progress','fermenting'].includes(b.status));
  const totalVol    = brews.reduce((s,b) => s + (b.volume_brewed||0), 0);
  const abvBrews    = completed.filter(b => b.abv);
  const avgAbv      = abvBrews.length ? (abvBrews.reduce((s,b)=>s+b.abv,0)/abvBrews.length) : null;
  const caveL       = beers.reduce((s,b)=>s+(b.stock_33cl||0)*0.33+(b.stock_75cl||0)*0.75+(b.keg_liters||0),0);

  document.getElementById('dash-big-stats').innerHTML = `
    <div class="stat"><div class="stat-val" style="color:var(--info)">${totalVol.toFixed(0)} L</div><div class="stat-lbl">${t('dash.stat_vol')}</div></div>
    <div class="stat"><div class="stat-val">${recipes.length}</div><div class="stat-lbl">${t('dash.stat_recipes')}</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--hop)">${completed.length}<span style="font-size:.9rem;font-weight:400;color:var(--muted)"> / ${brews.length}</span></div><div class="stat-lbl">${t('dash.stat_brews')}</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--amber)">${caveL.toFixed(1)} L</div><div class="stat-lbl">${t('dash.stat_cave')}</div></div>`;

  // ── Brassins actifs ────────────────────────────────────────────────────────
  const STATUS_COLOR = { planned:'var(--info)', in_progress:'var(--amber)', fermenting:'var(--hop)' };
  const STATUS_LABEL = { planned: t('dash.status_planned'), in_progress: t('dash.status_in_progress'), fermenting: t('dash.status_fermenting') };
  const activeEl = document.getElementById('dash-active');
  const activeList = document.getElementById('dash-active-list');
  if (active.length) {
    document.getElementById('dash-active-title').textContent = active.length > 1 ? t('dash.active_title_plural').replace('${n}', active.length) : t('dash.active_title').replace('${n}', active.length);
    activeList.innerHTML = active.map(b => {
      const sp = S.spindles?.find(s => s.brew_id === b.id);
      const grav = sp?.last_gravity ? `<span style="color:var(--info);font-weight:700;font-size:.82rem">${sp.last_gravity.toFixed(3)}</span>` : '';
      return `<div class="card" style="flex:1;min-width:180px;max-width:260px;padding:14px;cursor:pointer" onclick="navigate('brassins')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div style="font-weight:700;font-size:.9rem">${esc(b.name)}</div>
          <span style="background:${STATUS_COLOR[b.status]};color:#000;border-radius:20px;padding:2px 8px;font-size:.7rem;white-space:nowrap;font-weight:700">${STATUS_LABEL[b.status]||b.status}</span>
        </div>
        ${b.recipe_name ? `<div style="font-size:.75rem;color:var(--muted);margin-bottom:4px"><i class="fas fa-scroll"></i> ${esc(b.recipe_name)}</div>` : ''}
        <div style="display:flex;gap:10px;font-size:.78rem;color:var(--muted)">
          ${b.volume_brewed ? `<span><i class="fas fa-droplet"></i> ${b.volume_brewed} L</span>` : ''}
          ${b.og ? `<span>OG ${b.og}</span>` : ''}
          ${grav}
        </div>
      </div>`;
    }).join('');
    activeEl.style.display = '';
  } else {
    activeEl.style.display = 'none';
  }

  // ── Colonne gauche : Top recettes + Stats styles ───────────────────────────
  const rated = [...recipes].filter(r => r.rating).sort((a,b) => b.rating-a.rating).slice(0,5);
  const styleCounts = {};
  brews.forEach(b => {
    const r = S.recipes.find(x => x.id === b.recipe_id);
    if (r?.style) styleCounts[r.style] = (styleCounts[r.style]||0) + 1;
  });
  const topStyles = Object.entries(styleCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  let leftHtml = '';
  if (rated.length) {
    leftHtml += `<div class="card" style="margin-bottom:16px">
      <div class="section-label" style="margin-bottom:12px">${t('dash.top_recipes')}</div>
      ${rated.map((r,i) => `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;${i<rated.length-1?'border-bottom:1px solid var(--border)':''};cursor:pointer" onclick="navigate('recettes')">
          <div style="font-size:1rem;font-weight:800;color:var(--muted);width:20px;text-align:center">${i+1}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.name)}</div>
            ${r.style ? `<div style="font-size:.75rem;color:var(--muted)">${esc(r.style)}</div>` : ''}
          </div>
          <div style="white-space:nowrap">${Array.from({length:5},(_,j)=>`<span style="color:${j<r.rating?'var(--amber)':'var(--border)'}">★</span>`).join('')}</div>
        </div>`).join('')}
    </div>`;
  }

  if (topStyles.length) {
    const maxCount = topStyles[0][1];
    leftHtml += `<div class="card">
      <div class="section-label" style="margin-bottom:12px">${t('dash.top_styles')}</div>
      ${topStyles.map(([style, count]) => `
        <div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:3px">
            <span>${esc(style)}</span>
            <span style="color:var(--muted)">${count > 1 ? t('dash.brew_count_plural').replace('${n}', count) : t('dash.brew_count').replace('${n}', count)}</span>
          </div>
          <div class="bottle-bar"><div class="bottle-bar-fill" style="width:${Math.round(count/maxCount*100)}%;background:var(--amber)"></div></div>
        </div>`).join('')}
    </div>`;
  }

  document.getElementById('dash-left').innerHTML = leftHtml || `<div class="card" style="color:var(--muted);font-size:.88rem;padding:20px">${t('dash.no_ratings')}</div>`;

  // ── Colonne droite : Highlights + Alertes inventaire ──────────────────────
  let rightHtml = '';

  // Highlights
  const highlights = [];
  if (avgAbv !== null)
    highlights.push(`<div style="text-align:center"><div style="font-size:1.8rem;font-weight:800;color:var(--amber)">${avgAbv.toFixed(1)}%</div><div style="font-size:.78rem;color:var(--muted)">${t('dash.avg_abv')}</div></div>`);
  if (completed.length) {
    const lastBrew = completed.sort((a,b)=>(b.id||0)-(a.id||0))[0];
    highlights.push(`<div style="text-align:center"><div style="font-size:.88rem;font-weight:700;max-width:120px;margin:0 auto;line-height:1.3">${esc(lastBrew.name)}</div><div style="font-size:.78rem;color:var(--muted)">${t('dash.last_brew')}</div></div>`);
  }
  if (topStyles[0])
    highlights.push(`<div style="text-align:center"><div style="font-size:.88rem;font-weight:700;max-width:120px;margin:0 auto;line-height:1.3">${esc(topStyles[0][0])}</div><div style="font-size:.78rem;color:var(--muted)">${t('dash.top_style')}</div></div>`);

  if (highlights.length) {
    rightHtml += `<div class="card" style="margin-bottom:16px">
      <div class="section-label" style="margin-bottom:14px">${t('dash.highlights')}</div>
      <div style="display:flex;justify-content:space-around;gap:8px;flex-wrap:wrap">${highlights.join('')}</div>
    </div>`;
  }

  // Alertes inventaire
  const lowStock = inv.filter(i => {
    const qty = (i.quantity||0) * (i.unit==='kg'?1000:1);
    return qty < getThresh(i.category);
  });
  if (lowStock.length) {
    const CAT_ICON = {malt:'fa-wheat-awn',houblon:'fa-seedling',levure:'fa-flask',autre:'fa-box'};
    rightHtml += `<div class="card">
      <div class="section-label" style="margin-bottom:12px;color:var(--danger)">${t('dash.low_stock').replace('${n}', lowStock.length)}</div>
      ${lowStock.slice(0,8).map(i => `
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;${lowStock.indexOf(i)<lowStock.length-1?'border-bottom:1px solid var(--border)':''}">
          <i class="fas ${CAT_ICON[i.category]||'fa-box'}" style="color:var(--muted);width:14px"></i>
          <span style="flex:1;font-size:.83rem">${esc(i.name)}</span>
          <span style="font-size:.78rem;color:var(--danger);font-weight:600">${i.quantity||0} ${i.unit}</span>
        </div>`).join('')}
      ${lowStock.length>8?`<div style="font-size:.75rem;color:var(--muted);margin-top:8px;text-align:center">${t('dash.low_stock_more').replace('${n}', lowStock.length-8)}</div>`:''}
    </div>`;
  } else {
    rightHtml += `<div class="card" style="color:var(--success);font-size:.85rem;padding:16px;text-align:center"><i class="fas fa-check-circle"></i> ${t('dash.inv_ok')}</div>`;
  }

  document.getElementById('dash-right').innerHTML = rightHtml;
}

function renderInventaire() {
  const filtered = S.inventory.filter(i => invFilter === 'all' || i.category === invFilter);
  const active = filtered.filter(i => !i.archived);
  const arch   = filtered.filter(i => i.archived);
  const shown  = showArchivedInv ? [...active, ...arch] : active;

  const tbody = document.getElementById('inv-body');
  tbody.innerHTML = '';
  document.getElementById('inv-empty').style.display = shown.length ? 'none' : 'block';

  shown.forEach(item => {
    const specs = [];
    if (item.ebc != null) specs.push(`<span class="badge badge-malt" style="font-size:.7rem">EBC ${item.ebc}</span>`);
    if (item.alpha != null) specs.push(`<span class="badge badge-houblon" style="font-size:.7rem">α ${item.alpha}%</span>`);
    if (item.price_per_unit != null) specs.push(`<span class="badge" style="font-size:.7rem;background:rgba(34,197,94,.12);color:var(--success)"><i class="fas fa-euro-sign" style="font-size:.6rem"></i> ${item.price_per_unit.toFixed(2)}/${INV_PRICE_LABELS[item.category]||'unité'}</span>`);
    const thresh  = getThresh(item.category);
    const isEmpty = item.quantity <= 0;
    let isLow = false;
    if (!isEmpty) {
      if (item.category === 'levure') {
        // Seuil en sachets : comparaison brute
        isLow = item.quantity < thresh;
      } else if (item.category === 'autre') {
        // Seuil par unité : comparaison directe dans l'unité de l'ingrédient
        const autreUnits = (appSettings.thresholds || {}).autre_units || { g: 100 };
        const unitThresh = autreUnits[item.unit];
        isLow = unitThresh != null && item.quantity < unitThresh;
      } else {
        // Malt / Houblon : seuil en grammes
        const qtyG = item.unit === 'kg' ? item.quantity * 1000 : item.quantity;
        isLow = qtyG < thresh;
      }
    }
    const qtyColor = isEmpty ? 'var(--danger)' : isLow ? '#f59e0b' : 'var(--text)';
    const archIcon = item.archived ? 'box-open' : 'box-archive';
    tbody.insertAdjacentHTML('beforeend', `
      <tr class="inv-row ${item.archived ? 'archived-item' : ''}" draggable="true" data-id="${item.id}">
        <td class="inv-drag-handle"><i class="fas fa-grip-vertical"></i></td>
        <td><strong>${esc(item.name)}</strong>${(() => { const ci = item.category === 'houblon' ? (S.catalog||[]).find(c=>c.category==='houblon'&&c.name===item.name) : null; return (ci&&ci.aroma_spec) ? `<div style="font-size:.72rem;color:var(--muted);font-style:italic;line-height:1.3;margin-top:1px">${esc(ci.aroma_spec)}</div>` : ''; })()}${item.notes ? `<div style="font-size:.78rem;color:var(--muted)">${esc(item.notes)}</div>` : ''}</td>
        <td><span class="badge badge-${item.category}">${catLabel(item.category)}</span></td>
        <td class="col-hide-sm" style="color:var(--muted);font-size:.85rem">${esc(item.origin||'')}</td>
        <td class="col-hide-sm">${specs.join(' ')}</td>
        <td style="text-align:right">
          <div style="display:inline-flex;align-items:center;gap:6px">
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="adjustQty(${item.id},-1)">−</button>
              <input class="qty-inp" type="number" value="${item.quantity}" min="0" step="0.001"
                     onchange="setQty(${item.id},parseFloat(this.value))" style="color:${qtyColor}">
              <span class="qty-unit">${esc(item.unit)}</span>
              <button class="qty-btn" onclick="adjustQty(${item.id},1)">+</button>
            </div>
          </div>
        </td>
        <td style="text-align:right">
          <div style="display:flex;gap:4px;justify-content:flex-end">
            <button class="btn btn-icon btn-ghost btn-sm" onclick="archiveItem('inv',${item.id},${item.archived?0:1})" title="${item.archived?t('common.restore'):t('common.archive')}"><i class="fas fa-${archIcon}"></i></button>
            <button class="btn btn-icon btn-ghost btn-sm" onclick="editInventoryItem(${item.id})" title="${t('common.edit')}"><i class="fas fa-pen"></i></button>
            <button class="btn btn-icon btn-danger btn-sm" onclick="deleteInventoryItem(${item.id})" title="${t('common.delete')}"><i class="fas fa-trash"></i></button>
          </div>
        </td>
      </tr>`);
  });

  // Drag-and-drop reorder
  let invDragSrcIdx = null;
  tbody.querySelectorAll('tr.inv-row').forEach((row, idx) => {
    row.addEventListener('dragstart', e => {
      invDragSrcIdx = idx;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(idx));
    });
    row.addEventListener('dragend', () => { row.classList.remove('dragging'); invDragSrcIdx = null; });
    row.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; row.classList.add('drag-over'); });
    row.addEventListener('dragleave', e => { if (!row.contains(e.relatedTarget)) row.classList.remove('drag-over'); });
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over');
      if (invDragSrcIdx === null || invDragSrcIdx === idx) return;
      const srcIdx = invDragSrcIdx;
      const [moved] = shown.splice(srcIdx, 1);
      shown.splice(idx, 0, moved);
      // Mettre à jour sort_order dans S.inventory ET retrier le tableau
      shown.forEach((item, i) => {
        const si = S.inventory.findIndex(x => x.id === item.id);
        if (si !== -1) S.inventory[si].sort_order = i;
      });
      S.inventory.sort((a, b) => (a.sort_order ?? 9999) - (b.sort_order ?? 9999));
      saveInvOrder();
      renderInventaire();
    });
  });

  // Stats (active only)
  const activeAll = S.inventory.filter(i => !i.archived);
  const counts = { malt:0, houblon:0, levure:0, autre:0 };
  activeAll.forEach(i => counts[i.category] = (counts[i.category]||0)+1);

  const maltKgTotal = activeAll.filter(i => i.category === 'malt')
    .reduce((s, i) => s + (i.unit === 'kg' ? i.quantity : i.unit === 'g' ? i.quantity / 1000 : 0), 0);
  const hopGTotal = activeAll.filter(i => i.category === 'houblon')
    .reduce((s, i) => s + (i.unit === 'g' ? i.quantity : i.unit === 'kg' ? i.quantity * 1000 : 0), 0);
  const maltQtyLabel = maltKgTotal > 0 ? (maltKgTotal >= 1 ? maltKgTotal.toFixed(2) + ' kg' : (maltKgTotal * 1000).toFixed(0) + ' g') : '';
  const hopQtyLabel  = hopGTotal  > 0 ? (hopGTotal >= 1000 ? (hopGTotal / 1000).toFixed(2) + ' kg' : hopGTotal.toFixed(0) + ' g') : '';

  document.getElementById('inv-stats').innerHTML = `
    <div class="stat"><div class="stat-val" style="color:var(--text)">${activeAll.length}</div><div class="stat-lbl">${t('inv.total_articles')}</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--malt)">${counts.malt}</div><div class="stat-lbl">${t('cat.malts')}</div>${maltQtyLabel ? `<div style="font-size:.78rem;color:var(--malt);opacity:.75;margin-top:3px">${maltQtyLabel}</div>` : ''}</div>
    <div class="stat"><div class="stat-val" style="color:var(--hop)">${counts.houblon}</div><div class="stat-lbl">${t('cat.houblons')}</div>${hopQtyLabel ? `<div style="font-size:.78rem;color:var(--hop);opacity:.75;margin-top:3px">${hopQtyLabel}</div>` : ''}</div>
    <div class="stat"><div class="stat-val" style="color:var(--yeast)">${counts.levure}</div><div class="stat-lbl">${t('cat.levures')}</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--other)">${counts.autre}</div><div class="stat-lbl">${t('cat.autres')}</div></div>`;

  // Archive button
  const archBtn = document.getElementById('inv-arch-btn');
  if (archBtn) {
    const archCount = S.inventory.filter(i => i.archived).length;
    archBtn.textContent = showArchivedInv ? t('inv.show_archives') : `\uD83D\uDDC3\uFE0F Archives (${archCount})`;
  }
}

let _saveInvOrderTimer = null;
function saveInvOrder() {
  clearTimeout(_saveInvOrderTimer);
  _saveInvOrderTimer = setTimeout(async () => {
    try {
      await api('PUT', '/api/inventory/reorder',
        S.inventory.map(item => ({ id: item.id, sort_order: item.sort_order ?? 9999 })));
    } catch(e) { toast(t('inv.err_save_order'), 'error'); }
  }, 600);
}

function setInvFilter(cat, btn) {
  invFilter = cat;
  document.querySelectorAll('#inv-filters .filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderInventaire();
}

const INV_PRICE_LABELS = { malt:'€/kg', houblon:'€/g', levure:'€/sachet', autre:'€/unité' };
function invCatChange() {
  const cat = document.getElementById('inv-f-cat').value;
  document.getElementById('inv-f-ebc-wrap').style.display   = cat === 'malt'    ? '' : 'none';
  document.getElementById('inv-f-alpha-wrap').style.display = cat === 'houblon' ? '' : 'none';
  document.getElementById('inv-f-aroma-wrap').style.display = cat === 'houblon' ? '' : 'none';
  const priceLabel = document.getElementById('inv-f-price-lbl');
  if (priceLabel) priceLabel.textContent = `${t('inv.field_price_label')} (${INV_PRICE_LABELS[cat] || '€/unité'})`;
  // Refresh suggest only if the name field is currently focused
  const nameInput = document.getElementById('inv-f-name');
  if (nameInput && document.activeElement === nameInput) invNameSuggest(nameInput);
}

async function adjustQty(id, delta) {
  const item = S.inventory.find(i => i.id === id);
  if (!item) return;
  const step = item.unit === 'g' || item.unit === 'mL' ? 100 : 0.1;
  const newQty = Math.max(0, parseFloat((item.quantity + delta * step).toFixed(3)));
  await setQty(id, newQty);
}
async function setQty(id, qty) {
  try {
    const updated = await api('PATCH', `/api/inventory/${id}/qty`, { quantity: qty });
    const idx = S.inventory.findIndex(i => i.id === id);
    if (idx !== -1) S.inventory[idx] = updated;
    renderInventaire();
  } catch(e) { toast(t('inv.err_update_qty'), 'error'); }
}

function openInvModal(item = null) {
  document.getElementById('inv-f-id').value    = item ? item.id : '';
  document.getElementById('inv-f-name').value  = item ? item.name : '';
  document.getElementById('inv-f-cat').value   = item ? item.category : 'malt';
  document.getElementById('inv-f-qty').value   = item ? item.quantity : 0;
  document.getElementById('inv-f-unit').value  = item ? item.unit : 'kg';
  document.getElementById('inv-f-ebc').value   = item ? (item.ebc||'') : '';
  document.getElementById('inv-f-alpha').value = item ? (item.alpha||'') : '';
  document.getElementById('inv-f-origin').value= item ? (item.origin||'') : '';
  const _ci = item && item.category === 'houblon' ? (S.catalog||[]).find(c => c.category === 'houblon' && c.name === item.name) : null;
  document.getElementById('inv-f-aroma').value = _ci ? (_ci.aroma_spec||'') : '';
  document.getElementById('inv-f-notes').value  = item ? (item.notes||'') : '';
  document.getElementById('inv-f-price').value  = item ? (item.price_per_unit ?? '') : '';
  document.getElementById('inv-modal-title').textContent = item ? t('inv.modal_title_edit') : t('inv.modal_title_add');
  invCatChange();
  openModal('inv-modal');
}

function editInventoryItem(id) { openInvModal(S.inventory.find(i => i.id === id)); }

function invNameSuggest(input) {
  const q   = input.value.toLowerCase();
  if (!q) { closeInvSuggest(); return; }
  const cat = document.getElementById('inv-f-cat').value;
  const sug = document.getElementById('inv-name-sug');
  _invSugItems = [];
  closeInvSuggest();
  const matches = S.catalog.filter(c =>
    c.category === cat && c.name.toLowerCase().includes(q)
  ).slice(0, 30);
  if (!matches.length) return;
  const groups = {};
  matches.forEach(c => {
    const g = c.subcategory || t('cat.autres');
    if (!groups[g]) groups[g] = [];
    groups[g].push(c);
  });
  let html = '';
  Object.entries(groups).forEach(([grp, items]) => {
    html += `<div class="ing-suggest-cat">${esc(grp)}</div>`;
    items.forEach(item => {
      const specs = [];
      if (item.ebc   != null) specs.push(`EBC ${item.ebc}`);
      if (item.alpha != null) specs.push(`α ${item.alpha}%`);
      const specTxt = specs.length ? ` <span style="color:var(--muted);font-size:.72rem">${specs.join(' · ')}</span>` : '';
      const _ii = _invSugItems.push(item) - 1;
      html += `<div class="ing-suggest-item" onmousedown="applyInvCatalog(_invSugItems[${_ii}])">
        <span>${esc(item.name)}${specTxt}</span>
      </div>`;
    });
  });
  sug.innerHTML = html;
  sug.classList.add('open');
}

function closeInvSuggest() {
  document.getElementById('inv-name-sug').classList.remove('open');
}

function applyInvCatalog(item) {
  document.getElementById('inv-f-name').value  = item.name;
  document.getElementById('inv-f-cat').value   = item.category;
  if (item.ebc   != null) document.getElementById('inv-f-ebc').value   = item.ebc;
  if (item.alpha != null) document.getElementById('inv-f-alpha').value = item.alpha;
  if (item.aroma_spec != null) document.getElementById('inv-f-aroma').value = item.aroma_spec;
  if (item.default_unit && !document.getElementById('inv-f-id').value)
    document.getElementById('inv-f-unit').value = item.default_unit;
  invCatChange();
  closeInvSuggest();
}

async function saveInventoryItem() {
  const name = document.getElementById('inv-f-name').value.trim();
  if (!name) { toast(t('inv.name_required'), 'error'); return; }
  const id  = document.getElementById('inv-f-id').value;
  const cat = document.getElementById('inv-f-cat').value;
  const payload = {
    name, category: cat,
    quantity: parseFloat(document.getElementById('inv-f-qty').value) || 0,
    unit:     document.getElementById('inv-f-unit').value,
    origin:   document.getElementById('inv-f-origin').value.trim() || null,
    ebc:           document.getElementById('inv-f-ebc').value   ? parseFloat(document.getElementById('inv-f-ebc').value)   : null,
    alpha:         document.getElementById('inv-f-alpha').value ? parseFloat(document.getElementById('inv-f-alpha').value) : null,
    notes:         document.getElementById('inv-f-notes').value.trim() || null,
    price_per_unit:document.getElementById('inv-f-price').value ? parseFloat(document.getElementById('inv-f-price').value) : null,
  };
  try {
    if (id) {
      const updated = await api('PUT', `/api/inventory/${id}`, payload);
      const idx = S.inventory.findIndex(i => i.id === parseInt(id));
      if (idx !== -1) S.inventory[idx] = updated;
    } else {
      const created = await api('POST', '/api/inventory', payload);
      S.inventory.push(created);
    }
    // Mettre à jour aroma_spec dans le catalogue si houblon
    if (cat === 'houblon') {
      const aromaVal = document.getElementById('inv-f-aroma').value.trim() || null;
      const catItem = (S.catalog||[]).find(c => c.category === 'houblon' && c.name === payload.name);
      if (catItem) {
        const updated = await api('PUT', `/api/catalog/${catItem.id}`, { ...catItem, aroma_spec: aromaVal });
        const ci = S.catalog.findIndex(c => c.id === catItem.id);
        if (ci !== -1) S.catalog[ci] = updated;
      }
    }
    closeModal('inv-modal');
    renderInventaire();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast(id ? t('inv.updated') : t('inv.added'), 'success');
  } catch(e) { toast(t('inv.err_save'), 'error'); }
}

async function deleteInventoryItem(id) {
  if (!confirm(t('common.confirm_delete'))) return;
  try {
    await api('DELETE', `/api/inventory/${id}`);
    S.inventory = S.inventory.filter(i => i.id !== id);
    renderInventaire();
    const stats = await api('GET', '/api/stats');
    updateNavBadges(stats);
    toast(t('inv.deleted'), 'success');
  } catch(e) { toast(t('common.delete') + ' — ' + t('common.error'), 'error'); }
}

function showRecipeListOnly() {
  recEditingId = null;
  document.getElementById('recipe-layout').classList.add('recipe-list-only');
  document.getElementById('rec-actions').innerHTML =
    `<button class="btn btn-primary" onclick="newRecipeFromList()"><i class="fas fa-plus"></i> Nouvelle recette</button>`;
  renderRecipeList();
}

function exitRecipeListOnly() {
  document.getElementById('recipe-layout').classList.remove('recipe-list-only');
}

function newRecipeFromList() {
  exitRecipeListOnly();
  clearRecipeForm();
}

function goToCaveFromRecipe(recipeId) {
  const r = S.recipes.find(x => x.id === recipeId);
  const el = document.getElementById('cave-search');
  if (el) el.value = r ? r.name : '';
  navigate('cave');
}

function setRecRating(v) {
  const current = parseInt(document.getElementById('rec-rating').value) || 0;
  const newVal = current === v ? 0 : v; // click same star = remove rating
  document.getElementById('rec-rating').value = newVal || '';
  renderRecStars(newVal);
}

function renderRecStars(n) {
  document.querySelectorAll('#rec-star-input .star').forEach((el, i) => {
    el.classList.toggle('on', i < n);
  });
  const lbl = document.getElementById('rec-rating-label');
  if (lbl) lbl.textContent = STAR_LABELS()[n] || t('rec.star_0');
}

async function rateRecipe(id, n) {
  const r = S.recipes.find(x => x.id === id);
  if (!r) return;
  const newRating = r.rating === n ? null : n; // toggle
  try {
    await api('PATCH', `/api/recipes/${id}`, { rating: newRating });
    r.rating = newRating;
    renderRecipeView();
    renderRecipeList();
  } catch(e) { toast(t('rec.err_notation'), 'error'); }
}

function recipeCost(r) {
  let total = 0, has = false;
  (r.ingredients || []).forEach(ing => {
    const c = ingCost(ing);
    if (c !== null) { total += c; has = true; }
  });
  const gas  = parseFloat(appSettings.energy?.gas_per_brew)  || 0;
  const elec = parseFloat(appSettings.energy?.elec_per_brew) || 0;
  if (gas  > 0) { total += gas;  has = true; }
  if (elec > 0) { total += elec; has = true; }
  return has ? total : null;
}

function renderRecipeList() {
  // Sync sort select
  const sortSel = document.getElementById('rec-sort-select');
  if (sortSel) sortSel.value = recSort;

  const q = (document.getElementById('rec-search')?.value || '').toLowerCase();

  const c = document.getElementById('recipe-list-container');
  const active = S.recipes.filter(r => !r.archived);
  const arch   = S.recipes.filter(r => r.archived);
  const shown  = (showArchivedRec ? [...active, ...arch] : active)
    .filter(r => !q || r.name.toLowerCase().includes(q) || (r.style || '').toLowerCase().includes(q));

  // Apply sort (archives always follow actives)
  const sortFn = {
    name:   (a, b) => a.name.localeCompare(b.name),
    rating: (a, b) => (b.rating || 0) - (a.rating || 0),
    style:  (a, b) => (a.style || '').localeCompare(b.style || ''),
    volume: (a, b) => b.volume - a.volume,
    recent: () => 0,
  }[recSort] || (() => 0);
  if (recSort !== 'recent') shown.sort(sortFn);

  if (!shown.length) {
    c.innerHTML = `<div class="empty" id="recipe-list-empty"><i class="fas fa-scroll"></i><p>${q ? t('common.no_results') : t('rec.list_empty')}</p></div>`;
  } else {
    const BREW_STATUS = {
      planned:    { icon:'calendar-plus',      color:'var(--muted)',    label:t('brew.status_planned') },
      in_progress:{ icon:'fire-flame-curved',  color:'var(--amber)',    label:t('brew.status_in_progress') },
      fermenting: { icon:'flask',              color:'var(--info)',     label:t('brew.status_fermenting') },
    };
    c.innerHTML = shown.map(r => {
      const cost = recipeCost(r);
      const costBadge = cost !== null
        ? `<span style="color:var(--success);font-weight:700;white-space:nowrap"><i class="fas fa-euro-sign" style="font-size:.65rem"></i> ${cost.toFixed(2)}</span>`
        : '';
      const starsHtml = r.rating
        ? `<span class="stars-sm">${Array.from({length:5},(_,i)=>`<span style="color:${i<r.rating?'var(--amber)':'var(--border)'}">\u2605</span>`).join('')}</span>`
        : '';

      // Brassins actifs liés à cette recette
      const activeBrews = S.brews.filter(b => b.recipe_id === r.id && !b.archived && b.status !== 'completed');
      // Stock en cave lié à cette recette
      const linkedBeers = S.beers.filter(b => b.recipe_id === r.id && !b.archived);
      const total33  = linkedBeers.reduce((s, b) => s + (b.stock_33cl   || 0), 0);
      const total75  = linkedBeers.reduce((s, b) => s + (b.stock_75cl   || 0), 0);
      const totalKeg = linkedBeers.reduce((s, b) => s + (b.keg_liters   || 0), 0);
      const hasStock = (total33 + total75 + totalKeg) > 0;

      let statusHtml = '';
      if (activeBrews.length > 0) {
        const brew = activeBrews[0];
        const bs = BREW_STATUS[brew.status] || { icon:'flask', color:'var(--muted)', label:brew.status };
        const brewLabel = activeBrews.length > 1
          ? `${activeBrews.length} ${t('rec.active_brews_plural')}`
          : esc(brew.name);
        statusHtml += `<button class="rec-status-btn" style="color:${bs.color};background:${bs.color}1a;border-color:${bs.color}55"
          onclick="event.stopPropagation();navigate('brassins')" title="${esc(brew.name)} — ${bs.label}">
          <i class="fas fa-${bs.icon}"></i> ${brewLabel}</button>`;
      }
      if (total33 + total75 > 0) {
        const parts = [total33 ? total33 + '\u00d7 33cl' : '', total75 ? total75 + '\u00d7 75cl' : ''].filter(Boolean).join(' · ');
        statusHtml += `<button class="rec-status-btn" style="color:var(--success);background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3)"
          onclick="event.stopPropagation();goToCaveFromRecipe(${r.id})" title="${t('rec.view_in_cave')}">
          <i class="fas fa-wine-bottle"></i> ${parts}</button>`;
      }
      if (totalKeg > 0) {
        statusHtml += `<button class="rec-status-btn" style="color:var(--amber);background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3)"
          onclick="event.stopPropagation();goToCaveFromRecipe(${r.id})" title="${t('rec.view_in_cave')}">
          <i class="fas fa-wine-barrel"></i> ${totalKeg} L</button>`;
      }
      if (!activeBrews.length && !hasStock) {
        statusHtml = `<span style="font-size:.72rem;color:var(--muted);font-style:italic"><i class="fas fa-circle-info"></i> ${t('rec.no_brew_no_stock')}</span>`;
      }

      const dragHandle = recSort === 'recent'
        ? `<span class="rec-drag-handle" onclick="event.stopPropagation()" title="${t('rec.drag_to_reorder')}"><i class="fas fa-grip-vertical"></i></span>`
        : '';
      return `
      <div class="recipe-item ${r.archived?'archived-item':''} ${recEditingId===r.id?'active':''}" data-id="${r.id}" ${recSort==='recent'?'draggable="true"':''} onclick="loadRecipeForm(${r.id})">
        ${dragHandle}
        <div style="min-width:0;flex:1">
          <div class="recipe-item-name">${esc(r.name)}</div>
          <div class="recipe-item-meta" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span>${r.batch_no ? '#' + r.batch_no + ' · ' : ''}${r.style ? esc(r.style) + ' · ' : ''}${r.volume}L · ${r.ingredients.length} ing.</span>
            ${starsHtml}
            ${costBadge}
          </div>
          <div class="recipe-item-status">${statusHtml}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0;margin-top:2px">
          <button class="btn btn-icon btn-ghost btn-sm" onclick="event.stopPropagation();archiveItem('rec',${r.id},${r.archived?0:1})" title="${r.archived?t('common.restore'):t('common.archive')}"><i class="fas fa-${r.archived?'box-open':'box-archive'}"></i></button>
          <button class="btn btn-icon btn-danger btn-sm" onclick="event.stopPropagation();deleteRecipe(${r.id})" title="${t('common.delete')}"><i class="fas fa-trash"></i></button>
        </div>
      </div>`;
    }).join('') || `<div style="color:var(--muted);padding:12px 0;text-align:center">${t('rec.no_active')}</div>`;
  }

  // Archive toggle button for recipes
  const archWrap = document.getElementById('rec-arch-wrap');
  if (archWrap) {
    const archCount = arch.length;
    archWrap.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="toggleShowArchived('rec')">${showArchivedRec ? t('rec.show_archives') : '\uD83D\uDDC3\uFE0F Archives (' + archCount + ')'}</button>`;
  }

  // ── Drag & drop reorder (mode "Récent" uniquement) ──
  if (recSort === 'recent') {
    let dragSrcIdx = null;
    c.querySelectorAll('.recipe-item[draggable]').forEach((item, idx) => {
      item.addEventListener('dragstart', e => {
        dragSrcIdx = idx;
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        c.querySelectorAll('.recipe-item').forEach(el => el.classList.remove('drag-over'));
      });
      item.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        c.querySelectorAll('.recipe-item').forEach(el => el.classList.remove('drag-over'));
        if (dragSrcIdx !== idx) item.classList.add('drag-over');
      });
      item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
      item.addEventListener('drop', e => {
        e.preventDefault();
        if (dragSrcIdx === null || dragSrcIdx === idx) return;
        // Reorder within shown list (active only or active+archived)
        const items = [...c.querySelectorAll('.recipe-item[draggable]')];
        const movedId = parseInt(items[dragSrcIdx].dataset.id);
        const targetId = parseInt(items[idx].dataset.id);
        const mi = S.recipes.findIndex(r => r.id === movedId);
        const ti = S.recipes.findIndex(r => r.id === targetId);
        if (mi === -1 || ti === -1) return;
        const [moved] = S.recipes.splice(mi, 1);
        S.recipes.splice(ti, 0, moved);
        dragSrcIdx = null;
        saveRecipeOrder();
        renderRecipeList();
      });
    });
  }
}

// Water calcs
function recCalc() {
  const vol  = parseFloat(document.getElementById('rec-volume').value) || 20;
  const boil = parseFloat(document.getElementById('rec-boil-time').value) || 60;
  const ratio= parseFloat(document.getElementById('rec-mash-ratio').value) || 3;
  const evap = parseFloat(document.getElementById('rec-evap').value) || 3;
  const abs  = parseFloat(document.getElementById('rec-absorption').value) || 0.8;

  const grainKg = recIngredients.filter(i=>i.category==='malt')
    .reduce((s,i) => s + (i.unit==='kg' ? i.quantity : i.quantity/1000), 0);

  const preboil     = vol + evap * (boil/60);
  const grainAbs    = grainKg * abs;
  const totalWater  = preboil + grainAbs;          // Eau totale toujours nécessaire

  // Eau d'empâtage : ratio voulu, mais au minimum 55 % du total
  // pour garantir empâtage ≥ rinçage dans tous les cas
  const mashFromRatio = grainKg * ratio;
  const mashMin       = totalWater * 0.55;
  const mashWater     = grainKg > 0 ? Math.max(mashFromRatio, mashMin) : 0;
  const sparge        = Math.max(0, totalWater - mashWater);

  const fmtL = v => v > 0 ? v.toFixed(1) : '–';
  const hasGrain = grainKg > 0;
  document.getElementById('rw-mash').textContent   = hasGrain ? fmtL(mashWater) : '–';
  document.getElementById('rw-sparge').textContent = hasGrain ? fmtL(sparge) : '–';
  document.getElementById('rw-preboil').textContent= fmtL(preboil);
  document.getElementById('rw-total').textContent  = hasGrain ? fmtL(totalWater) : '–';

  // Volumes cuves + alertes dépassement
  // Cuve empatage : eau + volume du grain (≈ 0.67 L/kg de grain sec)
  const _grainVol  = grainKg * 0.67;
  const _mashTotal = mashWater + _grainVol;
  const _vs = appSettings.vessels || {};
  const _vesselChecks = [
    { key: 'sparge', vol: sparge,     icon: 'fa-shower',        label: t('rec.hop_sparge'), sub: `${sparge.toFixed(1)} L eau` },
    { key: 'mash',   vol: _mashTotal, icon: 'fa-temperature-half', label: t('rec.hop_empatage'), sub: `${mashWater.toFixed(1)} L eau + ${_grainVol.toFixed(1)} L grain` },
    { key: 'boil',   vol: preboil,    icon: 'fa-fire-burner',   label: t('rec.hop_ebullition'), sub: `${preboil.toFixed(1)} L ${t('rec.preboil_label')}` },
  ];
  const _vesselWarnEl = document.getElementById('rw-vessel-warnings');
  if (_vesselWarnEl && !hasGrain) { _vesselWarnEl.innerHTML = ''; }
  if (_vesselWarnEl && hasGrain) {
    _vesselWarnEl.innerHTML = `<div style="display:flex;gap:8px;flex-wrap:wrap">` + _vesselChecks.map(c => {
      const cap     = _vs[c.key] > 0 ? _vs[c.key] : null;
      const over    = cap && c.vol > cap;
      const pct     = cap ? Math.min(c.vol / cap * 100, 100) : 0;
      const color   = over ? 'var(--danger)' : cap ? 'var(--success)' : 'var(--muted)';
      const bg      = over ? 'rgba(239,68,68,.08)'  : cap ? 'rgba(16,185,129,.06)' : 'var(--card2)';
      const border  = over ? 'rgba(239,68,68,.35)'  : cap ? 'rgba(16,185,129,.25)' : 'var(--border)';
      const barColor= over ? '#ef4444' : '#10b981';
      const capLine = cap
        ? `<div style="margin-top:4px;height:4px;border-radius:2px;background:var(--border);overflow:hidden">
             <div style="width:${pct.toFixed(1)}%;height:100%;background:${barColor};transition:width .3s"></div>
           </div>
           <div style="font-size:.7rem;color:${color};margin-top:2px">${c.vol.toFixed(1)} / ${cap} L${over ? ` <i class="fas fa-triangle-exclamation"></i> ${t('rec.vessel_overflow')}` : ''}</div>`
        : `<div style="font-size:.7rem;color:var(--muted);margin-top:2px">${c.vol.toFixed(1)} L <span style="opacity:.6">(${t('rec.vessel_no_limit')})</span></div>`;
      return `<div style="flex:1;min-width:130px;padding:7px 10px;background:${bg};border:1px solid ${border};border-radius:8px">
        <div style="display:flex;align-items:center;gap:5px;font-size:.78rem;font-weight:600;color:${color}">
          <i class="fas ${c.icon}" style="font-size:.72rem"></i> ${c.label}
        </div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:1px">${c.sub}</div>
        ${capLine}
      </div>`;
    }).join('') + `</div>`;
  }

  calcBrewStats();
  // Sync water correction panel volumes (always)
  if (hasGrain) {
    const wcMash   = document.getElementById('wc-volume-mash');
    const wcSparge = document.getElementById('wc-volume-sparge');
    if (wcMash)   wcMash.value   = mashWater.toFixed(1);
    if (wcSparge) wcSparge.value = sparge.toFixed(1);
    if (document.getElementById('rec-wc-panel')?.style.display !== 'none') calcWaterCorrection();
  }
}

// ── Conversion d'unité pour calcul de coût ───────────────────────────────────
function convertQtyForCost(qty, from, to) {
  if (from === to) return qty;
  if (from === 'g'  && to === 'kg') return qty / 1000;
  if (from === 'kg' && to === 'g')  return qty * 1000;
  if ((from === 'ml' || from === 'mL') && to === 'L')  return qty / 1000;
  if (from === 'L' && (to === 'ml' || to === 'mL'))   return qty * 1000;
  return null; // incompatible
}

// Unité canonique dans laquelle le prix est toujours saisi/stocké
const CANONICAL_PRICE_UNIT = { malt: 'kg', houblon: 'g', levure: 'sachet' };

function ingCost(ing) {
  const inv = ing.inventory_item_id
    ? S.inventory.find(i => i.id === ing.inventory_item_id)
    : S.inventory.find(i => i.name.toLowerCase() === ing.name.toLowerCase() && i.category === ing.category);
  if (!inv || inv.price_per_unit == null) return null;
  // Convertir la quantité de l'ingrédient vers l'unité canonique du prix
  // (ex: g → kg pour les malts, peu importe l'unité de stockage)
  const priceUnit = CANONICAL_PRICE_UNIT[ing.category] || inv.unit;
  const converted = convertQtyForCost(ing.quantity || 0, ing.unit, priceUnit);
  if (converted === null) return null;
  return converted * inv.price_per_unit;
}

// ── Scale recette ────────────────────────────────────────────────────────────
function openScaleModal() {
  const vol = parseFloat(document.getElementById('rec-volume').value) || 0;
  if (!vol) { toast(t('rec.err_no_volume'), 'error'); return; }
  document.getElementById('scale-from').value = vol;
  document.getElementById('scale-to').value   = '';
  document.getElementById('scale-preview').textContent = '';
  document.getElementById('modal-scale').classList.add('open');
  setTimeout(() => document.getElementById('scale-to').focus(), 80);
}
function closeScaleModal() {
  document.getElementById('modal-scale').classList.remove('open');
}
function updateScalePreview() {
  const from = parseFloat(document.getElementById('scale-from').value) || 0;
  const to   = parseFloat(document.getElementById('scale-to').value)   || 0;
  const el   = document.getElementById('scale-preview');
  if (!from || !to || !recIngredients.length) { el.innerHTML = ''; return; }
  const ratio = to / from;
  const fmtQ = (q, u) => {
    const v = Math.round(q * 1000) / 1000;
    return `${v % 1 === 0 ? v : v.toFixed(2)} ${u}`;
  };
  const CATS = [
    { key: 'malt',    label: 'Malts',    icon: 'fa-wheat-awn',    color: 'var(--malt)' },
    { key: 'houblon', label: 'Houblons', icon: 'fa-seedling',     color: 'var(--hop)'  },
    { key: 'levure',  label: 'Levures',  icon: 'fa-flask',        color: 'var(--yeast)'},
    { key: 'autre',   label: 'Autres',   icon: 'fa-box',          color: 'var(--other)'},
  ];
  const rows = CATS.map(cat => {
    const items = recIngredients.filter(i => i.category === cat.key && i.name && i.quantity > 0);
    if (!items.length) return '';
    const lines = items.map(i => {
      const newQ = i.quantity * ratio;
      return `<div style="display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;border-bottom:1px solid var(--border)">
        <span style="color:var(--text);font-size:.82rem">${esc(i.name)}</span>
        <span style="white-space:nowrap;font-size:.82rem">
          <span style="color:var(--muted)">${fmtQ(i.quantity, i.unit)}</span>
          <span style="color:var(--muted);margin:0 4px">→</span>
          <span style="color:${cat.color};font-weight:600">${fmtQ(newQ, i.unit)}</span>
        </span>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:8px">
      <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:${cat.color};margin-bottom:4px">
        <i class="fas ${cat.icon}"></i> ${cat.label}
      </div>
      ${lines}
    </div>`;
  }).join('');
  el.innerHTML = `
    <div style="font-size:.8rem;color:var(--muted);text-align:center;margin-bottom:10px">
      Facteur <strong style="color:var(--text)">${ratio.toFixed(3)}×</strong>
    </div>
    <div style="max-height:260px;overflow-y:auto;padding-right:2px">${rows}</div>`;
}
function applyScale() {
  const from = parseFloat(document.getElementById('scale-from').value) || 0;
  const to   = parseFloat(document.getElementById('scale-to').value)   || 0;
  if (!from || !to) { toast(t('rec.err_invalid_volume'), 'error'); return; }
  if (to === from)  { closeScaleModal(); return; }
  const ratio = to / from;
  recIngredients.forEach(ing => {
    if (ing.quantity != null) ing.quantity = Math.round(ing.quantity * ratio * 1000) / 1000;
  });
  document.getElementById('rec-volume').value = to;
  renderIngredientRows();
  recCalc();
  closeScaleModal();
  toast(t('rec.scaled').replace('${from}', from).replace('${to}', to).replace('${ratio}', ratio.toFixed(2)), 'success');
}

// Ingredient rows
let ingRowId = 0;
function addIngRow(cat, data = null) {
  const rid = ++ingRowId;
  const ing = data || { _rid: rid, category: cat, name: '', quantity: 0,
    unit: cat==='malt'?'kg':cat==='houblon'?'g':cat==='levure'?'sachet':'g',
    hop_type: cat==='houblon' ? 'ebullition' : null,
    other_type: cat==='autre' ? 'ebullition' : null,
    inventory_item_id: null };
  if (!data) { ing._rid = rid; recIngredients.push(ing); }
  else ing._rid = rid;
  renderIngredientRows();
}

function renderIngredientRows() {
  const container = document.getElementById('rec-ingredients');
  if (!recIngredients.length) {
    container.innerHTML = `<div style="color:var(--muted);font-size:.875rem;padding:12px 0">${t('rec.no_ing')}</div>`;

  const cats = ['malt','houblon','levure','autre'];

    .filter(i => i.category === 'malt')
    .reduce((s, i) => s + (i.unit === 'kg' ? i.quantity : i.quantity / 1000), 0);

    .filter(i => i.category === 'houblon')
    .reduce((s, i) => s + (i.unit === 'kg' ? i.quantity * 1000 : i.quantity), 0);

  cats.forEach(cat => {
    const ings = recIngredients.filter(i => i.category === cat);

            <div class="ing-lbl"><i class="fas fa-clock"></i> ${t('rec.ing_min')}</div>
            <input type="number" placeholder="min" step="1" min="0" value="${ing.other_time!=null?ing.other_time:''}"
              onchange="recIngredients[${realIdx}].other_time=parseFloat(this.value)||null"
              style="font-size:.8rem">
          </div>` : needsDays ? `
          <div style="flex-shrink:0;width:88px">
            <div class="ing-lbl"><i class="fas fa-calendar-days"></i> ${t('rec.ing_days')}</div>
            <input type="number" placeholder="${t('rec.ing_days').toLowerCase()}" step="1" min="0" value="${ing.other_time!=null?ing.other_time:''}"
              onchange="recIngredients[${realIdx}].other_time=parseFloat(this.value)||null"
              style="font-size:.8rem">
          </div>` : '';
        extraFields = `
          <div style="flex-shrink:0;min-width:152px">
            <div class="ing-lbl"><i class="fas fa-tag"></i> ${t('rec.ing_stage')}</div>
            <select onchange="recIngredients[${realIdx}].other_type=this.value;renderIngredientRows()" style="font-size:.8rem">

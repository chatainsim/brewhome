<style>
#modal-settings .snav-btn {
  display:flex;align-items:center;gap:10px;padding:9px 13px;
  border-radius:8px;width:100%;border:none;background:none;
  color:var(--text);cursor:pointer;font-size:.85rem;text-align:left;
  font-weight:500;transition:background .15s,color .15s;white-space:nowrap;
}
#modal-settings .snav-btn:hover:not(.active) { background:var(--hover,rgba(128,128,128,.1)); }
#modal-settings .snav-btn.active { background:var(--amber);color:#000; }
#modal-settings .snav-btn .si { width:15px;text-align:center;flex-shrink:0;opacity:.7; }
#modal-settings .snav-btn.active .si { opacity:1; }
#modal-settings .snav-sep { height:1px;background:var(--border);margin:5px 6px; }
#modal-settings .snav-group {
  font-size:.67rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--muted);padding:8px 13px 3px;
}
/* Override du CSS global nav { position:fixed; top:0; left:0; right:0; height:56px } */
#modal-settings nav {
  position:static;
  top:auto; left:auto; right:auto;
  z-index:auto;
  background:var(--card2);
}
</style>

<div class="modal-overlay" id="modal-settings" onclick="if(event.target===this)closeSettings()">
  <div class="modal" style="max-width:900px;width:96vw;overflow:hidden">
    <div class="modal-head">
      <h3><i class="fas fa-gear" style="color:var(--amber)"></i> <span data-i18n="settings.title">Paramètres avancés</span></h3>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>

    <div class="modal-body" id="settings-modal-body" style="padding:0;display:flex;overflow:hidden">

      <!-- ── Sidebar navigation ─────────────────────────────────────────── -->
      <nav id="settings-nav" style="width:188px;flex-shrink:0;border-right:1px solid var(--border);padding:8px;
                  display:flex;flex-direction:column;gap:1px;overflow-y:auto;background:var(--card2)">

        <div class="snav-group" data-i18n="settings.groups.brewery">Brasserie</div>
        <button class="snav-btn active" data-tab="catalogue" onclick="settingsTab('catalogue')">
          <i class="fas fa-book si"></i> <span data-i18n="settings.tabs.catalogue">Catalogue</span>
        </button>
        <button class="snav-btn" data-tab="thresholds" onclick="settingsTab('thresholds')">
          <i class="fas fa-gauge-high si"></i> <span data-i18n="settings.tabs.thresholds">Seuils de stock</span>
        </button>
        <button class="snav-btn" data-tab="water" onclick="settingsTab('water')">
          <i class="fas fa-droplet si"></i> <span data-i18n="settings.tabs.water">Eau &amp; Énergie</span>
        </button>
        <button class="snav-btn" data-tab="calendrier" onclick="settingsTab('calendrier')">
          <i class="fas fa-calendar-days si"></i> <span data-i18n="settings.tabs.calendrier">Calendrier</span>
        </button>

        <div class="snav-sep"></div>
        <div class="snav-group" data-i18n="settings.groups.integrations">Intégrations</div>
        <button class="snav-btn" data-tab="github" onclick="settingsTab('github')">
          <i class="fa-brands fa-github si"></i> GitHub
        </button>
        <button class="snav-btn" data-tab="ai" onclick="settingsTab('ai')">
          <i class="fas fa-wand-magic-sparkles si"></i> <span data-i18n="settings.tabs.ai">IA</span>
        </button>
        <button class="snav-btn" data-tab="notif" onclick="settingsTab('notif')">
          <i class="fab fa-telegram si"></i> <span data-i18n="settings.tabs.notif">Notifications</span>
        </button>

        <div class="snav-sep"></div>
        <div class="snav-group" data-i18n="settings.groups.app">Application</div>
        <button class="snav-btn" data-tab="apparence" onclick="settingsTab('apparence')">
          <i class="fas fa-palette si"></i> <span data-i18n="settings.tabs.apparence">Apparence</span>
        </button>
        <button class="snav-btn" data-tab="lang" onclick="settingsTab('lang')">
          <i class="fas fa-language si"></i> <span data-i18n="settings.tabs.lang">Langue</span>
        </button>
        <button class="snav-btn" data-tab="import" onclick="settingsTab('import')">
          <i class="fas fa-file-import si"></i> <span data-i18n="settings.tabs.import">Import / Export</span>
        </button>
        <button class="snav-btn" data-tab="updates" onclick="settingsTab('updates')">
          <i class="fas fa-arrow-up-right-dots si"></i> <span data-i18n="settings.tabs.updates">Mises à jour</span>
        </button>
        <button class="snav-btn" data-tab="checklist" onclick="settingsTab('checklist')">
          <i class="fas fa-clipboard-list si"></i> <span data-i18n="settings.tabs.checklist">Checklists</span>
        </button>
        <button class="snav-btn" data-tab="trash" onclick="settingsTab('trash')">
          <i class="fas fa-trash-can si"></i> <span data-i18n="settings.tabs.trash">Corbeille</span>
        </button>

      </nav>

      <!-- ── Contenu ────────────────────────────────────────────────────── -->
      <div style="flex:1;overflow-y:auto;padding:22px 26px;min-width:0">

        <!-- TAB CATALOGUE -->
        <div id="stab-catalogue">
          <div class="cat-chips" id="settings-cat-chips">
            <button class="cat-chip active" data-cat="malt" onclick="renderSettingsCatalog('malt')" style="color:var(--malt);border-color:var(--malt)"><i class="fas fa-seedling"></i> <span data-i18n="cat.malts">Malts</span></button>
            <button class="cat-chip" data-cat="houblon" onclick="renderSettingsCatalog('houblon')" style="color:var(--hop)"><i class="fas fa-leaf"></i> <span data-i18n="cat.houblons">Houblons</span></button>
            <button class="cat-chip" data-cat="levure" onclick="renderSettingsCatalog('levure')" style="color:var(--yeast)"><i class="fas fa-flask"></i> <span data-i18n="cat.levures">Levures</span></button>
            <button class="cat-chip" data-cat="autre" onclick="renderSettingsCatalog('autre')" style="color:var(--other)"><i class="fas fa-box"></i> <span data-i18n="cat.autres">Autres</span></button>
          </div>
          <div class="catalog-list" id="settings-catalog-list"></div>
          <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
            <div style="font-weight:700;margin-bottom:12px;font-size:.9rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em" data-i18n="settings.catalogue.add_title">Ajouter au catalogue</div>
            <div class="form-row cols-2" style="margin-bottom:10px">
              <div class="field"><label data-i18n="settings.catalogue.field_name">Nom</label> <span class="req">*</span><input type="text" id="scat-name" placeholder="Ex : Maris Otter"></div>
              <div class="field"><label data-i18n="settings.catalogue.field_sub">Sous-catégorie</label><input type="text" id="scat-sub" placeholder="Ex : Base, Aromatique…"></div>
            </div>
            <div class="form-row cols-3" style="margin-bottom:10px">
              <div class="field" id="scat-ebc-wrap"><label data-i18n="settings.catalogue.field_ebc">EBC</label><input type="number" id="scat-ebc" step="0.1" placeholder="Ex : 6.5"></div>
              <div class="field" id="scat-maxpct-wrap" style="display:none"><label data-i18n="settings.catalogue.field_maxpct">% max recette</label><input type="number" id="scat-maxpct" step="1" min="0" max="100" placeholder="Ex : 15"></div>
              <div class="field" id="scat-alpha-wrap" style="display:none"><label data-i18n="settings.catalogue.field_alpha">Alpha (%)</label><input type="number" id="scat-alpha" step="0.1" placeholder="Ex : 12.5"></div>
              <div class="field" id="scat-ytype-wrap" style="display:none"><label data-i18n="settings.catalogue.field_ytype">Type levure</label><input type="text" id="scat-ytype" placeholder="Ex : Ale, Lager…"></div>
            </div>
            <div id="scat-aroma-wrap" style="display:none;margin-bottom:10px">
              <div class="field"><label data-i18n="settings.catalogue.field_aroma">Arômes</label><input type="text" id="scat-aroma" placeholder="Ex : citrus, tropical, floral…"></div>
            </div>
            <div class="form-row cols-3" style="margin-bottom:10px;display:none" id="_scat-filler">
              <div class="field"><label data-i18n="settings.catalogue.field_unit">Unité défaut</label>
                <select id="scat-unit"><option value="kg">kg</option><option value="g">g</option><option value="L">L</option><option value="mL">mL</option><option value="unité">unité</option></select>
              </div>
            </div>
            <div id="scat-yeast-wrap" style="display:none;margin-bottom:10px">
              <div class="form-row cols-3" style="margin-bottom:8px">
                <div class="field"><label data-i18n="settings.catalogue.field_tmin">T° min ferment. (°C)</label><input type="number" id="scat-tmin" step="0.5" placeholder="Ex : 18"></div>
                <div class="field"><label data-i18n="settings.catalogue.field_tmax">T° max ferment. (°C)</label><input type="number" id="scat-tmax" step="0.5" placeholder="Ex : 22"></div>
                <div class="field"><label data-i18n="settings.catalogue.field_dosage">Dosage (g/L)</label><input type="number" id="scat-dosage" step="0.01" placeholder="Ex : 0.5"></div>
              </div>
              <div class="form-row cols-3">
                <div class="field"><label data-i18n="settings.catalogue.field_att_min">Atténuation min (%)</label><input type="number" id="scat-attmin" step="1" placeholder="Ex : 72"></div>
                <div class="field"><label data-i18n="settings.catalogue.field_att_max">Atténuation max (%)</label><input type="number" id="scat-attmax" step="1" placeholder="Ex : 80"></div>
                <div class="field"><label data-i18n="settings.catalogue.field_alc_tol">Tolérance alcool (%)</label><input type="number" id="scat-alctol" step="0.5" placeholder="Ex : 12"></div>
              </div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="withBtn(this, addCatalogItem)"><i class="fas fa-plus"></i> <span data-i18n="settings.catalogue.btn_add">Ajouter</span></button>
          </div>
        </div>

        <!-- TAB CALENDRIER -->
        <template id="stab-calendrier-tpl">

          <!-- Rappel global -->
          <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)">
            <div style="font-weight:700;font-size:.9rem;margin-bottom:4px">
              🔔 <span data-i18n="settings.cal.default_remind_title">Rappel de brassage — délai par défaut</span>
            </div>
            <p style="color:var(--muted);font-size:.8rem;margin-bottom:10px" data-i18n="settings.cal.default_remind_hint">
              Nombre de jours avant l'événement pour afficher le rappel. Peut être surchargé par événement.
            </p>
            <div style="display:flex;align-items:center;gap:8px">
              <input id="settings-default-remind-days" type="number" min="1" max="365" value="45"
                class="form-control" style="width:72px;text-align:center">
              <span style="font-size:.85rem;color:var(--muted)" data-i18n="cal.event_remind_days">j. avant</span>
              <button class="btn btn-primary btn-sm"
                onclick="withBtn(this, () => saveDefaultBrewReminderDays(document.getElementById('settings-default-remind-days').value))">
                <i class="fas fa-check"></i> <span data-i18n="common.save">Enregistrer</span>
              </button>
            </div>
          </div>

          <!-- Événements automatiques -->
          <div style="margin-bottom:24px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
              <div style="font-weight:700;font-size:.9rem" data-i18n="settings.cal.world_title">Événements brassicoles automatiques</div>
              <button class="btn btn-ghost btn-sm" onclick="toggleAllWorldEvents()" id="cal-toggle-all-btn" style="font-size:.75rem"></button>
            </div>
            <p style="color:var(--muted);font-size:.8rem;margin-bottom:12px" data-i18n="settings.cal.world_hint">Ces événements sont générés automatiquement chaque année. Désactivez ceux que vous ne souhaitez pas voir.</p>
            <div id="settings-world-ev-list" style="display:flex;flex-direction:column;gap:4px;max-height:320px;overflow-y:auto"></div>
          </div>

          <!-- Événements personnalisés -->
          <div style="padding-top:18px;border-top:1px solid var(--border)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
              <div style="font-weight:700;font-size:.9rem" data-i18n="settings.cal.custom_title">Vos événements personnalisés</div>
              <button class="btn btn-primary btn-sm" onclick="closeSettings();openCustomEventModal()">
                <i class="fas fa-plus"></i> <span data-i18n="settings.cal.btn_add">Ajouter</span>
              </button>
            </div>
            <div id="settings-custom-ev-list" style="display:flex;flex-direction:column;gap:6px"></div>
          </div>

        </template>
        <div id="stab-calendrier" style="display:none"></div>

        <!-- TAB SEUILS DE STOCK -->
        <template id="stab-thresholds-tpl">
          <p style="color:var(--muted);font-size:.87rem;margin-bottom:18px" data-i18n="settings.thresholds.hint">Définissez à partir de quelle quantité un ingrédient passe en "stock faible" (affiché en orange).</p>
          <div class="thresh-row">
            <span class="thresh-lbl" style="color:var(--malt)"><i class="fas fa-seedling"></i> <span data-i18n="cat.malts">Malts</span></span>
            <input type="number" id="thresh-malt" value="1000" min="0" step="100" style="width:110px">
            <span style="font-size:.9rem;color:var(--muted)">g</span>
            <span class="thresh-hint" data-i18n="settings.thresholds.malt_hint">= 1 kg — en dessous de cette valeur, le stock est signalé en orange</span>
          </div>
          <div class="thresh-row">
            <span class="thresh-lbl" style="color:var(--hop)"><i class="fas fa-leaf"></i> <span data-i18n="cat.houblons">Houblons</span></span>
            <input type="number" id="thresh-houblon" value="50" min="0" step="10" style="width:110px">
            <span style="font-size:.9rem;color:var(--muted)">g</span>
            <span class="thresh-hint" data-i18n="settings.thresholds.hop_hint">Seuil d'alerte en grammes</span>
          </div>
          <div class="thresh-row">
            <span class="thresh-lbl" style="color:var(--yeast)"><i class="fas fa-flask"></i> <span data-i18n="cat.levures">Levures</span></span>
            <input type="number" id="thresh-levure" value="2" min="0" step="1" style="width:110px">
            <span style="font-size:.9rem;color:var(--muted)" id="thresh-levure-unit">sachet(s)</span>
            <span class="thresh-hint" data-i18n="settings.thresholds.yeast_hint">Nombre de sachets en dessous duquel le stock est signalé en orange</span>
          </div>
          <div class="thresh-row" style="align-items:flex-start">
            <span class="thresh-lbl" style="color:var(--other);padding-top:6px"><i class="fas fa-box"></i> <span data-i18n="cat.autres">Autres</span></span>
            <div style="flex:1">
              <p style="font-size:.8rem;color:var(--muted);margin-bottom:10px" data-i18n="settings.thresholds.other_hint">Seuil par unité — laisser vide pour désactiver l'alerte sur cette unité</p>
              <div id="thresh-autre-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px"></div>
            </div>
          </div>
        </template>
        <div id="stab-thresholds" style="display:none"></div>

        <!-- TAB EAU & ÉNERGIE -->
        <template id="stab-water-tpl">
          <p style="color:var(--muted);font-size:.87rem;margin-bottom:18px" data-i18n="settings.water.hint">Profil de votre eau de brassage et coûts énergétiques par brassin.</p>

          <div style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)">
            <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--info);margin-bottom:10px"><i class="fas fa-droplet"></i> <span data-i18n="settings.water.section_water">Eau</span></div>
            <div style="display:flex;align-items:center;gap:10px">
              <label style="font-size:.88rem;color:var(--muted);white-space:nowrap" data-i18n="settings.water.water_price">Prix au litre</label>
              <input type="number" id="water-price" min="0" step="0.0001" placeholder="Ex : 0.003" style="width:120px">
              <span style="font-size:.85rem;color:var(--muted)">€/L</span>
              <span style="font-size:.78rem;color:var(--muted)" data-i18n="settings.water.water_price_hint">(inclus dans le coût matières de la recette)</span>
            </div>
          </div>

          <div style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)">
            <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--info);margin-bottom:10px"><i class="fas fa-fire-flame-curved"></i> <span data-i18n="settings.water.section_energy">Énergie</span></div>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <label style="font-size:.88rem;color:var(--muted);white-space:nowrap;width:160px" data-i18n="settings.water.energy_gas">Coût gaz / brassin</label>
              <input type="number" id="energy-gas" min="0" step="0.01" placeholder="Ex : 2.50" style="width:120px">
              <span style="font-size:.85rem;color:var(--muted)" data-i18n="settings.water.energy_per_brew">€/brassin</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <label style="font-size:.88rem;color:var(--muted);white-space:nowrap;width:160px" data-i18n="settings.water.energy_elec">Coût électricité / brassin</label>
              <input type="number" id="energy-elec" min="0" step="0.01" placeholder="Ex : 1.20" style="width:120px">
              <span style="font-size:.85rem;color:var(--muted)" data-i18n="settings.water.energy_per_brew">€/brassin</span>
            </div>
            <p style="font-size:.78rem;color:var(--muted);margin-top:8px" data-i18n="settings.water.energy_hint">(ajoutés au coût total de chaque recette)</p>
          </div>

          <div style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)">
            <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--info);margin-bottom:10px"><i class="fas fa-calculator"></i> <span data-i18n="settings.water.section_recipe">Calculs recette</span></div>
            <div style="display:flex;align-items:center;gap:10px">
              <label style="font-size:.88rem;color:var(--muted);white-space:nowrap;width:160px" data-i18n="settings.water.ibu_formula_label">Formule IBU</label>
              <select id="ibu-formula" style="width:180px">
                <option value="tinseth" data-i18n="settings.water.ibu_tinseth">Tinseth (défaut)</option>
                <option value="rager" data-i18n="settings.water.ibu_rager">Rager</option>
              </select>
            </div>
          </div>

          <div style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)">
            <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--info);margin-bottom:10px"><i class="fas fa-satellite-dish"></i> <span data-i18n="settings.water.section_hubeau">Récupération automatique (HubEau)</span></div>
            <p style="font-size:.8rem;color:var(--muted);margin-bottom:12px" data-i18n="settings.water.hubeau_hint">Récupère les dernières valeurs connues de votre eau du robinet via l'API HubEau d'Eau France.</p>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
              <select id="hubeau-dept" onchange="hubEauDeptChange()" style="flex:0 0 auto;min-width:200px">
                <option value="">— Département —</option>
                <option value="01">01 – Ain</option><option value="02">02 – Aisne</option><option value="03">03 – Allier</option>
                <option value="04">04 – Alpes-de-Haute-Provence</option><option value="05">05 – Hautes-Alpes</option>
                <option value="06">06 – Alpes-Maritimes</option><option value="07">07 – Ardèche</option>
                <option value="08">08 – Ardennes</option><option value="09">09 – Ariège</option>
                <option value="10">10 – Aube</option><option value="11">11 – Aude</option>
                <option value="12">12 – Aveyron</option><option value="13">13 – Bouches-du-Rhône</option>
                <option value="14">14 – Calvados</option><option value="15">15 – Cantal</option>
                <option value="16">16 – Charente</option><option value="17">17 – Charente-Maritime</option>
                <option value="18">18 – Cher</option><option value="19">19 – Corrèze</option>
                <option value="2A">2A – Corse-du-Sud</option><option value="2B">2B – Haute-Corse</option>
                <option value="21">21 – Côte-d'Or</option><option value="22">22 – Côtes-d'Armor</option>
                <option value="23">23 – Creuse</option><option value="24">24 – Dordogne</option>
                <option value="25">25 – Doubs</option><option value="26">26 – Drôme</option>
                <option value="27">27 – Eure</option><option value="28">28 – Eure-et-Loir</option>
                <option value="29">29 – Finistère</option><option value="30">30 – Gard</option>
                <option value="31">31 – Haute-Garonne</option><option value="32">32 – Gers</option>
                <option value="33">33 – Gironde</option><option value="34">34 – Hérault</option>
                <option value="35">35 – Ille-et-Vilaine</option><option value="36">36 – Indre</option>
                <option value="37">37 – Indre-et-Loire</option><option value="38">38 – Isère</option>
                <option value="39">39 – Jura</option><option value="40">40 – Landes</option>
                <option value="41">41 – Loir-et-Cher</option><option value="42">42 – Loire</option>
                <option value="43">43 – Haute-Loire</option><option value="44">44 – Loire-Atlantique</option>
                <option value="45">45 – Loiret</option><option value="46">46 – Lot</option>
                <option value="47">47 – Lot-et-Garonne</option><option value="48">48 – Lozère</option>
                <option value="49">49 – Maine-et-Loire</option><option value="50">50 – Manche</option>
                <option value="51">51 – Marne</option><option value="52">52 – Haute-Marne</option>
                <option value="53">53 – Mayenne</option><option value="54">54 – Meurthe-et-Moselle</option>
                <option value="55">55 – Meuse</option><option value="56">56 – Morbihan</option>
                <option value="57">57 – Moselle</option><option value="58">58 – Nièvre</option>
                <option value="59">59 – Nord</option><option value="60">60 – Oise</option>
                <option value="61">61 – Orne</option><option value="62">62 – Pas-de-Calais</option>
                <option value="63">63 – Puy-de-Dôme</option><option value="64">64 – Pyrénées-Atlantiques</option>
                <option value="65">65 – Hautes-Pyrénées</option><option value="66">66 – Pyrénées-Orientales</option>
                <option value="67">67 – Bas-Rhin</option><option value="68">68 – Haut-Rhin</option>
                <option value="69">69 – Rhône</option><option value="70">70 – Haute-Saône</option>
                <option value="71">71 – Saône-et-Loire</option><option value="72">72 – Sarthe</option>

                <button class="btn btn-ghost btn-sm" onclick="triggerImport('import-calendar-file')"><i class="fas fa-file-import"></i> <span data-i18n="settings.import.btn_import">Importer (JSON)</span></button>
                <input type="file" id="import-calendar-file" accept=".json" style="display:none" onchange="importCalendar(this)">
                <button class="btn btn-ghost btn-sm" onclick="downloadIcal()" style="border-color:rgba(139,92,246,.4)"><i class="fas fa-calendar-arrow-down"></i> <span data-i18n="settings.import.btn_export_ical">Exporter iCal (.ics)</span></button>
                <p style="font-size:.72rem;color:var(--muted);margin:0" data-i18n="settings.import.cal_hint">Événements personnalisés avec titre, date, couleur, rappels.</p>
                <!-- Abonnement iCal -->
                <div style="background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.25);border-radius:8px;padding:10px;margin-top:4px">
                  <div style="font-size:.78rem;font-weight:600;color:#a78bfa;margin-bottom:6px"><i class="fas fa-rss"></i> <span data-i18n="settings.import.ical_sub_title">Abonnement (Google / Apple Calendar)</span></div>
                  <div style="display:flex;gap:6px;align-items:center">
                    <input id="ical-url-input" type="text" readonly onclick="this.select()"
                      style="flex:1;font-size:.72rem;font-family:monospace;padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);min-width:0">
                    <button class="btn btn-ghost btn-sm btn-icon" onclick="copyIcalUrl()" title="Copier l'URL">
                      <i class="fas fa-copy" id="ical-copy-icon"></i>
                    </button>
                    <button class="btn btn-ghost btn-sm btn-icon" onclick="openWebcal()" title="Ouvrir webcal://">
                      <i class="fas fa-arrow-up-right-from-square"></i>
                    </button>
                  </div>
                  <p style="font-size:.68rem;color:var(--muted);margin:6px 0 0" data-i18n="settings.import.ical_sub_hint">Collez cette URL dans votre calendrier. Utilisez webcal:// pour Apple Calendar.</p>
                </div>
              </div>
            </div>

            <div style="background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.2);border-radius:10px;padding:14px">
              <h4 style="font-size:.82rem;font-weight:700;margin-bottom:12px;color:#a78bfa;text-transform:uppercase;letter-spacing:.05em"><i class="fas fa-sliders"></i> <span data-i18n="settings.import.settings_title">Paramètres</span></h4>
              <div style="display:flex;flex-direction:column;gap:8px">
                <button class="btn btn-ghost btn-sm" onclick="exportSettings()"><i class="fas fa-file-export"></i> <span data-i18n="settings.import.btn_export">Exporter (JSON)</span></button>
                <button class="btn btn-ghost btn-sm" onclick="triggerImport('import-settings-file')"><i class="fas fa-file-import"></i> <span data-i18n="settings.import.btn_import">Importer (JSON)</span></button>
                <input type="file" id="import-settings-file" accept=".json" style="display:none" onchange="importSettings(this)">
                <p style="font-size:.72rem;color:var(--muted);margin:0" data-i18n="settings.import.settings_hint">Eau, énergie, seuils, apparence. Tokens exclus.</p>
              </div>
            </div>

          </div>

          <!-- RESTAURER DEPUIS GIT -->
          <div style="margin-top:24px;background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.2);border-radius:12px;padding:18px">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
              <i class="fas fa-cloud-arrow-down" style="color:#22d3ee;font-size:1.1rem"></i>
              <h4 style="font-size:.88rem;font-weight:700;color:#22d3ee;text-transform:uppercase;letter-spacing:.05em;margin:0" data-i18n="settings.restore.title">Restaurer depuis la sauvegarde Git</h4>
            </div>
            <p style="font-size:.78rem;color:var(--muted);margin-bottom:14px" id="restore-git-info" data-i18n="settings.restore.info">Récupère et importe les fichiers JSON depuis le dépôt de sauvegarde configuré (backup_auto/).</p>

            <!-- Mode selector -->
            <div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap">
              <label style="display:flex;align-items:center;gap:6px;font-size:.82rem;cursor:pointer">
                <input type="radio" name="restore-mode" value="merge" checked id="restore-mode-merge">
                <span><b data-i18n="settings.restore.mode_merge">Fusionner</b> — <span style="color:var(--muted)" data-i18n="settings.restore.mode_merge_hint">ajoute et met à jour, conserve les données existantes</span></span>
              </label>
              <label style="display:flex;align-items:center;gap:6px;font-size:.82rem;cursor:pointer">
                <input type="radio" name="restore-mode" value="replace" id="restore-mode-replace">
                <span style="color:var(--danger)"><b data-i18n="settings.restore.mode_replace">Remplacer</b> — <span data-i18n="settings.restore.mode_replace_hint">efface et réimporte intégralement chaque section sélectionnée</span></span>
              </label>
            </div>

            <!-- Section checkboxes -->
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:16px" id="restore-git-sections">
              <label class="restore-chk"><input type="checkbox" value="inventaire" checked> <span data-i18n="settings.import.inv_title">Inventaire</span></label>
              <label class="restore-chk"><input type="checkbox" value="recettes" checked> <span data-i18n="settings.import.rec_title">Recettes</span></label>
              <label class="restore-chk"><input type="checkbox" value="cave" checked> <span data-i18n="settings.import.cave_title">Cave</span></label>
              <label class="restore-chk"><input type="checkbox" value="brassins" checked> <span data-i18n="settings.import.brews_title">Brassins</span></label>
              <label class="restore-chk"><input type="checkbox" value="catalogue"> <span data-i18n="settings.import.catalog_title">Catalogue</span></label>
              <label class="restore-chk"><input type="checkbox" value="brouillons"> <span data-i18n="settings.import.drafts_title">Brouillons</span></label>
              <label class="restore-chk"><input type="checkbox" value="calendrier"> <span data-i18n="settings.import.cal_title">Calendrier</span></label>
              <label class="restore-chk"><input type="checkbox" value="densimetres"> <span data-i18n="settings.import.spindles_title">Densimètres</span></label>
            </div>

            <!-- Results area -->
            <div id="restore-git-results" style="display:none;margin-bottom:12px;font-size:.8rem;display:flex;flex-wrap:wrap;gap:6px"></div>

            <div style="display:flex;gap:8px;align-items:center">
              <button class="btn btn-ghost btn-sm" onclick="withBtn(this, restoreFromGit)" id="btn-restore-git" style="border-color:rgba(6,182,212,.4);color:#22d3ee">
                <i class="fas fa-cloud-arrow-down"></i> <span data-i18n="settings.restore.btn_restore">Restaurer depuis Git</span>
              </button>
              <button class="btn btn-ghost btn-sm" onclick="toggleRestoreAll(true)" style="font-size:.75rem;padding:4px 10px" data-i18n="settings.restore.btn_all">Tout sélectionner</button>
              <button class="btn btn-ghost btn-sm" onclick="toggleRestoreAll(false)" style="font-size:.75rem;padding:4px 10px" data-i18n="settings.restore.btn_none">Tout désélectionner</button>
            </div>
          </div>

        </template>
        <div id="stab-import" style="display:none"></div>

        <!-- TAB MISES À JOUR -->
        <template id="stab-updates-tpl">
          <!-- Version application -->
          <div id="app-version-row" style="margin-bottom:18px"></div>
          <p style="color:var(--muted);font-size:.87rem;margin-bottom:18px" data-i18n="settings.updates.hint">Vérifiez et mettez à jour les librairies statiques embarquées (Chart.js, Font Awesome, Google Fonts).</p>
          <div id="updates-list" style="display:flex;flex-direction:column;gap:12px">
            <div style="color:var(--muted);font-size:.85rem"><i class="fas fa-spinner fa-spin"></i> <span data-i18n="settings.updates.checking">Vérification en cours…</span></div>
          </div>
          <div style="margin-top:16px">
            <button class="btn btn-ghost btn-sm" onclick="withBtn(this, () => checkStaticUpdates(true))"><i class="fas fa-rotate"></i> <span data-i18n="settings.updates.btn_check_again">Vérifier à nouveau</span></button>
          </div>
        </template>
        <div id="stab-updates" style="display:none"></div>

        <!-- TAB CHECKLISTS -->
        <template id="stab-checklist-tpl">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">
              <i class="fas fa-clipboard-list"></i> <span data-i18n="settings.tabs.checklist">Checklists</span>
            </div>
            <button class="btn btn-primary btn-sm" onclick="openChecklistEditor()">
              <i class="fas fa-plus"></i> <span data-i18n="checklist.new_template">Nouveau template</span>
            </button>
          </div>
          <div id="checklist-templates-list"><div style="color:var(--muted);font-size:.85rem"><i class="fas fa-spinner fa-spin"></i></div></div>
        </template>
        <div id="stab-checklist" style="display:none"></div>

        <!-- TAB CORBEILLE -->
        <template id="stab-trash-tpl">
          <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:16px">
            <i class="fas fa-trash-can"></i> <span data-i18n="settings.tabs.trash">Corbeille</span>
          </div>
          <p style="font-size:.83rem;color:var(--muted);margin-bottom:18px" data-i18n="settings.trash.hint">Les éléments supprimés sont conservés ici. Vous pouvez les restaurer ou les supprimer définitivement.</p>
          <div id="trash-content"><div style="color:var(--muted);font-size:.85rem"><i class="fas fa-spinner fa-spin"></i></div></div>
        </template>
        <div id="stab-trash" style="display:none"></div>

      </div><!-- /content pane -->
    </div><!-- /modal-body -->

    <div class="modal-foot" style="flex-shrink:0">
      <button class="btn btn-ghost" onclick="closeSettings()" data-i18n="settings.footer.close">Fermer</button>
      <button class="btn btn-primary" id="settings-save-btn"  onclick="withBtn(this, saveThresholds)"       style="display:none"><i class="fas fa-floppy-disk"></i> <span data-i18n="settings.footer.save_thresholds">Enregistrer les seuils</span></button>
      <button class="btn btn-success" id="github-save-btn"    onclick="withBtn(this, saveGithubSettings)"   style="display:none"><i class="fas fa-floppy-disk"></i> <span data-i18n="settings.footer.save_github">Enregistrer la config GitHub</span></button>
      <button class="btn btn-primary" id="apparence-save-btn" onclick="withBtn(this, saveApparence)"        style="display:none"><i class="fas fa-floppy-disk"></i> <span data-i18n="settings.footer.save_apparence">Appliquer</span></button>
      <button class="btn btn-primary" id="ai-save-btn"        onclick="withBtn(this, saveAISettings)"       style="display:none"><i class="fas fa-floppy-disk"></i> <span data-i18n="settings.footer.save_ai">Enregistrer la config IA</span></button>
      <button class="btn btn-primary" id="notif-save-btn"     onclick="withBtn(this, saveTelegramSettings)" style="display:none"><i class="fas fa-floppy-disk"></i> <span data-i18n="settings.footer.save_notif">Enregistrer les notifications</span></button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════
     PAGE : CALENDRIER
═══════════════════════════════════════════════════════════════════════════ -->
<div class="page" id="page-calendrier">

  <!-- En-tête calendrier -->
  <div class="cal-topbar">
    <h2 style="margin:0;font-size:1.35rem"><i class="fas fa-calendar-days" style="color:var(--amber)"></i> <span data-i18n="cal.title">Calendrier</span></h2>
    <div class="cal-nav-group">
      <button class="btn btn-ghost btn-sm" onclick="calNav(-1)" style="padding:6px 12px"><i class="fas fa-chevron-left"></i></button>
      <span id="cal-title" style="font-weight:700;font-size:.95rem;min-width:130px;text-align:center;padding:0 4px"></span>
      <button class="btn btn-ghost btn-sm" onclick="calNav(1)" style="padding:6px 12px"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="btn btn-ghost btn-sm" onclick="calGoToday()" data-i18n="cal.today">Aujourd'hui</button>
      <button class="btn btn-primary btn-sm" onclick="openCustomEventModal()">
        <i class="fas fa-plus"></i> <span data-i18n="cal.add_event">Événement</span>
      </button>
    </div>
  </div>

  <!-- Légende compacte -->
  <div class="cal-legend">
    <span><span class="cal-dot" style="background:var(--amber)"></span> <span data-i18n="cal.legend_brew">Brassage</span></span>
    <span><span class="cal-dot" style="background:var(--info)"></span> <span data-i18n="cal.legend_ferm">Fermentation</span></span>
    <span><span class="cal-dot" style="background:#10b981"></span> <span data-i18n="cal.legend_bottle">Embouteillage</span></span>
    <span>🌍 <span data-i18n="cal.legend_world">Événements</span></span>
    <span><span class="cal-dot" style="background:#a855f7"></span> 🔔 <span data-i18n="cal.legend_remind">J-45</span></span>
    <span><i class="fas fa-book-open" style="font-size:.7rem;color:#8b5cf6"></i> <span data-i18n="cal.legend_draft">Brouillon</span></span>
    <span><i class="fas fa-star" style="font-size:.7rem;color:var(--amber)"></i> <span data-i18n="cal.legend_custom">Perso</span></span>
  </div>

  <!-- Popover détail événement -->
  <div id="cal-popover" style="display:none;position:fixed;z-index:500;min-width:220px;max-width:310px;
    background:var(--card);border:1px solid var(--border);border-radius:12px;
    box-shadow:0 8px 32px rgba(0,0,0,.35);padding:14px 16px;">
    <div id="cal-pop-content"></div>
  </div>

  <!-- Grille calendrier -->
  <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden">
    <!-- En-têtes jours -->
    <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border)">
      <div class="cal-dh" data-i18n="cal.day_mon">Lun</div><div class="cal-dh" data-i18n="cal.day_tue">Mar</div><div class="cal-dh" data-i18n="cal.day_wed">Mer</div>
      <div class="cal-dh" data-i18n="cal.day_thu">Jeu</div><div class="cal-dh" data-i18n="cal.day_fri">Ven</div>
      <div class="cal-dh" style="color:var(--muted)" data-i18n="cal.day_sat">Sam</div>
      <div class="cal-dh" style="color:var(--muted)" data-i18n="cal.day_sun">Dim</div>
    </div>
    <!-- Cellules -->
    <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr))"></div>
  </div>
</div>

<!-- ══ MODAL : Événement personnalisé ══════════════════════════════════════ -->
<div class="modal-overlay" id="custom-event-modal" onclick="if(event.target===this)closeModal('custom-event-modal')">
  <div class="modal">
    <div class="modal-head">
      <h3 id="custom-event-modal-title"><i class="fas fa-calendar-plus" style="color:var(--amber)"></i> <span data-i18n="cal.event_new">Nouvel événement</span></h3>
      <button class="modal-close" onclick="closeModal('custom-event-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="ce-id">

      <!-- Emoji + Titre -->
      <div style="margin-bottom:12px">
        <div style="display:flex;gap:8px;margin-bottom:6px">
          <div style="flex-shrink:0">
            <label class="form-label" data-i18n="cal.event_emoji">Emoji</label>
            <div style="display:flex;align-items:center;gap:6px">
              <div id="ce-emoji-display" style="width:42px;height:38px;font-size:1.4rem;display:flex;align-items:center;justify-content:center;
                background:var(--card2);border:1px solid var(--border);border-radius:8px;cursor:pointer;user-select:none"
                onclick="toggleEmojiPicker()" title="Choisir un emoji">📅</div>
              <input type="hidden" id="ce-emoji" value="📅">
            </div>
          </div>
          <div style="flex:1">
            <label class="form-label"><span data-i18n="cal.event_title">Titre</span> <span class="req">*</span></label>
            <input id="ce-title" type="text" class="form-control" placeholder="Nom de l'événement">
          </div>
        </div>
        <!-- Grille emoji -->
        <div id="ce-emoji-picker" style="display:none;border:1px solid var(--border);border-radius:10px;
          padding:10px;background:var(--card2);max-height:260px;overflow-y:auto">
          <div id="ce-emoji-grid" style="display:flex;flex-wrap:wrap;gap:4px"></div>
        </div>
      </div>

      <!-- Date + Couleur -->
      <div style="display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:12px">
        <div>
          <label class="form-label"><span data-i18n="cal.event_date">Date</span> <span class="req">*</span></label>
          <input id="ce-date" type="date" class="form-control">
        </div>
        <div>
          <label class="form-label" data-i18n="common.color">Couleur</label>
          <input id="ce-color" type="color" value="#f59e0b"
            style="width:48px;height:38px;border:none;border-radius:8px;cursor:pointer;background:none;padding:0;margin-top:2px">
        </div>
      </div>

      <!-- Notes -->
      <div style="margin-bottom:14px">
        <label class="form-label"><span data-i18n="cal.event_notes">Notes</span> <span style="color:var(--muted);font-weight:400" data-i18n="common.optional">(optionnel)</span></label>
        <textarea id="ce-notes" class="form-control" rows="2"
          placeholder="Description, lien, rappel…" style="resize:vertical"></textarea>
      </div>

      <!-- Association : Style / Recette / Brouillon -->
      <div style="margin-bottom:14px;padding:12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px">
        <div style="font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">
          <i class="fas fa-link" style="margin-right:4px"></i> <span data-i18n="cal.event_assoc">Association (optionnel)</span>
        </div>

        <!-- Style BJCP -->
        <div style="position:relative;margin-bottom:10px">
          <label class="form-label" data-i18n="cal.event_style">Style BJCP</label>
          <input id="ce-style" type="text" class="form-control" placeholder="Rechercher un style…"
            autocomplete="off"
            oninput="ceStyleSearch(this)" onfocus="ceStyleSearch(this)"
            onblur="setTimeout(closeCeStyleSug,200)">
          <div id="ce-style-sug" class="ing-suggest" style="max-height:240px"></div>
        </div>

        <!-- Recette -->
        <div style="position:relative;margin-bottom:10px">
          <label class="form-label" data-i18n="cal.event_recipe">Recette associée</label>
          <input id="ce-recipe-name" type="text" class="form-control" placeholder="Rechercher une recette…"
            autocomplete="off"
            oninput="ceSuggestRecipe(this)" onfocus="ceSuggestRecipe(this)"
            onblur="setTimeout(closeCeRecipeSug,200)">
          <input type="hidden" id="ce-recipe-id">
          <div id="ce-recipe-sug" class="ing-suggest" style="max-height:200px"></div>
        </div>

        <!-- Brouillon -->
        <div style="position:relative">
          <label class="form-label" data-i18n="cal.event_draft">Brouillon associé</label>
          <input id="ce-draft-name" type="text" class="form-control" placeholder="Rechercher un brouillon…"
            autocomplete="off"
            oninput="ceSuggestDraft(this)" onfocus="ceSuggestDraft(this)"
            onblur="setTimeout(closeCeDraftSug,200)">
          <input type="hidden" id="ce-draft-id">
          <div id="ce-draft-sug" class="ing-suggest" style="max-height:200px"></div>
        </div>
      </div>

      <!-- Options -->
      <div style="display:flex;flex-direction:column;gap:10px;padding:12px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid var(--border)">
        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer">
          <input id="ce-brew-reminder" type="checkbox" style="width:auto;margin-top:3px;flex-shrink:0">
          <div>
            <div style="font-weight:600;font-size:.875rem">🔔 <span data-i18n="cal.event_remind">Rappel de brassage J-45</span></div>
            <div style="font-size:.75rem;color:var(--muted)" data-i18n="cal.event_remind_hint">Affiche un rappel 45 jours avant dans le calendrier</div>
          </div>
        </label>
        <label id="ce-tg-wrap" style="display:flex;align-items:flex-start;gap:10px;cursor:pointer">
          <input id="ce-telegram" type="checkbox" style="width:auto;margin-top:3px;flex-shrink:0">
          <div>
            <div style="font-weight:600;font-size:.875rem"><i class="fas fa-paper-plane" style="color:#0088cc"></i> <span data-i18n="cal.event_telegram">Notification Telegram</span></div>
            <div style="font-size:.75rem;color:var(--muted)" data-i18n="cal.event_telegram_hint">Envoie un message le jour J (et le rappel J-45 si activé)</div>
          </div>
        </label>
      </div>

      <div id="ce-alert" class="alert" style="margin-top:10px"></div>
    </div>
    <div class="modal-foot" style="display:flex;justify-content:space-between">
      <button id="ce-delete-btn" class="btn btn-ghost btn-sm" style="color:var(--danger);display:none"
        onclick="deleteCustomEvent()">
        <i class="fas fa-trash"></i> <span data-i18n="common.delete">Supprimer</span>
      </button>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-ghost" onclick="closeModal('custom-event-modal')" data-i18n="common.cancel">Annuler</button>
        <button class="btn btn-primary" onclick="saveCustomEvent()">
          <i class="fas fa-check"></i> <span data-i18n="common.save">Enregistrer</span>
        </button>
      </div>
    </div>
  </div>
</div>

<style>
/* En-tête calendrier */
.cal-topbar {
  display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;
}
.cal-nav-group {
  display:flex;align-items:center;background:var(--card2);
  border:1px solid var(--border);border-radius:10px;overflow:hidden;
}
.cal-nav-group .btn { border-radius:0;border:none;background:transparent; }
.cal-nav-group .btn:hover { background:rgba(255,255,255,.06); }
.cal-nav-group #cal-title { padding:0 10px; }
.cal-legend {
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;
  font-size:.74rem;color:var(--muted);align-items:center;
}
.cal-legend span { display:flex;align-items:center;gap:4px;white-space:nowrap; }
.cal-dot { width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0; }
@media(max-width:768px){
  .cal-topbar > div:last-child { margin-left:auto; }
  #cal-title { min-width:100px!important;font-size:.85rem; }
}

.cal-dh {
  padding:8px 4px;text-align:center;font-size:.72rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
}
.cal-cell {
  min-height:90px;padding:6px 5px;border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);position:relative;
  transition:background .15s;
}
.cal-cell:nth-child(7n) { border-right:none; }
.cal-cell.cal-other-month { opacity:.4; }
.cal-cell.cal-today { background:rgba(245,158,11,.07); }
.cal-cell.cal-today .cal-day-num { color:var(--amber);font-weight:800; }
.cal-day-num {
  font-size:.78rem;font-weight:600;color:var(--muted);
  margin-bottom:4px;line-height:1;
}
.cal-event {
  display:flex;align-items:center;gap:4px;
  font-size:.71rem;line-height:1.2;padding:2px 5px;border-radius:5px;
  margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:100%;transition:opacity .15s;
}
.cal-event:hover { opacity:.8; }
.cal-event-brew    { background:rgba(245,158,11,.18);color:var(--amber); }
.cal-event-ferm    { background:rgba(59,130,246,.15);color:var(--info); }
.cal-event-bottle  { background:rgba(16,185,129,.15);color:#10b981; }
</style>

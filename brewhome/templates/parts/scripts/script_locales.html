let _lang   = localStorage.getItem('brewLang') || 'fr';
let _locale = LOCALES[_lang] || LOCALES.fr;

function t(key, fallback) {
  const val = key.split('.').reduce((o, k) => o?.[k], _locale);
  return val ?? fallback ?? key;
}

function applyI18n() {
  const days = appSettings?.defaultBrewReminderDays || 45;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const val = t(el.dataset.i18n, el.textContent);
    el.textContent = typeof val === 'string' && val.includes('${days}')
      ? val.replace(/\$\{days\}/g, days)
      : val;
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder) || el.placeholder;
  });
}

function _refreshDaysLabels() {
  const days = appSettings?.defaultBrewReminderDays || 45;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const raw = t(el.dataset.i18n);
    if (typeof raw === 'string' && raw.includes('${days}'))
      el.textContent = raw.replace(/\$\{days\}/g, days);
  });
}

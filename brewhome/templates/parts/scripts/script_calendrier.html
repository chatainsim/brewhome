<script>
// ══════════════════════════════════════════════════════════════════════════════
// CALENDRIER
// ══════════════════════════════════════════════════════════════════════════════
let _calYear  = new Date().getFullYear();
let _calMonth = new Date().getMonth(); // 0-based

// Retourne le Nème jour de semaine (0=dim…6=sam) d'un mois donné (nth : 1=premier, -1=dernier)
function _nthDow(year, month, dow, nth) {
  if (nth > 0) {
    const d = new Date(year, month, 1);
    while (d.getDay() !== dow) d.setDate(d.getDate() + 1);
    d.setDate(d.getDate() + (nth - 1) * 7);
    return d;
  } else { // dernier
    const d = new Date(year, month + 1, 0);
    while (d.getDay() !== dow) d.setDate(d.getDate() - 1);
    return d;
  }
}
function _ymd(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function _brewingEvents(year) {
  const ev = [];
  const add = (date, label, emoji, color, canonical) => ev.push({ date, label, emoji, color, canonical: canonical || label });
  const p = n => String(n).padStart(2, '0');
  const fd = (m, d) => `${year}-${p(m)}-${p(d)}`;

  // ── Janvier ───────────────────────────────────────────────────────────────
  add(fd(1, 1),  'National Hangover Day',           '🤕', '#6b7280');
  add(fd(1,17),  'Baltic Porter Day',               '🍺', '#6366f1');
  add(fd(1,17),  'National Bootlegger\'s Day',      '🥃', '#78350f');
  add(fd(1,24),  'National Beer Can Day',            '🥫', '#f59e0b');
  // ── Février ───────────────────────────────────────────────────────────────
  add(fd(2,24),  'World Bartender Day',             '🍸', '#a855f7');
  add(fd(2,28),  'Open That Bottle Night',          '🍾', '#a855f7');
  // ── Mars ──────────────────────────────────────────────────────────────────
  add(fd(3, 8),  'Pink Boots Collaboration Brew Day','👢', '#ec4899');
  add(fd(3,16),  'Orval International Day',         '🍺', '#d97706');
  add(fd(3,17),  'St. Patrick\'s Day',              '🍀', '#16a34a');
  add(fd(3,20),  'National Bock Day',               '🐐', '#92400e');
  // ── Avril ─────────────────────────────────────────────────────────────────
  add(fd(4, 6),  'New Beer\'s Eve',                 '🍺', '#f59e0b');
  add(fd(4, 7),  'National Beer Day',               '🍺', '#f59e0b');
  add(fd(4,11),  'King Gambrinus Day',              '👑', '#d97706');
  add(fd(4,23),  'German Beer Day / Reinheitsgebot','🇩🇪', '#ef4444');
  add(fd(4,25),  'Beer-Clean Glass Day',            '🥃', '#06b6d4');
  add(fd(4,26),  'Saison Day',                      '🌾', '#84cc16');
  // ── Mai ───────────────────────────────────────────────────────────────────
  add(fd(5, 1),  'National Rotate Your Beer Day',   '🔄', '#f59e0b');
  add(fd(5, 2),  'Beer Pong Day',                   '🏓', '#84cc16');
  add(fd(5, 5),  'Cinco de Mayo',                   '🌮', '#16a34a');
  add(fd(5, 7),  'National Homebrew Day',           '🍻', '#8b5cf6');
  add(fd(5,11),  'American Craft Beer Week (début)','🇺🇸', '#3b82f6');
  // ── Juin ──────────────────────────────────────────────────────────────────
  add(fd(6, 8),  'Name Your Poison Day',            '☠️', '#6b7280');
  add(fd(6,15),  'Beer Day Britain',                '🏴󠁧󠁢󠁥󠁮󠁧󠁿', '#3b82f6');
  // ── Juillet ───────────────────────────────────────────────────────────────
  add(fd(7, 7),  'National Dive Bar Day',           '🍺', '#92400e');
  add(fd(7,12),  'National Michelada Day',          '🌶️', '#dc2626');
  add(fd(7,23),  'National Refreshment Day',        '🥤', '#06b6d4');
  // ── Septembre ─────────────────────────────────────────────────────────────
  add(fd(9, 7),  'National Beer Lover\'s Day',      '🍺', '#f59e0b');
  add(fd(9,20),  'Sour Beer Day',                   '🍋', '#facc15');
  add(fd(9,24),  'Arthur Guinness Day',             '🖤', '#374151');
  add(fd(9,27),  'National Crush-A-Can Day',        '🥫', '#6b7280');
  add(fd(9,28),  'National Drink A Beer Day',       '🍺', '#f59e0b');
  // ── Octobre ───────────────────────────────────────────────────────────────
  add(fd(10, 2), 'Barrel-Aged Beer Day',            '🛢️', '#92400e');
  add(fd(10, 4), 'Buy A Stranger A Drink Day',      '🍺', '#f59e0b');
  add(fd(10, 9), 'Beer & Pizza Day',                '🍕', '#ef4444');
  add(fd(10,10), 'National Black Brewers Day',      '✊', '#374151');
  add(fd(10,14), 'Homebrewing Legalization Day',    '⚖️', '#8b5cf6');
  add(fd(10,27), 'National American Beer Day',      '🇺🇸', '#3b82f6');
  // ── Novembre ──────────────────────────────────────────────────────────────
  add(fd(11, 5), 'International Stout Day',         '🖤', '#374151');
  add(_ymd(_nthDow(year, 10, 6, 1)), 'Learn to Homebrew Day', '🏠', '#8b5cf6'); // 1er samedi de novembre
  add(fd(11,12), 'National Happy Hour Day',         '🍺', '#f59e0b');
  add(fd(11,17), 'International Happy Gose Day',    '🧂', '#06b6d4');
  add(fd(11,29), 'Small Brewery Sunday',            '🏠', '#8b5cf6');
  // ── Décembre ──────────────────────────────────────────────────────────────
  add(fd(12, 4), 'National Bartender Day',          '🍸', '#a855f7');
  add(fd(12, 5), 'National Repeal Day',             '🗽', '#3b82f6');
  add(fd(12,10), 'National Lager Day',              '🍺', '#f59e0b');
  add(fd(12,25), t('cal.ev_noel'),                   '🎄', '#dc2626', 'Noël — Bière de Noël');

  // ── Dates calculées ───────────────────────────────────────────────────────
  // IPA Day : 1er jeudi d'août
  add(_ymd(_nthDow(year, 7, 4, 1)),  'IPA Day',               '🌿', '#84cc16');
  // International Beer Day : 1er vendredi d'août
  add(_ymd(_nthDow(year, 7, 5, 1)),  'International Beer Day','🍺', '#f59e0b');
  // Beaujolais Nouveau : 3e jeudi de novembre
  add(_ymd(_nthDow(year, 10, 4, 3)), 'Beaujolais Nouveau',    '🍷', '#dc2626');
  // Oktoberfest : commence le samedi précédant le 22 sept
  const oktStart = (() => {
    const d = new Date(year, 8, 22);
    while (d.getDay() !== 6) d.setDate(d.getDate() - 1);
    return d;
  })();
  add(_ymd(oktStart),               t('cal.ev_okts'),  '🥨', '#d97706', 'Début Oktoberfest');
  add(_ymd(_nthDow(year, 9, 0, 1)), t('cal.ev_okte'),  '🥨', '#d97706', 'Fin Oktoberfest');

  return ev;
}

function calNav(dir) {
  _calMonth += dir;
  if (_calMonth > 11) { _calMonth = 0;  _calYear++; }
  if (_calMonth < 0)  { _calMonth = 11; _calYear--; }
  renderCalendar();
}
function calGoToday() {
  _calYear  = new Date().getFullYear();
  _calMonth = new Date().getMonth();
  renderCalendar();
}

function setCalView(mode) {
  _calViewMode = mode;
  localStorage.setItem('calViewMode', mode);
  document.getElementById('cal-grid-view').style.display = mode === 'grid'   ? '' : 'none';
  document.getElementById('cal-agenda').style.display    = mode === 'agenda' ? '' : 'none';
  document.getElementById('cal-btn-grid').classList.toggle('active',   mode === 'grid');
  document.getElementById('cal-btn-agenda').classList.toggle('active', mode === 'agenda');
  if (mode === 'agenda') renderAgendaView();
  else renderCalendar();
}

function renderAgendaView() {
  const today = new Date(); today.setHours(0,0,0,0);
  const horizon = new Date(today); horizon.setDate(horizon.getDate() + 180);
  const todayStr = _ymd(today);

  const events = [];
  const add = (date, type, label, color, emoji, id) => {
    if (!date) return;
    const d = new Date(date + 'T00:00:00');
    if (d >= today && d <= horizon) events.push({ date, type, label, color, emoji, id });
  };

  // Brassins
  (S.brews || []).filter(b => !b.archived).forEach(b => {
    add(b.brew_date,    'brew',   b.name || '?', 'var(--amber)', '🍺', b.id);
    add(b.bottling_date,'bottle', b.name || '?', '#10b981',      '🍾', b.id);
    if (b.brew_date && b.ferm_time) {
      const d = new Date(b.brew_date + 'T00:00:00'); d.setDate(d.getDate() + b.ferm_time);
      add(_ymd(d), 'ferm', b.name || '?', 'var(--info)', '🌡️', b.id);
    }
    // Dry hops
    if (b.brew_date && b.ferm_time && b.recipe_id) {
      const recipe = (S.recipes || []).find(r => r.id === b.recipe_id);
      if (recipe?.ingredients) {
        const dhByDay = {};
        recipe.ingredients
          .filter(i => i.category === 'houblon' && i.hop_type === 'dryhop' && i.hop_days > 0)
          .forEach(dh => {
            const k = dh.hop_days;
            if (!dhByDay[k]) dhByDay[k] = [];
            dhByDay[k].push(`${dh.quantity}\u202f${dh.unit} ${dh.name}`);
          });
        Object.entries(dhByDay).forEach(([days, hops]) => {
          const offset = (b.ferm_time | 0) - (parseInt(days) | 0);
          if (offset < 0) return;
          const d = new Date(b.brew_date + 'T00:00:00');
          d.setDate(d.getDate() + offset);
          add(_ymd(d), 'dryhop', `${b.name || '?'} — 🌿 Dry Hop (J${offset}) : ${hops.join(', ')}`, 'var(--hop)', '🌿', b.id);
        });
      }
    }
  });

  // Fin de refermentation (bières en cave)
  (S.beers || []).filter(b => b.refermentation && b.bottling_date && b.refermentation_days).forEach(b => {
    const d = new Date(b.bottling_date + 'T00:00:00');
    d.setDate(d.getDate() + b.refermentation_days);
    add(_ymd(d), 'referm', b.name || '?', 'var(--info)', '🔄', b.id);
  });

  // Brouillons
  (S.drafts || []).filter(dr => dr.target_date).forEach(dr => {
    add(dr.target_date, 'draft', dr.title || '?', '#8b5cf6', '📖', dr.id);
  });

  // Événements personnalisés (avec expansion récurrence)
  const savedYear = _calYear, savedMonth = _calMonth;
  _calYear = today.getFullYear(); _calMonth = today.getMonth();
  (S.customEvents || []).forEach(ev => {
    _expandCustomEvent(ev).forEach(ds => {
      add(ds, 'custom', ev.title, ev.color || 'var(--amber)', ev.emoji || '📅', ev.id);
      if (ev.brew_reminder) {
        const rd = new Date(ds + 'T00:00:00');
        rd.setDate(rd.getDate() - (ev.brew_reminder_days || appSettings.defaultBrewReminderDays || 45));
        add(_ymd(rd), 'remind', ev.title, '#a855f7', '🔔', ev.id);
      }
    });
  });
  _calYear = savedYear; _calMonth = savedMonth;

  // Événements mondiaux
  [today.getFullYear(), today.getFullYear() + 1].forEach(yr =>
    _brewingEvents(yr).forEach(we => add(we.date, 'world', we.label, we.color, we.emoji))
  );

  events.sort((a, b) => a.date.localeCompare(b.date));

  const container = document.getElementById('cal-agenda');
  if (!events.length) {
    container.innerHTML = `<div class="empty"><i class="fas fa-calendar-check"></i><p>${t('cal.agenda_empty')}</p></div>`;
    return;
  }

  const MONTHS     = t('cal.months');
  const DAY_NAMES  = t('cal.agenda_day_names');
  const MON_SHORT  = t('cal.agenda_months_short');
  const typeColor  = { brew:'var(--amber)', ferm:'var(--info)', bottle:'#10b981', referm:'var(--info)', dryhop:'var(--hop)', custom:'', remind:'#a855f7', draft:'#8b5cf6', world:'' };
  const thisWeekEnd  = _ymd(new Date(today.getFullYear(), today.getMonth(), today.getDate() + 7));
  const thisMonthEnd = _ymd(new Date(today.getFullYear(), today.getMonth() + 1, 0));

  let html = '', lastGroup = null;
  events.forEach(ev => {
    const d = new Date(ev.date + 'T00:00:00');
    let group;
    if (ev.date === todayStr)          group = t('cal.agenda_today');
    else if (ev.date < thisWeekEnd)    group = t('cal.agenda_this_week');
    else if (ev.date <= thisMonthEnd)  group = t('cal.agenda_this_month');
    else                               group = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    if (group !== lastGroup) { html += `<div class="agenda-group-head">${group}</div>`; lastGroup = group; }

    const dot  = ev.color || typeColor[ev.type] || 'var(--muted)';
    const ico  = ev.emoji || '📅';
    const ds   = `${DAY_NAMES[d.getDay()]} ${d.getDate()} ${MON_SHORT[d.getMonth()]}`;
    const edit = ev.type === 'custom'
      ? `<button class="btn btn-ghost btn-icon btn-sm" onclick="editCustomEvent(${ev.id})" style="flex-shrink:0"><i class="fas fa-pen"></i></button>`
      : ev.type === 'brew' ? `<button class="btn btn-ghost btn-icon btn-sm" onclick="navigate('brassins')" style="flex-shrink:0"><i class="fas fa-arrow-right"></i></button>` : '';

    html += `<div class="agenda-row">
      <div class="agenda-date">${ds}</div>
      <div class="agenda-dot" style="background:${dot}"></div>
      <div class="agenda-label">${ico} ${ev.label}</div>
      ${edit}
    </div>`;
  });
  container.innerHTML = html;
}

function _expandCustomEvent(ev) {
  const rec = ev.recurrence
    ? (typeof ev.recurrence === 'string' ? JSON.parse(ev.recurrence) : ev.recurrence)
    : null;
  if (!rec?.type) return [ev.event_date];
  const years = [_calYear - 1, _calYear, _calYear + 1];

  if (rec.type === 'yearly') {
    return years.map(year => `${year}-${ev.event_date.slice(5, 10)}`);
  }
  if (rec.type === 'yearly_nth_dow') {
    const month = parseInt(ev.event_date.slice(5, 7)) - 1;
    return years.map(year => _ymd(_nthDow(year, month, rec.dow, rec.nth))).filter(Boolean);
  }
  if (rec.type === 'monthly') {
    const day = parseInt(ev.event_date.slice(8, 10));
    const results = [];
    for (const year of years)
      for (let m = 0; m < 12; m++) {
        const d = new Date(year, m, day);
        if (d.getMonth() === m) results.push(_ymd(d));
      }
    return results;
  }
  if (rec.type === 'monthly_nth_dow') {
    const results = [];
    for (const year of years)
      for (let m = 0; m < 12; m++) {
        const d = _nthDow(year, m, rec.dow, rec.nth);
        if (d) results.push(_ymd(d));
      }
    return results;
  }
  if (rec.type === 'weekly') {
    const interval = Math.max(1, parseInt(rec.interval) || 1);
    const anchor = new Date(ev.event_date + 'T00:00:00');
    const rangeStart = new Date(_calYear - 1, 0, 1);
    const rangeEnd   = new Date(_calYear + 1, 11, 31);
    const cur = new Date(anchor);
    while (cur > rangeStart) cur.setDate(cur.getDate() - 7 * interval);
    cur.setDate(cur.getDate() + 7 * interval);
    const results = [];
    while (cur <= rangeEnd) { results.push(_ymd(new Date(cur))); cur.setDate(cur.getDate() + 7 * interval); }
    return results;
  }
  return [ev.event_date];
}

function renderCalendar() {
  const MONTHS = t('cal.months');
  document.getElementById('cal-title').textContent = `${MONTHS[_calMonth]} ${_calYear}`;

  // Construire les événements depuis S.brews
  _calEvStore = []; // réinitialisé à chaque rendu
  const events = {}; // { 'YYYY-MM-DD': [{type, label, brewId}] }
  const addEv = (date, ev) => {
    if (!date) return;
    const d = date.slice(0, 10);
    if (!events[d]) events[d] = [];
    events[d].push({ ...ev, date: d });
  };

  (S.brews || []).filter(b => !b.archived).forEach(b => {
    const label = b.name || t('brew.title');
    if (b.brew_date)     addEv(b.brew_date,    { type: 'brew',   label, id: b.id });
    if (b.bottling_date) addEv(b.bottling_date, { type: 'bottle', label, id: b.id });
    if (b.brew_date && b.ferm_time) {
      const d = new Date(b.brew_date + 'T00:00:00');
      d.setDate(d.getDate() + (b.ferm_time | 0));
      addEv(_ymd(d), { type: 'ferm', label: `${label} ${t('cal.ferm_abbr')}`, id: b.id });
    }
    // Dry hops
    if (b.brew_date && b.ferm_time && b.recipe_id) {
      const recipe = (S.recipes || []).find(r => r.id === b.recipe_id);
      if (recipe?.ingredients) {
        const dhByDay = {};
        recipe.ingredients
          .filter(i => i.category === 'houblon' && i.hop_type === 'dryhop' && i.hop_days > 0)
          .forEach(dh => {
            const k = dh.hop_days;
            if (!dhByDay[k]) dhByDay[k] = [];
            dhByDay[k].push(dh.name);
          });
        Object.entries(dhByDay).forEach(([days, hops]) => {
          const offset = (b.ferm_time | 0) - (parseInt(days) | 0);
          if (offset < 0) return;
          const d = new Date(b.brew_date + 'T00:00:00');
          d.setDate(d.getDate() + offset);
          addEv(_ymd(d), { type: 'dryhop', label: `${label} 🌿 DH`, color: 'var(--hop)', id: b.id });
        });
      }
    }
  });

  // Fin de refermentation (bières en cave)
  (S.beers || []).filter(b => b.refermentation && b.bottling_date && b.refermentation_days).forEach(b => {
    const label = b.name || t('cave.modal_title_add');
    const d = new Date(b.bottling_date + 'T00:00:00');
    d.setDate(d.getDate() + (b.refermentation_days | 0));
    addEv(_ymd(d), { type: 'referm', label: `🔄 ${label} — ${t('cave.refermentation_end')}`, color: 'var(--info)', id: b.id });
  });

  // Brouillons planifiés
  (S.drafts || []).filter(d => d.target_date).forEach(d => {
    addEv(d.target_date, { type: 'draft', label: d.title || 'Brouillon', color: d.color || '#8b5cf6', draftId: d.id });
  });

  // Événements personnalisés + leur rappel J-45
  (S.customEvents || []).forEach(ev => {
    const c = ev.color || '#f59e0b';
    const occurrences = _expandCustomEvent(ev);
    occurrences.forEach(eventDate => {
      addEv(eventDate, { type: 'custom', label: (ev.emoji || '📅') + ' ' + ev.title, color: c, customId: ev.id });
      if (ev.brew_reminder) {
        const days = ev.brew_reminder_days ?? appSettings.defaultBrewReminderDays ?? 45;
        const rd = new Date(eventDate + 'T00:00:00');
        rd.setDate(rd.getDate() - days);
        addEv(_ymd(rd), { type: 'custom_remind', label: '🔔 ' + t('cal.brew_for') + ' ' + ev.title, color: '#a855f7', eventDate, reminderDays: days, customId: ev.id });
      }
    });
  });

  // Événements brassicoles mondiaux + rappels J-45
  const _hiddenWorldEvs  = appSettings.hiddenWorldEvents   || [];
  const _worldOverrides  = appSettings.worldEventOverrides || {};
  const _allWorldEvs = [
    ..._brewingEvents(_calYear),
    ..._brewingEvents(_calYear - 1),
    ..._brewingEvents(_calYear + 1),
  ].filter(e => !_hiddenWorldEvs.includes(e.canonical || e.label));
  _allWorldEvs.forEach(e => {
    const eKey  = e.canonical || e.label;
    const ov    = _worldOverrides[eKey] || {};
    const emoji = ov.emoji || e.emoji;
    const lbl   = ov.label || e.label;
    const color = ov.color || e.color;
    const evYear = e.date.slice(0, 4);
    const date  = ov.date_mmdd ? `${evYear}-${ov.date_mmdd}` : e.date;
    addEv(date, { type: 'world', label: emoji + ' ' + lbl, color, origLabel: eKey });
    // Rappel brassage (délai global)
    const _remDays = appSettings.defaultBrewReminderDays ?? 45;
    const rd = new Date(date + 'T00:00:00');
    rd.setDate(rd.getDate() - _remDays);
    addEv(_ymd(rd), { type: 'remind', label: '🔔 ' + t('cal.brew_for') + ' ' + lbl, color: '#a855f7', eventDate: date, reminderDays: _remDays, origLabel: eKey });
  });

  // Calcul des cellules du mois
  const today    = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(_calYear, _calMonth, 1);
  const lastDay  = new Date(_calYear, _calMonth + 1, 0);
  // Lundi = 0 … Dimanche = 6
  const startDow = (firstDay.getDay() + 6) % 7; // lundi en premier
  const totalCells = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;

  let html = '';
  for (let i = 0; i < totalCells; i++) {
    const cellDate = new Date(_calYear, _calMonth, 1 - startDow + i);
    const isOther  = cellDate.getMonth() !== _calMonth;
    const isToday  = cellDate.getTime() === today.getTime();
    const key      = _ymd(cellDate);
    const dayEvs   = events[key] || [];

    const evHtml = dayEvs.map(ev => {
      const idx = _calEvStore.push(ev) - 1;
      if (ev.type === 'world') {
        return `<div class="cal-event" style="background:${ev.color}22;color:${ev.color};border:1px solid ${ev.color}44"
          onclick="calEvClick(event,${idx})">
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
        </div>`;
      }
      if (ev.type === 'remind') {
        return `<div class="cal-event" style="background:rgba(168,85,247,.12);color:#a855f7;border:1px dashed rgba(168,85,247,.4)"
          onclick="calEvClick(event,${idx})">
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
        </div>`;
      }
      if (ev.type === 'draft') {
        const c = ev.color || '#8b5cf6';
        return `<div class="cal-event" style="background:${c}22;color:${c};border:1px solid ${c}44"
          onclick="calEvClick(event,${idx})">
          <i class="fas fa-book-open" style="flex-shrink:0;font-size:.65rem"></i>
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
        </div>`;
      }
      if (ev.type === 'custom') {
        const c = ev.color || '#f59e0b';
        return `<div class="cal-event" style="background:${c}22;color:${c};border:1px solid ${c}55"
          onclick="event.stopPropagation();editCustomEvent(${ev.customId})" title="${t('common.edit')}">
          <i class="fas fa-star" style="flex-shrink:0;font-size:.6rem"></i>
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
          <i class="fas fa-pen" style="flex-shrink:0;font-size:.55rem;margin-left:auto;opacity:.6"></i>
        </div>`;
      }
      if (ev.type === 'custom_remind') {
        return `<div class="cal-event" style="background:rgba(168,85,247,.12);color:#a855f7;border:1px dashed rgba(168,85,247,.4)"
          onclick="calEvClick(event,${idx})">
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
        </div>`;
      }
      const cls  = ev.type === 'brew' ? 'cal-event-brew' : ev.type === 'bottle' ? 'cal-event-bottle' : ev.type === 'dryhop' ? 'cal-event-dryhop' : 'cal-event-ferm';
      const icon = ev.type === 'brew' ? 'fa-fire-burner'  : ev.type === 'bottle' ? 'fa-wine-bottle'   : ev.type === 'dryhop' ? 'fa-leaf'          : 'fa-clock';
      return `<div class="cal-event ${cls}" onclick="calEvClick(event,${idx})">
        <i class="fas ${icon}" style="flex-shrink:0;font-size:.65rem"></i>
        <span style="overflow:hidden;text-overflow:ellipsis">${esc(ev.label)}</span>
      </div>`;
    }).join('');

    html += `<div class="cal-cell${isOther?' cal-other-month':''}${isToday?' cal-today':''}">
      <div class="cal-day-num">${cellDate.getDate()}</div>
      ${evHtml}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
  _closeCalPopover();
  updateCalBadge();
}

function calEvClick(e, idx) {

    const brew = (S.brews || []).find(b => b.id === ev.id);
    const TYPE_LABELS = { brew:t('cal.legend_brew'), bottle:t('cal.legend_bottle'), ferm:t('cal.legend_ferm') };
    const TYPE_ICONS  = { brew:'fa-fire-burner', bottle:'fa-wine-bottle', ferm:'fa-clock' };
    const TYPE_COLORS = { brew:'var(--amber)', bottle:'#10b981', ferm:'var(--info)' };
    html = `
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
        <i class="fas ${TYPE_ICONS[ev.type]}" style="color:${TYPE_COLORS[ev.type]}"></i>

      </div>
      <div style="font-size:.78rem;color:var(--muted);margin-bottom:4px">${TYPE_LABELS[ev.type]} — ${esc(ev.date)}</div>`;
    if (brew) {
      const statusMap = { planned:t('brew.status_planned'), active:t('brew.status_in_progress'), completed:t('brew.status_completed') };
      html += `
      <div style="font-size:.78rem;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
        ${brew.style ? `<div style="color:var(--muted)">${esc(brew.style)}</div>` : ''}
        ${brew.volume_brewed ? `<div>Volume : <strong>${brew.volume_brewed} L</strong></div>` : ''}
        ${brew.og ? `<div>DI : <strong>${brew.og}</strong></div>` : ''}
        ${brew.fg ? `<div>DF : <strong>${brew.fg}</strong> — ABV : <strong>${brew.abv ?? '–'}%</strong></div>` : ''}

      </div>
      <button class="btn btn-sm btn-ghost" style="width:100%;margin-top:8px" onclick="_closeCalPopover();navigate('brassins')">
        <i class="fas fa-arrow-right"></i> ${t('cal.open_brew')}
      </button>`;
    }
  }
  cnt.innerHTML = html;

  // Positionnement du popover
  const rect = e.currentTarget.getBoundingClientRect();
  pop.style.display = 'block';
  const pw = pop.offsetWidth, ph = pop.offsetHeight;
  let left = rect.left, top = rect.bottom + 6;
  if (left + pw > window.innerWidth - 8)  left = window.innerWidth - pw - 8;
  if (top  + ph > window.innerHeight - 8) top  = rect.top - ph - 6;
  pop.style.left = left + 'px';
  pop.style.top  = top  + 'px';
}

function _closeCalPopover() {
  document.getElementById('cal-popover').style.display = 'none';

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('brewhome-theme', next);
  _updateThemeBtn(next);
}
function _updateThemeBtn(theme) {
  const btn = document.getElementById('btn-theme');
  if (!btn) return;
  if (theme === 'light') {
    btn.innerHTML = '<i class="fas fa-moon"></i>';
    btn.title = 'Passer en thème sombre';
  } else {
    btn.innerHTML = '<i class="fas fa-sun"></i>';
    btn.title = 'Passer en thème clair';
  }
}

}

function _ceUpdateRecurrenceUI() {
  const type = document.getElementById('ce-recurrence').value;
  const isNth = type === 'yearly_nth_dow' || type === 'monthly_nth_dow';
  document.getElementById('ce-rec-nth-wrap').style.display    = isNth ? 'flex' : 'none';
  document.getElementById('ce-rec-weekly-wrap').style.display = type === 'weekly' ? 'flex' : 'none';
  const suffix = document.getElementById('ce-rec-nth-suffix');
  if (suffix) suffix.textContent = type === 'monthly_nth_dow' ? t('cal.rec_of_month_monthly') : t('cal.rec_of_month');
  if (isNth) _ceAutoDetectNthDow(document.getElementById('ce-date').value);
}

function _ceOnDateChange() {
  const type = document.getElementById('ce-recurrence').value;
  if (type === 'yearly_nth_dow' || type === 'monthly_nth_dow')
    _ceAutoDetectNthDow(document.getElementById('ce-date').value);
}

function _ceAutoDetectNthDow(dateStr) {
  if (!dateStr) return;
  const d = new Date(dateStr + 'T00:00:00');
  const raw = Math.ceil(d.getDate() / 7);
  document.getElementById('ce-rec-dow').value = d.getDay();
  document.getElementById('ce-rec-nth').value = raw >= 5 ? -1 : raw;
}

function _ceGetRecurrence() {
  const type = document.getElementById('ce-recurrence').value;
  if (!type) return null;
  if (type === 'yearly')  return JSON.stringify({ type: 'yearly' });
  if (type === 'monthly') return JSON.stringify({ type: 'monthly' });
  if (type === 'yearly_nth_dow' || type === 'monthly_nth_dow') return JSON.stringify({
    type,
    nth: parseInt(document.getElementById('ce-rec-nth').value),
    dow: parseInt(document.getElementById('ce-rec-dow').value),
  });
  if (type === 'weekly') return JSON.stringify({
    type: 'weekly',
    interval: Math.max(1, parseInt(document.getElementById('ce-rec-weekly-interval').value) || 1),
  });
  return null;
}

function _ceSetRecurrence(rec) {
  const obj = rec ? (typeof rec === 'string' ? JSON.parse(rec) : rec) : null;
  document.getElementById('ce-recurrence').value = obj?.type || '';
  const isNth = obj?.type === 'yearly_nth_dow' || obj?.type === 'monthly_nth_dow';
  document.getElementById('ce-rec-nth-wrap').style.display    = isNth ? 'flex' : 'none';
  document.getElementById('ce-rec-weekly-wrap').style.display = obj?.type === 'weekly' ? 'flex' : 'none';
  const suffix = document.getElementById('ce-rec-nth-suffix');
  if (suffix) suffix.textContent = obj?.type === 'monthly_nth_dow' ? t('cal.rec_of_month_monthly') : t('cal.rec_of_month');
  if (isNth) {
    document.getElementById('ce-rec-nth').value = obj.nth ?? 1;
    document.getElementById('ce-rec-dow').value  = obj.dow ?? 1;
  }
  if (obj?.type === 'weekly')
    document.getElementById('ce-rec-weekly-interval').value = obj.interval ?? 1;
}

async function saveCustomEvent() {
  const title = document.getElementById('ce-title').value.trim();
  const date  = document.getElementById('ce-date').value;
  if (!title) { _ceAlert('Le titre est requis'); return; }
  if (!date)  { _ceAlert('La date est requise'); return; }

  const payload = {
    title,
    emoji:          document.getElementById('ce-emoji').value.trim() || '📅',
    event_date:     date,
    color:          document.getElementById('ce-color').value,
    notes:          document.getElementById('ce-notes').value.trim() || null,
    brew_reminder:       document.getElementById('ce-brew-reminder').checked,
    brew_reminder_days:  document.getElementById('ce-brew-reminder-days').value !== ''
                           ? parseInt(document.getElementById('ce-brew-reminder-days').value) || null
                           : null,
    telegram_notify:     document.getElementById('ce-telegram').checked,
    style:          document.getElementById('ce-style').value.trim() || null,
    recipe_id:      parseInt(document.getElementById('ce-recipe-id').value) || null,
    draft_id:       parseInt(document.getElementById('ce-draft-id').value)  || null,
    recurrence:     _ceGetRecurrence(),
  };

  const id = document.getElementById('ce-id').value;
  try {
    let saved;
    if (id) {
      saved = await api('PUT', `/api/custom_events/${id}`, payload);
      const idx = S.customEvents.findIndex(x => x.id === parseInt(id));
      if (idx !== -1) S.customEvents[idx] = saved;
    } else {
      saved = await api('POST', '/api/custom_events', payload);
      S.customEvents.push(saved);
    }
    closeModal('custom-event-modal');
    renderCalendar();
    toast(id ? t('settings.toast.event_modified') : t('settings.toast.event_created'), 'success');
  } catch(e) { _ceAlert('Erreur lors de l\'enregistrement'); }
}

// ── Suggests : style BJCP, recette, brouillon ─────────────────────────────
function ceStyleSearch(input) {
  const q   = input.value.toLowerCase().trim();
  const sug = document.getElementById('ce-style-sug');
  sug.classList.remove('open');
  let html = '', count = 0;
  const commonMatches = [];
  for (const types of Object.values(BEER_TYPES))
    types.forEach(t => { if (!q || t.toLowerCase().includes(q)) commonMatches.push(t); });
  if (commonMatches.length) {
    html += `<div class="ing-suggest-cat">Styles courants</div>`;
    commonMatches.slice(0, q ? 30 : 10).forEach(t => {
      html += `<div class="ing-suggest-item" onmousedown="selectCeStyle(${JSON.stringify(t).replace(/"/g,'&quot;')})"><span>${esc(t)}</span></div>`;
      count++;
    });
  }
  const bycat = _bjcpByCategory(s => !q || s.name.toLowerCase().includes(q) || s.category.toLowerCase().includes(q));
  for (const [cat, styles] of Object.entries(bycat)) {
    html += `<div class="ing-suggest-cat" style="color:var(--gold)">BJCP — ${esc(cat)}</div>`;
    styles.forEach(s => {
      html += `<div class="ing-suggest-item" onmousedown="selectCeStyle(${JSON.stringify(s.name).replace(/"/g,'&quot;')})"><span style="font-size:.83rem">${esc(s.name)}</span></div>`;
      count++;
    });
    if (!q && count > 50) break;
  }
  if (!html) return;
  sug.innerHTML = html;
  sug.classList.add('open');
}
function closeCeStyleSug() { document.getElementById('ce-style-sug')?.classList.remove('open'); }
function selectCeStyle(name) { document.getElementById('ce-style').value = name; closeCeStyleSug(); }

  const q   = input.value.toLowerCase().trim();
  const sug = document.getElementById('ce-draft-sug');
  const items = (S.drafts || []).filter(d => !q || (d.title||'').toLowerCase().includes(q)).slice(0, 20);
  if (!items.length) { sug.classList.remove('open'); return; }
  sug.innerHTML = items.map(d =>
    `<div class="ing-suggest-item" onmousedown="selectCeDraft(${d.id},${JSON.stringify(d.title||'Brouillon').replace(/"/g,'&quot;')})">
      <i class="fas fa-book-open" style="font-size:.7rem;color:#8b5cf6;margin-right:4px"></i>
      <span>${esc(d.title||'Brouillon')}</span>
      ${d.style ? `<span style="color:var(--muted);font-size:.75rem;margin-left:6px">${esc(d.style)}</span>` : ''}
    </div>`
  ).join('');
  sug.classList.add('open');
}
function closeCeDraftSug() { document.getElementById('ce-draft-sug')?.classList.remove('open'); }
function selectCeDraft(id, name) {
  document.getElementById('ce-draft-id').value    = id;
  document.getElementById('ce-draft-name').value  = name;
  // Pré-remplit style si vide
  const dr = (S.drafts||[]).find(d=>d.id===id);
  if (dr?.style && !document.getElementById('ce-style').value)
    document.getElementById('ce-style').value = dr.style;
  closeCeDraftSug();
}

async function deleteCustomEvent() {
  const id = document.getElementById('ce-id').value;
  if (!id || !await confirmModal(t('settings.toast.custom_event_confirm_delete'), { danger: true })) return;
  try {
    await api('DELETE', `/api/custom_events/${id}`);
    S.customEvents = S.customEvents.filter(x => x.id !== parseInt(id));
    closeModal('custom-event-modal');
    renderCalendar();
    toast(t('settings.toast.event_deleted'), 'success');
  } catch(e) { _ceAlert('Erreur lors de la suppression'); }
}


</script>

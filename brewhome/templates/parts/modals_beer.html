        <div class="field"><label><span data-i18n="cave.init_75">Remplissage initial 75cl</span> <span style="font-size:.73rem;color:var(--muted);font-weight:400;text-transform:none" data-i18n="cave.historical">(historique)</span></label><input type="number" id="beer-f-75-init" value="0" min="0"></div>

      <div class="field" style="margin-bottom:14px"><label data-i18n="common.description">Description</label><textarea id="beer-f-desc" placeholder="Notes de dégustation, arômes..."></textarea></div>
      <div class="form-row cols-2" style="margin-bottom:14px" id="beer-f-dates-wrap">
        <div class="field"><label data-i18n="brew.field_date">Date du brassin</label><input type="date" id="beer-f-brew-date"></div>
        <div class="field"><label data-i18n="brew.field_bottling">Date d'embouteillage</label><input type="date" id="beer-f-bottling-date"></div>
      </div>
      <div class="field" style="margin-bottom:14px">
        <label><i class="fas fa-wine-barrel" style="color:var(--amber)"></i> <span data-i18n="cave.field_keg">Volume en fût (L)</span> <span style="font-size:.73rem;color:var(--muted);font-weight:400;text-transform:none" data-i18n="cave.keg_hint">— laisser vide si uniquement en bouteilles</span></label>
        <input type="number" id="beer-f-keg" step="0.1" min="0" placeholder="Ex : 19" oninput="updateKegInitWrap()">

      <div class="form-row cols-2" id="beer-f-keg-init-wrap" style="display:none;margin-bottom:14px">
        <div class="field"><label><span data-i18n="cave.keg_init">Volume initial en fût (L)</span> <span style="font-size:.73rem;color:var(--muted);font-weight:400;text-transform:none" data-i18n="cave.historical">(historique)</span></label><input type="number" id="beer-f-keg-init" step="0.1" min="0" value="0"></div>
      </div>
      <div class="field"><label data-i18n="cave.field_photo">Photo</label>

        </div>
      </div>

      <input type="hidden" id="beer-f-photo-b64">

      <button class="btn btn-primary" onclick="saveBeer()"><i class="fas fa-floppy-disk"></i> <span data-i18n="common.save">Enregistrer</span></button>
    </div>

<!-- Modal Fiche de dégustation -->
<div class="modal-overlay" id="tasting-modal" onclick="if(event.target===this)closeModal('tasting-modal')">
  <div class="modal" style="max-width:620px">
    <div class="modal-head">
      <h3><i class="fas fa-wine-glass" style="color:var(--amber)"></i> <span id="tasting-modal-title"></span></h3>
      <button class="modal-close" onclick="closeModal('tasting-modal')">✕</button>
    </div>
    <div class="modal-body">
      <!-- Date + Note -->
      <div style="display:flex;align-items:flex-end;gap:20px;margin-bottom:16px;flex-wrap:wrap">
        <div class="field" style="margin-bottom:0">
          <label data-i18n="tasting.date">Date de dégustation</label>
          <input type="date" id="tasting-f-date" style="max-width:200px">
        </div>
        <div class="field" style="margin-bottom:0">
          <label data-i18n="tasting.rating">Note globale</label>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="star-input" id="tasting-star-input">
              <span class="star" onclick="setTastingRating(1)">★</span>
              <span class="star" onclick="setTastingRating(2)">★</span>
              <span class="star" onclick="setTastingRating(3)">★</span>
              <span class="star" onclick="setTastingRating(4)">★</span>
              <span class="star" onclick="setTastingRating(5)">★</span>
            </div>
            <span id="tasting-rating-label" style="font-size:.82rem;color:var(--muted)"></span>
          </div>
        </div>
      </div>
      <!-- Scores radar (1-10) -->
      <div style="margin-bottom:14px">
        <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:8px" data-i18n="tasting.scores_title">Scores (1–10)</div>
        <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <label style="font-size:.7rem;color:var(--info);font-weight:600;white-space:nowrap"><i class="fas fa-eye"></i></label>
            <input type="number" id="tasting-s-appearance" min="1" max="10" step="1" style="width:100%;text-align:center;padding:4px 2px">
            <span style="font-size:.65rem;color:var(--muted)" data-i18n="tasting.appearance">Apparence</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <label style="font-size:.7rem;color:var(--hop);font-weight:600;white-space:nowrap"><i class="fas fa-wind"></i></label>
            <input type="number" id="tasting-s-aroma" min="1" max="10" step="1" style="width:100%;text-align:center;padding:4px 2px">
            <span style="font-size:.65rem;color:var(--muted)" data-i18n="tasting.aroma">Arôme</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <label style="font-size:.7rem;color:var(--malt);font-weight:600;white-space:nowrap"><i class="fas fa-droplet"></i></label>
            <input type="number" id="tasting-s-flavor" min="1" max="10" step="1" style="width:100%;text-align:center;padding:4px 2px">
            <span style="font-size:.65rem;color:var(--muted)" data-i18n="tasting.flavor">Goût</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <label style="font-size:.7rem;color:var(--amber);font-weight:600;white-space:nowrap"><i class="fas fa-fire"></i></label>
            <input type="number" id="tasting-s-bitterness" min="1" max="10" step="1" style="width:100%;text-align:center;padding:4px 2px">
            <span style="font-size:.65rem;color:var(--muted)" data-i18n="tasting.bitterness">Amertume</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <label style="font-size:.7rem;color:var(--info);font-weight:600;white-space:nowrap"><i class="fas fa-circle-half-stroke"></i></label>
            <input type="number" id="tasting-s-mouthfeel" min="1" max="10" step="1" style="width:100%;text-align:center;padding:4px 2px">
            <span style="font-size:.65rem;color:var(--muted)" data-i18n="tasting.mouthfeel">Bouche</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <label style="font-size:.7rem;color:var(--amber);font-weight:600;white-space:nowrap"><i class="fas fa-hourglass-end"></i></label>
            <input type="number" id="tasting-s-finish" min="1" max="10" step="1" style="width:100%;text-align:center;padding:4px 2px">
            <span style="font-size:.65rem;color:var(--muted)" data-i18n="tasting.finish">Finale</span>
          </div>
        </div>
      </div>
      <!-- Nez / Bouche / Finale — 3 colonnes principales -->
      <div class="form-row" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:0">
        <div class="field">
          <label><i class="fas fa-wind" style="color:var(--hop)"></i> <span data-i18n="tasting.aroma">Nez / Arôme</span></label>
          <textarea id="tasting-f-aroma" style="height:90px;resize:vertical" data-i18n-placeholder="tasting.ph_aroma"></textarea>
        </div>
        <div class="field">
          <label><i class="fas fa-circle-half-stroke" style="color:var(--info)"></i> <span data-i18n="tasting.mouthfeel">Bouche</span></label>
          <textarea id="tasting-f-mouthfeel" style="height:90px;resize:vertical" data-i18n-placeholder="tasting.ph_mouthfeel"></textarea>
        </div>
        <div class="field">
          <label><i class="fas fa-hourglass-end" style="color:var(--amber)"></i> <span data-i18n="tasting.finish">Finale</span></label>
          <textarea id="tasting-f-finish" style="height:90px;resize:vertical" data-i18n-placeholder="tasting.ph_finish"></textarea>
        </div>
      </div>
      <!-- Secondaires : Goût / Amertume / Apparence -->
      <div class="form-row" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:0">
        <div class="field">
          <label><i class="fas fa-droplet" style="color:var(--malt)"></i> <span data-i18n="tasting.flavor">Goût</span></label>
          <textarea id="tasting-f-flavor" style="height:72px;resize:vertical" data-i18n-placeholder="tasting.ph_flavor"></textarea>
        </div>
        <div class="field">
          <label><i class="fas fa-fire" style="color:var(--amber)"></i> <span data-i18n="tasting.bitterness">Amertume</span></label>
          <textarea id="tasting-f-bitterness" style="height:72px;resize:vertical" data-i18n-placeholder="tasting.ph_bitterness"></textarea>
        </div>
        <div class="field">
          <label><i class="fas fa-eye" style="color:var(--info)"></i> <span data-i18n="tasting.appearance">Apparence</span></label>
          <textarea id="tasting-f-appearance" style="height:72px;resize:vertical" data-i18n-placeholder="tasting.ph_appearance"></textarea>
        </div>
      </div>
      <!-- Commentaire libre -->
      <div class="field" style="margin-bottom:0">
        <label><i class="fas fa-comment" style="color:var(--muted)"></i> <span data-i18n="tasting.overall_notes">Commentaire libre</span></label>
        <textarea id="tasting-f-overall" style="height:60px;resize:vertical" data-i18n-placeholder="tasting.ph_overall"></textarea>
      </div>
      <input type="hidden" id="tasting-f-rating">
      <input type="hidden" id="tasting-f-beer-id">
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('tasting-modal')" data-i18n="common.cancel">Annuler</button>
      <button class="btn btn-primary" onclick="saveTasting()"><i class="fas fa-floppy-disk"></i> <span data-i18n="common.save">Enregistrer</span></button>
    </div>
  </div>
</div>

<!-- Modal Transfert fût → bouteilles -->
<div class="modal-overlay" id="keg-transfer-modal" onclick="if(event.target===this)closeModal('keg-transfer-modal')">
  <div class="modal" style="max-width:480px">
    <div class="modal-head">
      <h3><i class="fas fa-wine-barrel" style="color:var(--amber)"></i> <span data-i18n="cave.keg_transfer">Transvaser du fût</span></h3>
      <button class="modal-close" onclick="closeModal('keg-transfer-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:16px;padding:12px;background:var(--card2);border-radius:9px">
        <div id="keg-tr-name" style="font-weight:700;margin-bottom:4px"></div>
        <div id="keg-tr-current" style="font-size:.85rem;color:var(--muted)"></div>
      </div>
      <div class="field" style="margin-bottom:12px">
        <label data-i18n="cave.keg_consumed">Bière consommée directement du fût (L)</label>
        <input type="number" id="keg-tr-consumed" step="0.1" min="0" value="0" placeholder="0" oninput="updateKegCalc()">
      </div>
      <div style="display:flex;gap:12px;margin-bottom:14px">
        <div class="field" style="flex:1"><label data-i18n="cave.bottles_33">Bouteilles 33cl</label><input type="number" id="keg-tr-33" step="1" min="0" value="0" oninput="updateKegCalc()"></div>
        <div class="field" style="flex:1"><label data-i18n="cave.bottles_75">Bouteilles 75cl</label><input type="number" id="keg-tr-75" step="1" min="0" value="0" oninput="updateKegCalc()"></div>
      </div>
      <div id="keg-tr-calc" style="padding:12px;border-radius:9px;background:var(--card2);font-size:.88rem;line-height:2"></div>
